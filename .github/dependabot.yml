version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      routine-root-dependencies:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: "/backend"
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      routine-backend-dependencies:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      routine-actions:
        patterns:
          - "*"
