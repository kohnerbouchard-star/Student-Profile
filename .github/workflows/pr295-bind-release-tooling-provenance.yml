name: PR295 Bind Release Tooling Provenance

on:
  push:
    branches:
      - agent/production-integration-gate-v1
    paths:
      - ".github/workflows/pr295-bind-release-tooling-provenance.yml"

permissions:
  contents: write

concurrency:
  group: pr295-bind-release-tooling-provenance
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/production-integration-gate-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Bind tooling commit and remove carrier
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/release-platform-lib.mjs')
          text = path.read_text(encoding='utf-8')
          old = '''      repository: process.env.GITHUB_REPOSITORY ?? "kohnerbouchard-star/Student-Profile",
              sourceCommit: commit,
              deterministicArchive: "gnu-tar+gzip-n",
          '''
          new = '''      repository: process.env.GITHUB_REPOSITORY ?? "kohnerbouchard-star/Student-Profile",
              sourceCommit: commit,
              toolingCommit: process.env.RELEASE_TOOLING_COMMIT ?? commit,
              deterministicArchive: "gnu-tar+gzip-n",
          '''
          if text.count(old) != 1:
              raise SystemExit('Expected provenance source block was not found exactly once')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          rm -f .github/workflows/pr295-bind-release-tooling-provenance.yml
          git add scripts/release-platform-lib.mjs .github/workflows/pr295-bind-release-tooling-provenance.yml
          git commit --amend --no-edit
          git push --force-with-lease origin HEAD:agent/production-integration-gate-v1
