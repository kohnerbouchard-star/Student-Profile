name: Messaging Source Fix Carrier

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - ".github/workflows/messaging-source-fix-carrier.yml"

permissions:
  contents: write
  statuses: write

concurrency:
  group: messaging-source-fix-carrier-pr-248
  cancel-in-progress: false

jobs:
  apply:
    if: >-
      github.event.pull_request.number == 248 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/messaging-communication-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Apply atomic slot-four compatibility repair
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'agent/messaging-communication-v1';
            const migrationPath = 'backend/supabase/migrations/20260721153000_compat_messaging_player_status_v1.sql';
            const slotOnePath = 'backend/supabase/migrations/20260721150000_add_messaging_communication_v2.sql';
            const testPath = 'backend/src/domains/messaging/tests/messagingCompatibilityMigrationContract.test.ts';
            const helperPath = '.github/workflows/messaging-source-fix-carrier.yml';

            async function readText(path) {
              const response = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
              if (Array.isArray(response.data) || response.data.type !== 'file') {
                throw new Error(`Expected file at ${path}`);
              }
              return Buffer.from(response.data.content, 'base64').toString('utf8');
            }

            function extractFunction(source, name) {
              const startNeedle = `create or replace function public.${name}(`;
              const start = source.indexOf(startNeedle);
              if (start < 0) throw new Error(`Missing ${startNeedle}`);
              const endNeedle = '$function$;';
              const end = source.indexOf(endNeedle, start);
              if (end < 0) throw new Error(`Missing terminator for ${name}`);
              return source.slice(start, end + endNeedle.length);
            }

            let migration = await readText(migrationPath);
            const slotOne = await readText(slotOnePath);
            let test = await readText(testPath);

            if (!migration.includes('v_initial_created_at := clock_timestamp();')) {
              migration = migration.replace(
                '  v_message public.messages%rowtype;\n  v_notification_id uuid;\n',
                '  v_message public.messages%rowtype;\n  v_notification_id uuid;\n  v_initial_created_at timestamptz;\n',
              );
              migration = migration.replace(
                "  insert into public.messages (\n    thread_id, game_session_id, sender_type, sender_player_id, body, idempotency_key\n  ) values (\n    v_thread.id, p_game_session_id, 'player', p_player_id, v_body, v_key || ':initial'\n  ) returning * into v_message;\n",
                "  v_initial_created_at := clock_timestamp();\n\n  insert into public.messages (\n    thread_id, game_session_id, sender_type, sender_player_id, body, idempotency_key,\n    created_at, updated_at\n  ) values (\n    v_thread.id, p_game_session_id, 'player', p_player_id, v_body, v_key || ':initial',\n    v_initial_created_at, v_initial_created_at\n  ) returning * into v_message;\n",
              );
            }

            migration = migration.replace(
              ') on conflict (thread_id, player_id) do nothing;',
              ') on conflict on constraint message_thread_participants_pkey do nothing;',
            );

            const sectionMarker = '-- Folded stable Player-status compatibility for legacy Messaging entry points.';
            if (!migration.includes(sectionMarker)) {
              const names = [
                'read_player_messages_v1',
                'send_player_message_atomic_v1',
                'mark_player_message_thread_read_v1',
                'create_admin_message_thread_atomic_v1',
              ];
              const overrides = names.map((name) => {
                let fn = extractFunction(slotOne, name)
                  .replaceAll("and player_row.archived_at is null", "and player_row.status = 'active'");
                if (name === 'mark_player_message_thread_read_v1') {
                  const oldUpdate = "  update public.message_thread_participants\n  set last_read_at = greatest(coalesce(last_read_at, joined_at), v_read_at)\n  where game_session_id = p_game_session_id\n    and thread_id = v_thread_id\n    and player_id = p_player_id;";
                  const newUpdate = "  update public.message_thread_participants as participant_row\n  set last_read_at = greatest(\n    coalesce(participant_row.last_read_at, participant_row.joined_at),\n    v_read_at\n  )\n  where participant_row.game_session_id = p_game_session_id\n    and participant_row.thread_id = v_thread_id\n    and participant_row.player_id = p_player_id;";
                  if (!fn.includes(oldUpdate)) throw new Error('Missing read-receipt update anchor');
                  fn = fn.replace(oldUpdate, newUpdate);
                }
                return fn;
              });
              if (overrides.join('\n').includes('archived_at')) {
                throw new Error('Legacy Player archive dependency remained in overrides');
              }
              if (!migration.trimEnd().endsWith('commit;')) throw new Error('Slot four is not transaction wrapped');
              migration = migration.trimEnd().slice(0, -'commit;'.length).trimEnd()
                + `\n\n${sectionMarker}\n`
                + '-- These replacements keep the assigned four-slot migration family authoritative.\n\n'
                + overrides.join('\n\n')
                + '\n\ncommit;\n';
            }

            const requiredMigrationFragments = [
              'v_initial_created_at := clock_timestamp();',
              'on conflict on constraint message_thread_participants_pkey do nothing;',
              'create or replace function public.read_player_messages_v1(',
              'create or replace function public.send_player_message_atomic_v1(',
              'create or replace function public.mark_player_message_thread_read_v1(',
              'create or replace function public.create_admin_message_thread_atomic_v1(',
              'update public.message_thread_participants as participant_row',
            ];
            for (const fragment of requiredMigrationFragments) {
              if (!migration.toLowerCase().includes(fragment.toLowerCase())) throw new Error(`Missing migration fragment: ${fragment}`);
            }
            if (migration.includes('archived_at')) throw new Error('Slot four still references archived_at');

            const testFragments = [
              '    "create or replace function public.read_player_messages_v1",\n',
              '    "create or replace function public.send_player_message_atomic_v1",\n',
              '    "create or replace function public.mark_player_message_thread_read_v1",\n',
              '    "create or replace function public.create_admin_message_thread_atomic_v1",\n',
              '    "v_initial_created_at := clock_timestamp()",\n',
              '    "created_at, updated_at",\n',
              '    "v_initial_created_at, v_initial_created_at",\n',
              '    "update public.message_thread_participants as participant_row",\n',
              '    "participant_row.thread_id = v_thread_id",\n',
              '    "on conflict on constraint message_thread_participants_pkey do nothing",\n',
            ];
            const testAnchor = '    "player_message_recipient_not_found",\n';
            if (!test.includes(testAnchor)) throw new Error('Missing test anchor');
            for (const fragment of testFragments) {
              if (!test.includes(fragment)) test = test.replace(testAnchor, testAnchor + fragment);
            }

            const ref = await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
            const parentSha = ref.data.object.sha;
            if (parentSha !== context.payload.pull_request.head.sha) {
              throw new Error(`Head moved before repair: ${parentSha}`);
            }
            const parent = await github.rest.git.getCommit({ owner, repo, commit_sha: parentSha });
            const migrationBlob = await github.rest.git.createBlob({ owner, repo, content: migration, encoding: 'utf-8' });
            const testBlob = await github.rest.git.createBlob({ owner, repo, content: test, encoding: 'utf-8' });
            const tree = await github.rest.git.createTree({
              owner,
              repo,
              base_tree: parent.data.tree.sha,
              tree: [
                { path: migrationPath, mode: '100644', type: 'blob', sha: migrationBlob.data.sha },
                { path: testPath, mode: '100644', type: 'blob', sha: testBlob.data.sha },
                { path: helperPath, mode: '100644', type: 'blob', sha: null },
              ],
            });
            const commit = await github.rest.git.createCommit({
              owner,
              repo,
              message: 'fix(messaging): fold connected staging compatibility repairs',
              tree: tree.data.sha,
              parents: [parentSha],
            });
            await github.rest.git.updateRef({
              owner,
              repo,
              ref: `heads/${branch}`,
              sha: commit.data.sha,
              force: false,
            });
            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha: commit.data.sha,
              state: 'success',
              context: 'messaging/source-fix-carrier',
              description: 'Slot-four staging compatibility repairs applied atomically',
              target_url: `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
            });
            core.notice(`Created permanent Messaging head ${commit.data.sha}`);
