name: Roadmap Audit Metadata Seal

on:
  pull_request:
    paths:
      - ".github/workflows/roadmap-audit-metadata-seal-v1.yml"
      - ".roadmap-audit-seal/**"
      - "docs/roadmaps/econovaria-beta-completion-roadmap-v1.md"

permissions:
  contents: write

jobs:
  seal:
    if: github.head_ref == 'agent/roadmap-audit-metadata-seal-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Check out audit-seal branch
        uses: actions/checkout@v7
        with:
          ref: agent/roadmap-audit-metadata-seal-v1
          fetch-depth: 0

      - name: Seal audit metadata semantics
        run: python3 .roadmap-audit-seal/patch.py

      - name: Validate patch formatting
        run: git diff --check

      - name: Remove one-use files and commit roadmap
        shell: bash
        run: |
          rm -rf .roadmap-audit-seal
          rm .github/workflows/roadmap-audit-metadata-seal-v1.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(roadmap): seal comprehensive audit metadata"
          git push origin HEAD:agent/roadmap-audit-metadata-seal-v1
