      - "backend/supabase/functions/admin-api/index.ts"
      - "backend/supabase/functions/admin-api/businessBankingOperations*.ts"
      - "assets/**"
      - "favicon.ico"
      - "index.html"
      - "frontend/src/core/bootstrap.js"
      - "frontend/src/features/auth/**"
      - "frontend/src/features/contracts/**"
      - "frontend/src/styles/screens/contracts.css"
      - "frontend/src/core/api.js"
      - "scripts/asset-reference-audit.mjs"
      - "scripts/admin-v606-full-drift-audit.mjs"
      - "scripts/admin-session-manager-smoke.mjs"
      - "scripts/admin-shell-smoke.mjs"
      - "scripts/admin-browser-smoke.mjs"
      - "scripts/admin-modal-accessibility-source-smoke.mjs"
      - "scripts/admin-modal-accessibility-smoke.mjs"
      - "scripts/admin-mounted-modal-focus-smoke.mjs"
      - "scripts/admin-mounted-modal-focus-reconciled-smoke.mjs"
      - "scripts/admin-keyboard-navigation-source-smoke.mjs"
      - "scripts/admin-keyboard-navigation-smoke.mjs"
      - "scripts/admin-mounted-keyboard-navigation-smoke.mjs"
