      - "scripts/admin-keyboard-focus-order-smoke.mjs"
      - "scripts/admin-inventory-redemption-queue-contract.mjs"
      - "scripts/admin-inventory-redemption-queue-ui-smoke.mjs"
      - "scripts/admin-stabilization-smoke.mjs"
      - "scripts/admin-quality-smoke-fixture.mjs"
      - "scripts/admin-contract-validation-smoke.mjs"
      - "scripts/admin-loading-scanner-smoke.mjs"
      - "scripts/admin-loading-scope-contract.mjs"
      - "scripts/admin-data-state-contracts-smoke.mjs"
      - "scripts/admin-attendance-reward-settings-smoke.mjs"
      - "scripts/admin-settings-disclosure-smoke.mjs"
      - "scripts/admin-account-surfaces-smoke.mjs"
      - "scripts/admin-create-actions-smoke.mjs"
      - "scripts/admin-contract-end-to-end-smoke.mjs"
      - "scripts/admin-contract-review-source-audit.mjs"
      - "scripts/admin-contract-review-smoke.mjs"
      - "scripts/player-contracts-workspace-smoke.mjs"
      - "scripts/admin-player-create-ux-smoke.mjs"
      - "scripts/admin-classroom-write-fallback-smoke.mjs"
      - "scripts/admin-player-access-code-smoke.mjs"
      - "scripts/admin-player-identity-smoke.mjs"
      - "scripts/admin-player-drawer-smoke.mjs"
      - "scripts/player-login-identity-smoke.mjs"
      - "scripts/admin-attendance-action-smoke.mjs"
      - ".github/workflows/admin-shell-smoke.yml"

permissions:
  contents: read

jobs:
  admin-shell-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm

      - name: Pin npm
        run: npm install --global npm@10.9.8

      - name: Install repository dependencies
        run: npm ci

      - name: Validate repository-owned assets
        run: node scripts/asset-reference-audit.mjs

      - name: Validate admin shell source contracts
        run: node scripts/admin-shell-smoke.mjs

      - name: Audit Admin loading scope and quick actions
        run: node scripts/admin-loading-scope-contract.mjs

      - name: Validate accepted v606 drift boundaries
        run: node scripts/admin-v606-full-drift-audit.mjs

      - name: Validate admin session refresh and rotation
        run: node scripts/admin-session-manager-smoke.mjs

      - name: Audit accepted admin review actions
        run: node scripts/admin-contract-review-source-audit.mjs

      - name: Validate classroom write fallback
        run: node scripts/admin-classroom-write-fallback-smoke.mjs

      - name: Validate player access code issuance
        run: node scripts/admin-player-access-code-smoke.mjs

      - name: Validate inventory redemption queue contracts
        run: node scripts/admin-inventory-redemption-queue-contract.mjs

      - name: Validate Admin modal accessibility contracts
        run: node scripts/admin-modal-accessibility-source-smoke.mjs

      - name: Install browser smoke runtime
        run: |
          npx playwright install --with-deps chromium

      - name: Materialize browser-only runtime fixture
        shell: bash
        run: |
          set -euo pipefail
          cat > runtime-config.env.js <<'EOF'
          window.__ECONOVARIA_RUNTIME_CONFIG__ = Object.freeze({
            environment: "development",
            projectRef: "runtimefixture123456",
            supabaseUrl: "https://runtimefixture123456.supabase.co",
            supabasePublishableKey: "sb_publishable_runtime_fixture_1234567890"
          });
          EOF

      - name: Exercise Admin keyboard navigation
        run: node scripts/admin-keyboard-navigation-smoke.mjs

      - name: Start static preview
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/admin-smoke-server.log 2>&1 &
          echo $! > /tmp/admin-smoke-server.pid
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/admin/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/admin-smoke-server.log
          false

      - name: Exercise Admin data-state contracts
        run: node scripts/admin-data-state-contracts-smoke.mjs

      - name: Exercise nested Admin modal accessibility
        run: node scripts/admin-modal-accessibility-smoke.mjs

      - name: Audit mounted Admin operational modal focus
        run: node scripts/admin-mounted-modal-focus-reconciled-smoke.mjs

      - name: Exercise inventory redemption review queue
        run: |
          mkdir -p admin-browser-smoke-artifacts/redemptions
          set -o pipefail
          node scripts/admin-inventory-redemption-queue-ui-smoke.mjs 2>&1 | tee admin-browser-smoke-artifacts/redemptions/run.log

      - name: Audit mounted keyboard-only Admin navigation
        run: node scripts/admin-mounted-keyboard-navigation-smoke.mjs

      - name: Exercise keyboard-only Admin create and scanner workflows
        run: node scripts/admin-keyboard-workflows-smoke.mjs

      - name: Prove page focus order and in-flight keyboard exclusion
        run: node scripts/admin-keyboard-focus-order-smoke.mjs

      - name: Exercise player identity login
        run: node scripts/player-login-identity-smoke.mjs

      - name: Exercise student contracts workspace
        run: node scripts/player-contracts-workspace-smoke.mjs

      - name: Audit admin stabilization boundaries
        run: node scripts/admin-stabilization-smoke.mjs

      - name: Audit contract validation and button states
        run: node scripts/admin-contract-validation-smoke.mjs

      - name: Audit verification skeleton and scanner lifecycle
        run: node scripts/admin-loading-scanner-smoke.mjs

      - name: Audit attendance reward settings and local currency
        run: node scripts/admin-attendance-reward-settings-smoke.mjs

      - name: Keep custom Settings open during edits
        run: node scripts/admin-settings-disclosure-smoke.mjs

      - name: Audit desktop navigation and layout
        env:
          ADMIN_SMOKE_VIEWPORT: 1440x1000
          ADMIN_SMOKE_ARTIFACT_DIR: admin-browser-smoke-artifacts/desktop
        run: node scripts/admin-browser-smoke.mjs

      - name: Audit compact desktop navigation and layout
        env:
          ADMIN_SMOKE_VIEWPORT: 1024x768
          ADMIN_SMOKE_ARTIFACT_DIR: admin-browser-smoke-artifacts/compact
        run: node scripts/admin-browser-smoke.mjs

      - name: Audit narrow-window navigation and layout
        env:
          ADMIN_SMOKE_VIEWPORT: 768x900
          ADMIN_SMOKE_ARTIFACT_DIR: admin-browser-smoke-artifacts/narrow
        run: node scripts/admin-browser-smoke.mjs

      - name: Audit all six v606 account surfaces
        run: node scripts/admin-account-surfaces-smoke.mjs

      - name: Open every admin create workflow
        run: node scripts/admin-create-actions-smoke.mjs

      - name: Exercise complete contract create payload
        run: node scripts/admin-contract-end-to-end-smoke.mjs

      - name: Exercise accepted admin contract review flow
        run: node scripts/admin-contract-review-smoke.mjs

      - name: Exercise generated player credentials and confirmation UX
        run: node scripts/admin-player-create-ux-smoke.mjs

      - name: Exercise RFID player identity management
        run: node scripts/admin-player-identity-smoke.mjs

      - name: Exercise original player drawer contract
        run: node scripts/admin-player-drawer-smoke.mjs

      - name: Exercise attendance scanner action
        run: node scripts/admin-attendance-action-smoke.mjs

      - name: Upload browser diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: admin-browser-smoke-${{ github.sha }}
          path: admin-browser-smoke-artifacts/
          if-no-files-found: warn
