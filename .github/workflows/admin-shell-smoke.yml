name: Admin Shell Smoke

on:
  pull_request:
    paths:
      - "admin/**"
      - "scripts/admin-shell-smoke.mjs"
      - ".github/workflows/admin-shell-smoke.yml"
  push:
    branches:
      - main
    paths:
      - "admin/**"
      - "scripts/admin-shell-smoke.mjs"
      - ".github/workflows/admin-shell-smoke.yml"

permissions:
  contents: read

jobs:
  admin-shell-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate admin shell assets and runtime order
        shell: bash
        run: |
          set -o pipefail
          node scripts/admin-shell-smoke.mjs | tee admin-interaction-diagnostic.log

      - name: Upload admin interaction diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-interaction-diagnostic
          path: admin-interaction-diagnostic.log
          if-no-files-found: error
          retention-days: 2
