name: Incident Roadmap Finalize

on:
  push:
    branches:
      - main
    paths:
      - ".github/incident-roadmap-finalize.trigger"
      - ".github/workflows/incident-roadmap-finalize.yml"
      - "scripts/finalize-incident-roadmap.py"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: incident-roadmap-finalize-main
  cancel-in-progress: false

jobs:
  finalize:
    if: github.event_name == 'push' && github.event.head_commit.message == 'chore(roadmap): trigger incident finalizer'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out current main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Finalize incident-readiness roadmap evidence
        shell: bash
        run: |
          set -euo pipefail
          test -f .github/incident-roadmap-finalize.trigger
          test -f scripts/finalize-incident-roadmap.py
          git pull --ff-only origin main
          python scripts/finalize-incident-roadmap.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "docs(roadmap): mark incident readiness verified"
          git push origin HEAD:main
