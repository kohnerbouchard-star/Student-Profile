name: Incident Roadmap Finalize

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write

concurrency:
  group: incident-roadmap-finalize-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  finalize:
    if: github.event.pull_request.head.ref == 'docs/incident-readiness-final-v4'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out exact verification branch
        uses: actions/checkout@v7
        with:
          ref: docs/incident-readiness-final-v4
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Finalize incident-readiness roadmap evidence
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f .github/incident-roadmap-finalize.trigger ]; then
            echo "Incident roadmap evidence is already finalized."
            exit 0
          fi
          test -f scripts/finalize-incident-roadmap.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-edit origin/main
          python scripts/finalize-incident-roadmap.py
          git add -A
          git diff --cached --check
          git diff --cached --quiet && { echo "No incident roadmap reconciliation changes were produced."; exit 1; }
          git commit -m "docs(roadmap): mark incident readiness verified"
          git push origin HEAD:docs/incident-readiness-final-v4
