name: Apply Environment-Neutral Browser Migration

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/apply-environment-neutral-browser-migration.yml"
      - "scripts/apply-environment-neutral-browser-migration.py"
  push:
    branches:
      - agent/environment-neutral-frontend-v1
    paths:
      - ".github/workflows/apply-environment-neutral-browser-migration.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-environment-neutral-browser-migration
  cancel-in-progress: true

jobs:
  migrate:
    if: github.event_name != 'pull_request' || github.head_ref == 'agent/environment-neutral-frontend-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/environment-neutral-frontend-v1
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1

      - name: Apply deterministic source migration
        run: python3 scripts/apply-environment-neutral-browser-migration.py

      - name: Validate runtime migration
        run: |
          node --test scripts/runtime-config-contract.test.mjs scripts/environment-neutral-browser-integration.test.mjs
          node --check frontend/src/core/runtime-config.js
          node --check frontend/src/core/constants.js
          node --check auth/reset-password.js
          node --check admin/auth-session-manager.js
          node --check player-terminal/host-runtime.js
          node --check admin/player-access-code-bridge.js
          node --check admin/admin-auth.js
          node --check admin/classroom-write-fallback.js

      - name: Commit migration result
        shell: bash
        run: |
          set -euo pipefail
          git checkout -- .github/workflows/environment-neutral-browser.yml
          git config user.name "econovaria-release-controller"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "feat(release): migrate browser consumers to runtime config"
          git push origin HEAD:agent/environment-neutral-frontend-v1
