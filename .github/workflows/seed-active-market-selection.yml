name: Seed Active Market Selection

on:
  push:
    branches:
      - agent/seed-content-foundation-v1
    paths:
      - package.json
      - scripts/generate-remaining-active-market-candidates.mjs
      - scripts/seed-market-curated-overlay-lib.mjs
      - scripts/seed-market-identity-reconciliation-summary.mjs
      - scripts/seed-content-preflight.test.mjs
      - .github/workflows/seed-active-market-selection.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: seed-active-market-selection-${{ github.ref }}
  cancel-in-progress: false

jobs:
  select:
    name: Generate all-country active market selections
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out seed authority branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/seed-content-foundation-v1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.23.1

      - name: Generate selections and retain diagnostics
        id: selection
        shell: bash
        run: |
          set +e
          LOG="docs/seed-content/reviews/active-market-selection-run-log.txt"
          : > "$LOG"
          STATUS=0

          run_step() {
            NAME="$1"
            shift
            printf '\n## %s\n' "$NAME" | tee -a "$LOG"
            "$@" 2>&1 | tee -a "$LOG"
            CODE=${PIPESTATUS[0]}
            printf 'exit=%s\n' "$CODE" | tee -a "$LOG"
            if [ "$CODE" -ne 0 ] && [ "$STATUS" -eq 0 ]; then STATUS="$CODE"; fi
          }

          run_step "generate six candidates" node scripts/generate-remaining-active-market-candidates.mjs
          run_step "regenerate universe" node scripts/generate-seed-market-universe.mjs
          run_step "regenerate editorial evidence" node scripts/seed-content-universe-editorial-audit.mjs
          run_step "regenerate identity evidence" node scripts/seed-market-identity-reconciliation-summary.mjs
          run_step "check six candidates" npm run audit:seed-content-active-candidates
          run_step "check canonicalization" npm run audit:seed-content-canonicalization
          run_step "check universe" npm run audit:seed-content-universe
          run_step "check editorial evidence" npm run audit:seed-content-editorial
          run_step "check identity evidence" npm run audit:seed-content-identities
          run_step "test seed preflight" npm run test:seed-content-preflight
          run_step "design seed preflight" npm run preflight:seed-content
          run_step "diff check" git diff --check

          printf '\nfinalStatus=%s\n' "$STATUS" | tee -a "$LOG"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit selection packages and diagnostics
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/seed-content/markets/active-subsets docs/seed-content/markets/universe docs/seed-content/reviews/market-universe-editorial-collision-review-v1.json docs/seed-content/reviews/market-universe-editorial-collision-review-v1.md docs/seed-content/reviews/market-identity-reconciliation-audit-v1.json docs/seed-content/reviews/market-identity-reconciliation-audit-v1.md docs/seed-content/reviews/active-market-selection-run-log.txt
          if git diff --cached --quiet; then
            echo "Active-market selections are already current."
          else
            git commit -m "feat(seed): add all-country active market selections [skip ci]"
            git push origin HEAD:agent/seed-content-foundation-v1
          fi

      - name: Enforce selection result
        shell: bash
        run: |
          STATUS="${{ steps.selection.outputs.status }}"
          if [ "$STATUS" -ne 0 ]; then
            echo "Active-market selection failed with status $STATUS. See the committed diagnostic log."
            false
          fi
