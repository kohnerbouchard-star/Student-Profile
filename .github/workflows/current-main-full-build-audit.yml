name: Current Main Full Build Audit

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/current-main-full-build-audit.yml"

permissions:
  contents: read

concurrency:
  group: current-main-full-build-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  repository:
    name: Repository audit and release build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm
      - run: npm install --global npm@10.9.8
      - run: npm ci
      - run: npm test
      - run: npm run release:build
      - run: npm run release:validate
      - run: npm run security:verify

  backend:
    name: Backend typecheck and domain smoke
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: npm install --global npm@10.9.8
      - run: npm ci
        working-directory: backend
      - run: npm run typecheck:all
        working-directory: backend
      - run: npm run test:smoke
        working-directory: backend

  player:
    name: Player terminal complete verification
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm
          cache-dependency-path: player-terminal/package-lock.json
      - run: npm install --global npm@10.9.8
      - run: npm ci
        working-directory: player-terminal
      - run: npm run verify
        working-directory: player-terminal

  database-replay:
    name: Full migration replay and lint
    uses: ./.github/workflows/database-replay.yml
