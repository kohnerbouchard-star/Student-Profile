name: Run Business Banking Integration

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/apply-business-banking-integration.yml"
      - ".github/workflows/run-business-banking-integration.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/business-banking-credit-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/business-banking-credit-v1
          fetch-depth: 0
      - name: Extract reviewed applicator
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/apply-business-banking-integration.yml').read_text().splitlines()
          output = []
          active = False
          for line in source:
              if line.strip() == "python3 <<'PY'":
                  active = True
                  continue
              if active and line.strip() == 'PY':
                  break
              if active:
                  output.append(line[10:] if line.startswith('          ') else line)
          if not output:
              raise SystemExit('reviewed integration script was not found')
          Path('/tmp/apply-business-banking.py').write_text('\n'.join(output) + '\n')
          PY
      - name: Run reviewed applicator
        shell: bash
        run: |
          set -o pipefail
          python3 /tmp/apply-business-banking.py 2>&1 | tee /tmp/business-banking-applicator.log
      - name: Upload applicator diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: business-banking-applicator-diagnostics
          path: /tmp/business-banking-applicator.log
          if-no-files-found: error
      - name: Apply focused correctness fixes
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          handler = Path('backend/src/domains/business-banking/api/playerBusinessBankingHttpHandler.ts')
          text = handler.read_text()
          old = '''    case "playerTransfer":
                return repository.execute("execute_player_transfer_v1", {
                  ...base,
                  p_sender_player_id: scope.playerId,
          '''
          if old not in text:
              old = '''    case "playerTransfer":
              return repository.execute("execute_player_transfer_v1", {
                ...base,
                p_sender_player_id: scope.playerId,
          '''
          if old not in text:
              old = '''    case "playerTransfer":
              return repository.execute("execute_player_transfer_v1", {
                ...base,
                p_sender_player_id: scope.playerId,
          '''
          replacement = old.replace('                ...base,\n', '                p_game_session_id: scope.gameSessionId,\n').replace('                  ...base,\n', '                  p_game_session_id: scope.gameSessionId,\n')
          if text.count(old) != 1:
              raise SystemExit('player transfer RPC argument block was not found exactly once')
          handler.write_text(text.replace(old, replacement, 1))

          migration = Path('backend/supabase/migrations/20260721122000_harden_business_banking_invariants_v1.sql')
          sql = migration.read_text()
          invalid = '''      defaulted_at = null,
      version = version
  where id = v_loan.id
          '''
          corrected = '''      defaulted_at = null
  where id = v_loan.id
          '''
          if sql.count(invalid) != 1:
              raise SystemExit('loan restructure invalid version assignment was not found exactly once')
          migration.write_text(sql.replace(invalid, corrected, 1))
          PY
          rm -f .github/workflows/run-business-banking-integration.yml
          git diff --check
      - name: Commit integration
        shell: bash
        run: |
          git config user.name "econovaria-integration-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "feat(runtime): integrate business banking capabilities"
          git push origin HEAD:agent/business-banking-credit-v1
