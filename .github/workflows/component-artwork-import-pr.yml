name: Component Artwork Import PR

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/component-artwork-import-pr.yml"
      - "docs/seed-content/items/.component-artwork-download-v2.json"
      - "docs/seed-content/items/component-artwork-source-v2.json"
      - "docs/seed-content/items/store-artwork-source-v2.json"
      - "scripts/component-artwork-contract.mjs"

permissions:
  contents: write

concurrency:
  group: component-artwork-import-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  import-components:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/seed-content-usable-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out exact PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deterministic image tooling
        run: python -m pip install --disable-pip-version-check pillow==11.3.0

      - name: Import and optimize component artwork
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import io
          import json
          import pathlib
          import urllib.request
          from PIL import Image, ImageOps

          root = pathlib.Path.cwd()
          component_path = root / 'docs/seed-content/items/component-artwork-source-v2.json'
          store_path = root / 'docs/seed-content/items/store-artwork-source-v2.json'
          download_path = root / 'docs/seed-content/items/.component-artwork-download-v2.json'
          component = json.loads(component_path.read_text(encoding='utf-8'))
          store = json.loads(store_path.read_text(encoding='utf-8'))
          downloads = json.loads(download_path.read_text(encoding='utf-8'))
          url_by_creation = {entry['creationIdentifier']: entry['url'] for entry in downloads['records']}
          store_by_stable = {entry['stableId']: entry for entry in store['records']}

          new_records = [entry for entry in component['records'] if not entry.get('reuseStoreArtworkStableId')]
          reused_records = [entry for entry in component['records'] if entry.get('reuseStoreArtworkStableId')]
          if len(component['records']) != 30 or len(new_records) != 22 or len(reused_records) != 8:
              raise SystemExit('Component artwork must contain 30 records: 22 new and 8 reused.')
          if set(url_by_creation) != {entry['creationIdentifier'] for entry in new_records}:
              raise SystemExit('Component download coverage does not match the 22 new creations.')

          imported = 0
          reused = 0
          for record in component['records']:
              reuse_id = record.get('reuseStoreArtworkStableId')
              if reuse_id:
                  source = store_by_stable.get(reuse_id)
                  if not source:
                      raise SystemExit(f'Missing Store artwork {reuse_id}.')
                  if source['sourceItemStableId'] != record['sourceItemStableId']:
                      raise SystemExit(f'Artwork reuse identity mismatch for {record["itemKey"]}.')
                  for field in ('runtimeImagePath', 'sha256', 'bytes', 'width', 'height', 'mediaType'):
                      record[field] = source[field]
                  record['assetStatus'] = 'repository-owned'
                  record['assetReuse'] = 'same-item-identity'
                  reused += 1
                  continue

              relative_path = pathlib.Path('player-terminal/assets/images/items/components') / record['country'] / f"{record['itemKey']}.webp"
              output_path = root / relative_path
              request = urllib.request.Request(
                  url_by_creation[record['creationIdentifier']],
                  headers={'User-Agent': 'Econovaria-Component-Asset-Importer/2.0'},
              )
              with urllib.request.urlopen(request, timeout=120) as response:
                  source = response.read()
              with Image.open(io.BytesIO(source)) as original:
                  image = ImageOps.exif_transpose(original).convert('RGB')
                  image = ImageOps.fit(image, (1024, 1024), method=Image.Resampling.LANCZOS, centering=(0.5, 0.5))
                  output_path.parent.mkdir(parents=True, exist_ok=True)
                  image.save(output_path, format='WEBP', quality=86, method=6)

              data = output_path.read_bytes()
              record.update({
                  'runtimeImagePath': relative_path.as_posix(),
                  'assetStatus': 'repository-owned',
                  'assetReuse': None,
                  'sha256': hashlib.sha256(data).hexdigest(),
                  'bytes': len(data),
                  'width': 1024,
                  'height': 1024,
                  'mediaType': 'image/webp',
              })
              imported += 1

          component['runtimeDelivery'] = {
              'binaryFilesCommitted': True,
              'runtimeImagePathsAvailable': True,
              'newBinaryCount': 22,
              'sameIdentityReuseCount': 8,
              'reason': 'Twenty-two optimized component WebPs are repository-owned; eight records reuse the exact Store asset for the same item identity.',
              'sourceResolution': '2048x2048',
              'runtimeResolution': '1024x1024',
              'runtimeMediaType': 'image/webp',
          }
          component_path.write_text(json.dumps(component, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')
          print(json.dumps({'imported': imported, 'reused': reused, 'records': len(component['records'])}, indent=2))
          PY

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"

      - name: Validate component assets and full item copy
        run: |
          node scripts/component-artwork-contract.mjs
          node --test scripts/item-content-coverage.test.mjs

      - name: Commit component assets and manifest
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            player-terminal/assets/images/items/components \
            docs/seed-content/items/component-artwork-source-v2.json
          if git diff --cached --quiet; then
            echo "Component assets are already current."
            exit 0
          fi
          git commit -m "seed: import component artwork assets"
          git push origin "HEAD:${{ github.head_ref }}"
