name: Apply Store Negative-State Rebase

on:
  push:
    branches:
      - agent/player-store-negative-state-matrix-v1
    paths:
      - .github/workflows/apply-store-negative-rebase-v1.yml

permissions:
  contents: write

concurrency:
  group: apply-store-negative-rebase-v1
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/player-store-negative-state-matrix-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore reviewed Store commits
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          for COMMIT in \
            ad0fffedeef9c450d8cf7502b705e58b8ff23651 \
            8c6221029c52ff8311965d7010da3692b8667e3d \
            04ffa8418b5d677eb6263ffaaa02707269bb98be \
            3a18bc04f456ef12d6fa05015e6d6668e510cb09 \
            583b03744b9137f5c07d3d032538591a81156ea3 \
            685790c5aed221332aaf72a540f47befc8e23ae9 \
            94169d751361f43495ef7dbfecf046880a9124b8
          do
            git fetch origin "$COMMIT"
            git cherry-pick "$COMMIT"
          done
          rm .github/workflows/apply-store-negative-rebase-v1.yml
          git add -A
          git commit -m "Remove Store rebase helper"
          git push origin HEAD:agent/player-store-negative-state-matrix-v1
