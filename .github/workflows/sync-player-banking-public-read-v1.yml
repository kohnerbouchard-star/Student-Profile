name: Sync Player Banking Public Read

on:
  pull_request:
    paths:
      - ".github/workflows/sync-player-banking-public-read-v1.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/player-banking-public-read-v1
          fetch-depth: 0

      - name: Merge current main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main --prune
          git merge --no-ff origin/main -m "chore(sync): merge current main into Banking public read"
          git push origin HEAD:agent/player-banking-public-read-v1
