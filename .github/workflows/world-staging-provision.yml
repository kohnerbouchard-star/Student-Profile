name: World Staging Provision

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/world-staging-provision.yml"
      - "scripts/world-staging-provision.mjs"
      - "scripts/world-staging-provision-lib.mjs"
      - "scripts/world-staging-provision.test.mjs"
      - "backend/supabase/migrations/20260723213038_restore_player_country_assignment_compatibility_v1.sql"
      - "backend/src/domains/world/tests/playerCountryAssignmentCompatibilityMigration.test.ts"
      - "docs/operations/contracts/beta-seed-downstream-consumer-contract-v1.json"
      - "docs/seed-content/executable/beta-pack-v1/location-registry-verified-v1.json"
      - "docs/seed-content/executable/beta-pack-v1/calibration-scenarios-v1.json"

permissions:
  contents: read

concurrency:
  group: world-staging-provision-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  contract:
    name: Canonical World publication contract
    if: github.event.pull_request.number == 325
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out exact PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm
      - name: Install pinned repository tooling
        run: |
          npm install --global npm@10.9.8
          npm ci
      - name: Verify publication bridge and migration boundary
        run: |
          node --check scripts/world-staging-provision-lib.mjs
          node --check scripts/world-staging-provision.mjs
          node --test scripts/world-staging-provision.test.mjs
          node scripts/supply-chain-secret-scan.mjs

  provision-staging:
    name: Publish World to staging preview
    if: github.event.pull_request.number == 325
    needs:
      - contract
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging
    env:
      RELEASE_COMMIT: ${{ github.event.pull_request.head.sha }}
      EXPECTED_STAGING_PROJECT_REF: eecvbssdvarfcykcfrny
      PRODUCTION_PROJECT_REF: cgiukdjwicykrmtkhudh
      TARGET_GAME_NAME: Econovaria Staging Preview
      TARGET_GAME_ID_SHA256: c15408fa67056586134331a39ba9c59ded9b6f45772d3c48a38bbbab002a9b2c
      EVIDENCE_PATH: /tmp/world-staging-provision.json
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      CONFIGURED_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Check out exact PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Enforce exact staging boundary
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$RELEASE_COMMIT"
          test -n "$SUPABASE_PROJECT_REF"
          test "$SUPABASE_PROJECT_REF" = "$EXPECTED_STAGING_PROJECT_REF"
          test "$SUPABASE_PROJECT_REF" != "$PRODUCTION_PROJECT_REF"
          [[ "$SUPABASE_PROJECT_REF" =~ ^[a-z0-9]{20}$ ]]
          echo "SUPABASE_URL=https://${SUPABASE_PROJECT_REF}.supabase.co" >> "$GITHUB_ENV"

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm

      - name: Install pinned repository tooling
        run: |
          npm install --global npm@10.9.8
          npm ci

      - name: Resolve protected staging service credential
        shell: bash
        run: |
          set -euo pipefail
          service="$CONFIGURED_SERVICE_ROLE_KEY"
          if [ -z "$service" ]; then
            test -n "$SUPABASE_ACCESS_TOKEN"
            curl --fail --silent --show-error \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF/api-keys?reveal=true" \
              > /tmp/project-api-keys.json
            node - <<'NODE'
          const fs = require('node:fs');
          const rows = JSON.parse(fs.readFileSync('/tmp/project-api-keys.json', 'utf8'));
          const service = rows.find((row) => row.name === 'service_role' && row.api_key)?.api_key || '';
          fs.writeFileSync('/tmp/service-role-key', service);
          NODE
            service="$(cat /tmp/service-role-key)"
          fi
          test -n "$service"
          echo "::add-mask::$service"
          printf 'SUPABASE_SERVICE_ROLE_KEY=%s\n' "$service" >> "$GITHUB_ENV"
          rm -f /tmp/project-api-keys.json /tmp/service-role-key

      - name: Re-run publication contract before connected write
        run: node --test scripts/world-staging-provision.test.mjs

      - name: Initialize and verify canonical World runtime
        run: node scripts/world-staging-provision.mjs

      - name: Upload sanitized World evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: world-staging-provision-${{ github.event.pull_request.head.sha }}
          path: /tmp/world-staging-provision.json
          if-no-files-found: warn
          retention-days: 30

      - name: Record World staging boundary
        if: success()
        run: |
          {
            echo "## Playable staging World"
            echo "- Exact isolated staging project: \`true\`"
            echo "- Exact game hash binding: \`true\`"
            echo "- World runtime instances: \`1\`"
            echo "- Canonical locations: \`50\`"
            echo "- Canonical routes: \`13\`"
            echo "- Country runtime bindings: \`10\`"
            echo "- Arrival Class grants: \`8\`"
            echo "- Player-country mirror mismatches: \`0\`"
            echo "- Production touched: \`false\`"
          } >> "$GITHUB_STEP_SUMMARY"
