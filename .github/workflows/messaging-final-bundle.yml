name: Messaging Final Source Bundle

on:
  push:
    branches:
      - agent/messaging-communication-v1
    paths:
      - .github/workflows/messaging-final-bundle.yml

permissions:
  contents: read
  statuses: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Build immutable source bundle
        run: |
          set -euo pipefail
          git fetch origin main --no-tags
          git bundle create /tmp/messaging-final.bundle HEAD refs/remotes/origin/main
          git bundle verify /tmp/messaging-final.bundle
          sha256sum /tmp/messaging-final.bundle > /tmp/messaging-final.bundle.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: messaging-final-bundle-${{ github.sha }}
          path: |
            /tmp/messaging-final.bundle
            /tmp/messaging-final.bundle.sha256
          if-no-files-found: error
          retention-days: 1
      - name: Publish bundle status
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'messaging/final-source-bundle',
              description: 'Converged Messaging source bundle is available',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
