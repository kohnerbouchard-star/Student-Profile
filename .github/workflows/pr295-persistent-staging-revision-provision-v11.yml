name: PR295 Persistent Staging Revision Provision V11

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/pr295-persistent-staging-revision-provision-v11.yml"
      - "scripts/pr295-persistent-staging-revision-provision.mjs"

permissions:
  contents: read

concurrency:
  group: pr295-persistent-staging-revision-provision-v11
  cancel-in-progress: true

jobs:
  verify-and-provision:
    if: github.event.pull_request.number == 295
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: staging
    env:
      RELEASE_COMMIT: d94ffd0a38e6d00113c657602dd56861d8a362fd
      EXPECTED_STAGING_PROJECT_REF: eecvbssdvarfcykcfrny
      PRODUCTION_PROJECT_REF: cgiukdjwicykrmtkhudh
      TARGET_GAME_NAME: Econovaria Staging Preview
      TARGET_GAME_ID_SHA256: c15408fa67056586134331a39ba9c59ded9b6f45772d3c48a38bbbab002a9b2c
      PROVISION_APPROVED_BY: "Repository owner instruction 2026-07-24: apply immutable authored Seed revision"
      EVIDENCE_PATH: /tmp/pr295-persistent-staging-revision-provision.json
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      CONFIGURED_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Check out exact PR tooling
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Enforce exact runtime and staging boundaries
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
          git fetch origin main
          test "$(git rev-parse origin/main)" = "$RELEASE_COMMIT"
          test -n "$SUPABASE_PROJECT_REF"
          test "$SUPABASE_PROJECT_REF" = "$EXPECTED_STAGING_PROJECT_REF"
          test "$SUPABASE_PROJECT_REF" != "$PRODUCTION_PROJECT_REF"
          [[ "$SUPABASE_PROJECT_REF" =~ ^[a-z0-9]{20}$ ]]
          echo "SUPABASE_URL=https://${SUPABASE_PROJECT_REF}.supabase.co" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm

      - name: Install pinned repository tooling
        run: |
          npm install --global npm@10.9.8
          npm ci

      - name: Verify revision provisioner and canonical pack
        run: |
          node --check scripts/pr295-persistent-staging-revision-provision.mjs
          node --test scripts/pr295-persistent-staging-provision.test.mjs
          node scripts/seed-beta-importer.mjs --mode validate --environment staging
          node scripts/supply-chain-secret-scan.mjs

      - name: Resolve protected staging service credential
        shell: bash
        run: |
          set -euo pipefail
          service="$CONFIGURED_SERVICE_ROLE_KEY"
          if [ -z "$service" ]; then
            test -n "$SUPABASE_ACCESS_TOKEN"
            curl --fail --silent --show-error \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF/api-keys?reveal=true" \
              > /tmp/project-api-keys.json
            node - <<'NODE'
          const fs = require('node:fs');
          const rows = JSON.parse(fs.readFileSync('/tmp/project-api-keys.json', 'utf8'));
          const service = rows.find((row) => row.name === 'service_role' && row.api_key)?.api_key || '';
          fs.writeFileSync('/tmp/service-role-key', service);
          NODE
            service="$(cat /tmp/service-role-key)"
          fi
          test -n "$service"
          echo "::add-mask::$service"
          printf 'SUPABASE_SERVICE_ROLE_KEY=%s\n' "$service" >> "$GITHUB_ENV"
          rm -f /tmp/project-api-keys.json /tmp/service-role-key

      - name: Apply and verify immutable authored Seed revision
        run: node scripts/pr295-persistent-staging-revision-provision.mjs

      - name: Upload sanitized revision evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr295-persistent-staging-revision-v11-${{ github.run_id }}
          path: /tmp/pr295-persistent-staging-revision-provision.json
          if-no-files-found: warn
          retention-days: 30

      - name: Record revision boundary
        if: success()
        run: |
          {
            echo '## Immutable Seed revision provisioning'
            echo "- Runtime source: \`$RELEASE_COMMIT\`"
            echo '- Current pack digest: `31f2f8e60c61b18eeab5cdac6e2930ae2f92a695b74e889a24129304e76547b7`'
            echo '- Predecessor release preserved: `true`'
            echo '- Revision entries expected: `2`'
            echo '- Active market assets: `240`'
            echo '- Active Contracts: `30`'
            echo '- Visible Store items: `50`'
            echo '- Destructive rollback used: `false`'
            echo '- Production touched: `false`'
          } >> "$GITHUB_STEP_SUMMARY"
