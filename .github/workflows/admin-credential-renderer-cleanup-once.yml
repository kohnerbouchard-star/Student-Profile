name: Admin Credential Renderer Cleanup Once

on:
  push:
    branches:
      - agent/admin-credential-renderer-cleanup-v1
    paths:
      - .github/admin-credential-cleanup-trigger

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v7
        with:
          ref: agent/admin-credential-renderer-cleanup-v1
          fetch-depth: 0

      - name: Remove dead credential suppression and reconcile ledgers
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          pr_number = "__PR_NUMBER__"

          create_path = Path("admin/player-create-ux.js")
          create_source = create_path.read_text()
          replacements = {
              '  const LEGACY_DIALOG_SELECTOR = "[data-admin-player-access-code-dialog]";\n': '',
              '  function removeLegacyDialog() {\n    document.querySelectorAll(LEGACY_DIALOG_SELECTOR).forEach((node) => node.remove());\n  }\n\n': '',
              '    removeLegacyDialog();\n': '',
              '      removeLegacyDialog();\n': '',
          }
          for old, new in replacements.items():
              if old not in create_source:
                  raise SystemExit(f"Missing expected player-create cleanup token: {old!r}")
              create_source = create_source.replace(old, new)
          if "LEGACY_DIALOG_SELECTOR" in create_source or "removeLegacyDialog" in create_source or "data-admin-player-access-code-dialog" in create_source:
              raise SystemExit("Legacy credential-dialog suppression remains in player-create-ux.js")
          create_path.write_text(create_source)

          smoke_path = Path("scripts/admin-player-create-ux-smoke.mjs")
          smoke_source = smoke_path.read_text()
          anchor = 'assert(!bridgeSource.includes("style.cssText"), "Access-code bridge still creates inline-styled credential UI.");\n'
          addition = anchor + (
              'assert(!createUxSource.includes("LEGACY_DIALOG_SELECTOR"), "Player create UX still declares a legacy credential-dialog selector.");\n'
              'assert(!createUxSource.includes("removeLegacyDialog"), "Player create UX still suppresses a legacy credential dialog at runtime.");\n'
              'assert(!createUxSource.includes("data-admin-player-access-code-dialog"), "Player create UX still references the obsolete credential dialog marker.");\n'
          )
          if smoke_source.count(anchor) != 1:
              raise SystemExit("Player create smoke source-guard anchor changed")
          smoke_path.write_text(smoke_source.replace(anchor, addition))

          audit_path = Path("admin/docs/admin-current-state-audit-2026-07-18.md")
          audit_source = audit_path.read_text()
          audit_anchor = "- Add a source test preventing the legacy dialog from returning.\n"
          audit_resolution = audit_anchor + (
              f"\n**Resolution (2026-07-19):** `VERIFIED_COMPLETE` through PR #{pr_number}. "
              "`player-access-code-bridge.js` is event-only and contains no dialog renderer or inline presentation. "
              "The remaining selector, removal helper, and observer-driven suppression calls were removed from `player-create-ux.js`, "
              "while the accepted one-time Player-created confirmation remains authoritative. The Player create smoke now fails closed if the legacy marker or suppression path returns.\n"
          )
          if audit_source.count(audit_anchor) != 1:
              raise SystemExit("Admin audit credential-resolution anchor changed")
          audit_path.write_text(audit_source.replace(audit_anchor, audit_resolution))

          roadmap_path = Path("docs/roadmaps/econovaria-beta-completion-roadmap-v1.md")
          roadmap_source = roadmap_path.read_text()
          replacements = {
              "- [ ] `BETA-ADMIN-003` Remove remaining obsolete credential-dialog renderer if still present.":
                  f"- [x] `BETA-ADMIN-003` Remove remaining obsolete credential-dialog renderer if still present. `VERIFIED_COMPLETE` through PR #{pr_number}: the access-code bridge is event-only, dead suppression code was removed from Player create UX, and the source ratchet prevents the legacy marker or renderer from returning.",
              "- [ ] `BETA-ADMIN-008` Add the inventory-redemption review queue after Backend handoff.":
                  "- [x] `BETA-ADMIN-008` Add the inventory-redemption review queue after Backend handoff. `VERIFIED_COMPLETE` through PR #177 merged as `00ffc841cb7072cb98610e23d20eb4d0cfd60cf8`; Repository Quality #885, Staging Readiness Preflight #58, Database Replay #296, and Admin Shell Smoke #827 with all 87 stages passed.",
          }
          for old, new in replacements.items():
              count = roadmap_source.count(old)
              if count != 1:
                  raise SystemExit(f"Expected one roadmap entry for {old!r}; found {count}")
              roadmap_source = roadmap_source.replace(old, new)
          roadmap_path.write_text(roadmap_source)
          PY

          git diff --check

      - name: Remove one-shot helper and commit bounded cleanup
        shell: bash
        run: |
          rm -f .github/admin-credential-cleanup-trigger
          rm -f .github/workflows/admin-credential-renderer-cleanup-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin/player-create-ux.js \
            scripts/admin-player-create-ux-smoke.mjs \
            admin/docs/admin-current-state-audit-2026-07-18.md \
            docs/roadmaps/econovaria-beta-completion-roadmap-v1.md \
            .github/admin-credential-cleanup-trigger \
            .github/workflows/admin-credential-renderer-cleanup-once.yml
          git commit -m "chore(admin): remove obsolete credential dialog suppression"
          git push origin HEAD:agent/admin-credential-renderer-cleanup-v1
