name: Temporary Business Router Format

on:
  pull_request:
    paths:
      - "backend/supabase/functions/classroom-api/index.ts"
      - ".github/workflows/temporary-business-router-format.yml"

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.3
      - name: Format router
        run: deno fmt backend/supabase/functions/classroom-api/index.ts
      - name: Upload formatted router
        uses: actions/upload-artifact@v4
        with:
          name: formatted-business-classroom-router
          path: backend/supabase/functions/classroom-api/index.ts
          if-no-files-found: error
          retention-days: 1
