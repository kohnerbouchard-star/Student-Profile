name: Backend Typecheck

on:
  pull_request:
    paths:
      - "backend/**"
      - "scripts/supabase-migration-history-audit.mjs"
      - ".github/workflows/backend-typecheck.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "scripts/supabase-migration-history-audit.mjs"
      - ".github/workflows/backend-typecheck.yml"

permissions:
  contents: read

jobs:
  backend-typecheck:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.23.1"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Pin npm
        run: npm install --global npm@10.9.8

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.3

      - name: Audit Supabase migration history
        run: node ../scripts/supabase-migration-history-audit.mjs

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend typecheck with bounded dependency retries
        shell: bash
        run: |
          set +e
          status=1
          : > /tmp/backend-typecheck.log
          for attempt in 1 2 3; do
            echo "Backend typecheck attempt ${attempt}/3" | tee -a /tmp/backend-typecheck.log
            npm run typecheck:all >> /tmp/backend-typecheck.log 2>&1
            status=$?
            if [ "$status" = "0" ]; then
              break
            fi
            if grep -Eq "(Import .* failed: 5[0-9]{2}|error sending request|connection reset|timed out)" /tmp/backend-typecheck.log; then
              sleep $((attempt * 5))
              continue
            fi
            break
          done
          echo "$status" > /tmp/backend-typecheck.status
          tail -n 200 /tmp/backend-typecheck.log
          exit 0

      - name: Upload backend typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-typecheck-diagnostics
          path: |
            /tmp/backend-typecheck.log
            /tmp/backend-typecheck.status
          if-no-files-found: error
          retention-days: 7

      - name: Enforce backend typecheck
        shell: bash
        run: |
          status="$(cat /tmp/backend-typecheck.status)"
          if [ "$status" != "0" ]; then
            echo "Backend typecheck failed. Download the backend-typecheck-diagnostics artifact."
            exit 1
          fi

      - name: Run backend smoke tests
        run: npm run smoke
