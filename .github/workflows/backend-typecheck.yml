name: Backend Typecheck

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-typecheck.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-typecheck.yml"

permissions:
  contents: read

jobs:
  backend-typecheck:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck:all > /tmp/backend-typecheck.log 2>&1
          echo $? > /tmp/backend-typecheck.status
          tail -n 160 /tmp/backend-typecheck.log
          exit 0

      - name: Upload backend typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-typecheck-diagnostics
          path: |
            /tmp/backend-typecheck.log
            /tmp/backend-typecheck.status
          if-no-files-found: error
          retention-days: 7

      - name: Enforce backend typecheck
        shell: bash
        run: |
          status="$(cat /tmp/backend-typecheck.status)"
          if [ "$status" != "0" ]; then
            echo "Backend typecheck failed. Download the backend-typecheck-diagnostics artifact."
            exit 1
          fi

      - name: Run backend smoke tests
        run: npm run smoke
