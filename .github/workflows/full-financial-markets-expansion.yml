name: Full Financial Markets Expansion

on:
  push:
    branches:
      - agent/full-financial-markets-expansion-v1
    paths:
      - ".github/workflows/full-financial-markets-expansion.yml"
      - "backend/src/domains/markets/**"
      - "docs/markets/**"
      - "docs/seed-content/markets/universe/**"
      - "scripts/validate-full-market-universe*.mjs"
      - "scripts/review-full-market-universe*.mjs"
      - "scripts/lib/full-market-universe-validator.mjs"
      - "scripts/lib/full-market-editorial-review.mjs"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/full-financial-markets-expansion.yml"
      - "backend/src/domains/markets/**"
      - "docs/markets/**"
      - "docs/seed-content/markets/universe/**"
      - "scripts/validate-full-market-universe*.mjs"
      - "scripts/review-full-market-universe*.mjs"
      - "scripts/lib/full-market-universe-validator.mjs"
      - "scripts/lib/full-market-editorial-review.mjs"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-financial-markets-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-domain-and-universe:
    name: Validate safe-hold financial-markets tranche
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Check out exact source head
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.3

      - name: Pin npm
        run: npm install --global npm@10.9.8

      - name: Install root dependencies
        run: npm ci

      - name: Install Backend dependencies
        run: npm --prefix backend ci

      - name: Enforce controller-hold file boundary
        run: |
          git fetch origin main --no-tags
          merge_base="$(git merge-base HEAD origin/main)"
          git diff --name-only "$merge_base"...HEAD > full-market-changed-files.txt
          forbidden='^(backend/supabase/migrations/|backend/supabase/functions/classroom-api/|backend/supabase/functions/admin-api/|backend/src/domains/players/contracts/playerCapabilityManifestContracts\.ts$|backend/src/security/playerRateLimitDispatch\.ts$|player-terminal/src/api/backend-routes\.js$|player-terminal/src/integrations/student-profile-capability-manifest\.js$)'
          if grep -E "$forbidden" full-market-changed-files.txt; then
            echo "Controller-hold boundary violation detected."
            false
          fi

      - name: Validate complete inactive definition library
        run: |
          node scripts/validate-full-market-universe.mjs \
            --report full-market-universe-validation.json \
            > full-market-universe-validation.stdout.json

      - name: Build deterministic editorial reports
        run: |
          node scripts/review-full-market-universe.mjs \
            --report full-market-editorial-review.json \
            --transformation-plan full-market-editorial-transformation-plan.json \
            > full-market-editorial-review.stdout.json

      - name: Run universe and editorial validator tests
        run: |
          node --test scripts/validate-full-market-universe.test.mjs
          node --test scripts/review-full-market-universe.test.mjs

      - name: Run financial-market domain tests
        run: |
          set +e
          deno test --no-lock backend/src/domains/markets \
            > financial-market-domain-tests.log 2>&1
          status=$?
          cat financial-market-domain-tests.log
          echo "$status" > financial-market-domain-tests.status
          exit "$status"

      - name: Run relevant existing stock engine tests
        run: |
          deno test --no-lock \
            backend/src/domains/stocks/calculations/stockMarketEngine.test.ts

      - name: Generate deterministic reference simulation
        run: |
          deno run --allow-write \
            backend/src/domains/markets/simulations/runReferenceMarketSimulation.ts \
            --output full-financial-markets-reference-simulation.json \
            > full-financial-markets-reference-simulation.stdout.json

      - name: Run Backend typecheck
        run: npm --prefix backend run typecheck:all

      - name: Run Backend smoke
        run: npm --prefix backend run smoke

      - name: Verify formatting and source quality
        run: |
          deno fmt --check \
            --config backend/src/domains/markets/deno.json \
            backend/src/domains/markets
          git diff --check

      - name: Verify prohibited features remain disabled
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const contracts = fs.readFileSync(
            'backend/src/domains/markets/contracts/financialMarketContracts.ts',
            'utf8',
          );
          const guards = fs.readFileSync(
            'backend/src/domains/markets/validation/publicContractGuards.ts',
            'utf8',
          );
          const required = [
            'shortSellingSupported: false',
            'derivativesSupported: false',
            'physicalDeliverySupported: false',
            'complexPricingSupported: false',
            'activationAuthorized: false',
            'realWorldFeedsSupported: false',
            'automaticFullUniverseActivationSupported: false',
          ];
          const source = `${contracts}\n${guards}`;
          for (const marker of required) {
            if (!source.includes(marker)) {
              throw new Error(`Missing fail-closed contract marker: ${marker}`);
            }
          }
          NODE

      - name: Upload deterministic validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-financial-markets-validation-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            full-market-changed-files.txt
            full-market-universe-validation.json
            full-market-universe-validation.stdout.json
            full-market-editorial-review.json
            full-market-editorial-review.stdout.json
            full-market-editorial-transformation-plan.json
            full-financial-markets-reference-simulation.json
            full-financial-markets-reference-simulation.stdout.json
            financial-market-domain-tests.log
            financial-market-domain-tests.status
          if-no-files-found: warn
          retention-days: 30
