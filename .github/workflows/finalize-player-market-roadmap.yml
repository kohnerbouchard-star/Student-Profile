name: Finalize Player Market Roadmap

on:
  push:
    branches:
      - agent/player-market-reconciliation-v1
    paths:
      - ".github/workflows/finalize-player-market-roadmap.yml"
      - "scripts/finalize-player-market-roadmap.mjs"

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: agent/player-market-reconciliation-v1
          fetch-depth: 0

      - name: Apply authoritative roadmap reconciliation
        run: node scripts/finalize-player-market-roadmap.mjs

      - name: Commit reconciliation and remove one-time tooling
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && { echo "No roadmap reconciliation changes were produced."; false; }
          git commit -m "docs: reconcile completed player market tranche"
          git push origin HEAD:agent/player-market-reconciliation-v1
