name: Production Integration Gate

on:
  pull_request:
    paths:
      - ".github/workflows/production-integration-gate.yml"
      - "docs/operations/evidence/production-integration-gate-v1/**"
      - "scripts/production-integration-gate*"
      - "package.json"
  workflow_dispatch:
    inputs:
      evidence_path:
        description: Sanitized connected-execution evidence on current main
        required: true
        default: docs/operations/evidence/production-integration-gate-v1/preflight-2026-07-21.json
        type: string

permissions:
  contents: read

concurrency:
  group: production-integration-gate-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  contract-tests:
    name: Integration gate contract tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm
      - name: Pin npm
        run: npm install --global npm@10.9.8
      - name: Install repository tooling
        run: npm ci
      - name: Validate blocked connected preflight
        run: >-
          node scripts/production-integration-gate.mjs
          --evidence docs/operations/evidence/production-integration-gate-v1/preflight-2026-07-21.json
      - name: Validate parallel release and operations preparation
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'EOF'
          import assert from "node:assert/strict";
          import { readFile } from "node:fs/promises";
          import {
            PREPARATION_CATEGORIES,
            PROBE_IDS,
            TEMPLATE_IDS,
            validateOperationsPreparation,
          } from "./scripts/production-integration-gate.mjs";

          const preflightPath = "docs/operations/evidence/production-integration-gate-v1/preflight-2026-07-21.json";
          const preparationPath = "docs/operations/evidence/production-integration-gate-v1/preliminary-go-no-go-2026-07-21.json";
          const preflight = JSON.parse(await readFile(preflightPath, "utf8"));
          const evidence = JSON.parse(await readFile(preparationPath, "utf8"));
          const expectedFunctions = [
            "admin-api",
            "classroom-api",
            "stock-market-player-read",
            "stock-market-read",
            "stock-market-runner",
            "stock-market-seed-copy",
            "stock-market-trading",
          ];

          assert.equal(evidence.reportType, "connected-operations-stage1-preparation");
          assert.equal(evidence.preparationCheckpoint, "CONNECTED_RELEASE_PREPARATION_CURRENT_NO_GO");
          assert.equal(evidence.operationsStopState, "OPERATIONS_PREPARATION_CURRENT_EXECUTION_BLOCKED");
          assert.equal(evidence.operationsPreparation.stopState, evidence.operationsStopState);
          assert.equal(evidence.stage1Status, "PRE_RELEASE_PREPARED");
          assert.equal(evidence.stage2Status, "BLOCKED_FINAL_IMMUTABLE_STAGING_RELEASE_NOT_PUBLISHED");
          assert.equal(evidence.operationsEvidenceComplete, false);
          assert.equal(evidence.productionDeploymentAuthorized, false);
          assert.equal(evidence.productionModified, false);
          assert.equal(evidence.repository.featureSemanticsModified, false);
          assert.match(evidence.repository.mainCommit, /^[a-f0-9]{40}$/);
          assert.equal(evidence.repository.mainCommit, preflight.repository.mainCommitAtAudit);
          assert.equal(preflight.repository.branchBaseCommit, preflight.repository.mainCommitAtAudit);
          assert.equal(evidence.repository.behindMain, 0);
          assert.equal(evidence.repository.draft, true);

          const merged = preflight.integrationWatch.serialQueue.filter(({ status }) => status === "MERGED");
          const open = preflight.integrationWatch.serialQueue.filter(({ status }) => status !== "MERGED");
          assert.deepEqual(
            evidence.serialReleaseQueue.completed.map(({ number }) => number),
            merged.map(({ number }) => number),
          );
          assert.deepEqual(evidence.serialReleaseQueue.remaining, open.map(({ number }) => number));
          assert.equal(evidence.serialReleaseQueue.activeBlocker.number, open[0].number);
          assert.equal(evidence.serialReleaseQueue.activeBlocker.head, open[0].head);
          for (const entry of open) {
            assert.equal(evidence.serialReleaseQueue.heads[String(entry.number)], entry.head);
          }
          assert.equal(evidence.serialReleaseQueue.finalReleaseAssemblyEligible, false);

          const canonical = preflight.migrations.canonicalRepositoryIdentity;
          const staging = preflight.migrations.stagingLedger;
          assert.equal(evidence.staging.project.distinctFromProduction, true);
          assert.equal(evidence.staging.project.dataPolicy, "synthetic-only");
          assert.equal(evidence.staging.migrations.repositoryCount, canonical.count);
          assert.equal(evidence.staging.migrations.repositoryHead, canonical.head);
          assert.equal(evidence.staging.migrations.repositoryVersionSetSha256, canonical.versionSetSha256);
          assert.equal(evidence.staging.migrations.appliedCount, staging.count);
          assert.equal(evidence.staging.migrations.appliedDistinctCount, staging.distinctVersionCount);
          assert.equal(evidence.staging.migrations.appliedHead, staging.head);
          assert.equal(evidence.staging.migrations.appliedVersionSetSha256, staging.versionSetSha256);
          assert.deepEqual(
            evidence.staging.migrations.stagingOnlyVersions,
            staging.stagingOnlyVersions.map(({ version }) => version),
          );
          assert.deepEqual(
            evidence.staging.migrations.missingCanonicalVersions,
            staging.missingCanonicalVersions,
          );
          assert.equal(evidence.staging.edgeFunctions.applicationFunctionCount, 0);
          assert.equal(evidence.staging.edgeFunctions.finalApplicationReleaseDeployed, false);
          assert.equal(evidence.releaseContract.finalImmutableRelease.publishedByChat2, false);
          assert.equal(evidence.releaseContract.finalImmutableRelease.stage2Eligible, false);
          assert.deepEqual(
            evidence.releaseContract.requiredApplicationEdgeFunctions.map(({ name }) => name),
            expectedFunctions,
          );

          const releasePreparation = evidence.releaseContract.preparation;
          assert.equal(releasePreparation.status, "PREPARED_NOT_EXECUTED");
          assert.equal(releasePreparation.releaseManifestSchemaVersion, 1);
          assert.equal(releasePreparation.artifactSetManifestSchemaVersion, 1);
          assert.equal(releasePreparation.sourceCommitBinding, "EXACT_MERGED_MAIN_SHA_ONLY");
          assert.equal(releasePreparation.singleBuildPromotionRequired, true);
          assert.equal(releasePreparation.rebuildDuringPromotionAllowed, false);
          assert.equal(
            releasePreparation.migrationDigestInput,
            "sorted-unique-versions-newline-delimited-with-trailing-newline",
          );
          assert.ok(releasePreparation.historicalMigrationStrategy.startsWith("forward-only-preserve-applied-"));
          assert.equal(
            releasePreparation.routeCapabilityRateLimitTemplates,
            "PREPARED_REQUIRES_FINAL_MAIN",
          );
          assert.equal(releasePreparation.rollbackEligibilityRules, "PREPARED");
          assert.equal(releasePreparation.evidenceRetentionRules, "PREPARED");

          assert.equal(evidence.githubControlPlane.valuesRecorded, false);
          assert.equal(evidence.backupAndRestore.rehearsalExecuted, false);
          assert.equal(evidence.loadPreparation.mode, "synthetic-dry-run-validated");
          assert.equal(evidence.loadPreparation.expectedPlayers, 30);
          assert.equal(evidence.loadPreparation.maximumPlayers, 40);
          assert.equal(evidence.loadPreparation.executed, false);
          assert.equal(evidence.observabilityPreparation.dashboardPanelCount, 13);
          assert.equal(evidence.observabilityPreparation.alertCount, 12);
          assert.equal(evidence.observabilityPreparation.activationExecuted, false);
          assert.equal(evidence.queryPlanPreparation.executed, false);
          assert.equal(evidence.cleanupPreparation.executed, false);
          assert.equal(evidence.productionNonModificationPreparation.executed, false);
          assert.equal(evidence.legacyPreparation.executed, false);
          assert.ok(evidence.repositoryRisks.sharedConvergence.length > 0);
          assert.ok(evidence.externalPrerequisites.length >= 10);
          assert.ok(evidence.securityPreparation.probes.every(({ status }) => status.startsWith("PREPARED")));
          assert.ok(Object.values(evidence.privacy).every((value) => value === false));

          validateOperationsPreparation(evidence.operationsPreparation, {
            operationsEvidenceComplete: false,
          });
          assert.deepEqual(evidence.operationsPreparation.validatedCategories, PREPARATION_CATEGORIES);
          assert.deepEqual(
            evidence.operationsPreparation.probes.items.map(({ id }) => id),
            PROBE_IDS,
          );
          assert.deepEqual(
            evidence.operationsPreparation.evidenceTemplates.templates.map(({ id }) => id),
            TEMPLATE_IDS,
          );
          console.log("Parallel release and operations preparation is current and remains non-acceptance.");
          EOF
      - name: Dry-run deterministic identities and bounded-load phases
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'EOF'
          import assert from "node:assert/strict";
          import { readFile } from "node:fs/promises";
          const path = "docs/operations/evidence/production-integration-gate-v1/preliminary-go-no-go-2026-07-21.json";
          const evidence = JSON.parse(await readFile(path, "utf8"));
          const plan = evidence.operationsPreparation;
          const identityLabels = Array.from(
            { length: plan.syntheticIdentities.plannedPoolSize },
            (_, index) => `synthetic-player-${String(index + 1).padStart(2, "0")}`,
          );
          assert.equal(identityLabels.length, 40);
          assert.equal(new Set(identityLabels).size, 40);
          assert.equal(identityLabels.slice(0, plan.syntheticIdentities.expectedLoadSubsetSize).length, 30);
          assert.equal(plan.syntheticIdentities.productionDerived, false);
          assert.equal(plan.syntheticIdentities.credentialMaterialized, false);
          for (const scenario of plan.loadRunner.scenarios) {
            const duration = scenario.rampMinutes + scenario.steadyMinutes + scenario.cooldownMinutes;
            assert.ok(duration <= plan.loadRunner.maximumDurationMinutes);
            assert.equal(scenario.executed, false);
          }
          assert.equal(plan.loadRunner.maximumRequestsPerSecond, 25);
          assert.equal(plan.loadRunner.connectedExecutionBlocked, true);
          assert.equal(plan.loadRunner.executed, false);
          assert.equal(plan.cleanupProcedure.productionAllowed, false);
          assert.equal(plan.productionNonModificationProof.productionWriteOperationsAllowed, false);
          console.log(JSON.stringify({
            generatedSyntheticLabels: identityLabels.length,
            expectedSubset: 30,
            maximumSubset: 40,
            connectedRequestsSent: 0,
            productionWrites: 0,
          }));
          EOF
      - name: Run integration gate tests
        run: node --test scripts/production-integration-gate.test.mjs
      - name: Validate merged recovery preparation
        run: npm run audit:recovery && npm run test:recovery-contract
      - name: Validate merged observability and bounded load preparation
        run: npm run audit:observability && npm run test:observability
      - name: Validate merged legacy-retirement preparation
        run: npm run audit:legacy-runtime && npm run test:legacy-runtime
      - name: Validate security probe contracts without connected execution
        run: npm run test:security-probes
      - name: Validate staging-readiness preparation contract
        run: npm run test:deployment-readiness
      - name: Scan integration evidence for credentials
        run: |
          npm run security:secrets
          node scripts/staging/scan-beta-security-evidence.mjs \
            docs/operations/evidence/production-integration-gate-v1
      - name: Record preparation boundary
        run: |
          {
            echo "## Connected release preparation"
            echo "- Release checkpoint: \`CONNECTED_RELEASE_PREPARATION_CURRENT_NO_GO\`"
            echo "- Operations stop: \`OPERATIONS_PREPARATION_CURRENT_EXECUTION_BLOCKED\`"
            echo "- Repository preparation validated: \`true\`"
            echo "- Local/synthetic dry-run validation: \`true\`"
            echo "- Connected requests sent by this workflow: \`0\`"
            echo "- Connected acceptance claimed: \`false\`"
            echo "- Final immutable staging release published: \`false\`"
            echo "- Production deployment executed: \`false\`"
            echo "- OPERATIONS_EVIDENCE_COMPLETE: \`false\`"
          } >> "$GITHUB_STEP_SUMMARY"

  connected-readiness-gate:
    name: Connected readiness — no production action
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging
    steps:
      - name: Check out current main evidence
        uses: actions/checkout@v7
        with:
          ref: main
      - name: Validate evidence path
        shell: bash
        env:
          EVIDENCE_PATH: ${{ inputs.evidence_path }}
        run: |
          set -euo pipefail
          [[ "$EVIDENCE_PATH" =~ ^docs/operations/evidence/production-integration-gate-v1/[a-zA-Z0-9._/-]+\.json$ ]]
          [[ "$EVIDENCE_PATH" != *".."* ]]
          test -f "$EVIDENCE_PATH"
      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm
      - name: Pin npm
        run: npm install --global npm@10.9.8
      - name: Install repository tooling
        run: npm ci
      - name: Require complete connected acceptance
        env:
          EVIDENCE_PATH: ${{ inputs.evidence_path }}
        run: >-
          node scripts/production-integration-gate.mjs
          --evidence "$EVIDENCE_PATH"
          --require-ready
      - name: Record authorization boundary
        run: |
          {
            echo "## Connected staging readiness validated"
            echo "- Production deployment executed: \`false\`"
            echo "- Production modification authorized: \`false\`"
            echo "- Final promotion requires explicit product-owner authorization."
          } >> "$GITHUB_STEP_SUMMARY"
