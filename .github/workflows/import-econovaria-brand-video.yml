name: Import Econovaria Brand Video

on:
  push:
    branches:
      - agent/econovaria-brand-assets-v1
    paths:
      - ".github/workflows/import-econovaria-brand-video.yml"

permissions:
  contents: write

jobs:
  import-video:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branding branch
        uses: actions/checkout@v4
        with:
          ref: agent/econovaria-brand-assets-v1

      - name: Download approved Magnific loop
        shell: bash
        env:
          ECONOVARIA_VIDEO_URL: "https://pikaso.cdnpk.net/private/production/4973257672/2a76623a-ea5b-4884-b25d-1baaad976c26-0.mp4?token=exp=1785110400~hmac=8794b04983bef398ea3dc96d87f5efbea960b7553b6271f0dc61593cef1e292c"
        run: |
          set -euo pipefail
          mkdir -p assets/brand
          curl --fail --location --silent --show-error \
            "$ECONOVARIA_VIDEO_URL" \
            --output assets/brand/econovaria-logo-loop.mp4
          test -s assets/brand/econovaria-logo-loop.mp4
          file assets/brand/econovaria-logo-loop.mp4 | grep -qi "mp4\|iso media"

      - name: Confirm video remains unreferenced
        shell: bash
        run: |
          set -euo pipefail
          if git grep -n "econovaria-logo-loop.mp4" -- ':!assets/brand/econovaria-logo-loop.mp4' ':!.github/workflows/import-econovaria-brand-video.yml'; then
            echo "The staged video is referenced by runtime code." >&2
            exit 1
          fi

      - name: Commit unused video asset
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/brand/econovaria-logo-loop.mp4
          git commit -m "feat(brand): store approved Econovaria logo loop"
          git push origin HEAD:agent/econovaria-brand-assets-v1
