name: Player Banking Focused Debug

on:
  pull_request:
    paths:
      - ".github/workflows/player-banking-focused-debug-v1.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.3
      - name: Install Backend dependencies
        working-directory: backend
        run: npm ci
      - name: Run focused Banking tests
        id: focused
        working-directory: backend
        shell: bash
        run: |
          set +e
          npm run test:player-banking-public 2>&1 | tee "$RUNNER_TEMP/player-banking-focused.log"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload focused log
        uses: actions/upload-artifact@v4
        with:
          name: player-banking-focused-log
          path: ${{ runner.temp }}/player-banking-focused.log
          if-no-files-found: error
          retention-days: 7
      - name: Enforce focused result
        run: test "${{ steps.focused.outputs.status }}" -eq 0
