name: Temporary Business Migration Signature Repair

on:
  push:
    branches:
      - agent/business-banking-credit-v1
    paths:
      - ".github/workflows/temporary-fix-business-migration-signature.yml"

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out authority branch
        uses: actions/checkout@v7
        with:
          ref: agent/business-banking-credit-v1
          fetch-depth: 0

      - name: Repair exact function privilege signature
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("backend/supabase/migrations/20260721120000_add_business_banking_credit_runtime_v1.sql")
          text = path.read_text()
          bad = "public.terminate_business_employee_v1(uuid,uuid,text,text,text,text,text)"
          good = "public.terminate_business_employee_v1(uuid,uuid,text,text,text,text)"
          count = text.count(bad)
          if count == 0:
              print("Signature is already repaired.")
          elif count == 2:
              path.write_text(text.replace(bad, good))
              print("Repaired revoke and grant signatures.")
          else:
              raise SystemExit(f"Expected 0 or 2 bad signatures, found {count}.")
          PY

      - name: Commit migration repair
        shell: bash
        run: |
          if git diff --quiet -- backend/supabase/migrations/20260721120000_add_business_banking_credit_runtime_v1.sql; then
            echo "No migration change required."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add backend/supabase/migrations/20260721120000_add_business_banking_credit_runtime_v1.sql
            git commit -m "fix(database): correct employee termination privilege signature"
            git push origin HEAD:agent/business-banking-credit-v1
          fi
