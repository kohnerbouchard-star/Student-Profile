name: Seed Market Identity Reconciliation

on:
  push:
    branches:
      - agent/seed-content-foundation-v1
    paths:
      - scripts/seed-market-identity-reconciliation-audit.mjs
      - docs/seed-content/markets/universe/**
      - docs/seed-content/markets/active-subsets/**
      - .github/workflows/seed-market-identity-reconciliation.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: seed-market-identity-reconciliation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  reconcile:
    name: Record active and universe identity conflicts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out seed authority branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/seed-content-foundation-v1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.23.1

      - name: Generate reconciliation evidence
        run: node scripts/seed-market-identity-reconciliation-audit.mjs

      - name: Verify deterministic evidence
        run: node scripts/seed-market-identity-reconciliation-audit.mjs --check

      - name: Validate generated diff
        run: git diff --check

      - name: Commit reconciliation evidence
        shell: bash
        run: |
          # This workflow records deterministic evidence only; it never authorizes activation.
          if git diff --quiet -- docs/seed-content/reviews/market-identity-reconciliation-audit-v1.json docs/seed-content/reviews/market-identity-reconciliation-audit-v1.md; then
            echo "Identity reconciliation evidence is current."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/seed-content/reviews/market-identity-reconciliation-audit-v1.json docs/seed-content/reviews/market-identity-reconciliation-audit-v1.md
            git commit -m "docs(seed): record market identity reconciliation blockers [skip ci]"
            git push origin HEAD:agent/seed-content-foundation-v1
          fi
