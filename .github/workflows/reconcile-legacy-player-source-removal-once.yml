name: Reconcile Legacy Player Source Removal Once

on:
  pull_request:
    branches:
      - main
    paths:
      - "scripts/apply-legacy-player-source-removal-v1.mjs"
      - ".github/workflows/reconcile-legacy-player-source-removal-once.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: legacy-player-source-removal-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  reconcile:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'agent/legacy-player-source-removal-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out cleanup authority branch
        uses: actions/checkout@v7
        with:
          ref: agent/legacy-player-source-removal-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm

      - name: Install repository tooling
        run: npm ci --no-audit --no-fund

      - name: Apply bounded legacy source removal
        run: node scripts/apply-legacy-player-source-removal-v1.mjs

      - name: Run repository verification
        run: npm test

      - name: Install Player Terminal tooling
        run: npm --prefix player-terminal ci --no-audit --no-fund

      - name: Verify Player Terminal remains intact
        run: npm --prefix player-terminal run verify

      - name: Remove one-time reconciliation helpers
        run: |
          rm -f scripts/apply-legacy-player-source-removal-v1.mjs
          rm -f .github/workflows/reconcile-legacy-player-source-removal-once.yml

      - name: Commit reconciled cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No cleanup changes were produced."
            false
          fi
          git commit -m "chore(player): remove dormant legacy frontend source"
          git push origin HEAD:agent/legacy-player-source-removal-v1
