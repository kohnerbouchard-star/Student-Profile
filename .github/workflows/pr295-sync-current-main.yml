name: PR295 Synchronize Current Main

on:
  push:
    branches:
      - agent/production-integration-gate-v1
    paths:
      - ".github/workflows/pr295-sync-current-main.yml"

permissions:
  contents: write

concurrency:
  group: pr295-sync-current-main
  cancel-in-progress: false

jobs:
  synchronize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out PR295 authority branch
        uses: actions/checkout@v7
        with:
          ref: agent/production-integration-gate-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge exact current main and remove carrier
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-edit origin/main
          rm -f .github/workflows/pr295-sync-current-main.yml
          git add -A
          git commit --amend --no-edit
          git push origin HEAD:agent/production-integration-gate-v1
# synchronization pulse 2026-07-23
