name: World Runtime Source Snapshot

on:
  pull_request:
    paths:
      - ".github/workflows/world-runtime-source-snapshot.yml"
  push:
    branches:
      - agent/story-arrival-world-runtime-v1
    paths:
      - ".github/workflows/world-runtime-source-snapshot.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Build source archives
        shell: bash
        run: |
          git fetch origin agent/seed-content-foundation-v1 --depth=1
          git archive --format=zip --output=/tmp/world-runtime-source.zip HEAD
          git archive --format=zip --output=/tmp/current-main-source.zip origin/main
          git archive --format=zip --output=/tmp/seed-interface-source.zip FETCH_HEAD

      - name: Upload source archives
        uses: actions/upload-artifact@v4
        with:
          name: world-runtime-sources-${{ github.sha }}
          path: |
            /tmp/world-runtime-source.zip
            /tmp/current-main-source.zip
            /tmp/seed-interface-source.zip
          if-no-files-found: error
          retention-days: 1
