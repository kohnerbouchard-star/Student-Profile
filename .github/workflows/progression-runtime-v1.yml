name: Progression Final Convergence Launcher

on:
  push:
    branches:
      - agent/progression-reputation-achievements-v1
    paths:
      - .github/workflows/progression-runtime-v1.yml

permissions:
  contents: write

concurrency:
  group: progression-final-convergence
  cancel-in-progress: false

jobs:
  converge:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out Progression authority
        uses: actions/checkout@v7
        with:
          ref: agent/progression-reputation-achievements-v1
          fetch-depth: 0
          persist-credentials: true
      - name: Execute guarded post-Messaging convergence
        shell: bash
        run: bash scripts/progression-final-convergence.sh
