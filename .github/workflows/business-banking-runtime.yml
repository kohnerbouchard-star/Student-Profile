name: Business Banking Runtime

on:
  pull_request:
    paths:
      - "backend/src/domains/business-banking/**"
      - "backend/src/domains/players/contracts/playerCapabilityManifestContracts.ts"
      - "backend/src/security/playerRateLimitDispatch.ts"
      - "backend/supabase/functions/classroom-api/index.ts"
      - "backend/supabase/functions/admin-api/businessBankingOperations.ts"
      - "backend/supabase/functions/admin-api/index.ts"
      - "backend/supabase/migrations/2026072112*.sql"
      - "player-terminal/src/api/business-banking-backend-routes.js"
      - "player-terminal/src/api/endpoints.js"
      - "player-terminal/src/api/capabilities.js"
      - "player-terminal/src/integrations/student-profile-api-call.js"
      - "scripts/business-banking-*.mjs"
      - ".github/workflows/business-banking-runtime.yml"
      - "package.json"
  push:
    branches: [main]
    paths:
      - "backend/src/domains/business-banking/**"
      - "backend/src/domains/players/contracts/playerCapabilityManifestContracts.ts"
      - "backend/src/security/playerRateLimitDispatch.ts"
      - "backend/supabase/functions/classroom-api/index.ts"
      - "backend/supabase/functions/admin-api/businessBankingOperations.ts"
      - "backend/supabase/functions/admin-api/index.ts"
      - "backend/supabase/migrations/2026072112*.sql"
      - "player-terminal/src/api/business-banking-backend-routes.js"
      - "player-terminal/src/api/endpoints.js"
      - "player-terminal/src/api/capabilities.js"
      - "player-terminal/src/integrations/student-profile-api-call.js"
      - "scripts/business-banking-*.mjs"
      - ".github/workflows/business-banking-runtime.yml"
      - "package.json"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Capture synchronization tree
        shell: bash
        run: git rev-parse 'HEAD^{tree}' > /tmp/business-banking-tree-sha.txt
      - name: Upload synchronization tree
        uses: actions/upload-artifact@v4
        with:
          name: business-banking-tree-sha
          path: /tmp/business-banking-tree-sha.txt
          if-no-files-found: error
          retention-days: 1
      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 22.23.1
          cache: npm
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.3
      - name: Install repository dependencies
        run: npm ci --ignore-scripts
      - name: Run deterministic economic simulations
        run: node --experimental-strip-types --test scripts/business-banking-economic-simulation.test.mjs
      - name: Validate runtime and migration contract
        run: node scripts/business-banking-runtime-contract.mjs
      - name: Typecheck business banking domain
        working-directory: backend
        run: |
          deno check --config supabase/functions/classroom-api/deno.json \
            --lock=supabase/functions/deno.lock --frozen \
            src/domains/business-banking/api/playerBusinessBankingHttpHandler.ts \
            src/domains/business-banking/api/playerBusinessBankingRoutePaths.ts \
            src/domains/business-banking/infrastructure/supabasePlayerBusinessBankingRepository.ts \
            src/domains/business-banking/domain/businessBankingEconomicSimulation.ts
      - name: Check Player route adapter syntax
        run: node --check player-terminal/src/api/business-banking-backend-routes.js
