name: Apply Business Banking Integration

on:
  push:
    branches: [agent/business-banking-credit-v1]
    paths:
      - ".github/workflows/apply-business-banking-integration.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.ref == 'refs/heads/agent/business-banking-credit-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/business-banking-credit-v1
          fetch-depth: 0
      - name: Apply reviewed integrations
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}: {old[:80]!r}")
              p.write_text(text.replace(old, new, 1))

          # Backend capability publication.
          path = "backend/src/domains/players/contracts/playerCapabilityManifestContracts.ts"
          replace_once(path, 'export const PLAYER_CAPABILITY_MANIFEST_VERSION = "2026-07-20.3" as const;', 'export const PLAYER_CAPABILITY_MANIFEST_VERSION = "2026-07-21.1" as const;')
          replace_once(path, '  "bankTransfer",\n  "businessHire",', '  "bankTransfer",\n  "businessCreate",\n  "businessEmployeeTerminate",\n  "businessHire",\n  "businessInputPurchase",\n  "businessProductCreate",')
          replace_once(path, '  "businessProduction",\n  "chartRange",', '  "businessProduction",\n  "businessStatus",\n  "chartRange",')
          replace_once(path, '  | "banking"\n  | "contractAccept"', '  | "banking"\n  | "bankTransfer"\n  | "business"\n  | "businessCreate"\n  | "businessHire"\n  | "businessInputPurchase"\n  | "businessPrice"\n  | "businessProductCreate"\n  | "businessProduction"\n  | "businessStatus"\n  | "businessTerminate"\n  | "contractAccept"')
          replace_once(path, '  | "notificationsRead"\n  | "portfolio"', '  | "notificationsRead"\n  | "loanApply"\n  | "loanRepay"\n  | "loans"\n  | "portfolio"')
          replace_once(path, '  | "storePurchase"\n  | "storyDeliveries"', '  | "storePurchase"\n  | "savingsTransfer"\n  | "storyDeliveries"')
          marker = '''  {
            key: "banking",
            operations: [{ method: "GET", pathTemplate: "/players/me/ledger" }],
            routeCapabilities: ["banking"],
          },
          '''
          addition = marker + '''  {
            key: "bankTransfer",
            operations: [{ method: "POST", pathTemplate: "/players/me/banking/transfers" }],
            actionCapabilities: ["bankTransfer"],
          },
          {
            key: "savingsTransfer",
            operations: [{ method: "POST", pathTemplate: "/players/me/banking/savings/transfers" }],
            actionCapabilities: ["savingsTransfer"],
          },
          {
            key: "business",
            operations: [{ method: "GET", pathTemplate: "/players/me/business" }],
            routeCapabilities: ["business"],
          },
          {
            key: "businessCreate",
            operations: [{ method: "POST", pathTemplate: "/players/me/businesses" }],
            actionCapabilities: ["businessCreate"],
          },
          {
            key: "businessProductCreate",
            operations: [{ method: "POST", pathTemplate: "/players/me/business/products" }],
            actionCapabilities: ["businessProductCreate"],
          },
          {
            key: "businessInputPurchase",
            operations: [{ method: "POST", pathTemplate: "/players/me/business/inputs/purchases" }],
            actionCapabilities: ["businessInputPurchase"],
          },
          {
            key: "businessProduction",
            operations: [{ method: "POST", pathTemplate: "/players/me/business/production-runs" }],
            actionCapabilities: ["businessProduction"],
          },
          {
            key: "businessPrice",
            operations: [{ method: "POST", pathTemplate: "/players/me/business/products/:productKey/pricing" }],
            actionCapabilities: ["businessPrice"],
          },
          {
            key: "businessHire",
            operations: [{ method: "POST", pathTemplate: "/players/me/business/employees/hire" }],
            actionCapabilities: ["businessHire"],
          },
          {
            key: "businessTerminate",
            operations: [{ method: "POST", pathTemplate: "/players/me/business/employees/:employeeKey/terminate" }],
            actionCapabilities: ["businessEmployeeTerminate"],
          },
          {
            key: "businessStatus",
            operations: [{ method: "POST", pathTemplate: "/players/me/business/status" }],
            actionCapabilities: ["businessStatus"],
          },
          {
            key: "loans",
            operations: [{ method: "GET", pathTemplate: "/players/me/banking/loans" }],
            routeCapabilities: ["loans"],
          },
          {
            key: "loanApply",
            operations: [{ method: "POST", pathTemplate: "/players/me/banking/loans/applications/:offerKey" }],
            actionCapabilities: ["loanApply"],
          },
          {
            key: "loanRepay",
            operations: [{ method: "POST", pathTemplate: "/players/me/banking/loans/:loanKey/payments" }],
            actionCapabilities: ["loanRepay"],
          },
          '''
          replace_once(path, marker, addition)

          # Additive reviewed rate-limit registrations only.
          path = "backend/src/security/playerRateLimitDispatch.ts"
          marker = '''  banking: byMethod({
            GET: operation("player.banking.read", "read"),
          }),
          '''
          addition = marker + '''  bankTransfer: byMethod({
            POST: operation("player.banking.transfer", "sensitive"),
          }),
          savingsTransfer: byMethod({
            POST: operation("player.banking.savings.transfer", "sensitive"),
          }),
          business: byMethod({
            GET: operation("player.business.read", "read"),
          }),
          businessCreate: byMethod({
            POST: operation("player.business.create", "sensitive"),
          }),
          businessProductCreate: byMethod({
            POST: operation("player.business.product.create", "write"),
          }),
          businessInputPurchase: byMethod({
            POST: operation("player.business.input.purchase", "sensitive"),
          }),
          businessProduction: byMethod({
            POST: operation("player.business.production", "sensitive"),
          }),
          businessPrice: byMethod({
            POST: operation("player.business.price", "write"),
          }),
          businessHire: byMethod({
            POST: operation("player.business.employee.hire", "sensitive"),
          }),
          businessTerminate: byMethod({
            POST: operation("player.business.employee.terminate", "write"),
          }),
          businessStatus: byMethod({
            POST: operation("player.business.status", "sensitive"),
          }),
          loans: byMethod({
            GET: operation("player.loans.read", "read"),
          }),
          loanApply: byMethod({
            POST: operation("player.loans.apply", "sensitive"),
          }),
          loanRepay: byMethod({
            POST: operation("player.loans.repay", "sensitive"),
          }),
          '''
          replace_once(path, marker, addition)

          # Classroom API route integration.
          path = "backend/supabase/functions/classroom-api/index.ts"
          marker = '''import {
            readPlayerBankingPublicRoutePath,
          } from "../../../src/domains/economy/api/playerBankingPublicRoutePaths.ts";
          '''
          addition = marker + '''import {
            handlePlayerBusinessBankingRequest,
          } from "../../../src/domains/business-banking/api/playerBusinessBankingHttpHandler.ts";
          import {
            readPlayerBusinessBankingRoutePath,
          } from "../../../src/domains/business-banking/api/playerBusinessBankingRoutePaths.ts";
          '''
          replace_once(path, marker, addition)
          marker = '''  const playerBankingRoute = readPlayerBankingPublicRoutePath(url.pathname);
          '''
          addition = '''  const playerBusinessBankingRoute = readPlayerBusinessBankingRoutePath(url.pathname);

            if (playerBusinessBankingRoute) {
              const endpointKey = ({
                businessRead: "business",
                businessCreate: "businessCreate",
                businessProductCreate: "businessProductCreate",
                businessInputPurchase: "businessInputPurchase",
                businessProduction: "businessProduction",
                businessPrice: "businessPrice",
                businessHire: "businessHire",
                businessTerminate: "businessTerminate",
                businessStatus: "businessStatus",
                playerTransfer: "bankTransfer",
                savingsTransfer: "savingsTransfer",
                loansRead: "loans",
                loanApply: "loanApply",
                loanRepay: "loanRepay",
              } as const)[playerBusinessBankingRoute.kind];
              return dispatchRateLimitedReviewedPlayerRequest(
                request,
                endpointKey,
                () => handlePlayerBusinessBankingRequest(request, playerBusinessBankingRoute, { createServiceClient }),
                { createServiceClient },
              );
            }

            ''' + marker
          replace_once(path, marker, addition)

          # Admin API oversight and approval surface.
          path = "backend/supabase/functions/admin-api/index.ts"
          marker = 'import { handleInventoryRedemptionOperation } from "./inventoryRedemptionOperations.ts";\n'
          replace_once(path, marker, marker + 'import { handleBusinessBankingAdminOperation } from "./businessBankingOperations.ts";\n')
          marker = '''    const redemptionOperation = await handleInventoryRedemptionOperation(
          '''
          addition = '''    const businessBankingOperation = await handleBusinessBankingAdminOperation(
                context.service,
                {
                  request,
                  gameId,
                  staffUserId: context.staff.id,
                  suffix,
                },
              );
              if (businessBankingOperation.handled) {
                return json(
                  request,
                  businessBankingOperation.status || 500,
                  businessBankingOperation.body,
                );
              }

              ''' + marker
          replace_once(path, marker, addition)

          # Player endpoint catalog and capability flags.
          path = "player-terminal/src/api/endpoints.js"
          marker = '  business: { method: "GET", path: "/business" },\n'
          addition = marker + '''  businessCreate: { method: "POST", path: "/businesses" },
            businessProductCreate: { method: "POST", path: "/business/products" },
            businessInputPurchase: { method: "POST", path: "/business/inputs/purchases" },
          '''
          replace_once(path, marker, addition)
          replace_once(path, '  businessHire: { method: "POST", path: "/business/employees/hire" },\n', '  businessHire: { method: "POST", path: "/business/employees/hire" },\n  businessTerminate: { method: "POST", path: "/business/employees/:employeeId/terminate" },\n  businessStatus: { method: "POST", path: "/business/status" },\n')

          path = "player-terminal/src/api/capabilities.js"
          replace_once(path, '  "bankTransfer",\n  "businessHire",', '  "bankTransfer",\n  "businessCreate",\n  "businessEmployeeTerminate",\n  "businessHire",\n  "businessInputPurchase",\n  "businessProductCreate",')
          replace_once(path, '  "businessProduction",\n  "chartRange",', '  "businessProduction",\n  "businessStatus",\n  "chartRange",')
          replace_once(path, '  storeQuote: "storePurchase",\n', '  businessTerminate: "businessEmployeeTerminate",\n  storeQuote: "storePurchase",\n')

          # Player backend adapter routes.
          path = "player-terminal/src/api/backend-routes.js"
          marker = '''  banking: ({ payload = {} }) => ({
            method: "GET",
            path: queryPath("/players/me/ledger", {
              limit: payload.limit ?? 50,
              cursor: payload.cursor,
            }),
          }),
          '''
          addition = '''  business: () => ({ method: "GET", path: "/players/me/business" }),

            businessCreate: ({ payload = {} }) => ({
              method: "POST",
              path: "/players/me/businesses",
              payload: {
                legalName: requiredText(payload.legalName, "legalName", "businessCreate"),
                entityType: payload.entityType || "sole_proprietorship",
                industryCode: requiredText(payload.industryCode, "industryCode", "businessCreate"),
                capitalization: Number(payload.capitalization || 0),
                acquireBusinessKey: payload.acquireBusinessKey || null,
                idempotencyKey: idempotencyKey(payload, "businessCreate"),
              },
            }),

            businessProductCreate: ({ payload = {} }) => ({
              method: "POST",
              path: "/players/me/business/products",
              payload: {
                businessKey: requiredText(payload.businessKey, "businessKey", "businessProductCreate"),
                name: requiredText(payload.name, "name", "businessProductCreate"),
                category: payload.category || "general",
                unitPrice: Number(payload.unitPrice),
                unitInputCost: Number(payload.unitInputCost || 0),
                unitLaborCost: Number(payload.unitLaborCost || 0),
                capacityUnits: Number(payload.capacityUnits || 100),
                baseDemandUnits: Number(payload.baseDemandUnits || 20),
                qualityScore: Number(payload.qualityScore || 50),
                idempotencyKey: idempotencyKey(payload, "businessProductCreate"),
              },
            }),

            businessInputPurchase: ({ payload = {} }) => ({
              method: "POST",
              path: "/players/me/business/inputs/purchases",
              payload: {
                businessKey: requiredText(payload.businessKey, "businessKey", "businessInputPurchase"),
                productKey: requiredText(payload.productKey || payload.productId, "productKey", "businessInputPurchase"),
                quantity: Number(payload.quantity),
                idempotencyKey: idempotencyKey(payload, "businessInputPurchase"),
              },
            }),

            businessProduction: ({ payload = {} }) => ({
              method: "POST",
              path: "/players/me/business/production-runs",
              payload: {
                businessKey: requiredText(payload.businessKey, "businessKey", "businessProduction"),
                productKey: requiredText(payload.productKey || payload.productId, "productKey", "businessProduction"),
                quantity: Number(payload.quantity),
                priority: payload.priority || "standard",
                idempotencyKey: idempotencyKey(payload, "businessProduction"),
              },
            }),

            businessPrice: ({ params = {}, payload = {} }) => ({
              method: "POST",
              path: `/players/me/business/products/${encodeURIComponent(requiredText(params.productId || payload.productKey, "productKey", "businessPrice"))}/pricing`,
              payload: {
                businessKey: requiredText(payload.businessKey, "businessKey", "businessPrice"),
                price: Number(payload.price),
                expectedVersion: payload.expectedVersion === undefined ? null : Number(payload.expectedVersion),
                idempotencyKey: idempotencyKey(payload, "businessPrice"),
              },
            }),

            businessHire: ({ payload = {} }) => ({
              method: "POST",
              path: "/players/me/business/employees/hire",
              payload: {
                businessKey: requiredText(payload.businessKey, "businessKey", "businessHire"),
                employeePlayerIdentifier: payload.employeePlayerIdentifier || null,
                role: requiredText(payload.role || payload.roleName, "role", "businessHire"),
                contractType: payload.contractType || "cycle",
                wagePerCycle: Number(payload.wagePerCycle),
                productivityIndex: Number(payload.productivityIndex || 1),
                idempotencyKey: idempotencyKey(payload, "businessHire"),
              },
            }),

            businessTerminate: ({ params = {}, payload = {} }) => ({
              method: "POST",
              path: `/players/me/business/employees/${encodeURIComponent(requiredText(params.employeeId || payload.employeeKey, "employeeKey", "businessTerminate"))}/terminate`,
              payload: {
                businessKey: requiredText(payload.businessKey, "businessKey", "businessTerminate"),
                reason: requiredText(payload.reason, "reason", "businessTerminate"),
                idempotencyKey: idempotencyKey(payload, "businessTerminate"),
              },
            }),

            businessStatus: ({ payload = {} }) => ({
              method: "POST",
              path: "/players/me/business/status",
              payload: {
                businessKey: requiredText(payload.businessKey, "businessKey", "businessStatus"),
                transition: requiredText(payload.transition, "transition", "businessStatus"),
                reason: requiredText(payload.reason, "reason", "businessStatus"),
                idempotencyKey: idempotencyKey(payload, "businessStatus"),
              },
            }),

            bankTransfer: ({ payload = {} }) => ({
              method: "POST",
              path: "/players/me/banking/transfers",
              payload: {
                recipientPlayerIdentifier: requiredText(payload.recipientPlayerIdentifier || payload.recipientId, "recipientPlayerIdentifier", "bankTransfer"),
                amount: Number(payload.amount),
                memo: payload.memo || null,
                idempotencyKey: idempotencyKey(payload, "bankTransfer"),
              },
            }),

            savingsTransfer: ({ payload = {} }) => ({
              method: "POST",
              path: "/players/me/banking/savings/transfers",
              payload: {
                fromAccount: requiredText(payload.fromAccount, "fromAccount", "savingsTransfer"),
                toAccount: requiredText(payload.toAccount, "toAccount", "savingsTransfer"),
                amount: Number(payload.amount),
                note: payload.note || null,
                idempotencyKey: idempotencyKey(payload, "savingsTransfer"),
              },
            }),

            loans: () => ({ method: "GET", path: "/players/me/banking/loans" }),

            loanApply: ({ params = {}, payload = {} }) => ({
              method: "POST",
              path: `/players/me/banking/loans/applications/${encodeURIComponent(requiredText(params.offerId || payload.offerKey, "offerKey", "loanApply"))}`,
              payload: {
                businessKey: payload.businessKey || null,
                amount: Number(payload.amount),
                purpose: requiredText(payload.purpose, "purpose", "loanApply"),
                repaymentSource: requiredText(payload.repaymentSource, "repaymentSource", "loanApply"),
                idempotencyKey: idempotencyKey(payload, "loanApply"),
              },
            }),

            loanRepay: ({ params = {}, payload = {} }) => ({
              method: "POST",
              path: `/players/me/banking/loans/${encodeURIComponent(requiredText(params.loanId || payload.loanKey, "loanKey", "loanRepay"))}/payments`,
              payload: {
                amount: Number(payload.amount),
                idempotencyKey: idempotencyKey(payload, "loanRepay"),
              },
            }),

            ''' + marker
          replace_once(path, marker, addition)

          # Read-model integration for the already-designed pages.
          path = "player-terminal/src/integrations/student-profile-api-call.js"
          replace_once(path, '  "portfolio",\n  "store",\n  "banking",', '  "portfolio",\n  "store",\n  "business",\n  "banking",\n  "loans",')
          replace_once(path, 'if (context.idempotencyKey) headers["idempotency-key"] = String(context.idempotencyKey);', 'if (context.idempotencyKey) headers["x-idempotency-key"] = String(context.idempotencyKey);')

          path = "player-terminal/src/api/http-transport.js"
          replace_once(path, 'if (idempotencyKey) headers["idempotency-key"] = idempotencyKey;', 'if (idempotencyKey) headers["x-idempotency-key"] = idempotencyKey;')

          path = "player-terminal/src/api/read-model.js"
          marker = '''  if (endpointKey === "banking") {
            next.banking = normalizeBankingRead(response, data.banking);
          }
          '''
          addition = '''  if (endpointKey === "business") {
              next.business = object(response);
            }
            ''' + marker + '''  if (endpointKey === "loans") {
              next.loans = object(response);
            }
          '''
          replace_once(path, marker, addition)

          # Admin surface advertises connected oversight.
          path = "backend/supabase/functions/admin-api/index.ts"
          replace_once(path, '          marketplaceAdminTrading: false,\n', '          marketplaceAdminTrading: false,\n          businessBankingOversight: true,\n          loanReview: true,\n')

          # Self-remove before committing.
          Path(".github/workflows/apply-business-banking-integration.yml").unlink()
          PY
          git diff --check
          git status --short
      - name: Commit integration
        shell: bash
        run: |
          git config user.name "econovaria-integration-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "feat(runtime): integrate business banking capabilities" 
          git push origin HEAD:agent/business-banking-credit-v1
