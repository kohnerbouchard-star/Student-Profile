name: Sync PR 280 With Main

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/sync-pr280-with-main.yml"

permissions:
  contents: read

concurrency:
  group: sync-pr280-with-main
  cancel-in-progress: true

jobs:
  sync:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/isolated-staging-release-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out existing release branch
        uses: actions/checkout@v4
        with:
          ref: agent/isolated-staging-release-v1
          fetch-depth: 0
          persist-credentials: false

      - name: Construct merge handoff bundle
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "econovaria-release-controller"
          git config user.email "actions@users.noreply.github.com"
          git fetch --quiet --no-tags origin main
          branch_head="$(git rev-parse HEAD)"
          main_head="$(git rev-parse origin/main)"
          git merge --no-ff --no-commit -X theirs origin/main
          git rm .github/workflows/sync-pr280-with-main.yml
          git diff --check --cached
          git commit -m "Merge current main into isolated staging release platform"
          merge_head="$(git rev-parse HEAD)"
          merge_tree="$(git rev-parse HEAD^{tree})"
          main_tree="$(git rev-parse origin/main^{tree})"
          printf 'branch_head=%s\nmain_head=%s\nmerge_head=%s\nmerge_tree=%s\nmain_tree=%s\n' \
            "$branch_head" "$main_head" "$merge_head" "$merge_tree" "$main_tree" \
            > "$RUNNER_TEMP/pr280-sync-metadata.txt"
          git bundle create "$RUNNER_TEMP/pr280-sync.bundle" HEAD origin/main
          cat "$RUNNER_TEMP/pr280-sync-metadata.txt"

      - name: Upload merge handoff
        uses: actions/upload-artifact@v4
        with:
          name: pr280-sync-handoff
          path: |
            ${{ runner.temp }}/pr280-sync.bundle
            ${{ runner.temp }}/pr280-sync-metadata.txt
          if-no-files-found: error
          retention-days: 7
