name: Sync PR 280 With Main

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/sync-pr280-with-main.yml"

permissions:
  contents: write

concurrency:
  group: sync-pr280-with-main
  cancel-in-progress: true

jobs:
  sync:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/isolated-staging-release-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out existing release branch
        uses: actions/checkout@v4
        with:
          ref: agent/isolated-staging-release-v1
          fetch-depth: 0

      - name: Merge current main into the existing branch
        id: merge
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "econovaria-release-controller"
          git config user.email "actions@users.noreply.github.com"
          git fetch --quiet --no-tags origin main
          set +e
          git merge --no-ff --no-commit -X theirs origin/main > "$RUNNER_TEMP/merge-output.txt" 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "merge_exit_status=$status"
              echo "--- merge output ---"
              cat "$RUNNER_TEMP/merge-output.txt"
              echo "--- unmerged paths ---"
              git diff --name-only --diff-filter=U
              echo "--- status ---"
              git status --short
            } > "$RUNNER_TEMP/pr280-sync-diagnostic.txt"
            git merge --abort || true
            cat "$RUNNER_TEMP/pr280-sync-diagnostic.txt"
            exit "$status"
          fi
          cat "$RUNNER_TEMP/merge-output.txt"
          git diff --check --cached
          git commit -m "Merge current main into isolated staging release platform"
          git push origin HEAD:agent/isolated-staging-release-v1

      - name: Upload merge diagnostics
        if: steps.merge.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: pr280-sync-diagnostic
          path: ${{ runner.temp }}/pr280-sync-diagnostic.txt
          if-no-files-found: error
          retention-days: 7

      - name: Fail after diagnostic upload
        if: steps.merge.outcome == 'failure'
        run: false
