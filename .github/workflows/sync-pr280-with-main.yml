name: Sync PR 280 With Main

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/sync-pr280-with-main.yml"

permissions:
  contents: write

concurrency:
  group: sync-pr280-with-main
  cancel-in-progress: true

jobs:
  sync:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/isolated-staging-release-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out existing release branch
        uses: actions/checkout@v4
        with:
          ref: agent/isolated-staging-release-v1
          fetch-depth: 0

      - name: Publish merge commit handoff or clean prior handoff
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "econovaria-release-controller"
          git config user.email "actions@users.noreply.github.com"
          git fetch --quiet --no-tags origin main

          if git merge-base --is-ancestor origin/main HEAD; then
            git push origin :refs/tags/pr280-sync-handoff || true
            echo "Branch already contains current main; handoff tag removed."
            exit 0
          fi

          git merge --no-ff --no-commit -X theirs origin/main
          git diff --check --cached
          git commit -m "Merge current main into isolated staging release platform"
          merge_sha="$(git rev-parse HEAD)"
          git tag -f pr280-sync-handoff "$merge_sha"
          git push --force origin refs/tags/pr280-sync-handoff
          printf 'Published merge handoff %s\n' "$merge_sha"
