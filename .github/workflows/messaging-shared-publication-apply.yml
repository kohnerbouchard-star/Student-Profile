name: Messaging Shared Publication Apply

on:
  push:
    branches:
      - agent/messaging-communication-v1
    paths:
      - .github/workflows/messaging-shared-publication-apply.yml

permissions:
  contents: write
  statuses: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/messaging-communication-v1
          fetch-depth: 0
          persist-credentials: true

      - name: Three-way union Messaging publication with Marketplace main
        id: publish
        continue-on-error: true
        shell: bash
        env:
          SOURCE_HEAD: c485c2369d9a0e73a2fdbd04d5f87a4439f154aa
          MERGE_BASE: 7f89e8f7bd390a0d27877cc970b4deff993f9c9a
          EXPECTED_MAIN: fcef04f9327efc24955ff17406aaa2d368da2e55
        run: |
          set -euo pipefail
          printf 'initialization' > /tmp/messaging-shared-stage
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main --no-tags
          test "$(git rev-parse origin/main)" = "$EXPECTED_MAIN"
          test "$(git merge-base HEAD origin/main)" = "$EXPECTED_MAIN"

          shared=(
            .github/workflows/database-replay.yml
            .github/workflows/player-terminal-verify.yml
            admin/index.html
            backend/package.json
            backend/src/domains/players/contracts/playerCapabilityManifestContracts.test.ts
            backend/src/domains/players/contracts/playerCapabilityManifestContracts.ts
            backend/src/security/playerRateLimitDispatch.ts
            backend/supabase/functions/admin-api/index.ts
            backend/supabase/functions/classroom-api/index.ts
            package.json
            player-terminal/package.json
            player-terminal/src/api/backend-routes.js
            player-terminal/src/api/endpoints.js
            player-terminal/src/api/payload-normalizer.js
            player-terminal/src/api/resource-plan.js
            player-terminal/src/integrations/student-profile-capability-manifest.js
            player-terminal/src/pages/messages-page.js
          )

          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT
          for path in "${shared[@]}"; do
            printf 'union:%s' "$path" > /tmp/messaging-shared-stage
            current="$workdir/current"
            base="$workdir/base"
            source="$workdir/source"
            cp "$path" "$current"
            git show "$MERGE_BASE:$path" > "$base"
            git show "$SOURCE_HEAD:$path" > "$source"
            git merge-file --union "$current" "$base" "$source" || true
            test -z "$(grep -nE '^(<<<<<<<|=======|>>>>>>>)' "$current" || true)"
            install -m 0644 "$current" "$path"
          done

          rm -f .github/workflows/messaging-final-bundle.yml
          rm -f .github/workflows/messaging-shared-publication-apply.yml
          git add -A
          for spec in \
            'classroom:messagingDispatch:backend/supabase/functions/classroom-api/index.ts' \
            'rate-limit:messageSend:backend/src/security/playerRateLimitDispatch.ts' \
            'capability:messageSend:backend/src/domains/players/contracts/playerCapabilityManifestContracts.ts' \
            'player-endpoints:messageSend:player-terminal/src/api/endpoints.js' \
            'admin:messaging:backend/supabase/functions/admin-api/index.ts'
          do
            stage="${spec%%:*}"
            rest="${spec#*:}"
            needle="${rest%%:*}"
            file="${rest#*:}"
            printf 'grep:%s' "$stage" > /tmp/messaging-shared-stage
            git grep -Fq "$needle" -- "$file"
          done
          for file in \
            player-terminal/src/api/backend-routes.js \
            player-terminal/src/api/endpoints.js \
            player-terminal/src/api/payload-normalizer.js \
            player-terminal/src/api/resource-plan.js \
            player-terminal/src/integrations/student-profile-capability-manifest.js \
            player-terminal/src/pages/messages-page.js
          do
            printf 'node-check:%s' "$file" > /tmp/messaging-shared-stage
            node --check "$file"
          done
          printf 'commit' > /tmp/messaging-shared-stage
          git commit -m "feat(messaging): publish shared routes and capabilities additively"
          git push origin HEAD:agent/messaging-communication-v1

      - name: Publish shared-publication status
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const success = '${{ steps.publish.outcome }}' === 'success';
            const stage = fs.existsSync('/tmp/messaging-shared-stage')
              ? fs.readFileSync('/tmp/messaging-shared-stage', 'utf8').trim()
              : 'unknown';
            const slug = stage.replace(/[^A-Za-z0-9_.-]+/g, '-').slice(0, 70);
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: success ? 'success' : 'failure',
              context: success ? 'messaging/shared-publication' : `messaging/shared-stage/${slug}`,
              description: success ? 'Messaging shared registrations unioned with Marketplace main' : `Failed at ${stage}`.slice(0, 140),
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Enforce shared-publication success
        if: steps.publish.outcome != 'success'
        run: false
