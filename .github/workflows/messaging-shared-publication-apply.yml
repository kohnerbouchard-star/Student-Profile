name: Messaging Shared Publication Candidate

on:
  push:
    branches:
      - agent/messaging-communication-v1
    paths:
      - .github/workflows/messaging-shared-publication-apply.yml

permissions:
  contents: write
  statuses: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/messaging-communication-v1
          fetch-depth: 0
          persist-credentials: false

      - name: Build validated shared publication candidate
        shell: bash
        env:
          SOURCE_HEAD: c485c2369d9a0e73a2fdbd04d5f87a4439f154aa
          MERGE_BASE: 7f89e8f7bd390a0d27877cc970b4deff993f9c9a
          EXPECTED_MAIN: fcef04f9327efc24955ff17406aaa2d368da2e55
        run: |
          set -euo pipefail
          git fetch origin main --no-tags
          test "$(git rev-parse origin/main)" = "$EXPECTED_MAIN"
          test "$(git merge-base HEAD origin/main)" = "$EXPECTED_MAIN"

          shared=(
            admin/index.html
            backend/package.json
            backend/src/domains/players/contracts/playerCapabilityManifestContracts.test.ts
            backend/src/domains/players/contracts/playerCapabilityManifestContracts.ts
            backend/src/security/playerRateLimitDispatch.ts
            backend/supabase/functions/admin-api/index.ts
            backend/supabase/functions/classroom-api/index.ts
            package.json
            player-terminal/package.json
            player-terminal/src/api/endpoints.js
            player-terminal/src/api/resource-plan.js
            player-terminal/src/integrations/student-profile-capability-manifest.js
            player-terminal/src/pages/messages-page.js
          )

          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT
          mkdir -p /tmp/messaging-shared-candidate
          for path in "${shared[@]}"; do
            current="$workdir/current"
            base="$workdir/base"
            source="$workdir/source"
            cp "$path" "$current"
            git show "$MERGE_BASE:$path" > "$base"
            git show "$SOURCE_HEAD:$path" > "$source"
            git merge-file --union "$current" "$base" "$source" || true
            test -z "$(grep -nE '^(<<<<<<<|=======|>>>>>>>)' "$current" || true)"
            mkdir -p "/tmp/messaging-shared-candidate/$(dirname "$path")"
            install -m 0644 "$current" "/tmp/messaging-shared-candidate/$path"
          done

          git --work-tree=/tmp/messaging-shared-candidate grep -Fq 'messagingDispatch' -- backend/supabase/functions/classroom-api/index.ts
          git --work-tree=/tmp/messaging-shared-candidate grep -Fq 'messageSend' -- backend/src/security/playerRateLimitDispatch.ts
          git --work-tree=/tmp/messaging-shared-candidate grep -Fq 'messageSend' -- backend/src/domains/players/contracts/playerCapabilityManifestContracts.ts
          git --work-tree=/tmp/messaging-shared-candidate grep -Fq 'messageSend' -- player-terminal/src/api/endpoints.js
          git --work-tree=/tmp/messaging-shared-candidate grep -Fq 'messaging' -- backend/supabase/functions/admin-api/index.ts
          for file in \
            player-terminal/src/api/endpoints.js \
            player-terminal/src/api/resource-plan.js \
            player-terminal/src/integrations/student-profile-capability-manifest.js \
            player-terminal/src/pages/messages-page.js
          do
            node --input-type=module --check < "/tmp/messaging-shared-candidate/$file"
          done

      - name: Publish validated files sequentially
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const root = '/tmp/messaging-shared-candidate';
            const branch = 'agent/messaging-communication-v1';
            const files = [
              'admin/index.html',
              'backend/package.json',
              'backend/src/domains/players/contracts/playerCapabilityManifestContracts.test.ts',
              'backend/src/domains/players/contracts/playerCapabilityManifestContracts.ts',
              'backend/src/security/playerRateLimitDispatch.ts',
              'backend/supabase/functions/admin-api/index.ts',
              'backend/supabase/functions/classroom-api/index.ts',
              'package.json',
              'player-terminal/package.json',
              'player-terminal/src/api/endpoints.js',
              'player-terminal/src/api/resource-plan.js',
              'player-terminal/src/integrations/student-profile-capability-manifest.js',
              'player-terminal/src/pages/messages-page.js',
            ];
            for (const file of files) {
              const current = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: file,
                ref: branch,
              });
              if (Array.isArray(current.data) || !current.data.sha) {
                throw new Error(`Expected file content for ${file}`);
              }
              const content = fs.readFileSync(path.join(root, file)).toString('base64');
              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: file,
                branch,
                sha: current.data.sha,
                message: `feat(messaging): publish ${file} additively`,
                content,
              });
            }

      - name: Publish candidate status
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: '${{ job.status }}' === 'success' ? 'success' : 'failure',
              context: 'messaging/shared-publication-api',
              description: '${{ job.status }}' === 'success'
                ? 'Validated Messaging shared files published through contents API'
                : 'Messaging shared contents publication failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
