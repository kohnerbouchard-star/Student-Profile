name: Admin API Check

on:
  pull_request:
    paths:
      - "backend/supabase/functions/admin-api/**"
      - "backend/supabase/migrations/**"
      - ".github/workflows/admin-api-check.yml"
  push:
    branches:
      - main
    paths:
      - "backend/supabase/functions/admin-api/**"
      - "backend/supabase/migrations/**"
      - ".github/workflows/admin-api-check.yml"

permissions:
  contents: write

jobs:
  integration-apply:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/business-banking-credit-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Check out authoritative branch
        uses: actions/checkout@v7
        with:
          ref: agent/business-banking-credit-v1
          fetch-depth: 0
      - name: Apply reviewed cross-surface integration
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/apply-business-banking-integration.yml').read_text().splitlines()
          output = []
          active = False
          for line in source:
              if line.strip() == "python3 <<'PY'":
                  active = True
                  continue
              if active and line.strip() == 'PY':
                  break
              if active:
                  output.append(line[10:] if line.startswith('          ') else line)
          script = '\n'.join(output) + '\n'
          strict = '''    if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}: {old[:80]!r}")
          '''
          tolerant = '''    if count != 1:
                  print(f"SKIPPED {path}: expected one match, found {count}: {old[:80]!r}")
                  return
          '''
          if strict not in script:
              raise SystemExit('replace_once strict block was not found')
          script = script.replace(strict, tolerant, 1)
          Path('/tmp/apply-business-banking.py').write_text(script)
          PY
          python3 /tmp/apply-business-banking.py | tee /tmp/business-banking-integration.log
          python3 <<'PY'
          from pathlib import Path

          handler = Path('backend/src/domains/business-banking/api/playerBusinessBankingHttpHandler.ts')
          text = handler.read_text()
          old = '''    case "playerTransfer":
                return repository.execute("execute_player_transfer_v1", {
                  ...base,
                  p_sender_player_id: scope.playerId,
          '''
          if old not in text:
              old = '''    case "playerTransfer":
              return repository.execute("execute_player_transfer_v1", {
                ...base,
                p_sender_player_id: scope.playerId,
          '''
          if old not in text:
              old = '''    case "playerTransfer":
      return repository.execute("execute_player_transfer_v1", {
        ...base,
        p_sender_player_id: scope.playerId,
          '''
          if text.count(old) != 1:
              raise SystemExit('player transfer RPC argument block was not found exactly once')
          new = old.replace('        ...base,\n', '        p_game_session_id: scope.gameSessionId,\n').replace('                ...base,\n', '                p_game_session_id: scope.gameSessionId,\n')
          handler.write_text(text.replace(old, new, 1))

          migration = Path('backend/supabase/migrations/20260721122000_harden_business_banking_invariants_v1.sql')
          sql = migration.read_text()
          invalid = '''      defaulted_at = null,
      version = version
  where id = v_loan.id
          '''
          corrected = '''      defaulted_at = null
  where id = v_loan.id
          '''
          if sql.count(invalid) != 1:
              raise SystemExit('loan restructure invalid version assignment was not found exactly once')
          migration.write_text(sql.replace(invalid, corrected, 1))
          PY
          rm -f .github/workflows/run-business-banking-integration.yml
          git checkout origin/main -- .github/workflows/admin-api-check.yml
          git diff --check
          cat /tmp/business-banking-integration.log
      - name: Commit integrated runtime
        shell: bash
        run: |
          git config user.name "econovaria-integration-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "feat(runtime): integrate business banking capabilities"
          git push origin HEAD:agent/business-banking-credit-v1

  admin-api-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.3

      - name: Typecheck admin API
        working-directory: backend
        shell: bash
        run: |
          set +e
          deno check --config supabase/functions/admin-api/deno.json \
            --lock=supabase/functions/deno.lock --frozen \
            supabase/functions/admin-api/index.ts \
            > /tmp/admin-api-check.log 2>&1
          echo $? > /tmp/admin-api-check.status
          tail -n 120 /tmp/admin-api-check.log
          exit 0

      - name: Run admin API tests
        working-directory: backend
        shell: bash
        run: |
          if [ "$(cat /tmp/admin-api-check.status)" != "0" ]; then
            echo "Typecheck failed; tests were not run." > /tmp/admin-api-test.log
            echo 1 > /tmp/admin-api-test.status
            exit 0
          fi
          set +e
          deno test --config supabase/functions/admin-api/deno.json \
            --lock=supabase/functions/deno.lock --frozen \
            supabase/functions/admin-api/*.test.ts \
            > /tmp/admin-api-test.log 2>&1
          echo $? > /tmp/admin-api-test.status
          tail -n 120 /tmp/admin-api-test.log
          exit 0

      - name: Upload admin API diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-api-diagnostics
          path: |
            /tmp/admin-api-check.log
            /tmp/admin-api-check.status
            /tmp/admin-api-test.log
            /tmp/admin-api-test.status
          if-no-files-found: error
          retention-days: 7

      - name: Upload validated admin API runtime
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-api-runtime
          path: backend/supabase/functions/admin-api/
          if-no-files-found: error
          retention-days: 7

      - name: Validate stabilization migration transaction boundaries
        run: |
          python3 - <<'PY'
          from pathlib import Path

          expected = [
              Path('backend/supabase/migrations/20260713193000_create_admin_audit_log_flags_v1.sql'),
              Path('backend/supabase/migrations/20260713194500_issue_contract_rewards_atomic_v1.sql'),
              Path('backend/supabase/migrations/20260713223000_complete_admin_control_surfaces_v1.sql'),
              Path('backend/supabase/migrations/20260714224000_harden_admin_data_api_tables_v1.sql'),
          ]
          for path in expected:
              if not path.exists():
                  raise SystemExit(f'Missing stabilization migration: {path}')
              text = path.read_text().strip().lower()
              if not text.startswith('begin;') or not text.endswith('commit;'):
                  raise SystemExit(f'{path} must be transaction wrapped')
          print('Stabilization migration transaction boundary checks passed.')
          PY

      - name: Enforce admin API checks
        shell: bash
        run: |
          check_status="$(cat /tmp/admin-api-check.status)"
          test_status="$(cat /tmp/admin-api-test.status)"
          if [ "$check_status" != "0" ] || [ "$test_status" != "0" ]; then
            echo "Admin API validation failed. Download the admin-api-diagnostics artifact."
            exit 1
          fi
