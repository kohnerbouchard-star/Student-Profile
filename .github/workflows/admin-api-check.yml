name: Admin API Check

on:
  pull_request:
    paths:
      - "backend/supabase/functions/admin-api/**"
      - "backend/supabase/migrations/**"
      - ".github/workflows/admin-api-check.yml"
  push:
    branches:
      - main
    paths:
      - "backend/supabase/functions/admin-api/**"
      - "backend/supabase/migrations/**"
      - ".github/workflows/admin-api-check.yml"

jobs:
  admin-api-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Typecheck admin API
        working-directory: backend
        shell: bash
        run: |
          set +e
          deno check --config supabase/functions/admin-api/deno.json --no-lock \
            supabase/functions/admin-api/index.ts \
            > /tmp/admin-api-check.log 2>&1
          status=$?
          tail -n 120 /tmp/admin-api-check.log
          exit $status

      - name: Run admin API tests
        working-directory: backend
        shell: bash
        run: |
          set +e
          deno test --config supabase/functions/admin-api/deno.json --no-lock \
            supabase/functions/admin-api/*.test.ts \
            > /tmp/admin-api-test.log 2>&1
          status=$?
          tail -n 120 /tmp/admin-api-test.log
          exit $status

      - name: Validate migration transaction boundaries
        run: |
          python3 - <<'PY'
          from pathlib import Path
          for path in Path('backend/supabase/migrations').glob('20260713*.sql'):
              text = path.read_text().strip().lower()
              if not text.startswith('begin;') or not text.endswith('commit;'):
                  raise SystemExit(f'{path} must be transaction wrapped')
          print('Migration transaction boundary checks passed.')
          PY
