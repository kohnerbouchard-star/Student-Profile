name: Secure Connected Release Framework

on:
  pull_request:
    paths:
      - ".github/workflows/secure-connected-release-framework.yml"
      - "docs/operations/evidence/production-integration-gate-v1/**"
      - "scripts/connected-release-framework*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secure-connected-release-framework-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  validate:
    name: Secure acceptance and drift ledger
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
      - name: Validate secure acceptance contract
        run: >-
          node scripts/connected-release-framework.mjs validate-acceptance
          --contract docs/operations/evidence/production-integration-gate-v1/secure-acceptance-contract-v1.json
      - name: Derive and validate live staging inventory
        run: >-
          node scripts/connected-release-framework.mjs validate-live-inventory
          --snapshot docs/operations/evidence/production-integration-gate-v1/live-staging-inventory-2026-07-22.json
          --repo-root .
      - name: Validate forward-only migration reconciliation
        run: >-
          node scripts/connected-release-framework.mjs validate-reconciliation
          --snapshot docs/operations/evidence/production-integration-gate-v1/live-staging-inventory-2026-07-22.json
          --plan docs/operations/evidence/production-integration-gate-v1/forward-only-reconciliation-v1.json
          --repo-root .
      - name: Run secure framework tests
        run: node --test scripts/connected-release-framework.test.mjs
      - name: Record no-go boundary
        run: |
          {
            echo "## Secure connected release framework"
            echo "- Secure acceptance contract: \`green\`"
            echo "- Drift-derived staging inventory: \`green\`"
            echo "- Forward-only reconciliation contract: \`green\`"
            echo "- Final release operations executed: \`false\`"
            echo "- Production modified: \`false\`"
            echo "- Stop: \`SECURE_ACCEPTANCE_FRAMEWORK_AND_DRIFT_LEDGER_GREEN_NO_GO\`"
          } >> "$GITHUB_STEP_SUMMARY"
