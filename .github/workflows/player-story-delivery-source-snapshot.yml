name: Player Story Delivery Source Snapshot

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/player-story-delivery-source-snapshot.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Package source snapshot
        run: |
          tar \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=backend/node_modules \
            -czf "$RUNNER_TEMP/student-profile-source.tar.gz" .

      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: player-story-delivery-source
          path: ${{ runner.temp }}/student-profile-source.tar.gz
          if-no-files-found: error
          retention-days: 1
