name: PR295 Fix V2 Builder Binding Fast Forward

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/pr295-fix-v2-builder-binding-fast-forward.yml"

permissions:
  contents: write

concurrency:
  group: pr295-fix-v2-builder-binding-fast-forward
  cancel-in-progress: false

jobs:
  patch:
    if: github.event.pull_request.number == 295
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/production-integration-gate-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply exact-head builder binding
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/pr295-immutable-release-build.yml')
          text = path.read_text(encoding='utf-8')
          expression = chr(36) + '{{ github.event.pull_request.head.sha }}'
          old_env = '      EXPECTED_TOOLING_COMMIT: 6ee5707261cf005df7180acaf5c7d29edd71a945'
          old_ref = '          ref: agent/production-integration-gate-v1'
          if text.count(old_env) != 1 or text.count(old_ref) != 1:
              raise SystemExit('Unexpected v2 builder binding state')
          text = text.replace(old_env, f'      EXPECTED_TOOLING_COMMIT: {expression}', 1)
          text = text.replace(old_ref, f'          ref: {expression}', 1)
          path.write_text(text, encoding='utf-8')
          PY
          rm -f \
            .github/workflows/pr295-fix-v2-builder-binding.yml \
            .github/workflows/pr295-fix-v2-builder-binding-fast-forward.yml
          git add -A
          git diff --cached --check
          git commit -m "ci(ops): bind v2 builder to exact PR head"
          git push origin HEAD:agent/production-integration-gate-v1
