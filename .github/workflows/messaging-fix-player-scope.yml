name: Messaging Fix Verification Guards

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/messaging-fix-player-scope.yml
  push:
    branches:
      - agent/messaging-communication-v1
    paths:
      - .github/workflows/messaging-fix-player-scope.yml

permissions:
  contents: write

concurrency:
  group: messaging-fix-verification-guards
  cancel-in-progress: true

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact Messaging branch
        uses: actions/checkout@v7
        with:
          ref: agent/messaging-communication-v1
          fetch-depth: 0
          persist-credentials: true

      - name: Correct exact staging guard and remove helper
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/messaging-isolated-staging.yml')
          lines = path.read_text().splitlines()
          matches = [
              index
              for index, line in enumerate(lines)
              if 'grep -Fq' in line
              and 'ON_ERROR_STOP on' in line
              and 'messaging-connected-acceptance.sql' in line
          ]
          if len(matches) != 1:
              raise SystemExit(f'Expected exactly one psql guard, found {len(matches)}.')
          lines[matches[0]] = r"          grep -Fq '\set ON_ERROR_STOP on' scripts/staging/messaging-connected-acceptance.sql"
          path.write_text('\n'.join(lines) + '\n')
          PY

          grep -Fq '\set ON_ERROR_STOP on' scripts/staging/messaging-connected-acceptance.sql
          rm .github/workflows/messaging-fix-player-scope.yml
          git add -A
          git diff --cached --check
          git commit -m "fix(messaging): correct exact staging validation guard"
          git push origin HEAD:agent/messaging-communication-v1
