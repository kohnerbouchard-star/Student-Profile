name: Messaging Export Corrected Staging Workflow

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/messaging-fix-player-scope.yml

permissions:
  contents: read

concurrency:
  group: messaging-export-corrected-staging
  cancel-in-progress: true

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact Messaging branch
        uses: actions/checkout@v7
        with:
          ref: agent/messaging-communication-v1
          fetch-depth: 1
          persist-credentials: false

      - name: Materialize corrected staging workflow
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/messaging-isolated-staging.yml')
          lines = path.read_text().splitlines()
          matches = [
              index
              for index, line in enumerate(lines)
              if 'grep -Fq' in line
              and 'ON_ERROR_STOP on' in line
              and 'messaging-connected-acceptance.sql' in line
          ]
          if len(matches) != 1:
              raise SystemExit(f'Expected exactly one psql guard, found {len(matches)}.')
          lines[matches[0]] = r"          grep -Fq '\set ON_ERROR_STOP on' scripts/staging/messaging-connected-acceptance.sql"
          path.write_text('\n'.join(lines) + '\n')
          PY
          grep -Fq '\set ON_ERROR_STOP on' scripts/staging/messaging-connected-acceptance.sql

      - name: Upload corrected workflow
        uses: actions/upload-artifact@v4
        with:
          name: corrected-messaging-isolated-staging
          path: .github/workflows/messaging-isolated-staging.yml
          if-no-files-found: error
          retention-days: 1
