name: Messaging Fix Verification Guards

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/messaging-fix-player-scope.yml
  push:
    branches:
      - agent/messaging-communication-v1
    paths:
      - .github/workflows/messaging-fix-player-scope.yml

permissions:
  contents: write

concurrency:
  group: messaging-fix-verification-guards
  cancel-in-progress: true

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact Messaging branch
        uses: actions/checkout@v7
        with:
          ref: agent/messaging-communication-v1
          fetch-depth: 0
          persist-credentials: true

      - name: Correct exact staging guard and remove helper
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python - <<'PY'
          from pathlib import Path

          scope = Path('player-terminal/tools/verify-pr-scope.mjs').read_text()
          required_scope_guards = [
              '"admin/admin-bootstrap.js"',
              '/^backend\\/src\\/domains\\/messaging\\//',
              'playerMessagingRateLimitDispatch',
              'staffMessagingRateLimitDispatch',
              '2026072115(0000|1000|2000|3000)',
          ]
          missing = [guard for guard in required_scope_guards if guard not in scope]
          if missing:
              raise SystemExit(f'Messaging scope verifier is missing: {missing}')

          staging_path = Path('.github/workflows/messaging-isolated-staging.yml')
          staging = staging_path.read_text()
          old_guard = "          grep -Fq '\\\\set ON_ERROR_STOP on' scripts/staging/messaging-connected-acceptance.sql\n"
          new_guard = "          grep -Fq '\\set ON_ERROR_STOP on' scripts/staging/messaging-connected-acceptance.sql\n"
          if new_guard not in staging:
              if old_guard not in staging:
                  raise SystemExit('Expected doubled-backslash staging guard is missing.')
              staging = staging.replace(old_guard, new_guard, 1)
          staging_path.write_text(staging)
          PY

          rm .github/workflows/messaging-fix-player-scope.yml
          git add -A
          git diff --cached --check
          git commit -m "fix(messaging): correct exact staging validation guard"
          git push origin HEAD:agent/messaging-communication-v1
