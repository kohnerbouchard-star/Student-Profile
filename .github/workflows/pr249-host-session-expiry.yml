name: PR249 One-Use Host Session Expiry

on:
  push:
    branches:
      - agent/player-marketplace-lifecycle-v1
    paths:
      - ".github/workflows/pr249-host-session-expiry.yml"

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: agent/player-marketplace-lifecycle-v1

      - name: Advance synthetic browser session expiry
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("player-terminal/tests/browser/marketplace-lifecycle.spec.mjs")
          source = path.read_text()
          old = 'sessionExpiresAt: "2026-07-21T03:00:00.000Z"'
          new = 'sessionExpiresAt: "2099-07-21T03:00:00.000Z"'
          if source.count(old) != 1:
              raise SystemExit(f"Expected one Marketplace host expiry marker, found {source.count(old)}")
          path.write_text(source.replace(old, new, 1))
          Path(".github/workflows/pr249-host-session-expiry.yml").unlink()
          PY

      - name: Commit valid synthetic session expiry
        shell: bash
        run: |
          git config user.name "econovaria-controller"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "test(marketplace): keep browser host session unexpired"
          git push origin HEAD:agent/player-marketplace-lifecycle-v1
