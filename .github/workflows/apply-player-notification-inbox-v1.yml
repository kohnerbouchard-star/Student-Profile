name: Apply Player Notification Inbox v1

on:
  push:
    branches:
      - agent/player-notification-inbox-v1

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/player-notification-inbox-v1
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Apply bounded notification patch
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def read(path):
              return Path(path).read_text()

          def write(path, content):
              target = Path(path)
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(content)

          def replace_once(path, old, new):
              content = read(path)
              if content.count(old) != 1:
                  raise SystemExit(f"Expected exactly one match in {path}: {old[:120]!r}; found {content.count(old)}")
              write(path, content.replace(old, new, 1))

          # Backend: expose one exact unread total beside the existing cursor page.
          path = "backend/src/domains/notifications/contracts/playerNotificationContracts.ts"
          replace_once(path,
          '''  }): Promise<readonly PlayerNotificationRecord[]>;

          readDeliveriesByPublicIds(input: {''',
          '''  }): Promise<readonly PlayerNotificationRecord[]>;

          countUnreadNotifications?(input: {
            readonly gameId: string;
            readonly playerUuid: string;
          }): Promise<number>;

          readDeliveriesByPublicIds(input: {''')
          replace_once(path,
          '''  readonly page: {
            readonly returned: number;
            readonly hasMore: boolean;
            readonly nextCursor: string | null;
          };
          readonly items: readonly PlayerNotificationItemDto[];''',
          '''  readonly page: {
            readonly returned: number;
            readonly hasMore: boolean;
            readonly nextCursor: string | null;
          };
          readonly summary: {
            readonly unreadCount: number;
          };
          readonly items: readonly PlayerNotificationItemDto[];''')

          path = "backend/src/domains/notifications/services/playerNotificationService.ts"
          replace_once(path,
          '''export interface PlayerNotificationListServiceResult {
            readonly items: readonly PlayerNotificationItemDto[];
            readonly hasMore: boolean;
            readonly nextCursor: PlayerNotificationCursor | null;
          }''',
          '''export interface PlayerNotificationListServiceResult {
            readonly items: readonly PlayerNotificationItemDto[];
            readonly unreadCount: number;
            readonly hasMore: boolean;
            readonly nextCursor: PlayerNotificationCursor | null;
          }''')
          replace_once(path,
          '''      const records = await this.repository.listNotifications({
                gameId: scope.gameId,
                playerUuid: scope.playerUuid,
                status: query.status,
                limit: query.limit + 1,
                cursor: query.cursor,
              });
              validateRecordScope(records, scope);''',
          '''      const [records, unreadCount] = await Promise.all([
                this.repository.listNotifications({
                  gameId: scope.gameId,
                  playerUuid: scope.playerUuid,
                  status: query.status,
                  limit: query.limit + 1,
                  cursor: query.cursor,
                }),
                this.repository.countUnreadNotifications
                  ? this.repository.countUnreadNotifications({
                    gameId: scope.gameId,
                    playerUuid: scope.playerUuid,
                  })
                  : Promise.resolve<number | null>(null),
              ]);
              validateRecordScope(records, scope);''')
          replace_once(path,
          '''      return {
                items: page.map(toItemDto),
                hasMore,
                nextCursor: hasMore && last
                  ? {
                    deliveredAt: last.deliveredAt,
                    publicDeliveryId: last.publicDeliveryId,
                  }
                  : null,
              };''',
          '''      const fallbackUnreadCount = query.status === "unread" && !hasMore
                ? page.length
                : 0;
              return {
                items: page.map(toItemDto),
                unreadCount: requireUnreadCount(unreadCount ?? fallbackUnreadCount),
                hasMore,
                nextCursor: hasMore && last
                  ? {
                    deliveredAt: last.deliveredAt,
                    publicDeliveryId: last.publicDeliveryId,
                  }
                  : null,
              };''')
          replace_once(path,
          '''function compareNotifications(
            left: PlayerNotificationRecord,''',
          '''function requireUnreadCount(value: number): number {
            if (!Number.isSafeInteger(value) || value < 0) throw scopeViolation();
            return value;
          }

          function compareNotifications(
            left: PlayerNotificationRecord,''')

          path = "backend/src/domains/notifications/api/playerNotificationHttpHandler.ts"
          replace_once(path,
          '''        page: {
                  returned: result.items.length,
                  hasMore: result.hasMore,
                  nextCursor: result.nextCursor
                    ? encodePlayerNotificationCursor(result.nextCursor)
                    : null,
                },
                items: result.items,''',
          '''        page: {
                  returned: result.items.length,
                  hasMore: result.hasMore,
                  nextCursor: result.nextCursor
                    ? encodePlayerNotificationCursor(result.nextCursor)
                    : null,
                },
                summary: {
                  unreadCount: result.unreadCount,
                },
                items: result.items,''')

          path = "backend/src/domains/notifications/infrastructure/supabasePlayerNotificationRepository.ts"
          replace_once(path,
          '''interface QueryResponse<T> {
            readonly data: T | null;
            readonly error: QueryError | null;
          }''',
          '''interface QueryResponse<T> {
            readonly data: T | null;
            readonly error: QueryError | null;
            readonly count?: number | null;
          }''')
          replace_once(path,
          '''interface QueryBuilder {
            select(columns: string): FilterBuilder;
            update(values: unknown): UpdateBuilder;
          }''',
          '''interface QueryBuilder {
            select(
              columns: string,
              options?: { readonly count?: "exact"; readonly head?: boolean },
            ): FilterBuilder;
            update(values: unknown): UpdateBuilder;
          }''')
          replace_once(path,
          '''  async readDeliveriesByPublicIds(input: {
            readonly gameId: string;''',
          '''  async countUnreadNotifications(input: {
            readonly gameId: string;
            readonly playerUuid: string;
          }): Promise<number> {
            const response = await this.client
              .from("notification_deliveries")
              .select("id", { count: "exact", head: true })
              .eq("game_session_id", input.gameId)
              .eq("player_id", input.playerUuid)
              .is("seen_at", null)
              .is("dismissed_at", null);
            if (response.error) throw mapPersistenceError(response.error);
            if (typeof response.count !== "number" || !Number.isSafeInteger(response.count) || response.count < 0) {
              throw readFailed();
            }
            return response.count;
          }

          async readDeliveriesByPublicIds(input: {
            readonly gameId: string;''')

          path = "backend/src/domains/notifications/services/playerNotificationService.test.ts"
          replace_once(path,
          '''Deno.test("notification read acknowledgement is idempotent and ordered", async () => {''',
          '''Deno.test("notification service reports the exact unread total independently from page size", async () => {
            const service = new PlayerNotificationService({
              ...repository({ list: [] }),
              countUnreadNotifications: () => Promise.resolve(17),
            });
            const result = await service.listNotifications(
              scope(),
              { status: "all", limit: 1, cursor: null },
            );
            assertEquals(result.unreadCount, 17);
          });

          Deno.test("notification read acknowledgement is idempotent and ordered", async () => {''')

          # Player adapter: retain the full page envelope through a reviewed alias key.
          path = "player-terminal/src/api/endpoints.js"
          replace_once(path,
          '''  notifications: { method: "GET", path: "/notifications" },
            notificationsRead: { method: "POST", path: "/notifications/read" }''',
          '''  notifications: { method: "GET", path: "/notifications" },
            notificationsPage: { method: "GET", path: "/notifications" },
            notificationsRead: { method: "POST", path: "/notifications/read" }''')

          path = "player-terminal/src/api/backend-routes.js"
          notification_builder = '''  notifications: ({ payload = {} }) => ({
            method: "GET",
            path: queryPath("/players/me/notifications", {
              status: payload.status ?? "unread",
              limit: payload.limit ?? 50,
              cursor: payload.cursor
            })
          }),'''
          replace_once(path, notification_builder,
          notification_builder + '''

          notificationsPage: ({ payload = {} }) => ({
            method: "GET",
            path: queryPath("/players/me/notifications", {
              status: payload.status ?? "unread",
              limit: payload.limit ?? 20,
              cursor: payload.cursor
            })
          }),''')

          path = "player-terminal/src/api/response-normalizer.js"
          replace_once(path,
          '''  "progression", "notifications"
          ]);''',
          '''  "progression", "notifications", "notificationsPage"
          ]);''')
          replace_once(path,
          '''  progression: Object.freeze(["reputation", "milestones", "skills", "achievements", "licenses"])
          });''',
          '''  progression: Object.freeze(["reputation", "milestones", "skills", "achievements", "licenses"]),
            notificationsPage: Object.freeze(["items"])
          });''')
          replace_once(path,
          '''  loans: Object.freeze(["nextPayment"])
          });''',
          '''  loans: Object.freeze(["nextPayment"]),
            notificationsPage: Object.freeze(["page", "summary"])
          });''')
          replace_once(path,
          '''  for (const key of REQUIRED_OBJECT_FIELDS[endpointKey] || []) {
              if (!value[key] || typeof value[key] !== "object" || Array.isArray(value[key])) {
                throw invalidResponse(endpointKey, context.requestId, context.path);
              }
            }
          }''',
          '''  for (const key of REQUIRED_OBJECT_FIELDS[endpointKey] || []) {
              if (!value[key] || typeof value[key] !== "object" || Array.isArray(value[key])) {
                throw invalidResponse(endpointKey, context.requestId, context.path);
              }
            }
            if (endpointKey === "notificationsPage") {
              const unreadCount = value.summary.unreadCount;
              const returned = value.page.returned;
              const hasMore = value.page.hasMore;
              const nextCursor = value.page.nextCursor;
              if (!Number.isSafeInteger(unreadCount) || unreadCount < 0 ||
                  !Number.isSafeInteger(returned) || returned < 0 || returned !== value.items.length ||
                  typeof hasMore !== "boolean" ||
                  !(nextCursor === null || typeof nextCursor === "string")) {
                throw invalidResponse(endpointKey, context.requestId, context.path);
              }
            }
          }''')

          controller = r'''import { PlayerApi } from "../../api/player-api.js";
          import { isEndpointEnabled } from "../../api/capabilities.js";
          import { escapeHtml } from "../../core/format.js";
          import { setButtonProcessing } from "../../core/dom.js";

          const PUBLIC_DELIVERY_ID = /^ndl_[0-9a-f]{32}$/;
          const CATEGORY_LABELS = Object.freeze({
            attendance: "Attendance",
            contract: "Contracts",
            economy: "Economy",
            general: "General",
            inventory: "Inventory",
            market: "Market",
            security: "Security",
            store: "Store",
            story: "Story",
            system: "System"
          });

          function boundedText(value, fallback = "", limit = 500) {
            const text = typeof value === "string" ? value.trim() : "";
            return (text || fallback).slice(0, limit);
          }

          export function resolvePlayerNotificationCategory(item = {}) {
            const source = boundedText(item.sourceType).toLowerCase();
            const type = boundedText(item.notificationType).toLowerCase();
            const combined = `${source} ${type}`;
            const category =
              /security|authentication|session|credential/.test(combined) ? "security" :
              /attendance|clock/.test(combined) ? "attendance" :
              /contract|assignment|submission/.test(combined) ? "contract" :
              /inventory|redemption|item|equipment|craft/.test(combined) ? "inventory" :
              /store|purchase|quote|receipt/.test(combined) ? "store" :
              /stock|market|portfolio|trade|exchange/.test(combined) ? "market" :
              /story|campaign|cutscene|briefing|war|event/.test(combined) ? "story" :
              /economy|ledger|bank|cash|reward|currency/.test(combined) ? "economy" :
              /system|admin|settings|game/.test(combined) ? "system" :
              "general";
            return Object.freeze({ key: category, label: CATEGORY_LABELS[category] });
          }

          function toneForPriority(value) {
            const priority = boundedText(value).toLowerCase();
            if (["critical", "high", "urgent"].includes(priority)) return "warn";
            if (priority === "low") return "cyan";
            return "purple";
          }

          function normalizeItem(item) {
            if (!item || typeof item !== "object" || Array.isArray(item)) return null;
            const id = boundedText(item.deliveryId || item.id).toLowerCase();
            if (!PUBLIC_DELIVERY_ID.test(id)) return null;
            const category = resolvePlayerNotificationCategory(item);
            return Object.freeze({
              id,
              notificationId: boundedText(item.notificationId).toLowerCase(),
              title: boundedText(item.title, "Notification", 180),
              detail: boundedText(item.summary || item.detail, "A new player update is available.", 1000),
              category,
              tone: toneForPriority(item.priority),
              status: ["unread", "read", "dismissed"].includes(boundedText(item.status).toLowerCase())
                ? boundedText(item.status).toLowerCase()
                : "unread",
              deliveredAt: boundedText(item.deliveredAt, "", 80)
            });
          }

          export function normalizeNotificationPage(body, previousItems = []) {
            if (!body || typeof body !== "object" || Array.isArray(body)) {
              throw new TypeError("Notification page response must be an object.");
            }
            const rawItems = Array.isArray(body.items) ? body.items : [];
            const page = body.page && typeof body.page === "object" && !Array.isArray(body.page) ? body.page : {};
            const summary = body.summary && typeof body.summary === "object" && !Array.isArray(body.summary) ? body.summary : {};
            const unreadCount = Number(summary.unreadCount);
            if (!Number.isSafeInteger(unreadCount) || unreadCount < 0) {
              throw new TypeError("Notification unread count is invalid.");
            }
            const returned = Number(page.returned);
            if (!Number.isSafeInteger(returned) || returned < 0 || returned !== rawItems.length || typeof page.hasMore !== "boolean") {
              throw new TypeError("Notification page metadata is invalid.");
            }
            const nextCursor = page.nextCursor === null ? null : boundedText(page.nextCursor, "", 1000);
            if (page.hasMore && !nextCursor) throw new TypeError("Notification continuation cursor is missing.");

            const merged = new Map();
            for (const item of [...previousItems, ...rawItems.map(normalizeItem).filter(Boolean)]) merged.set(item.id, item);
            return Object.freeze({
              items: Object.freeze([...merged.values()]),
              unreadCount,
              hasMore: page.hasMore,
              nextCursor
            });
          }

          function safeErrorMessage(error) {
            if (Number(error?.status) === 429) return "Notifications are being checked too quickly. Try again shortly.";
            if (Number(error?.status) >= 500 || error?.code === "NETWORK_ERROR" || error?.code === "OFFLINE") {
              return "Notifications are temporarily unavailable. Existing alerts remain visible.";
            }
            return "Notifications could not be loaded safely.";
          }

          function dispatchInvalidSession(error, config, runtime = globalThis) {
            if (Number(error?.status) !== 401) return false;
            const detail = Object.freeze({
              reason: "invalid_player_session",
              terminal: "player",
              status: 401,
              code: String(error?.code || "SESSION_INVALID"),
              requestId: String(error?.requestId || "")
            });
            try { config.onSessionInvalid?.(detail); } catch { /* Host callbacks cannot block safe exit. */ }
            const eventName = String(config.sessionInvalidEvent || "econovaria:player-session-invalid");
            runtime.dispatchEvent?.(new runtime.CustomEvent(eventName, { detail }));
            return true;
          }

          export function installNotificationInboxFlow({ mount, terminal, config }) {
            if (!(mount instanceof HTMLElement) || config.usePreviewData === true) return { destroy() {} };
            if (!terminal || typeof terminal.getState !== "function") {
              throw new TypeError("The notification inbox flow requires an active player terminal.");
            }

            const api = new PlayerApi(config);
            let model = { items: [], unreadCount: 0, hasMore: false, nextCursor: null };
            let loading = false;
            let error = "";
            let destroyed = false;

            function drawer() {
              return mount.querySelector("[data-player-notification-drawer]");
            }

            function capabilityEnabled(endpointKey) {
              return isEndpointEnabled(terminal.getState()?.data?.capabilities, endpointKey);
            }

            function updateBell() {
              const bell = mount.querySelector('[data-player-local-action="toggle-notifications"]');
              const badge = bell?.querySelector("small");
              if (badge) badge.textContent = String(model.unreadCount);
              if (bell) bell.setAttribute("aria-label", `${bell.getAttribute("aria-expanded") === "true" ? "Close" : "Open"} notifications, ${model.unreadCount} unread`);
            }

            function render() {
              if (destroyed) return;
              const host = drawer();
              if (!host) return;
              const notices = model.items.length
                ? model.items.map((item) => `<article class="player-terminal-notice is-${escapeHtml(item.tone)}" data-player-notification-id="${escapeHtml(item.id)}"><span></span><div><small>${escapeHtml(item.category.label)}</small><strong>${escapeHtml(item.title)}</strong><small>${escapeHtml(item.detail)}</small></div></article>`).join("")
                : `<p class="player-terminal-inline-empty">${loading ? "Loading notifications…" : error ? escapeHtml(error) : "No unread notifications."}</p>`;
              const loadMore = model.hasMore
                ? `<button class="player-terminal-drawer-action" type="button" data-player-notification-load-more ${loading ? "disabled" : ""}>${loading ? "Loading…" : "Load more"}</button>`
                : "";
              const markDisabled = loading || !model.items.some((item) => item.status === "unread") || !capabilityEnabled("notificationsRead");
              host.innerHTML = `<div class="player-terminal-drawer-head"><div><span>PLAYER ALERTS</span><strong>${escapeHtml(model.unreadCount)} Unread</strong></div><small>${escapeHtml(model.items.length)} loaded</small></div><div class="player-terminal-notice-list">${notices}</div>${loadMore}<button class="player-terminal-drawer-action" type="button" data-player-notification-mark-read ${markDisabled ? "disabled" : ""}>Mark loaded alerts read</button>`;
              updateBell();
            }

            async function loadPage({ append = false } = {}) {
              if (loading || !capabilityEnabled("notifications")) return;
              loading = true;
              error = "";
              render();
              try {
                api.setSession(config);
                const body = await api.request("notificationsPage", {
                  payload: {
                    status: "unread",
                    limit: 20,
                    cursor: append ? model.nextCursor : undefined
                  },
                  force: true
                });
                model = normalizeNotificationPage(body, append ? model.items : []);
              } catch (requestError) {
                if (dispatchInvalidSession(requestError, config)) return;
                error = safeErrorMessage(requestError);
              } finally {
                loading = false;
                render();
              }
            }

            async function markLoadedRead(button) {
              if (loading || !capabilityEnabled("notificationsRead")) return;
              const deliveryIds = model.items.filter((item) => item.status === "unread").map((item) => item.id);
              if (!deliveryIds.length) return;
              const restore = setButtonProcessing(button, "Marking read");
              loading = true;
              try {
                api.setSession(config);
                await api.execute("notificationsRead", { deliveryIds });
                model = { items: [], unreadCount: Math.max(0, model.unreadCount - deliveryIds.length), hasMore: false, nextCursor: null };
                await loadPage();
                restore("Completed");
                setTimeout(() => restore(), 900);
              } catch (requestError) {
                restore();
                loading = false;
                if (dispatchInvalidSession(requestError, config)) return;
                error = safeErrorMessage(requestError);
                render();
              }
            }

            function handleClick(event) {
              const toggle = event.target.closest?.('[data-player-local-action="toggle-notifications"]');
              if (toggle) {
                const opening = terminal.getState()?.ui?.notificationsOpen !== true;
                if (opening) queueMicrotask(() => void loadPage());
                return;
              }
              const loadMore = event.target.closest?.("[data-player-notification-load-more]");
              if (loadMore) {
                event.preventDefault();
                event.stopImmediatePropagation();
                void loadPage({ append: true });
                return;
              }
              const markRead = event.target.closest?.("[data-player-notification-mark-read]");
              if (markRead) {
                event.preventDefault();
                event.stopImmediatePropagation();
                void markLoadedRead(markRead);
              }
            }

            mount.addEventListener("click", handleClick, true);
            return {
              destroy() {
                destroyed = true;
                mount.removeEventListener("click", handleClick, true);
              }
            };
          }
          '''
          write("player-terminal/src/features/notifications/notification-inbox-flow.js", controller)

          path = "player-terminal/src/main.js"
          replace_once(path,
          '''import { installMarketOrderFlow } from "./features/market/market-order-flow.js";
          import { installStorePurchaseFlow } from "./features/store/store-purchase-flow.js";''',
          '''import { installMarketOrderFlow } from "./features/market/market-order-flow.js";
          import { installNotificationInboxFlow } from "./features/notifications/notification-inbox-flow.js";
          import { installStorePurchaseFlow } from "./features/store/store-purchase-flow.js";''')
          replace_once(path,
          '''const marketOrders = installMarketOrderFlow({ mount, terminal, config });
          const invalidations = installPlayerInvalidationController({ terminal, config });''',
          '''const marketOrders = installMarketOrderFlow({ mount, terminal, config });
          const notifications = installNotificationInboxFlow({ mount, terminal, config });
          const invalidations = installPlayerInvalidationController({ terminal, config });''')
          replace_once(path,
          '''  invalidations.destroy();
            marketOrders.destroy();''',
          '''  invalidations.destroy();
            notifications.destroy();
            marketOrders.destroy();''')

          test = r'''import assert from "node:assert/strict";
          import fs from "node:fs";
          import {
            normalizeNotificationPage,
            resolvePlayerNotificationCategory
          } from "../src/features/notifications/notification-inbox-flow.js";

          const DELIVERY_A = "ndl_00000000000000000000000000000001";
          const DELIVERY_B = "ndl_00000000000000000000000000000002";

          assert.deepEqual(resolvePlayerNotificationCategory({ sourceType: "stock_market", notificationType: "trade_fill" }), { key: "market", label: "Market" });
          assert.deepEqual(resolvePlayerNotificationCategory({ sourceType: "internal_worker", notificationType: "opaque_value" }), { key: "general", label: "General" });

          const first = normalizeNotificationPage({
            summary: { unreadCount: 27 },
            page: { returned: 1, hasMore: true, nextCursor: "cursor-1" },
            items: [{
              deliveryId: DELIVERY_A,
              notificationId: "ntf_00000000000000000000000000000001",
              sourceType: "story_runner",
              notificationType: "campaign_briefing",
              title: "Meridian briefing",
              summary: "Conditions changed.",
              priority: "high",
              status: "unread"
            }]
          });
          assert.equal(first.unreadCount, 27);
          assert.equal(first.hasMore, true);
          assert.equal(first.nextCursor, "cursor-1");
          assert.equal(first.items[0].category.key, "story");
          assert.equal(first.items[0].tone, "warn");

          const second = normalizeNotificationPage({
            summary: { unreadCount: 27 },
            page: { returned: 2, hasMore: false, nextCursor: null },
            items: [
              { deliveryId: DELIVERY_A, title: "Duplicate", summary: "Ignored duplicate", status: "unread" },
              { deliveryId: DELIVERY_B, sourceType: "attendance", title: "Attendance reward", summary: "Reward posted", status: "unread" }
            ]
          }, first.items);
          assert.deepEqual(second.items.map((item) => item.id), [DELIVERY_A, DELIVERY_B]);
          assert.equal(second.items[1].category.key, "attendance");

          assert.throws(() => normalizeNotificationPage({ summary: { unreadCount: -1 }, page: { returned: 0, hasMore: false, nextCursor: null }, items: [] }));
          assert.throws(() => normalizeNotificationPage({ summary: { unreadCount: 1 }, page: { returned: 1, hasMore: true, nextCursor: null }, items: [] }));

          const source = fs.readFileSync(new URL("../src/features/notifications/notification-inbox-flow.js", import.meta.url), "utf8");
          assert.doesNotMatch(source, /\bfetch\s*\(/);
          assert.doesNotMatch(source, /innerHTML\s*=\s*JSON\.stringify/);
          assert.match(source, /api\.request\("notificationsPage"/);
          assert.match(source, /api\.execute\("notificationsRead"/);
          console.log("notification inbox flow checks passed");
          '''
          write("player-terminal/tests/notification-inbox-flow.mjs", test)

          path = "player-terminal/package.json"
          replace_once(path,
          '''    "inventory-read": "node tests/inventory-read-model.mjs",
              "realtime":''',
          '''    "inventory-read": "node tests/inventory-read-model.mjs",
              "notifications-inbox": "node tests/notification-inbox-flow.mjs",
              "realtime":''')
          replace_once(path,
          '''npm run banking-read && npm run inventory-read && npm run realtime''',
          '''npm run banking-read && npm run inventory-read && npm run notifications-inbox && npm run realtime''')

          # Register the focused browser-safe contract in the root verification path without altering runtime styling.
          path = "backend/package.json"
          replace_once(path,
          '''src/domains/notifications/services/playerNotificationService.test.ts src/domains/notifications/infrastructure/supabasePlayerNotificationRepository.test.ts"''',
          '''src/domains/notifications/services/playerNotificationService.test.ts src/domains/notifications/infrastructure/supabasePlayerNotificationRepository.test.ts"''')
          PY
      - name: Install Player dependencies
        working-directory: player-terminal
        run: npm ci
      - name: Verify notification Backend
        working-directory: backend
        run: npm run test:player-notifications && npm run typecheck
      - name: Verify Player notification inbox
        working-directory: player-terminal
        run: npm run notifications-inbox && npm run adapter && npm run connected-reads && npm run check
      - name: Remove integration workflow and publish patch
        shell: bash
        run: |
          rm .github/workflows/apply-player-notification-inbox-v1.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(notifications): add paginated Player inbox"
          git push origin HEAD:agent/player-notification-inbox-v1
