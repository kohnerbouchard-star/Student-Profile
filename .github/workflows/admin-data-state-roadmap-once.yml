name: Admin Data State Roadmap Once

on:
  push:
    branches:
      - agent/admin-data-state-evidence-v1
    paths:
      - .github/admin-data-state-roadmap-trigger

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out evidence branch
        uses: actions/checkout@v7
        with:
          ref: agent/admin-data-state-evidence-v1
          fetch-depth: 0

      - name: Reconcile BETA-ADMIN-006
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("docs/roadmaps/econovaria-beta-completion-roadmap-v1.md")
          source = path.read_text()
          old = "- [ ] `BETA-ADMIN-006` Add explicit loading, loaded, refreshing, stale, empty, and failed data-state contracts."
          new = "- [x] `BETA-ADMIN-006` Add explicit loading, loaded, refreshing, stale, empty, and failed data-state contracts. `VERIFIED_COMPLETE` through PR #231 merged as `249fc53a23ad23058d376e4e394524af0bdee265`; synchronized head `c0f482914ec34352b924d8220cabb1c87a79a23b` passed Repository Quality #949 and Admin Shell Smoke #858 with all 89 stages, including mounted six-state lifecycle, content-preserving refresh/stale behavior, accessibility, and zero-pointer evidence."
          if source.count(old) != 1:
              raise SystemExit(f"Expected one BETA-ADMIN-006 entry; found {source.count(old)}")
          path.write_text(source.replace(old, new))
          PY
          git diff --check

      - name: Remove helper and commit roadmap evidence
        shell: bash
        run: |
          rm -f .github/admin-data-state-roadmap-trigger
          rm -f .github/workflows/admin-data-state-roadmap-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin/docs/admin-data-state-contracts-2026-07-19.md \
            docs/roadmaps/econovaria-beta-completion-roadmap-v1.md \
            .github/admin-data-state-roadmap-trigger \
            .github/workflows/admin-data-state-roadmap-once.yml
          git commit -m "docs(admin): record data-state completion evidence"
          git push origin HEAD:agent/admin-data-state-evidence-v1
