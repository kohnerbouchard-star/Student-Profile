name: Sync Player Banking Notifications

on:
  pull_request:
    paths:
      - ".github/workflows/sync-player-banking-notifications-v1.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/player-banking-public-read-v1
          fetch-depth: 0

      - name: Merge current main and preserve reconciled registries
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main --prune

          set +e
          git merge --no-ff --no-commit origin/main
          status=$?
          set -e

          if [ "$status" -ne 0 ]; then
            conflicts="$(git diff --name-only --diff-filter=U)"
            unexpected="$(printf '%s\n' "$conflicts" | grep -Ev '^(\.github/workflows/player-terminal-verify\.yml|backend/package\.json|player-terminal/src/api/backend-routes\.js)$' || true)"
            if [ -n "$unexpected" ]; then
              echo "Unexpected merge conflicts:"
              printf '%s\n' "$unexpected"
              false
            fi
            for path in \
              .github/workflows/player-terminal-verify.yml \
              backend/package.json \
              player-terminal/src/api/backend-routes.js; do
              if git diff --name-only --diff-filter=U | grep -Fxq "$path"; then
                git checkout --ours "$path"
                git add "$path"
              fi
            done
          fi

          git diff --check
          git commit -m "chore(sync): merge Notifications main into Banking public read"
          git push origin HEAD:agent/player-banking-public-read-v1
