name: Release Build Run Probe

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release-build-run-probe.yml"

permissions:
  actions: read
  issues: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Record recent release build runs on PR 280
        uses: actions/github-script@v8
        with:
          script: |
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release-artifact-build.yml',
              branch: 'main',
              per_page: 10,
            });
            const runs = data.workflow_runs.map((run) => ({
              id: run.id,
              runNumber: run.run_number,
              event: run.event,
              status: run.status,
              conclusion: run.conclusion,
              headSha: run.head_sha,
              createdAt: run.created_at,
              url: run.html_url,
            }));
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 280,
              body: `## Release build run probe\n\n\`${JSON.stringify(runs)}\``,
            });
