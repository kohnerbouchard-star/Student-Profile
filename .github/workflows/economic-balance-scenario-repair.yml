name: Economic Balance Scenario Repair

on:
  push:
    branches:
      - agent/economic-balance-exploit-lab-v1
    paths:
      - ".github/workflows/economic-balance-scenario-repair.yml"

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact branch
        uses: actions/checkout@v7
        with:
          ref: agent/economic-balance-exploit-lab-v1
      - name: Repair bounded scenario definitions
        run: |
          python - <<'PY'
          from pathlib import Path

          macro = Path("backend/src/simulations/economy/macroEconomicScenarioSimulation.ts")
          source = macro.read_text()
          old = '''  for (const [value, errorCode] of [
            [country.startingPriceIndex, "macro_starting_price_index_invalid"],
            [country.startingFxRateToBase, "macro_starting_fx_rate_invalid"],
            [country.inflationSensitivity, "macro_inflation_sensitivity_invalid"],
            [country.currencySensitivity, "macro_currency_sensitivity_invalid"],
          ] as const) {
            if (!Number.isFinite(value) || value <= 0 || value > 10) {
              throw new Error(errorCode);
            }
          }
          validateUnitInterval(country.importDependency, "macro_import_dependency_invalid");'''
          new = '''  if (
            !Number.isFinite(country.startingPriceIndex) ||
            country.startingPriceIndex <= 0 ||
            country.startingPriceIndex > 1_000_000
          ) {
            throw new Error("macro_starting_price_index_invalid");
          }
          for (const [value, errorCode] of [
            [country.startingFxRateToBase, "macro_starting_fx_rate_invalid"],
            [country.inflationSensitivity, "macro_inflation_sensitivity_invalid"],
            [country.currencySensitivity, "macro_currency_sensitivity_invalid"],
          ] as const) {
            if (!Number.isFinite(value) || value <= 0 || value > 10) {
              throw new Error(errorCode);
            }
          }
          validateUnitInterval(country.importDependency, "macro_import_dependency_invalid");'''
          if old not in source:
              raise SystemExit("Macro validation block not found")
          macro.write_text(source.replace(old, new, 1))

          credit = Path("backend/src/simulations/economy/creditRecoveryScenarioSimulation.ts")
          source = credit.read_text()
          old = '''  const earlyAverage = average(early.map((player) => player.endingNetWealthMinor));
          const lateAverage = average(late.map((player) => player.endingNetWealthMinor));
          const higher = Math.max(1, earlyAverage, lateAverage);
          const lower = Math.max(1, Math.min(earlyAverage, lateAverage));
          return higher / lower;'''
          new = '''  const earlyAverage = average(early.map((player) => player.endingNetWealthMinor));
          const lateAverage = average(late.map((player) => player.endingNetWealthMinor));
          return 1 + Math.abs(earlyAverage - lateAverage) /
            Math.max(1, Math.abs(earlyAverage));'''
          if old not in source:
              raise SystemExit("Late-join gap block not found")
          credit.write_text(source.replace(old, new, 1))
          PY
      - name: Format and test repaired scenarios
        run: |
          deno fmt backend/src/simulations/economy/macroEconomicScenarioSimulation.ts \
            backend/src/simulations/economy/creditRecoveryScenarioSimulation.ts
          deno test --no-lock backend/src/simulations/economy
      - name: Remove one-time repair workflow
        run: rm .github/workflows/economic-balance-scenario-repair.yml
      - name: Commit repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/src/simulations/economy/macroEconomicScenarioSimulation.ts \
            backend/src/simulations/economy/creditRecoveryScenarioSimulation.ts \
            .github/workflows/economic-balance-scenario-repair.yml
          git commit -m "fix(simulation): correct macro and catch-up metrics"
          git push origin HEAD:agent/economic-balance-exploit-lab-v1
