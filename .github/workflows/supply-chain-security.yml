name: Supply Chain Security

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supply-chain-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          fail-on-scopes: runtime, development, unknown
          comment-summary-in-pr: never

  verify-and-attest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm

      - name: Pin npm
        run: npm install --global npm@10.9.8

      - name: Install pinned repository tooling
        run: npm ci

      - name: Scan committed source for credentials
        run: npm run security:secrets

      - name: Verify committed-source scan test
        run: node --test --test-name-pattern="repository secret scan" scripts/supply-chain-security.test.mjs

      - name: Verify generated GitHub-token rejection
        run: node --test --test-name-pattern="generated GitHub token" scripts/supply-chain-security.test.mjs

      - name: Verify private-key rejection
        run: node --test --test-name-pattern="private key material" scripts/supply-chain-security.test.mjs

      - name: Verify reviewed allow marker
        run: node --test --test-name-pattern="reviewed allow marker" scripts/supply-chain-security.test.mjs

      - name: Verify deterministic SBOM and checksums
        run: node --test --test-name-pattern="SBOM generation" scripts/supply-chain-security.test.mjs

      - name: Generate release-support SBOM bundle
        run: npm run security:sbom

      - name: Upload immutable SBOM bundle
        uses: actions/upload-artifact@v7
        with:
          name: supply-chain-sbom-${{ github.sha }}
          path: artifacts/supply-chain
          if-no-files-found: error
          retention-days: 30

      - name: Attest SBOM bundle provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest@v4
        with:
          subject-path: artifacts/supply-chain/*
          show-summary: true
