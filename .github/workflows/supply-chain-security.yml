name: Supply Chain Security

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supply-chain-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          fail-on-scopes: runtime, development, unknown
          comment-summary-in-pr: never

  verify-and-attest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm

      - name: Pin npm
        run: npm install --global npm@10.9.8

      - name: Install pinned repository tooling
        run: npm ci

      - name: Verify secret scan, SBOM tests, and SBOM generation
        run: npm run security:verify

      - name: Upload immutable SBOM bundle
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-sbom-${{ github.sha }}
          path: artifacts/supply-chain
          if-no-files-found: error
          retention-days: 30

      - name: Attest SBOM bundle provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest@v4
        with:
          subject-path: artifacts/supply-chain/*
          show-summary: true
