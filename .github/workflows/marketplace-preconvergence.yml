name: Marketplace Preconvergence

on:
  pull_request:
    paths:
      - "backend/package.json"
      - "backend/package-lock.json"
      - "backend/src/domains/marketplace/**"
      - "backend/supabase/migrations/20260721140000_add_marketplace_reference_scopes_v1.sql"
      - "backend/supabase/migrations/20260721141000_add_player_marketplace_lifecycle_v2.sql"
      - "backend/supabase/migrations/20260721142000_harden_marketplace_resolution_replay_v1.sql"
      - "backend/supabase/migrations/20260721142500_add_marketplace_inventory_event_types_v1.sql"
      - "backend/supabase/migrations/20260721142600_fix_marketplace_listing_item_lookup_v1.sql"
      - "backend/supabase/migrations/20260721142700_fix_marketplace_listing_currency_lookup_v1.sql"
      - "backend/supabase/migrations/20260721142800_restore_marketplace_listing_reservation_wrapper_v1.sql"
      - "backend/supabase/migrations/20260721142900_fix_marketplace_listing_legacy_lookups_v1.sql"
      - "backend/supabase/migrations/20260721143000_harden_marketplace_legacy_projection_conflicts_v1.sql"
      - "backend/supabase/migrations/20260721143100_harden_marketplace_table_return_conflicts_v1.sql"
      - "docs/workstreams/marketplace-crafting-reservation-convergence-v1.md"
      - ".github/workflows/marketplace-preconvergence.yml"
  push:
    branches:
      - agent/player-marketplace-lifecycle-v1
    paths:
      - "backend/package.json"
      - "backend/package-lock.json"
      - "backend/src/domains/marketplace/**"
      - "backend/supabase/migrations/20260721140000_add_marketplace_reference_scopes_v1.sql"
      - "backend/supabase/migrations/20260721141000_add_player_marketplace_lifecycle_v2.sql"
      - "backend/supabase/migrations/20260721142000_harden_marketplace_resolution_replay_v1.sql"
      - "backend/supabase/migrations/20260721142500_add_marketplace_inventory_event_types_v1.sql"
      - "backend/supabase/migrations/20260721142600_fix_marketplace_listing_item_lookup_v1.sql"
      - "backend/supabase/migrations/20260721142700_fix_marketplace_listing_currency_lookup_v1.sql"
      - "backend/supabase/migrations/20260721142800_restore_marketplace_listing_reservation_wrapper_v1.sql"
      - "backend/supabase/migrations/20260721142900_fix_marketplace_listing_legacy_lookups_v1.sql"
      - "backend/supabase/migrations/20260721143000_harden_marketplace_legacy_projection_conflicts_v1.sql"
      - "backend/supabase/migrations/20260721143100_harden_marketplace_table_return_conflicts_v1.sql"
      - "docs/workstreams/marketplace-crafting-reservation-convergence-v1.md"
      - ".github/workflows/marketplace-preconvergence.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: marketplace-preconvergence-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build read-only convergence bundle
        shell: bash
        working-directory: .
        run: |
          set -euo pipefail
          git rev-parse HEAD
          git rev-parse refs/remotes/origin/main
          git bundle create /tmp/marketplace-convergence.bundle HEAD refs/remotes/origin/main
          git bundle verify /tmp/marketplace-convergence.bundle
          sha256sum /tmp/marketplace-convergence.bundle > /tmp/marketplace-convergence.bundle.sha256

      - name: Upload read-only convergence bundle
        uses: actions/upload-artifact@v4
        with:
          name: marketplace-convergence-bundle
          path: |
            /tmp/marketplace-convergence.bundle
            /tmp/marketplace-convergence.bundle.sha256
          if-no-files-found: error
          retention-days: 1

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Pin npm
        run: npm install --global npm@10.9.8

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.3

      - name: Install backend dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify Marketplace inventory event compatibility migration
        shell: bash
        run: |
          set -euo pipefail
          migration="supabase/migrations/20260721142500_add_marketplace_inventory_event_types_v1.sql"
          test -f "$migration"
          grep -Fq "drop constraint if exists inventory_events_event_type_check" "$migration"
          grep -Fq "add constraint inventory_events_event_type_check" "$migration"
          for event_type in \
            PURCHASED USED RESERVED RELEASED ADJUSTED REVERSED \
            MARKETPLACE_SOLD MARKETPLACE_PURCHASED MARKETPLACE_REFUNDED MARKETPLACE_RETURNED
          do
            grep -Fq "'$event_type'" "$migration"
          done
          first_nonblank="$(awk 'NF { print tolower($0); exit }' "$migration")"
          last_nonblank="$(awk 'NF { line=tolower($0) } END { print line }' "$migration")"
          test "$first_nonblank" = "begin;"
          test "$last_nonblank" = "commit;"

      - name: Run Marketplace TypeScript typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck > /tmp/marketplace-typecheck.log 2>&1
          echo $? > /tmp/marketplace-typecheck.status
          tail -n 180 /tmp/marketplace-typecheck.log
          exit 0

      - name: Run focused Marketplace suites
        shell: bash
        run: |
          set +e
          npm run test:player-marketplace > /tmp/marketplace-tests.log 2>&1
          echo $? > /tmp/marketplace-tests.status
          tail -n 240 /tmp/marketplace-tests.log
          exit 0

      - name: Run connected forward migration contracts
        shell: bash
        run: |
          deno test \
            --allow-read=supabase/migrations/20260721142800_restore_marketplace_listing_reservation_wrapper_v1.sql,supabase/migrations/20260721143000_harden_marketplace_legacy_projection_conflicts_v1.sql,supabase/migrations/20260721143100_harden_marketplace_table_return_conflicts_v1.sql \
            --config supabase/functions/classroom-api/deno.json \
            --lock=supabase/functions/deno.lock \
            --frozen \
            src/domains/marketplace/tests/playerMarketplaceListingWrapperRestorationMigrationContract.test.ts \
            src/domains/marketplace/tests/playerMarketplaceLegacyProjectionConflictMigrationContract.test.ts \
            src/domains/marketplace/tests/playerMarketplaceTableReturnConflictMigrationContract.test.ts

      - name: Upload Marketplace diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marketplace-preconvergence-diagnostics
          path: |
            /tmp/marketplace-typecheck.log
            /tmp/marketplace-typecheck.status
            /tmp/marketplace-tests.log
            /tmp/marketplace-tests.status
          if-no-files-found: error
          retention-days: 7

      - name: Publish exact-head Marketplace status
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const readStatus = (path) => fs.existsSync(path) ? fs.readFileSync(path, 'utf8').trim() : '1';
            const typecheck = readStatus('/tmp/marketplace-typecheck.status');
            const tests = readStatus('/tmp/marketplace-tests.status');
            const state = typecheck === '0' && tests === '0' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'marketplace/preconvergence-exact-head',
              description: state === 'success'
                ? 'Marketplace typecheck and focused suites passed'
                : 'Marketplace preconvergence verification failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Enforce exact-head Marketplace verification
        shell: bash
        run: |
          typecheck_status="$(cat /tmp/marketplace-typecheck.status)"
          test_status="$(cat /tmp/marketplace-tests.status)"
          if [ "$typecheck_status" != "0" ] || [ "$test_status" != "0" ]; then
            echo "Marketplace preconvergence verification failed."
            false
          fi
