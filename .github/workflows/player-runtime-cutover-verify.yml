name: Player Runtime Cutover Verify

on:
  pull_request:
    paths:
      - "index.html"
      - "frontend/src/core/constants.js"
      - "frontend/src/core/api.js"
      - "frontend/src/core/login.js"
      - "player-terminal/host-runtime.js"
      - "player-terminal/index.html"
      - "scripts/player-login-identity-smoke.mjs"
      - "scripts/player-terminal-runtime-cutover-smoke.mjs"
      - ".github/workflows/player-runtime-cutover-verify.yml"
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "frontend/src/core/constants.js"
      - "frontend/src/core/api.js"
      - "frontend/src/core/login.js"
      - "player-terminal/host-runtime.js"
      - "player-terminal/index.html"
      - "scripts/player-login-identity-smoke.mjs"
      - "scripts/player-terminal-runtime-cutover-smoke.mjs"
      - ".github/workflows/player-runtime-cutover-verify.yml"

permissions:
  contents: read

concurrency:
  group: player-runtime-cutover-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm

      - name: Install repository tooling
        run: npm ci --no-audit --no-fund

      - name: Install Player Terminal tooling
        run: npm --prefix player-terminal ci --no-audit --no-fund

      - name: Verify cutover source contract
        run: node scripts/player-terminal-runtime-cutover-smoke.mjs

      - name: Verify Player Terminal package
        run: npm --prefix player-terminal run verify

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Start static preview
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/player-runtime-cutover-server.log 2>&1 &
          echo $! > /tmp/player-runtime-cutover-server.pid
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/player-runtime-cutover-server.log
          false

      - name: Exercise authenticated Player Terminal handoff
        env:
          ADMIN_SMOKE_ARTIFACT_DIR: player-runtime-cutover-artifacts
        run: node scripts/player-login-identity-smoke.mjs

      - name: Upload cutover diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: player-runtime-cutover-${{ github.sha }}
          path: |
            player-runtime-cutover-artifacts/
            /tmp/player-runtime-cutover-server.log
          if-no-files-found: warn
          retention-days: 14
