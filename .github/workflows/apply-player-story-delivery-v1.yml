name: Apply Authoritative Player Story Delivery

on:
  pull_request:
    branches:
      - main
    paths:
      - .tmp/story-patch-gz/READY

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply verified implementation source
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .tmp/story-patch-gz/chunk-00 \
            .tmp/story-patch-gz/chunk-01 \
            .tmp/story-patch-gz/chunk-02-0 \
            .tmp/story-patch-gz/chunk-02-1 \
            > /tmp/player-story-delivery-final.patch.gz.b64
          base64 --decode /tmp/player-story-delivery-final.patch.gz.b64 \
            > /tmp/player-story-delivery-final.patch.gz
          gzip --decompress --stdout /tmp/player-story-delivery-final.patch.gz \
            > /tmp/player-story-delivery-final.patch
          echo "54fea54ed010df5665010aa2d4ffdfbeea156953bf3e51aa34e9a7d7223dfd98  /tmp/player-story-delivery-final.patch" \
            | sha256sum --check --strict
          git apply --check /tmp/player-story-delivery-final.patch
          git apply /tmp/player-story-delivery-final.patch

          rm -rf .tmp/story-patch .tmp/story-patch-gz
          rm -f \
            .github/workflows/apply-player-story-delivery-v1.yml \
            .github/workflows/player-story-delivery-source-snapshot.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          test -z "$(find .tmp -type f -print 2>/dev/null)"
          git commit -m "feat(player): complete story notification delivery"
          git push origin HEAD:${{ github.head_ref }}
