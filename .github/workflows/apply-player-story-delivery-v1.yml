name: Sync Main and Snapshot Player Story Delivery

on:
  pull_request:
    branches:
      - main
    paths:
      - .tmp/story-patch-gz/READY

permissions:
  contents: write

jobs:
  sync-and-snapshot:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Synchronize current main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "Branch already contains current main."
          else
            git merge --no-edit origin/main
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Package synchronized source snapshot
        shell: bash
        run: |
          set -euo pipefail
          tar \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=backend/node_modules \
            -czf "$RUNNER_TEMP/player-story-delivery-synced-source.tar.gz" .

      - name: Upload synchronized source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: player-story-delivery-synced-source
          path: ${{ runner.temp }}/player-story-delivery-synced-source.tar.gz
          if-no-files-found: error
          retention-days: 1
