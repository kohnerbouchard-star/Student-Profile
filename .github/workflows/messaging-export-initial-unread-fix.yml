name: Messaging Export Initial Unread Fix

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/messaging-export-initial-unread-fix.yml"

permissions:
  contents: read

jobs:
  export:
    if: >-
      github.event.pull_request.number == 248 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/messaging-communication-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact Messaging head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Materialize corrected migration and contract test
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          migration_path = Path('backend/supabase/migrations/20260721153000_compat_messaging_player_status_v1.sql')
          sql = migration_path.read_text(encoding='utf-8')
          if 'v_initial_created_at := clock_timestamp();' not in sql:
              old_decl = """  v_message public.messages%rowtype;
  v_notification_id uuid;
"""
              new_decl = """  v_message public.messages%rowtype;
  v_notification_id uuid;
  v_initial_created_at timestamptz;
"""
              if old_decl not in sql:
                  raise SystemExit('Missing Messaging declaration anchor.')
              sql = sql.replace(old_decl, new_decl, 1)

              old_insert = """  insert into public.messages (
    thread_id, game_session_id, sender_type, sender_player_id, body, idempotency_key
  ) values (
    v_thread.id, p_game_session_id, 'player', p_player_id, v_body, v_key || ':initial'
  ) returning * into v_message;
"""
              new_insert = """  v_initial_created_at := clock_timestamp();

  insert into public.messages (
    thread_id, game_session_id, sender_type, sender_player_id, body, idempotency_key,
    created_at, updated_at
  ) values (
    v_thread.id, p_game_session_id, 'player', p_player_id, v_body, v_key || ':initial',
    v_initial_created_at, v_initial_created_at
  ) returning * into v_message;
"""
              if old_insert not in sql:
                  raise SystemExit('Missing Messaging insert anchor.')
              sql = sql.replace(old_insert, new_insert, 1)
              migration_path.write_text(sql, encoding='utf-8')

          test_path = Path('backend/src/domains/messaging/tests/messagingCompatibilityMigrationContract.test.ts')
          test = test_path.read_text(encoding='utf-8')
          if '    "v_initial_created_at := clock_timestamp()",\n' not in test:
              anchor = '    "player_message_recipient_not_found",\n'
              replacement = anchor + '    "v_initial_created_at := clock_timestamp()",\n    "created_at, updated_at",\n    "v_initial_created_at, v_initial_created_at",\n'
              if anchor not in test:
                  raise SystemExit('Missing Messaging test anchor.')
              test = test.replace(anchor, replacement, 1)
              test_path.write_text(test, encoding='utf-8')
          PY

          git diff --check
          grep -Fq 'v_initial_created_at := clock_timestamp();' backend/supabase/migrations/20260721153000_compat_messaging_player_status_v1.sql

      - name: Upload corrected files
        uses: actions/upload-artifact@v4
        with:
          name: messaging-initial-unread-fix-${{ github.event.pull_request.head.sha }}
          path: |
            backend/supabase/migrations/20260721153000_compat_messaging_player_status_v1.sql
            backend/src/domains/messaging/tests/messagingCompatibilityMigrationContract.test.ts
          if-no-files-found: error
          retention-days: 7
