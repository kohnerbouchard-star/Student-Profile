name: Program Control Phase 0 Seal

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - .github/workflows/program-control-phase0-seal.yml
      - scripts/program-control-phase0-seal.py

permissions:
  contents: write

jobs:
  seal-roadmap:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'docs/program-control-phase0-seal-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply deterministic Phase 0 seal
        run: python scripts/program-control-phase0-seal.py

      - name: Remove one-time seal helpers
        run: rm scripts/program-control-phase0-seal.py .github/workflows/program-control-phase0-seal.yml

      - name: Commit generated roadmap seal
        run: |
          if git diff --quiet; then
            echo "No Phase 0 seal changes were generated."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/roadmaps/econovaria-beta-completion-roadmap-v1.md scripts/program-control-phase0-seal.py .github/workflows/program-control-phase0-seal.yml
          git commit -m "docs(roadmap): seal Phase 0 completion"
          git push origin HEAD:${{ github.head_ref }}
