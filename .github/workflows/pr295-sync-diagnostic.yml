name: PR295 Sync Diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/pr295-sync-diagnostic.yml"

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.number == 295
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/production-integration-gate-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Capture full synchronization phases
        shell: bash
        run: |
          set +e
          git config user.name diagnostic
          git config user.email diagnostic@example.invalid
          git fetch origin main
          starting_head="$(git rev-parse HEAD)"
          remote_head="$(git rev-parse origin/agent/production-integration-gate-v1)"
          git merge --no-edit origin/main > /tmp/merge.log 2>&1
          merge_status=$?

          python3 - <<'PY' > /tmp/replacements.log 2>&1
          from pathlib import Path
          acceptance = Path('scripts/pr295-connected-staging-acceptance.mjs')
          text = acceptance.read_text()
          bad = '    `/functions/v1/classroom-api/players/me/contracts?gameSessionId=${encodeURIComponent(fixture.gameId)}`,\n'
          good = '    "/functions/v1/classroom-api/players/me/contracts",\n'
          assert text.count(bad) == 1, text.count(bad)
          acceptance.write_text(text.replace(bad, good))

          build = Path('.github/workflows/pr295-immutable-release-build.yml')
          text = build.read_text()
          unique = {
              'pr295-immutable-release-v4-': 'pr295-immutable-release-v5-',
              'RELEASE_COMMIT: 7838d93ef33908f61a2534486ec92031875a9a22': 'RELEASE_COMMIT: 1c3ae6004db442eeed1a4999a733445ca6fcecbd',
              'OUTPUT_ROOT: /tmp/econovaria-release-v4': 'OUTPUT_ROOT: /tmp/econovaria-release-v5',
              'name: econovaria-release-7838d93ef33908f61a2534486ec92031875a9a22-v4': 'name: econovaria-release-1c3ae6004db442eeed1a4999a733445ca6fcecbd-v5',
          }
          for old, new in unique.items():
              assert text.count(old) == 1, (old, text.count(old))
              text = text.replace(old, new)
          assert text.count('/tmp/econovaria-release-v4') >= 1
          text = text.replace('/tmp/econovaria-release-v4', '/tmp/econovaria-release-v5')
          build.write_text(text)
          PY
          replacement_status=$?

          rm -f .github/workflows/pr295-sync-contract-hotfix-v5.yml
          git add -A
          git commit -m "diagnostic synchronization commit" > /tmp/commit.log 2>&1
          commit_status=$?
          git push --dry-run origin HEAD:agent/production-integration-gate-v1 > /tmp/push.log 2>&1
          push_status=$?

          {
            echo "starting_head=$starting_head"
            echo "remote_head=$remote_head"
            echo "merge_status=$merge_status"
            echo "replacement_status=$replacement_status"
            echo "commit_status=$commit_status"
            echo "push_dry_run_status=$push_status"
            echo '--- merge ---'
            cat /tmp/merge.log
            echo '--- replacements ---'
            cat /tmp/replacements.log
            echo '--- commit ---'
            cat /tmp/commit.log
            echo '--- push dry-run ---'
            cat /tmp/push.log
            echo '--- latest ---'
            git log -3 --oneline
          } > /tmp/merge-diagnostic.txt
          cat /tmp/merge-diagnostic.txt
          exit 0
      - name: Upload merge diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: pr295-merge-diagnostic-${{ github.event.pull_request.head.sha }}
          path: /tmp/merge-diagnostic.txt
          if-no-files-found: error
          retention-days: 3
