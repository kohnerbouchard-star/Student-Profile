name: PR295 Final Main Synchronization

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/pr295-sync-diagnostic.yml"

permissions:
  contents: write

concurrency:
  group: pr295-final-main-synchronization
  cancel-in-progress: true

jobs:
  synchronize:
    if: github.event.pull_request.number == 295
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/production-integration-gate-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge current main and bind v5 release
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main agent/production-integration-gate-v1

          starting_head="$(git rev-parse HEAD)"
          test "$starting_head" = "${{ github.event.pull_request.head.sha }}"
          test "$starting_head" = "$(git rev-parse origin/agent/production-integration-gate-v1)"
          test "$(git rev-parse origin/main)" = "1c3ae6004db442eeed1a4999a733445ca6fcecbd"

          git merge --no-edit origin/main

          python3 - <<'PY'
          from pathlib import Path

          acceptance = Path('scripts/pr295-connected-staging-acceptance.mjs')
          text = acceptance.read_text()
          old = '    `/functions/v1/classroom-api/players/me/contracts?gameSessionId=${encodeURIComponent(fixture.gameId)}`,\n'
          new = '    "/functions/v1/classroom-api/players/me/contracts",\n'
          if text.count(old) != 1:
              raise SystemExit(f'Expected contracts workaround exactly once, found {text.count(old)}')
          acceptance.write_text(text.replace(old, new))

          build = Path('.github/workflows/pr295-immutable-release-build.yml')
          text = build.read_text()
          replacements = {
              'pr295-immutable-release-v4-': 'pr295-immutable-release-v5-',
              'RELEASE_COMMIT: 7838d93ef33908f61a2534486ec92031875a9a22': 'RELEASE_COMMIT: 1c3ae6004db442eeed1a4999a733445ca6fcecbd',
              'OUTPUT_ROOT: /tmp/econovaria-release-v4': 'OUTPUT_ROOT: /tmp/econovaria-release-v5',
              'name: econovaria-release-7838d93ef33908f61a2534486ec92031875a9a22-v4': 'name: econovaria-release-1c3ae6004db442eeed1a4999a733445ca6fcecbd-v5',
          }
          for old, new in replacements.items():
              if text.count(old) != 1:
                  raise SystemExit(f'Expected unique v4 binding exactly once: {old} ({text.count(old)})')
              text = text.replace(old, new)
          if '/tmp/econovaria-release-v4' not in text:
              raise SystemExit('Expected remaining v4 artifact paths')
          build.write_text(text.replace('/tmp/econovaria-release-v4', '/tmp/econovaria-release-v5'))

          deploy = Path('.github/workflows/pr295-staging-artifact-deploy-v2.yml')
          text = deploy.read_text()
          old = 'concurrency:\n  group: pr295-staging-artifact-deploy-v4\n  cancel-in-progress: false\n'
          new = 'concurrency:\n  group: pr295-staging-artifact-deploy-v5\n  cancel-in-progress: true\n'
          if text.count(old) != 1:
              raise SystemExit(f'Expected deployment concurrency block exactly once, found {text.count(old)}')
          deploy.write_text(text.replace(old, new))

          workflow = Path('.github/workflows/pr295-connected-staging-acceptance.yml')
          text = workflow.read_text()
          old = 'concurrency:\n  group: pr295-connected-staging-${{ github.event.pull_request.head.sha || github.sha }}\n  cancel-in-progress: true\n'
          new = 'concurrency:\n  group: pr295-connected-staging-v1\n  cancel-in-progress: true\n'
          if text.count(old) != 1:
              raise SystemExit(f'Expected acceptance concurrency block exactly once, found {text.count(old)}')
          workflow.write_text(text.replace(old, new))
          PY

          rm -f .github/workflows/pr295-sync-diagnostic.yml
          git add -A
          git commit -m "ops(pr295): synchronize current main and bind v5 release"
          git push origin HEAD:agent/production-integration-gate-v1
