name: Admin Roadmap Reconcile Temp

on:
  push:
    branches:
      - agent/admin-roadmap-reconcile-temp-v1
    paths:
      - .github/admin-roadmap-reconcile-trigger

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Check out temporary reconciliation branch
        uses: actions/checkout@v7
        with:
          ref: agent/admin-roadmap-reconcile-temp-v1
          fetch-depth: 0

      - name: Reconcile Admin credential and redemption evidence
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          audit_path = Path("admin/docs/admin-current-state-audit-2026-07-18.md")
          audit_source = audit_path.read_text()
          audit_anchor = "- Add a source test preventing the legacy dialog from returning.\n"
          audit_resolution = audit_anchor + (
              "\n**Resolution (2026-07-19):** `VERIFIED_COMPLETE` through PR #227 merged as "
              "`322db9d25fbfc581be59ae0fbe80ca20ce89b42d`. "
              "`player-access-code-bridge.js` is event-only and contains no dialog renderer or inline presentation. "
              "The remaining selector, removal helper, and observer/timer suppression calls were removed from `player-create-ux.js`, "
              "while the accepted one-time Player-created confirmation remains authoritative. "
              "The Player create smoke now fails closed if the legacy selector, marker, or suppression helper returns. "
              "Repository Quality #931 and Admin Shell Smoke #840 with all 87 stages passed on exact reviewed head "
              "`bcd14d0cf507c8545dee07ac263ef8cb17e83f53`.\n"
          )
          if audit_source.count(audit_anchor) != 1:
              raise SystemExit("Admin audit credential-resolution anchor changed")
          audit_path.write_text(audit_source.replace(audit_anchor, audit_resolution))

          roadmap_path = Path("docs/roadmaps/econovaria-beta-completion-roadmap-v1.md")
          roadmap_source = roadmap_path.read_text()
          replacements = {
              "- [ ] `BETA-ADMIN-003` Remove remaining obsolete credential-dialog renderer if still present.":
                  "- [x] `BETA-ADMIN-003` Remove remaining obsolete credential-dialog renderer if still present. `VERIFIED_COMPLETE` through PR #227 merged as `322db9d25fbfc581be59ae0fbe80ca20ce89b42d`; the access-code bridge is event-only, dead Player-create suppression code was removed, the source ratchet prevents return, Repository Quality #931 passed, and Admin Shell Smoke #840 passed all 87 stages.",
              "- [ ] `BETA-ADMIN-008` Add the inventory-redemption review queue after Backend handoff.":
                  "- [x] `BETA-ADMIN-008` Add the inventory-redemption review queue after Backend handoff. `VERIFIED_COMPLETE` through PR #177 merged as `00ffc841cb7072cb98610e23d20eb4d0cfd60cf8`; Repository Quality #885, Staging Readiness Preflight #58, Database Replay #296, and Admin Shell Smoke #827 with all 87 stages passed.",
          }
          for old, new in replacements.items():
              count = roadmap_source.count(old)
              if count != 1:
                  raise SystemExit(f"Expected one roadmap entry for {old!r}; found {count}")
              roadmap_source = roadmap_source.replace(old, new)
          roadmap_path.write_text(roadmap_source)
          PY
          git diff --check

      - name: Remove temporary helper and commit evidence
        shell: bash
        run: |
          rm -f .github/admin-roadmap-reconcile-trigger
          rm -f .github/workflows/admin-roadmap-reconcile-temp.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add admin/docs/admin-current-state-audit-2026-07-18.md \
            docs/roadmaps/econovaria-beta-completion-roadmap-v1.md \
            .github/admin-roadmap-reconcile-trigger \
            .github/workflows/admin-roadmap-reconcile-temp.yml
          git commit -m "docs(admin): reconcile completed credential and redemption items"
          git push origin HEAD:agent/admin-roadmap-reconcile-temp-v1
