name: Messaging Player Scope Diagnostic Candidate

on:
  push:
    branches:
      - agent/messaging-communication-v1
    paths:
      - .github/workflows/messaging-player-scope-diagnostics.yml

permissions:
  contents: read
  statuses: write

jobs:
  candidate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/messaging-communication-v1
          persist-credentials: false

      - name: Build diagnostic workflow candidate
        shell: python
        run: |
          from pathlib import Path
          path = Path('.github/workflows/player-terminal-verify.yml')
          text = path.read_text()
          if '/tmp/player-terminal-unexpected.txt' not in text:
              marker = '\n          if [ -n "$unexpected" ]; then\n            echo "Player Terminal verification detected protected repository paths:"'
              if marker not in text:
                  raise SystemExit('scope failure marker not found')
              text = text.replace(marker, '\n          printf \'%s\\n\' "$unexpected" > /tmp/player-terminal-unexpected.txt' + marker, 1)
          if 'name: player-terminal-scope-diagnostics' not in text:
              marker = '\n      - name: Set up Node\n'
              if marker not in text:
                  raise SystemExit('setup node marker not found')
              step = '''
      - name: Upload Player scope diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: player-terminal-scope-diagnostics
          path: |
            /tmp/player-terminal-changed-files.txt
            /tmp/player-terminal-unexpected.txt
          if-no-files-found: warn
          retention-days: 7
'''
              text = text.replace(marker, step + marker, 1)
          out = Path('/tmp/player-terminal-verify.yml')
          out.write_text(text)

      - run: sha256sum /tmp/player-terminal-verify.yml > /tmp/player-terminal-verify.yml.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: player-scope-diagnostic-workflow-${{ github.sha }}
          path: |
            /tmp/player-terminal-verify.yml
            /tmp/player-terminal-verify.yml.sha256
          if-no-files-found: error
          retention-days: 2

      - name: Publish candidate status
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner, repo: context.repo.repo, sha: context.sha,
              state: '${{ job.status }}' === 'success' ? 'success' : 'failure',
              context: 'messaging/player-scope-candidate',
              description: 'Player scope diagnostic workflow candidate exported',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
