name: Seed Arrival Foundation

on:
  push:
    branches:
      - agent/seed-content-foundation-v1
    paths:
      - package.json
      - scripts/generate-arrival-foundation-content.mjs
      - scripts/seed-content-preflight.test.mjs
      - docs/seed-content/players/arrival-packages-v1.json
      - docs/seed-content/messages/**
      - docs/seed-content/tutorials/**
      - docs/seed-content/contracts/arrival/**
      - .github/workflows/seed-arrival-foundation.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: seed-arrival-foundation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  materialize:
    name: Materialize arrival content graph
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out seed authority branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/seed-content-foundation-v1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.23.1

      - name: Generate content and retain diagnostics
        id: arrival
        shell: bash
        run: |
          set +e
          LOG="docs/seed-content/reviews/arrival-foundation-run-log.txt"
          : > "$LOG"
          STATUS=0

          run_step() {
            NAME="$1"
            shift
            printf '\n## %s\n' "$NAME" | tee -a "$LOG"
            "$@" 2>&1 | tee -a "$LOG"
            CODE=${PIPESTATUS[0]}
            printf 'exit=%s\n' "$CODE" | tee -a "$LOG"
            if [ "$CODE" -ne 0 ] && [ "$STATUS" -eq 0 ]; then STATUS="$CODE"; fi
          }

          run_step "generate arrival graph" node scripts/generate-arrival-foundation-content.mjs
          run_step "check arrival graph" npm run audit:seed-content-arrivals
          run_step "test seed preflight" npm run test:seed-content-preflight
          run_step "design seed preflight" npm run preflight:seed-content
          run_step "diff check" git diff --check

          printf '\nfinalStatus=%s\n' "$STATUS" | tee -a "$LOG"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit arrival foundation and diagnostics
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/seed-content/players/arrival-packages-v1.json docs/seed-content/messages/arrival-messages-v1.json docs/seed-content/tutorials/arrival-tutorials-v1.json docs/seed-content/contracts/arrival/arrival-contracts-v1.json docs/seed-content/reviews/arrival-foundation-run-log.txt
          if git diff --cached --quiet; then
            echo "Arrival foundation is already current."
          else
            git commit -m "feat(seed): add ten-country arrival foundation [skip ci]"
            git push origin HEAD:agent/seed-content-foundation-v1
          fi

      - name: Enforce arrival result
        shell: bash
        run: |
          STATUS="${{ steps.arrival.outputs.status }}"
          if [ "$STATUS" -ne 0 ]; then
            echo "Arrival foundation failed with status $STATUS. See the committed diagnostic log."
            false
          fi
