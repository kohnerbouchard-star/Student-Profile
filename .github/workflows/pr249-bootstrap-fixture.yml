name: PR249 One-Use Bootstrap Fixture

on:
  push:
    branches:
      - agent/player-marketplace-lifecycle-v1
    paths:
      - ".github/workflows/pr249-bootstrap-fixture.yml"

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: agent/player-marketplace-lifecycle-v1

      - name: Use the accepted top-level Player bootstrap envelope
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("player-terminal/tests/browser/marketplace-lifecycle.spec.mjs")
          source = path.read_text()
          start = source.index("function session() {")
          end = source.index("\nfunction capabilities()", start)
          replacement = '''function session() {
            return {
              playerId: "PLAYER-42",
              playerSessionId: "psn_marketplace_browser",
              playerSessionToken: SESSION_TOKEN,
              gameSessionId: GAME_ID,
              gameCode: "MARKET42",
              gameName: "Marketplace Browser Game",
              status: "active",
              displayName: "Marketplace Tester",
              rosterLabel: "Trader 42",
              countryCode: "LUMENOR",
              countryName: "Lumenor",
              currencyCode: "LUM",
              expiresAt: "2099-07-21T03:00:00.000Z",
            };
          }
          '''
          path.write_text(source[:start] + replacement + source[end:])
          Path(".github/workflows/pr249-bootstrap-fixture.yml").unlink()
          PY

      - name: Commit accepted bootstrap fixture
        shell: bash
        run: |
          git config user.name "econovaria-controller"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "test(marketplace): use public bootstrap session envelope"
          git push origin HEAD:agent/player-marketplace-lifecycle-v1
