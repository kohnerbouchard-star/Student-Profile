name: Beta Pilot Contract

on:
  pull_request:
    paths:
      - ".github/workflows/beta-e2e-pilot.yml"
      - "docs/operations/beta-pilot-controls.md"
      - "docs/operations/templates/beta-e2e-pilot.definition.template.json"
      - "docs/operations/templates/beta-e2e-pilot.fixture.template.json"
      - "scripts/beta-e2e-pilot-catalog.mjs"
      - "scripts/beta-e2e-pilot-validation.mjs"
      - "scripts/beta-e2e-pilot.test.mjs"
      - "package.json"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: npm
      - run: npm ci
      - run: npm run audit:beta-e2e
      - run: npm run test:beta-e2e
      - run: npm run security:secrets
