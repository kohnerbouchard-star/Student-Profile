name: Roadmap Post-Merge Baseline Seal

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/roadmap-post-merge-baseline-v1.yml
      - .roadmap-baseline/**

permissions:
  contents: write

jobs:
  seal:
    runs-on: ubuntu-latest
    steps:
      - name: Check out baseline branch
        uses: actions/checkout@v7
        with:
          ref: agent/roadmap-post-merge-baseline-v1
          fetch-depth: 0

      - name: Seal post-merge baseline
        run: |
          python3 .roadmap-baseline/reconcile.py
          git diff --check

      - name: Remove one-use files and commit roadmap
        shell: bash
        run: |
          rm -rf .roadmap-baseline
          rm .github/workflows/roadmap-post-merge-baseline-v1.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/roadmaps/econovaria-beta-completion-roadmap-v1.md .roadmap-baseline .github/workflows/roadmap-post-merge-baseline-v1.yml
          git commit -m "docs(roadmap): seal reconciliation baseline"
          git push origin HEAD:agent/roadmap-post-merge-baseline-v1
