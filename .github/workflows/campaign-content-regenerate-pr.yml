# regeneration revision: 2
name: Campaign Content Regenerate PR

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/campaign-content-regenerate-pr.yml"
      - "package.json"
      - "docs/seed-content/events/campaign-content-source-v2.json"
      - "scripts/apply-campaign-content-overrides.mjs"
      - "scripts/campaign-content-quality.test.mjs"
      - "scripts/refresh-seed-consumer-contract.mjs"

permissions:
  contents: write

concurrency:
  group: campaign-content-regenerate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  regenerate-campaign-content:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/seed-content-usable-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out exact PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Correct concise campaign phrase thresholds
        shell: bash
        run: |
          python - <<'PY'
          import pathlib
          path = pathlib.Path('scripts/apply-campaign-content-overrides.mjs')
          text = path.read_text(encoding='utf-8')
          replacements = {
              "assertText(entry, 55, `${label}.confirmedFacts.${index + 1}`)": "assertText(entry, 40, `${label}.confirmedFacts.${index + 1}`)",
              "assertText(entry, 24, `${label}.playerHooks.${index + 1}`)": "assertText(entry, 12, `${label}.playerHooks.${index + 1}`)",
              "assertText(entry, 30, `${label}.civilianRisks.${index + 1}`)": "assertText(entry, 12, `${label}.civilianRisks.${index + 1}`)",
              "key.endsWith('Headline') ? 24 : 130": "key.endsWith('Headline') ? 22 : 105",
              "key.endsWith('Title') ? 20 : 120": "key.endsWith('Title') ? 18 : 100",
              "assertText(entry, 55, `global.${event.key}.confirmedFacts.${index + 1}`)": "assertText(entry, 40, `global.${event.key}.confirmedFacts.${index + 1}`)",
          }
          for before, after in replacements.items():
              if before in text:
                  text = text.replace(before, after)
              elif after not in text:
                  raise SystemExit(f'Expected campaign threshold expression was not found: {before}')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Wire campaign content into canonical seed build
        shell: bash
        run: |
          python - <<'PY'
          import json
          import pathlib
          path = pathlib.Path('package.json')
          package = json.loads(path.read_text(encoding='utf-8'))
          campaign_step = 'node scripts/apply-campaign-content-overrides.mjs'
          refresh_step = 'node scripts/refresh-seed-consumer-contract.mjs'
          build = package['scripts']['build:seed-beta-pack']
          if campaign_step not in build:
              build += ' && ' + campaign_step
          if refresh_step not in build:
              build += ' && ' + refresh_step
          package['scripts']['build:seed-beta-pack'] = build
          test_file = 'scripts/campaign-content-quality.test.mjs'
          test_command = package['scripts']['test:seed-beta-pack']
          if test_file not in test_command:
              marker = 'scripts/arrival-content-quality.test.mjs'
              package['scripts']['test:seed-beta-pack'] = test_command.replace(marker, marker + ' ' + test_file)
          package['scripts']['validate:campaign-content'] = 'node --test scripts/campaign-content-quality.test.mjs'
          package['scripts']['refresh:seed-consumer-contract'] = refresh_step
          path.write_text(json.dumps(package, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm

      - name: Pin npm
        run: npm install --global npm@10.9.8

      - name: Install dependencies
        run: npm ci

      - name: Rebuild executable seed pack with authored campaign content
        run: npm run build:seed-beta-pack

      - name: Validate executable pack and authored content
        run: |
          npm run validate:seed-beta-pack
          npm run validate:contract-content
          npm run validate:arrival-content
          npm run validate:campaign-content
          npm run validate:physical-item-artwork
          node --test scripts/item-content-coverage.test.mjs
          npm run test:seed-beta-pack

      - name: Commit deterministic campaign content artifacts
        env:
          ACCEPTED_SOURCE_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/refresh-seed-consumer-contract.mjs --source-sha "$ACCEPTED_SOURCE_SHA"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            package.json \
            scripts/apply-campaign-content-overrides.mjs \
            docs/seed-content/executable/beta-pack-v1 \
            docs/operations/contracts/beta-seed-downstream-consumer-contract-v1.json
          if git diff --cached --quiet; then
            echo "Campaign content pack and consumer contract are already current."
            exit 0
          fi
          git commit -m "seed: regenerate authored campaign content pack"
          git push origin "HEAD:${{ github.head_ref }}"
