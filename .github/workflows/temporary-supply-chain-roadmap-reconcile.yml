name: Temporary Supply Chain Roadmap Reconciliation

on:
  push:
    branches:
      - docs/supply-chain-roadmap-reconciliation-v1

permissions:
  contents: write
  actions: read

concurrency:
  group: supply-chain-roadmap-reconciliation
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TARGET_SHA: 476cfba30666b1303d32d6c2e46560483b641edf
      TARGET_WORKFLOW: Supply Chain Security
      EXPECTED_ARTIFACT: supply-chain-sbom-476cfba30666b1303d32d6c2e46560483b641edf

    steps:
      - name: Check out reconciliation branch
        uses: actions/checkout@v7
        with:
          ref: docs/supply-chain-roadmap-reconciliation-v1
          fetch-depth: 0

      - name: Require trusted-main attestation evidence and reconcile roadmap
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          run_json=""
          for attempt in $(seq 1 60); do
            runs_json=$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${TARGET_SHA}&event=push&per_page=100")
            run_id=$(jq -r --arg sha "$TARGET_SHA" --arg workflow "$TARGET_WORKFLOW" '
              [.workflow_runs[] | select(.head_sha == $sha and .event == "push" and .name == $workflow)]
              | sort_by(.id) | last | .id // empty
            ' <<<"$runs_json")

            if [[ -n "$run_id" ]]; then
              run_json=$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}")
              status=$(jq -r '.status' <<<"$run_json")
              if [[ "$status" == "completed" ]]; then
                break
              fi
            fi
            sleep 10
          done

          [[ -n "$run_json" ]] || { echo "Trusted-main Supply Chain Security run was not found." >&2; false; }
          [[ "$(jq -r '.status' <<<"$run_json")" == "completed" ]] || { echo "Trusted-main run did not complete in the evidence window." >&2; false; }
          [[ "$(jq -r '.conclusion' <<<"$run_json")" == "success" ]] || { echo "Trusted-main run did not succeed." >&2; false; }

          run_id=$(jq -r '.id' <<<"$run_json")
          run_number=$(jq -r '.run_number' <<<"$run_json")
          run_url=$(jq -r '.html_url' <<<"$run_json")
          jobs_json=$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100")

          verify_job=$(jq -c '[.jobs[] | select(.name == "verify-and-attest")] | last // empty' <<<"$jobs_json")
          [[ -n "$verify_job" ]] || { echo "verify-and-attest job was not found." >&2; false; }
          [[ "$(jq -r '.conclusion' <<<"$verify_job")" == "success" ]] || { echo "verify-and-attest job did not succeed." >&2; false; }

          upload_result=$(jq -r '[.steps[] | select(.name == "Upload immutable SBOM bundle")] | last | .conclusion // empty' <<<"$verify_job")
          attest_result=$(jq -r '[.steps[] | select(.name == "Attest SBOM bundle provenance")] | last | .conclusion // empty' <<<"$verify_job")
          [[ "$upload_result" == "success" ]] || { echo "SBOM artifact upload was not successful." >&2; false; }
          [[ "$attest_result" == "success" ]] || { echo "Trusted-main provenance attestation was not successful." >&2; false; }

          artifacts_json=$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/artifacts?per_page=100")
          artifact=$(jq -c --arg expected "$EXPECTED_ARTIFACT" '[.artifacts[] | select(.name == $expected and .expired == false)] | last // empty' <<<"$artifacts_json")
          [[ -n "$artifact" ]] || { echo "Expected immutable SBOM artifact was not found." >&2; false; }

          artifact_id=$(jq -r '.id' <<<"$artifact")
          artifact_name=$(jq -r '.name' <<<"$artifact")
          artifact_url=$(jq -r '.archive_download_url' <<<"$artifact")
          verified_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          export run_id run_number run_url artifact_id artifact_name artifact_url verified_at upload_result attest_result
          python <<'PY'
          import json
          import os
          from pathlib import Path

          merge_sha = "476cfba30666b1303d32d6c2e46560483b641edf"
          final_head = "48414aaccf223c94c358033c883215dced666f24"
          run_number = os.environ["run_number"]
          run_id = os.environ["run_id"]
          run_url = os.environ["run_url"]
          artifact_name = os.environ["artifact_name"]
          artifact_id = os.environ["artifact_id"]
          verified_at = os.environ["verified_at"]

          roadmap_path = Path("docs/roadmaps/econovaria-beta-completion-roadmap-v1.md")
          roadmap = roadmap_path.read_text()
          old_item = "- [ ] `OPS-SUPPLY-001` Add secret scanning, dependency review, SBOM/provenance, and patch cadence. `IN_PROGRESS`: exact Node/npm/tool pins, lockfiles, high-severity dependency audit thresholds, and package-signature checks run in Repository Quality; secret scanning, dependency-review enforcement, SBOM, provenance, automated update policy, and approved patch cadence remain open."
          new_item = (
              "- [x] `OPS-SUPPLY-001` Add secret scanning, dependency review, SBOM/provenance, and patch cadence. "
              f"`VERIFIED_COMPLETE` through PR #250 merged as `{merge_sha}`. Deterministic committed-source secret scanning, high-severity pull-request dependency review, root and Backend CycloneDX SBOMs, SHA-256 manifests, commit-specific immutable artifacts, trusted-main provenance attestation, grouped weekly Dependabot updates, patch/exception objectives, and Repository Quality enforcement are authoritative. Final head `{final_head}` passed Supply Chain Security #9, Repository Quality #1104, Backend Typecheck #1261, and Database Replay #358; trusted-main Supply Chain Security #{run_number} passed attestation and retained artifact `{artifact_name}`."
          )
          if roadmap.count(old_item) != 1:
              raise SystemExit(f"Expected exactly one OPS-SUPPLY-001 source line, found {roadmap.count(old_item)}")
          roadmap = roadmap.replace(old_item, new_item)

          registry_marker = "| Program-control consolidation | PR #251 / `chore/program-control-consolidation-v1` | `IMPLEMENTED_NOT_MERGED` | Owns only `P0-006`, ownership reconciliation, and branch-hygiene policy; no feature implementation. |"
          registry_row = f"| Software supply-chain security | PR #250 / merge `{merge_sha}` | `VERIFIED_COMPLETE` | Preserve secret scanning, dependency review, deterministic SBOM/checksum generation, trusted-run attestation, Dependabot cadence, and the patch/exception policy; artifact promotion and environment approval remain separately governed. |"
          if registry_row not in roadmap:
              if roadmap.count(registry_marker) != 1:
                  raise SystemExit("Capability registry insertion marker was not unique.")
              roadmap = roadmap.replace(registry_marker, registry_marker + "\n" + registry_row)

          ledger_marker = "### Current release condition"
          ledger = (
              "### 2026-07-20 software supply-chain security completion\n\n"
              f"- PR #250 merged `OPS-SUPPLY-001` as `{merge_sha}` after a collision audit confirmed no active PR owned the subsection.\n"
              f"- Final implementation head `{final_head}` passed Supply Chain Security #9, Repository Quality #1104, Backend Typecheck #1261, Database Replay #358, Staging Readiness Preflight #107, Exchange Calendar Runtime #216, Required Game Market Timezone #245, and Admin Game Lifecycle Controls #43.\n"
              f"- Trusted-main Supply Chain Security #{run_number} (run `{run_id}`) completed successfully, executed the provenance-attestation step, and retained immutable artifact `{artifact_name}`. Evidence is recorded in `docs/operations/evidence/supply-chain-security-{merge_sha}.json`.\n"
              "- This completion does not satisfy immutable application promotion, isolated-environment approval, observability, backup/restore, or production release gates.\n\n"
          )
          if ledger not in roadmap:
              if roadmap.count(ledger_marker) != 1:
                  raise SystemExit("Change-ledger insertion marker was not unique.")
              roadmap = roadmap.replace(ledger_marker, ledger + ledger_marker)
          roadmap_path.write_text(roadmap)

          amendment_path = Path("docs/roadmaps/econovaria-supply-chain-security-amendment-2026-07-20.md")
          amendment = amendment_path.read_text()
          amendment = amendment.replace("**Status:** `IN_PROGRESS`", "**Status:** `VERIFIED_COMPLETE`")
          amendment = amendment.replace("**Branch:** `agent/supply-chain-security-v1`", f"**Authority:** PR #250 / merge `{merge_sha}`")
          evidence_section = f"""

          ## Completion evidence

          - Implementation PR: #250.
          - Immutable merge commit: `{merge_sha}`.
          - Final implementation head: `{final_head}`.
          - Pull-request validation: Supply Chain Security #9, Repository Quality #1104, Backend Typecheck #1261, Database Replay #358, Staging Readiness Preflight #107, Exchange Calendar Runtime #216, Required Game Market Timezone #245, and Admin Game Lifecycle Controls #43 passed.
          - Trusted-main validation: Supply Chain Security #{run_number}, run `{run_id}`, completed successfully at `{verified_at}`.
          - Provenance: `Attest SBOM bundle provenance` completed successfully.
          - Immutable artifact: `{artifact_name}` (artifact `{artifact_id}`).
          - Machine-readable evidence: `docs/operations/evidence/supply-chain-security-{merge_sha}.json`.

          The bounded repository supply-chain subsection is complete. Isolated staging, immutable application promotion, environment approvals, runtime observability, backup/restore, and production release remain separate roadmap gates.
          """
          if "## Completion evidence" not in amendment:
              amendment += evidence_section
          amendment_path.write_text(amendment)

          evidence_path = Path(f"docs/operations/evidence/supply-chain-security-{merge_sha}.json")
          evidence_path.parent.mkdir(parents=True, exist_ok=True)
          evidence_path.write_text(json.dumps({
              "schemaVersion": 1,
              "roadmapItem": "OPS-SUPPLY-001",
              "repository": os.environ["GITHUB_REPOSITORY"],
              "mergeSha": merge_sha,
              "finalImplementationHead": final_head,
              "trustedMainWorkflow": "Supply Chain Security",
              "trustedMainRunId": int(run_id),
              "trustedMainRunNumber": int(run_number),
              "trustedMainRunUrl": run_url,
              "trustedMainConclusion": "success",
              "artifactId": int(artifact_id),
              "artifactName": artifact_name,
              "artifactArchiveUrl": os.environ["artifact_url"],
              "artifactUploadConclusion": os.environ["upload_result"],
              "provenanceAttestationConclusion": os.environ["attest_result"],
              "verifiedAt": verified_at
          }, indent=2) + "\n")
          PY

          rm .github/workflows/temporary-supply-chain-roadmap-reconcile.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/roadmaps/econovaria-beta-completion-roadmap-v1.md \
                  docs/roadmaps/econovaria-supply-chain-security-amendment-2026-07-20.md \
                  docs/operations/evidence \
                  .github/workflows/temporary-supply-chain-roadmap-reconcile.yml
          git commit -m "docs(roadmap): verify supply-chain security completion"
          git push origin HEAD:docs/supply-chain-roadmap-reconciliation-v1
