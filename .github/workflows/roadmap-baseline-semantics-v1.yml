name: Roadmap Baseline Semantics

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/roadmap-baseline-semantics-v1.yml
      - .roadmap-semantics/**

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - name: Check out semantics branch
        uses: actions/checkout@v7
        with:
          ref: agent/roadmap-baseline-semantics-v1
          fetch-depth: 0

      - name: Correct baseline semantics
        run: |
          python3 .roadmap-semantics/reconcile.py
          git diff --check

      - name: Remove one-use files and commit roadmap
        shell: bash
        run: |
          rm -rf .roadmap-semantics
          rm .github/workflows/roadmap-baseline-semantics-v1.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/roadmaps/econovaria-beta-completion-roadmap-v1.md .roadmap-semantics .github/workflows/roadmap-baseline-semantics-v1.yml
          git commit -m "docs(roadmap): define application-state baseline"
          git push origin HEAD:agent/roadmap-baseline-semantics-v1
