name: Messaging Workflow Publication

on:
  push:
    branches:
      - agent/messaging-communication-v1
    paths:
      - .github/workflows/messaging-workflow-publication.yml

permissions:
  contents: write
  statuses: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/messaging-communication-v1
          fetch-depth: 0
          persist-credentials: false

      - name: Build Player verification candidate
        shell: bash
        env:
          SOURCE_HEAD: c485c2369d9a0e73a2fdbd04d5f87a4439f154aa
          MERGE_BASE: 7f89e8f7bd390a0d27877cc970b4deff993f9c9a
        run: |
          set -euo pipefail
          mkdir -p /tmp/messaging-workflow-candidate/.github/workflows
          path=.github/workflows/player-terminal-verify.yml
          cp "$path" /tmp/current
          git show "$MERGE_BASE:$path" > /tmp/base
          git show "$SOURCE_HEAD:$path" > /tmp/source
          git merge-file --union /tmp/current /tmp/base /tmp/source || true
          test -z "$(grep -nE '^(<<<<<<<|=======|>>>>>>>)' /tmp/current || true)"
          sed -i \
            -e 's/20260721130000_add_messaging_communication_v2.sql/20260721150000_add_messaging_communication_v2.sql/g' \
            -e 's/20260721131000_harden_messaging_retention_and_audit_v2.sql/20260721151000_harden_messaging_retention_and_audit_v2.sql/g' \
            -e 's/20260721132000_complete_messaging_lifecycle_v1.sql/20260721152000_complete_messaging_lifecycle_v1.sql/g' \
            -e 's/20260721133000_compat_messaging_player_status_v1.sql/20260721153000_compat_messaging_player_status_v1.sql/g' \
            -e 's/2026072113\[0-9\]{4}/2026072115[0-9]{4}/g' \
            /tmp/current
          cp /tmp/current "/tmp/messaging-workflow-candidate/$path"
          grep -Fq 'messaging-isolated-staging.yml' /tmp/current
          grep -Fq 'domains\/messaging' /tmp/current
          grep -Fq 'staffMessagingRateLimitDispatch.ts' /tmp/current
          grep -Fq 'messagingDispatch.ts' /tmp/current
          grep -Eq '2026072115\[0-9\]\{4\}|2026072115\[0-9\]\{4\}' /tmp/current || grep -Fq '2026072115' /tmp/current

      - name: Publish Player verification workflow
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const branch = 'agent/messaging-communication-v1';
            const file = '.github/workflows/player-terminal-verify.yml';
            const current = await github.rest.repos.getContent({
              owner: context.repo.owner, repo: context.repo.repo, path: file, ref: branch,
            });
            if (Array.isArray(current.data) || !current.data.sha) throw new Error(`Invalid file: ${file}`);
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: file,
              branch,
              sha: current.data.sha,
              message: 'ci(messaging): publish final Player verification scope',
              content: fs.readFileSync(`/tmp/messaging-workflow-candidate/${file}`).toString('base64'),
            });

      - name: Publish workflow-publication status
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: '${{ job.status }}' === 'success' ? 'success' : 'failure',
              context: 'messaging/workflow-publication',
              description: '${{ job.status }}' === 'success'
                ? 'Messaging Player verification scope published'
                : 'Messaging Player verification publication failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
