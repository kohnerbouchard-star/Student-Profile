name: Messaging Workflow Candidate

on:
  push:
    branches:
      - agent/messaging-communication-v1
    paths:
      - .github/workflows/messaging-workflow-publication.yml

permissions:
  contents: read
  statuses: write

jobs:
  candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/messaging-communication-v1
          fetch-depth: 0
          persist-credentials: false

      - name: Build Player verification candidate
        shell: bash
        env:
          SOURCE_HEAD: c485c2369d9a0e73a2fdbd04d5f87a4439f154aa
          MERGE_BASE: 7f89e8f7bd390a0d27877cc970b4deff993f9c9a
        run: |
          set -euo pipefail
          path=.github/workflows/player-terminal-verify.yml
          cp "$path" /tmp/player-terminal-verify.yml
          git show "$MERGE_BASE:$path" > /tmp/base
          git show "$SOURCE_HEAD:$path" > /tmp/source
          git merge-file --union /tmp/player-terminal-verify.yml /tmp/base /tmp/source || true
          test -z "$(grep -nE '^(<<<<<<<|=======|>>>>>>>)' /tmp/player-terminal-verify.yml || true)"
          sed -i \
            -e 's/20260721130000_add_messaging_communication_v2.sql/20260721150000_add_messaging_communication_v2.sql/g' \
            -e 's/20260721131000_harden_messaging_retention_and_audit_v2.sql/20260721151000_harden_messaging_retention_and_audit_v2.sql/g' \
            -e 's/20260721132000_complete_messaging_lifecycle_v1.sql/20260721152000_complete_messaging_lifecycle_v1.sql/g' \
            -e 's/20260721133000_compat_messaging_player_status_v1.sql/20260721153000_compat_messaging_player_status_v1.sql/g' \
            -e 's/2026072113\[0-9\]{4}/2026072115[0-9]{4}/g' \
            /tmp/player-terminal-verify.yml
          grep -Fq 'messaging-isolated-staging.yml' /tmp/player-terminal-verify.yml
          grep -Fq 'domains\/messaging' /tmp/player-terminal-verify.yml
          grep -Fq 'staffMessagingRateLimitDispatch.ts' /tmp/player-terminal-verify.yml
          grep -Fq 'messagingDispatch.ts' /tmp/player-terminal-verify.yml
          sha256sum /tmp/player-terminal-verify.yml > /tmp/player-terminal-verify.yml.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: messaging-player-workflow-${{ github.sha }}
          path: |
            /tmp/player-terminal-verify.yml
            /tmp/player-terminal-verify.yml.sha256
          if-no-files-found: error
          retention-days: 2

      - name: Publish candidate status
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: '${{ job.status }}' === 'success' ? 'success' : 'failure',
              context: 'messaging/workflow-candidate',
              description: '${{ job.status }}' === 'success'
                ? 'Validated Player verification workflow exported'
                : 'Player verification workflow candidate failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
