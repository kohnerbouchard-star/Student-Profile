name: Messaging PR Unblock

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/messaging-pr-unblock.yml"

permissions:
  contents: write

concurrency:
  group: messaging-pr-unblock-248
  cancel-in-progress: false

jobs:
  unblock:
    if: >-
      github.event.head_commit.message == 'ci(messaging): trigger exact PR synchronization unblocker' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out exact messaging branch
        uses: actions/checkout@v7
        with:
          ref: agent/messaging-communication-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Synchronize current main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          if ! git merge --no-edit origin/main; then
            conflicts="$(git diff --name-only --diff-filter=U)"
            if [ "$conflicts" != "backend/src/security/classroomApiRateLimitDispatch.test.ts" ]; then
              printf 'Unexpected merge conflicts:\n%s\n' "$conflicts" >&2
              git merge --abort
              false
            fi
            git checkout --ours backend/src/security/classroomApiRateLimitDispatch.test.ts
            git add backend/src/security/classroomApiRateLimitDispatch.test.ts
            git commit --no-edit
          fi

      - name: Apply exact messaging registrations
        run: |
          python scripts/repair-messaging-finalizer.py
          python scripts/finalize-messaging-pr.py

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Pin npm
        run: npm install --global npm@10.9.8

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.3

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix backend

      - name: Verify focused messaging and types
        run: |
          npm run test:admin-messaging
          npm run test:player-messaging --prefix backend
          npm run typecheck:all --prefix backend

      - name: Verify repository and shared integration suites
        run: |
          npm test
          npm run test:player-security --prefix backend
          npm run test:player-capabilities --prefix backend
          SUPABASE_URL=http://localhost:54321 SUPABASE_ANON_KEY=smoke-anon-key SUPABASE_SERVICE_ROLE_KEY=smoke-service-role-key deno run --config=backend/supabase/functions/deno.json --allow-env=SUPABASE_URL,SUPABASE_ANON_KEY,SUPABASE_SERVICE_ROLE_KEY --deny-net --lock=backend/supabase/functions/deno.lock --frozen backend/src/smoke/classroomApiSmokeTest.ts
          npm run smoke --prefix backend

      - name: Publish synchronized branch and remove branch helpers
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/messaging-pr-finalize.yml
          git rm .github/workflows/messaging-pr-unblock.yml
          git rm scripts/finalize-messaging-pr.py
          git rm scripts/repair-messaging-finalizer.py
          git add --all
          git diff --cached --check
          git commit -m "feat(messaging): synchronize complete communication runtime"
          git push origin HEAD:agent/messaging-communication-v1

      - name: Remove unblocker from main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout -B main origin/main
          git rm .github/workflows/messaging-pr-unblock.yml
          git commit -m "ci(messaging): retire exact PR synchronization unblocker"
          git push origin HEAD:main
