name: Seed Market Canonicalization

on:
  push:
    branches:
      - agent/seed-content-foundation-v1
    paths:
      - package.json
      - scripts/apply-seed-market-canonicalization.mjs
      - scripts/seed-market-curated-overlay-lib.mjs
      - scripts/seed-market-identity-reconciliation-summary.mjs
      - scripts/seed-content-preflight.test.mjs
      - docs/seed-content/markets/active-subsets/**
      - docs/seed-content/markets/universe/**
      - .github/workflows/seed-market-canonicalization.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: seed-market-canonicalization-${{ github.ref }}
  cancel-in-progress: false

jobs:
  canonicalize:
    name: Canonicalize active and universe market identities
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out seed authority branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/seed-content-foundation-v1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.23.1

      - name: Run canonicalization and retain diagnostics
        id: canonicalization
        shell: bash
        run: |
          set +e
          LOG="docs/seed-content/reviews/market-canonicalization-run-log.txt"
          : > "$LOG"
          STATUS=0

          run_step() {
            NAME="$1"
            shift
            printf '\n## %s\n' "$NAME" | tee -a "$LOG"
            "$@" 2>&1 | tee -a "$LOG"
            CODE=${PIPESTATUS[0]}
            printf 'exit=%s\n' "$CODE" | tee -a "$LOG"
            if [ "$CODE" -ne 0 ] && [ "$STATUS" -eq 0 ]; then STATUS="$CODE"; fi
          }

          run_step "apply canonicalization" node scripts/apply-seed-market-canonicalization.mjs
          run_step "generate universe" node scripts/generate-seed-market-universe.mjs
          run_step "generate editorial evidence" node scripts/seed-content-universe-editorial-audit.mjs
          run_step "generate identity evidence" node scripts/seed-market-identity-reconciliation-summary.mjs
          run_step "check canonicalization" npm run audit:seed-content-canonicalization
          run_step "check universe" npm run audit:seed-content-universe
          run_step "check editorial evidence" npm run audit:seed-content-editorial
          run_step "check identity evidence" npm run audit:seed-content-identities
          run_step "test seed preflight" npm run test:seed-content-preflight
          run_step "design seed preflight" npm run preflight:seed-content
          run_step "diff check" git diff --check

          printf '\nfinalStatus=%s\n' "$STATUS" | tee -a "$LOG"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit canonicalization output and diagnostics
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/generate-seed-market-universe.mjs docs/seed-content/markets/active-subsets docs/seed-content/markets/universe docs/seed-content/reviews/market-universe-editorial-collision-review-v1.json docs/seed-content/reviews/market-universe-editorial-collision-review-v1.md docs/seed-content/reviews/market-identity-reconciliation-audit-v1.json docs/seed-content/reviews/market-identity-reconciliation-audit-v1.md docs/seed-content/reviews/market-canonicalization-run-log.txt
          if git diff --cached --quiet; then
            echo "No canonicalization output changed."
          else
            git commit -m "fix(seed): canonicalize active and universe market identities [skip ci]"
            git push origin HEAD:agent/seed-content-foundation-v1
          fi

      - name: Enforce canonicalization result
        shell: bash
        run: |
          STATUS="${{ steps.canonicalization.outputs.status }}"
          if [ "$STATUS" -ne 0 ]; then
            echo "Canonicalization failed with status $STATUS. See the committed diagnostic log."
            false
          fi
