name: PR249 One-Use Player Session Fixture

on:
  push:
    branches:
      - agent/player-marketplace-lifecycle-v1
    paths:
      - ".github/workflows/pr249-player-session-fixture.yml"

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: agent/player-marketplace-lifecycle-v1

      - name: Use the accepted direct Player Terminal session contract
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("player-terminal/tests/browser/marketplace-lifecycle.spec.mjs")
          source = path.read_text()
          old = '''function installSession(page) {
            return page.addInitScript(({ gameId, token }) => {
              const value = {
                gameSessionId: gameId,
                playerSessionId: "psn_marketplace_browser",
                playerSessionToken: token,
                expiresAt: "2026-07-21T03:00:00.000Z",
              };
              globalThis.ECONOVARIA_PLAYER_SESSION = value;
            }, { gameId: GAME_ID, token: SESSION_TOKEN });
          }
          '''
          new = '''function installSession(page) {
            return page.addInitScript(({ gameId, token }) => {
              const value = {
                gameSessionId: gameId,
                playerSessionId: "psn_marketplace_browser",
                playerSessionToken: token,
                expiresAt: "2026-07-21T03:00:00.000Z",
              };
              globalThis.ECONOVARIA_PLAYER_SESSION = value;
              globalThis.ECONOVARIA_PLAYER_TERMINAL_CONFIG = {
                ...(globalThis.ECONOVARIA_PLAYER_TERMINAL_CONFIG || {}),
                usePreviewData: false,
                gameSessionId: gameId,
                playerSessionId: value.playerSessionId,
                playerSessionToken: token,
              };
            }, { gameId: GAME_ID, token: SESSION_TOKEN });
          }
          '''
          if old not in source:
              raise SystemExit("Marketplace browser session fixture marker missing")
          path.write_text(source.replace(old, new, 1))
          Path(".github/workflows/pr249-player-session-fixture.yml").unlink()
          PY

      - name: Commit corrected connected fixture
        shell: bash
        run: |
          git config user.name "econovaria-controller"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "test(marketplace): use direct Player Terminal session config"
          git push origin HEAD:agent/player-marketplace-lifecycle-v1
