name: Seed PR 163 Reconcile

on:
  pull_request:
    paths:
      - ".github/workflows/seed-pr163-reconcile.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: seed-pr163-reconcile-${{ github.ref }}
  cancel-in-progress: false

jobs:
  reconcile:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.number == 163 &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       github.event.pull_request.head.ref == 'agent/seed-content-foundation-v1')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out permanent seed branch
        uses: actions/checkout@v7
        with:
          ref: agent/seed-content-foundation-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build current-main seed merge
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main

          SEED_HEAD="$(git rev-parse HEAD)"
          MAIN_HEAD="$(git rev-parse origin/main)"

          if git merge-base --is-ancestor "$MAIN_HEAD" "$SEED_HEAD"; then
            echo "Seed branch already contains current main."
            exit 0
          fi

          MERGE_BASE="$(git merge-base "$SEED_HEAD" "$MAIN_HEAD")"
          git diff --name-only "$MERGE_BASE" "$SEED_HEAD" > /tmp/seed-owned-paths.txt
          git show "$SEED_HEAD:package.json" > /tmp/seed-package.json

          git read-tree --reset -u "$MAIN_HEAD"

          while IFS= read -r path; do
            case "$path" in
              package.json|.gitignore|.github/workflows/seed-pr163-reconcile.yml)
                continue
                ;;
            esac
            if git cat-file -e "$SEED_HEAD:$path" 2>/dev/null; then
              git checkout "$SEED_HEAD" -- "$path"
            else
              git rm -f --ignore-unmatch -- "$path"
            fi
          done < /tmp/seed-owned-paths.txt

          git checkout "$SEED_HEAD" -- .github/workflows/seed-pr163-reconcile.yml

          node <<'NODE'
          const fs = require('node:fs');
          const current = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const seed = JSON.parse(fs.readFileSync('/tmp/seed-package.json', 'utf8'));
          current.scripts ??= {};
          for (const [name, command] of Object.entries(seed.scripts ?? {})) {
            if (name.toLowerCase().includes('seed')) current.scripts[name] = command;
          }
          if (!current.scripts.audit.includes('audit:seed-content')) {
            current.scripts.audit += ' && npm run audit:seed-content';
          }
          fs.writeFileSync('package.json', `${JSON.stringify(current, null, 2)}\n`);
          NODE

          if ! grep -qxF '.seed-audit/' .gitignore; then
            printf '\n.seed-audit/\n' >> .gitignore
          fi

          git add -A
          git diff --cached --check
          TREE="$(git write-tree)"
          MERGE_COMMIT="$(printf '%s\n' 'merge(seed): synchronize executable pack with current main' | git commit-tree "$TREE" -p "$SEED_HEAD" -p "$MAIN_HEAD")"
          git reset --hard "$MERGE_COMMIT"
          test "$(git rev-list --count HEAD..origin/main)" -eq 0
          git push origin HEAD:agent/seed-content-foundation-v1
