name: Seed Executable Beta Pack

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/seed-executable-beta-pack.yml"
      - "docs/seed-content/executable/beta-pack-v1/**"
      - "docs/seed-content/reviews/executable-beta-pack-readiness-v1.md"
      - "scripts/seed-beta-*.mjs"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: seed-executable-beta-pack-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out pull-request head
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm

      - name: Pin npm
        run: npm install --global npm@10.9.8

      - name: Install repository dependencies
        run: npm ci

      - name: Build bounded pack deterministically
        run: npm run build:seed-beta-pack

      - name: Reject generated pack drift
        shell: bash
        run: git diff --exit-code -- docs/seed-content/executable/beta-pack-v1

      - name: Validate executable pack and calibration
        run: npm run validate:seed-beta-pack

      - name: Run executable pack tests
        run: npm run test:seed-beta-pack

      - name: Validate importer contract
        run: npm run seed:beta:validate

      - name: Run credential-free staging dry run
        run: npm run seed:beta:dry-run

      - name: Run complete seed-content audit
        run: npm run audit:seed-content

      - name: Run repository staging preflight
        run: npm run preflight:staging

      - name: Scan committed source for credentials
        run: npm run security:secrets
