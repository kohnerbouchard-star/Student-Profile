name: Apply Player Banking Public Read

on:
  push:
    branches:
      - agent/player-banking-public-read-v1
    paths:
      - .github/workflows/apply-player-banking-public-read-v1.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/player-banking-public-read-v1
          fetch-depth: 0

      - name: Apply cross-layer Banking integration
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import json
          import re

          def replace_once(path, old, new):
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f"missing replacement anchor in {path}: {old[:80]!r}")
              file.write_text(text.replace(old, new, 1))

          replace_once(
              "backend/supabase/functions/classroom-api/index.ts",
              '''import {
            handlePlayerLedgerHistoryRequest,
          } from "../../../src/domains/economy/api/playerLedgerHistoryHttpHandler.ts";''',
              '''import {
            handlePlayerBankingPublicRequest,
          } from "../../../src/domains/economy/api/playerBankingPublicHttpHandler.ts";
          import {
            readPlayerBankingPublicRoutePath,
          } from "../../../src/domains/economy/api/playerBankingPublicRoutePaths.ts";''',
          )
          replace_once(
              "backend/supabase/functions/classroom-api/index.ts",
              '''  if (url.pathname.endsWith("/players/me/ledger")) {
            return handlePlayerLedgerHistoryRequest(request, {
              createServiceClient,
            });
          }''',
              '''  const playerBankingRoute = readPlayerBankingPublicRoutePath(url.pathname);

          if (playerBankingRoute) {
            return dispatchRateLimitedReviewedPlayerRequest(
              request,
              "banking",
              () =>
                handlePlayerBankingPublicRequest(request, {
                  createServiceClient,
                }),
              { createServiceClient },
            );
          }''',
          )

          replace_once(
              "backend/src/security/playerRateLimitDispatch.ts",
              '''  capabilities: byMethod({
            GET: operation("player.capabilities.read", "read"),
          }),''',
              '''  capabilities: byMethod({
            GET: operation("player.capabilities.read", "read"),
          }),
          banking: byMethod({
            GET: operation("player.banking.read", "read"),
          }),''',
          )
          replace_once(
              "backend/src/security/playerRateLimitDispatch.test.ts",
              '''    "capabilities:GET": ["player.capabilities.read", "read"],''',
              '''    "capabilities:GET": ["player.capabilities.read", "read"],
              "banking:GET": ["player.banking.read", "read"],''',
          )
          replace_once(
              "backend/src/security/classroomApiRateLimitDispatch.test.ts",
              '''    12,''',
              '''    13,''',
          )
          replace_once(
              "backend/src/security/classroomApiRateLimitDispatch.test.ts",
              '''      "return handlePlayerCapabilityManifestRequest(",''',
              '''      "return handlePlayerCapabilityManifestRequest(",
                "return handlePlayerBankingPublicRequest(",''',
          )

          manifest_path = Path("backend/src/domains/players/contracts/playerCapabilityManifestContracts.ts")
          manifest = manifest_path.read_text()
          manifest = manifest.replace('PLAYER_CAPABILITY_MANIFEST_VERSION = "2026-07-19.3"', 'PLAYER_CAPABILITY_MANIFEST_VERSION = "2026-07-19.4"', 1)
          manifest = manifest.replace('''  | "capabilities"\n  | "contractAccept"''', '''  | "capabilities"\n  | "banking"\n  | "contractAccept"''', 1)
          manifest = manifest.replace(
              '''  {
            key: "capabilities",
            operations: [{ method: "GET", pathTemplate: "/players/me/capabilities" }],
          },''',
              '''  {
            key: "capabilities",
            operations: [{ method: "GET", pathTemplate: "/players/me/capabilities" }],
          },
          {
            key: "banking",
            operations: [{ method: "GET", pathTemplate: "/players/me/ledger" }],
            routeCapabilities: ["banking"],
          },''',
              1,
          )
          manifest_path.write_text(manifest)

          capability_test = Path("backend/src/domains/players/contracts/playerCapabilityManifestContracts.test.ts")
          text = capability_test.read_text()
          text = text.replace(
              'import { readPlayerCapabilityManifestRoutePath } from "../api/playerCapabilityManifestRoutePaths.ts";',
              'import { readPlayerCapabilityManifestRoutePath } from "../api/playerCapabilityManifestRoutePaths.ts";\nimport { readPlayerBankingPublicRoutePath } from "../../economy/api/playerBankingPublicRoutePaths.ts";',
              1,
          )
          text = text.replace('assertEquals(manifest.capabilities.routes.banking, false);', 'assertEquals(manifest.capabilities.routes.banking, true);', 1)
          text = text.replace('assertEquals(endpointKeys.includes("capabilities"), true);', 'assertEquals(endpointKeys.includes("capabilities"), true);\n  assertEquals(endpointKeys.includes("banking"), true);', 1)
          text = text.replace(
              ''': operation.key === "contractAccept"
                ? readPlayerContractAcceptanceRoutePath(operation.path)''',
              ''': operation.key === "banking"
                ? readPlayerBankingPublicRoutePath(operation.path)
                : operation.key === "contractAccept"
                ? readPlayerContractAcceptanceRoutePath(operation.path)''',
              1,
          )
          capability_test.write_text(text)

          backend_package = Path("backend/package.json")
          package = json.loads(backend_package.read_text())
          package["scripts"]["test:smoke"] = package["scripts"]["test:smoke"].replace(
              " && npm run test:player-store-public && npm run test:admin-api",
              " && npm run test:player-store-public && npm run test:player-banking-public && npm run test:admin-api",
          )
          package["scripts"]["test:player-banking-public"] = "deno test --config supabase/functions/classroom-api/deno.json --lock=supabase/functions/deno.lock --frozen src/domains/economy/api/playerBankingPublicHttpHandler.test.ts src/domains/economy/infrastructure/supabasePlayerBankingPublicRepository.test.ts"
          backend_package.write_text(json.dumps(package, indent=2) + "\n")

          replace_once(
              "backend/src/domains/economy/api/playerBankingPublicHttpHandler.ts",
              '''      pagination: {
                limit,
                hasMore: page.hasMore,
                nextCursor: page.hasMore ? `offset_${nextOffset}` : null,
              },''',
              '''      pagination: {
                cursor: offset > 0 ? `offset_${offset}` : null,
                limit,
                hasMore: page.hasMore,
                nextCursor: page.hasMore ? `offset_${nextOffset}` : null,
              },''',
          )

          replace_once(
              "player-terminal/src/api/backend-routes.js",
              '''  banking: ({ payload = {} }) => ({
            method: "GET",
            path: queryPath("/players/me/ledger", { limit: payload.limit ?? 50 })
          }),''',
              '''  banking: ({ payload = {} }) => ({
            method: "GET",
            path: queryPath("/players/me/ledger", {
              limit: payload.limit ?? 50,
              cursor: payload.cursor
            })
          }),''',
          )

          read_model_path = Path("player-terminal/src/api/read-model.js")
          read_model = read_model_path.read_text()
          read_model = read_model.replace(
              '''      transferLimit: null,
                transactions: []
              },''',
              '''      transferLimit: null,
                balances: [],
                generatedAt: "",
                staleAt: "",
                stale: false,
                pagination: { cursor: null, nextCursor: null, hasMore: false, limit: 50 },
                transactions: []
              },''',
              1,
          )
          replacement = '''function normalizeBankingRead(response, currentBanking) {
            const body = object(response);
            const current = object(currentBanking);
            const balances = list(body.currentBalances);
            const checking = balances.find((item) => ["cash", "checking"].includes(text(item.accountType).toLowerCase())) || balances[0] || {};
            const savings = balances.find((item) => text(item.accountType).toLowerCase() === "savings");
            const checkingBalance = number(checking.balance);
            const page = object(body.pagination);
            const incoming = list(body.ledgerEntries).map((entry) => {
              const amount = number(entry.amount);
              const entryType = text(entry.entryType).toLowerCase();
              return {
                id: text(entry.entryKey),
                description: transactionDescription(entry),
                date: shortDate(entry.createdAt, "Recorded"),
                category: text(entry.sourceDomain, "Ledger"),
                amount: entryType === "debit" ? -Math.abs(amount) : entryType === "credit" ? Math.abs(amount) : amount,
                status: "Posted",
                accountType: text(entry.accountType),
                currencyCode: text(entry.currencyCode)
              };
            });
            const append = Boolean(text(page.cursor));
            const transactions = append ? [...list(current.transactions), ...incoming] : incoming;
            const uniqueTransactions = [...new Map(transactions.map((entry) => [entry.id, entry])).values()];
            const staleAt = text(body.staleAt);
            const staleTimestamp = Date.parse(staleAt);
            return {
              ...current,
              balances: balances.map((balance) => ({
                accountType: text(balance.accountType),
                balance: number(balance.balance),
                currencyCode: text(balance.currencyCode)
              })),
              checking: {
                accountId: text(checking.accountType, "CASH").toUpperCase(),
                balance: checkingBalance,
                available: checkingBalance,
                pending: 0,
                currencyCode: text(checking.currencyCode)
              },
              savings: savings ? {
                configured: true,
                accountId: text(savings.accountType, "SAVINGS").toUpperCase(),
                balance: number(savings.balance),
                available: number(savings.balance),
                interestRate: null,
                interestEarned: null,
                currencyCode: text(savings.currencyCode)
              } : {
                configured: false,
                accountId: "NOT CONFIGURED",
                balance: null,
                available: null,
                interestRate: null,
                interestEarned: null,
                currencyCode: ""
              },
              creditConfigured: false,
              transfersConfigured: false,
              creditScore: null,
              transferLimit: null,
              generatedAt: text(body.generatedAt),
              staleAt,
              stale: body.stale === true || (Number.isFinite(staleTimestamp) && staleTimestamp <= Date.now()),
              pagination: {
                cursor: text(page.cursor) || null,
                nextCursor: text(page.nextCursor) || null,
                hasMore: page.hasMore === true,
                limit: number(page.limit, 50)
              },
              transactions: uniqueTransactions
            };
          }'''
          read_model, count = re.subn(
              r'function normalizeBankingRead\(response, currentBanking\) \{.*?\n\}\n\nfunction storeItemsFromSnapshot',
              replacement + '\n\nfunction storeItemsFromSnapshot',
              read_model,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit("failed to replace normalizeBankingRead")
          read_model_path.write_text(read_model)

          replace_once(
              "player-terminal/src/pages/banking-page.js",
              '''  const currencyCode = data.session.currencyCode;''',
              '''  const currencyCode = data.session.currencyCode;
            const checkingCurrencyCode = bank.checking?.currencyCode || currencyCode;
            const savingsCurrencyCode = bank.savings?.currencyCode || currencyCode;''',
          )
          replace_once(
              "player-terminal/src/pages/banking-page.js",
              '''      <div class="player-terminal-heading-actions">${creditConfigured ? renderStatusPill(`CREDIT ${bank.creditScore}`, "green") : renderStatusPill("CREDIT NOT CONFIGURED", "amber")}</div>''',
              '''      <div class="player-terminal-heading-actions">${bank.stale ? renderStatusPill("STALE DATA", "amber") : ""}${creditConfigured ? renderStatusPill(`CREDIT ${bank.creditScore}`, "green") : renderStatusPill("CREDIT NOT CONFIGURED", "amber")}</div>''',
          )
          replace_once(
              "player-terminal/src/pages/banking-page.js",
              '''${escapeHtml(optionalCurrency(bank.checking.balance, currencyCode, "Unavailable"))}</h3><p>${escapeHtml(optionalCurrency(bank.checking.available, currencyCode, "Unavailable"))} available''',
              '''${escapeHtml(optionalCurrency(bank.checking.balance, checkingCurrencyCode, "Unavailable"))}</h3><p>${escapeHtml(optionalCurrency(bank.checking.available, checkingCurrencyCode, "Unavailable"))} available''',
          )
          replace_once(
              "player-terminal/src/pages/banking-page.js",
              '''${escapeHtml(optionalCurrency(bank.savings?.balance, currencyCode))}</h3><p>${savingsConfigured ? `${escapeHtml(optionalPercent(bank.savings.interestRate, "Yield unavailable"))} annual yield · ${escapeHtml(optionalCurrency(bank.savings.interestEarned, currencyCode, "Interest unavailable"))} earned''',
              '''${escapeHtml(optionalCurrency(bank.savings?.balance, savingsCurrencyCode))}</h3><p>${savingsConfigured ? `${escapeHtml(optionalPercent(bank.savings.interestRate, "Yield unavailable"))} annual yield · ${escapeHtml(optionalCurrency(bank.savings.interestEarned, savingsCurrencyCode, "Interest unavailable"))} earned''',
          )

          replace_once(
              "player-terminal/src/integrations/student-profile-capability-manifest.js",
              '''  capabilities: Object.freeze(["capabilities"]),''',
              '''  capabilities: Object.freeze(["capabilities"]),
            banking: Object.freeze(["banking"]),''',
          )
          replace_once(
              "player-terminal/src/integrations/student-profile-capability-manifest.js",
              '''  news: "news",''',
              '''  news: "news",
            banking: "banking",''',
          )

          adapter_path = Path("player-terminal/tests/student-profile-adapter.mjs")
          adapter = adapter_path.read_text()
          adapter = adapter.replace('manifestVersion: "2026-07-19.3"', 'manifestVersion: "2026-07-19.4"', 1)
          adapter = adapter.replace('''      store: true
            },''', '''      store: true,
              banking: true
            },''', 1)
          adapter = adapter.replace(
              '''    {
                key: "contractAccept",''',
              '''    {
                key: "banking",
                operations: [{ method: "GET", pathTemplate: "/players/me/ledger" }]
              },
              {
                key: "contractAccept",''',
              1,
          )
          adapter = adapter.replace(
              '''  banking: {
                currentBalances: [{ accountType: "cash", currencyCode: "ECO", balance: 1250 }],
                ledgerEntries: [{
                  id: "ledger-1",
                  entryType: "credit",
                  amount: 25,
                  currencyCode: "ECO",
                  accountType: "cash",
                  sourceDomain: "contracts",
                  sourceAction: "contract_reward",
                  createdAt: "2026-07-17T12:00:00.000Z"
                }]
              },''',
              '''  banking: {
                ok: true,
                generatedAt: "2026-07-19T04:00:00.000Z",
                staleAt: "2026-07-19T04:02:00.000Z",
                currentBalances: [{ accountType: "cash", currencyCode: "ECO", balance: 1250 }],
                ledgerEntries: [{
                  entryKey: "ledger_1",
                  entryType: "credit",
                  amount: 25,
                  currencyCode: "ECO",
                  accountType: "cash",
                  sourceDomain: "contracts",
                  sourceAction: "contract_reward",
                  createdAt: "2026-07-17T12:00:00.000Z"
                }],
                pagination: { cursor: null, nextCursor: "offset_1", hasMore: true, limit: 1 }
              },''',
              1,
          )
          adapter = adapter.replace('assert.equal(session.capabilityManifestVersion, "2026-07-19.3");', 'assert.equal(session.capabilityManifestVersion, "2026-07-19.4");', 1)
          adapter = adapter.replace(
              '''assert.equal(banking.transactions[0].amount, 25);
            assert.equal(calls.at(-1).path, "/players/me/ledger?limit=50");''',
              '''assert.equal(banking.transactions[0].amount, 25);
            assert.equal(banking.transactions[0].id, "ledger_1");
            assert.equal(banking.pagination.nextCursor, "offset_1");
            assert.equal(calls.at(-1).path, "/players/me/ledger?limit=50");''',
              1,
          )
          adapter_path.write_text(adapter)

          scope_path = Path(".github/workflows/player-terminal-verify.yml")
          scope = scope_path.read_text()
          scope = scope.replace(
              '''              $0 ~ /^backend\/src\/domains\/contracts\/api\/playerContractPublicList[A-Za-z0-9.-]*[.]ts$/ { next }''',
              '''              $0 ~ /^backend\/src\/domains\/economy\/api\/playerBankingPublic[A-Za-z0-9.-]*[.]ts$/ { next }
                          $0 ~ /^backend\/src\/domains\/economy\/contracts\/playerBankingPublicContracts[.]ts$/ { next }
                          $0 ~ /^backend\/src\/domains\/economy\/infrastructure\/supabasePlayerBankingPublicRepository([.]test)?[.]ts$/ { next }
                          $0 ~ /^backend\/src\/domains\/contracts\/api\/playerContractPublicList[A-Za-z0-9.-]*[.]ts$/ { next }''',
              1,
          )
          scope_path.write_text(scope)
          PY

          git rm .github/workflows/apply-player-banking-public-read-v1.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(banking): connect UUID-private paginated Player read"
          git push origin HEAD:agent/player-banking-public-read-v1
