name: PR249 One-Use Dashboard Fixture

on:
  push:
    branches:
      - agent/player-marketplace-lifecycle-v1
    paths:
      - ".github/workflows/pr249-dashboard-fixture.yml"

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: agent/player-marketplace-lifecycle-v1

      - name: Supply the synthetic game scope through the terminal config contract
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("player-terminal/tests/browser/marketplace-lifecycle.spec.mjs")
          source = path.read_text()
          old = '''function installSession(page) {
            return page.addInitScript(({ token }) => {
              sessionStorage.setItem("econovaria.player.auth.v1", JSON.stringify({
                playerSessionToken: token,
                sessionExpiresAt: "2099-07-21T03:00:00.000Z",
                storedAt: "2026-07-21T01:00:00.000Z",
              }));
            }, { token: SESSION_TOKEN });
          }
          '''
          new = '''function installSession(page) {
            return page.addInitScript(({ token, gameId }) => {
              globalThis.ECONOVARIA_PLAYER_TERMINAL_CONFIG = {
                ...(globalThis.ECONOVARIA_PLAYER_TERMINAL_CONFIG || {}),
                gameSessionId: gameId,
              };
              sessionStorage.setItem("econovaria.player.auth.v1", JSON.stringify({
                playerSessionToken: token,
                sessionExpiresAt: "2099-07-21T03:00:00.000Z",
                storedAt: "2026-07-21T01:00:00.000Z",
              }));
            }, { token: SESSION_TOKEN, gameId: GAME_ID });
          }
          '''
          if old not in source:
              raise SystemExit("Marketplace host session fixture marker missing")
          path.write_text(source.replace(old, new, 1))
          Path(".github/workflows/pr249-dashboard-fixture.yml").unlink()
          PY

      - name: Commit connected dashboard fixture
        shell: bash
        run: |
          git config user.name "econovaria-controller"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "test(marketplace): supply connected game scope to dashboard"
          git push origin HEAD:agent/player-marketplace-lifecycle-v1
