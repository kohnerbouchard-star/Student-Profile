name: Seed Content Regenerate PR

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/seed-content-regenerate-pr.yml"
      - "package.json"
      - "docs/seed-content/**"
      - "scripts/apply-store-content-overrides.mjs"
      - "scripts/store-content-artwork-contract.mjs"
      - "scripts/store-content-artwork-source.test.mjs"

permissions:
  contents: write

concurrency:
  group: seed-content-regenerate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  regenerate:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/seed-content-usable-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out exact PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm

      - name: Pin npm
        run: npm install --global npm@10.9.8

      - name: Install dependencies
        run: npm ci

      - name: Rebuild executable seed pack
        run: npm run build:seed-beta-pack

      - name: Validate generated pack and Store content contract
        run: |
          npm run validate:seed-beta-pack
          npm run validate:store-content-artwork
          node --test scripts/store-content-artwork-source.test.mjs

      - name: Commit deterministic generated artifacts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/seed-content/executable/beta-pack-v1
          if git diff --cached --quiet; then
            echo "Generated pack is already current."
            exit 0
          fi
          git commit -m "seed: regenerate executable Store content pack"
          git push origin "HEAD:${{ github.head_ref }}"
