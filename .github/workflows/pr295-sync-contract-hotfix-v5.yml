name: PR295 Sync Contract Hotfix V5

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/pr295-sync-contract-hotfix-v5.yml"

permissions:
  contents: write

jobs:
  synchronize:
    if: github.event.pull_request.number == 295
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/production-integration-gate-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge exact main and bind v5 release
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          test "$(git rev-parse origin/main)" = "1c3ae6004db442eeed1a4999a733445ca6fcecbd"

          if ! git merge --no-edit origin/main; then
            git checkout --theirs -- \
              backend/src/domains/contracts/api/playerContractPublicListRoutePaths.ts \
              backend/src/domains/contracts/api/playerContractPublicListRoutePaths.test.ts
            git add \
              backend/src/domains/contracts/api/playerContractPublicListRoutePaths.ts \
              backend/src/domains/contracts/api/playerContractPublicListRoutePaths.test.ts
            test -z "$(git diff --name-only --diff-filter=U)"
            git commit --no-edit
          fi

          python3 - <<'PY'
          from pathlib import Path

          acceptance = Path('scripts/pr295-connected-staging-acceptance.mjs')
          text = acceptance.read_text()
          bad = '    `/functions/v1/classroom-api/players/me/contracts?gameSessionId=${encodeURIComponent(fixture.gameId)}`,\n'
          good = '    "/functions/v1/classroom-api/players/me/contracts",\n'
          if text.count(bad) != 1:
              raise SystemExit('Expected invalid contracts workaround was not found exactly once')
          acceptance.write_text(text.replace(bad, good))

          build = Path('.github/workflows/pr295-immutable-release-build.yml')
          text = build.read_text()
          replacements = {
              'pr295-immutable-release-v4-': 'pr295-immutable-release-v5-',
              'RELEASE_COMMIT: 7838d93ef33908f61a2534486ec92031875a9a22': 'RELEASE_COMMIT: 1c3ae6004db442eeed1a4999a733445ca6fcecbd',
              'OUTPUT_ROOT: /tmp/econovaria-release-v4': 'OUTPUT_ROOT: /tmp/econovaria-release-v5',
              'name: econovaria-release-7838d93ef33908f61a2534486ec92031875a9a22-v4': 'name: econovaria-release-1c3ae6004db442eeed1a4999a733445ca6fcecbd-v5',
              'path: /tmp/econovaria-release-v4': 'path: /tmp/econovaria-release-v5',
          }
          for old, new in replacements.items():
              if text.count(old) != 1:
                  raise SystemExit(f'Expected v4 build binding not found exactly once: {old}')
              text = text.replace(old, new)
          build.write_text(text)
          PY

          rm -f .github/workflows/pr295-sync-contract-hotfix-v5.yml
          git add -A
          git commit -m "ops(pr295): synchronize hosted contract fix for v5 release"
          git push origin HEAD:agent/production-integration-gate-v1
