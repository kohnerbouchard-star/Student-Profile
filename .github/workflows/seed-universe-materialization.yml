name: Seed Universe Materialization

on:
  push:
    branches:
      - agent/seed-content-foundation-v1
    paths:
      - scripts/generate-seed-market-universe.mjs
      - .github/workflows/seed-universe-materialization.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: seed-universe-materialization-${{ github.ref }}
  cancel-in-progress: false

jobs:
  materialize:
    name: Materialize deterministic market universe
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out seed authority branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/seed-content-foundation-v1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.23.1

      - name: Generate country JSONL files and checksummed manifest
        run: node scripts/generate-seed-market-universe.mjs

      - name: Verify generated files are deterministic
        run: node scripts/generate-seed-market-universe.mjs --check

      - name: Validate generated diff
        run: git diff --check

      - name: Commit generated universe
        shell: bash
        run: |
          if git diff --quiet -- docs/seed-content/markets/universe; then
            echo "Universe files already match the deterministic generator."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/seed-content/markets/universe
            git commit -m "feat(seed): materialize 3200-instrument universe [skip ci]"
            git push origin HEAD:agent/seed-content-foundation-v1
          fi
