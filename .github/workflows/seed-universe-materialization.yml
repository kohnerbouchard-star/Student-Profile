name: Seed Universe Materialization

on:
  push:
    branches:
      - agent/seed-content-foundation-v1
    paths:
      - scripts/generate-seed-market-universe.mjs
      - scripts/seed-content-universe-editorial-audit.mjs
      - .github/workflows/seed-universe-materialization.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: seed-universe-materialization-${{ github.ref }}
  cancel-in-progress: false

jobs:
  materialize:
    name: Materialize deterministic market universe
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out seed authority branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/seed-content-foundation-v1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.23.1

      - name: Generate country JSONL files and checksummed manifest
        run: node scripts/generate-seed-market-universe.mjs

      - name: Generate editorial and active-issuer reconciliation reports
        run: node scripts/seed-content-universe-editorial-audit.mjs

      - name: Verify deterministic outputs
        run: |
          node scripts/generate-seed-market-universe.mjs --check
          node scripts/seed-content-universe-editorial-audit.mjs --check

      - name: Validate generated diff
        run: git diff --check

      - name: Commit generated universe evidence
        shell: bash
        run: |
          if git diff --quiet -- docs/seed-content/markets/universe docs/seed-content/reviews/market-universe-editorial-collision-review-v1.json docs/seed-content/reviews/market-universe-editorial-collision-review-v1.md; then
            echo "Universe files and editorial evidence already match the deterministic generators."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/seed-content/markets/universe
            git add docs/seed-content/reviews/market-universe-editorial-collision-review-v1.json
            git add docs/seed-content/reviews/market-universe-editorial-collision-review-v1.md
            git commit -m "test(seed): materialize universe editorial evidence [skip ci]"
            git push origin HEAD:agent/seed-content-foundation-v1
          fi
