name: Database Replay

on:
  pull_request:
    paths:
      - "backend/supabase/config.toml"
      - "backend/supabase/migrations/**"
      - "scripts/operations/live-migration-reconciliation/**"
      - "docs/operations/evidence/live-migration-reconciliation-v1/**"
      - ".github/workflows/database-replay.yml"

permissions:
  contents: write

concurrency:
  group: database-replay-${{ github.ref }}
  cancel-in-progress: true

jobs:
  finalize-reconciliation:
    if: >-
      github.event.pull_request.number == 282 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/live-migration-reconciliation-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - name: Check out existing reconciliation branch
        uses: actions/checkout@v7
        with:
          ref: agent/live-migration-reconciliation-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Synchronize current main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-edit --no-ff origin/main
          test "$(git rev-list --count HEAD..origin/main)" -eq 0

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm

      - name: Pin npm
        run: npm install --global npm@10.9.8

      - name: Install repository dependencies
        run: |
          npm ci
          npm --prefix backend ci

      - name: Run root repository tests
        id: root_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee /tmp/root-tests.log

      - name: Run Backend typecheck
        id: backend_typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm --prefix backend run typecheck:all 2>&1 | tee /tmp/backend-typecheck.log

      - name: Run Backend smoke
        id: backend_smoke
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm --prefix backend run smoke 2>&1 | tee /tmp/backend-smoke.log

      - name: Validate migration source
        id: migration_audit
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run audit:migrations 2>&1 | tee /tmp/migration-audit.log

      - name: Validate reconciliation tooling
        id: reconciliation_tools
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            node --check scripts/operations/live-migration-reconciliation/reconcile-migrations.mjs
            node --check scripts/operations/live-migration-reconciliation/compare-schema-snapshots.mjs
            node scripts/operations/live-migration-reconciliation/reconcile-migrations.mjs --self-test
            bash -n scripts/operations/live-migration-reconciliation/export-management-metadata.sh
          } 2>&1 | tee /tmp/reconciliation-tools.log

      - name: Calculate all repository migration SHA-256 values
        id: migration_hashes
        shell: bash
        run: |
          set -euo pipefail
          EVIDENCE_DIR="docs/operations/evidence/live-migration-reconciliation-v1"
          mkdir -p "$EVIDENCE_DIR"

          jq '{migrations: [.matched[] | {
            version,
            name,
            live_statement_md5,
            statement_count: .live_statement_count
          }]}' "$EVIDENCE_DIR/migration-ledger.json" > /tmp/live-migrations.json

          RECONCILE_EXIT=0
          node scripts/operations/live-migration-reconciliation/reconcile-migrations.mjs \
            --repo-dir backend/supabase/migrations \
            --live-snapshot /tmp/live-migrations.json \
            --out "$EVIDENCE_DIR/migration-reconciliation-final.json" || RECONCILE_EXIT=$?

          SOURCE_COMMIT="$(git rev-parse HEAD)"
          jq --arg sourceCommit "$SOURCE_COMMIT" '{
            format: "econovaria-repository-migration-sha256-v1",
            generated_at: (now | todateiso8601),
            source_commit: $sourceCommit,
            migration_count: .repositoryMigrationCount,
            migrations: [.rows[] | select(.repository != null) | {
              version,
              name: .repository.name,
              filename: .repository.filename,
              repository_sha256: .repository.repositorySha256,
              reconciliation_status: .status
            }]
          }' "$EVIDENCE_DIR/migration-reconciliation-final.json" \
            > "$EVIDENCE_DIR/repository-migration-sha256.json"

          REPOSITORY_COUNT="$(jq '.repositoryMigrationCount' "$EVIDENCE_DIR/migration-reconciliation-final.json")"
          HASH_COUNT="$(jq '[.migrations[].repository_sha256 | select(test("^[0-9a-f]{64}$"))] | length' "$EVIDENCE_DIR/repository-migration-sha256.json")"
          test "$REPOSITORY_COUNT" -eq "$HASH_COUNT"
          test "$REPOSITORY_COUNT" -gt 0
          printf 'reconcile_exit=%s\n' "$RECONCILE_EXIT" >> "$GITHUB_OUTPUT"
          printf 'repository_count=%s\n' "$REPOSITORY_COUNT" >> "$GITHUB_OUTPUT"

      - name: Start disposable Supabase stack
        shell: bash
        run: |
          set -euo pipefail
          LOG="/tmp/live-migration-reconciliation-startup.log"
          : > "$LOG"
          STATUS=1

          for ATTEMPT in 1 2 3; do
            printf '\n## Supabase startup attempt %s\n' "$ATTEMPT" | tee -a "$LOG"
            set +e
            npx supabase start --workdir backend \
              --exclude studio,imgproxy,inbucket,storage-api,edge-runtime,logflare,vector,supavisor \
              2>&1 | tee -a "$LOG"
            STATUS=${PIPESTATUS[0]}
            set -e

            if [ "$STATUS" -eq 0 ]; then
              exit 0
            fi

            npx supabase status --workdir backend 2>&1 | tee -a "$LOG" || true
            npx supabase stop --workdir backend --no-backup 2>&1 | tee -a "$LOG" || true
            sleep $((ATTEMPT * 10))
          done

          exit "$STATUS"

      - name: Replay from zero twice and capture canonical schemas
        shell: bash
        run: |
          set -euo pipefail
          EVIDENCE_DIR="docs/operations/evidence/live-migration-reconciliation-v1"
          set -a
          source <(npx supabase status --workdir backend -o env)
          set +a
          test -n "${DB_URL:-}"

          npx supabase db reset --workdir backend --local
          psql "$DB_URL" -X -v ON_ERROR_STOP=1 \
            -f scripts/operations/live-migration-reconciliation/export-live-schema.sql \
            > /tmp/clean-replay-schema-first.json

          npx supabase db reset --workdir backend --local
          psql "$DB_URL" -X -v ON_ERROR_STOP=1 \
            -f scripts/operations/live-migration-reconciliation/export-live-schema.sql \
            > "$EVIDENCE_DIR/clean-replay-schema.json"

          node scripts/operations/live-migration-reconciliation/compare-schema-snapshots.mjs \
            --left /tmp/clean-replay-schema-first.json \
            --right "$EVIDENCE_DIR/clean-replay-schema.json" \
            > "$EVIDENCE_DIR/clean-replay-determinism.json"

          test "$(jq '.matched' "$EVIDENCE_DIR/clean-replay-determinism.json")" = "true"
          REPLAY_COUNT="$(jq '.migrations | length' "$EVIDENCE_DIR/clean-replay-schema.json")"
          test "$REPLAY_COUNT" -eq "${{ steps.migration_hashes.outputs.repository_count }}"
          npx supabase db lint --workdir backend --local --level warning

          SOURCE_COMMIT="$(git rev-parse HEAD)"
          jq --arg sourceCommit "$SOURCE_COMMIT" \
             --arg schemaSha "$(jq -r '.right.sha256' "$EVIDENCE_DIR/clean-replay-determinism.json")" \
             --arg migrationSetSha "$(sha256sum "$EVIDENCE_DIR/repository-migration-sha256.json" | awk '{print $1}')" \
             --argjson migrationCount "$REPLAY_COUNT" \
             '{
               format: "econovaria-clean-replay-evidence-v1",
               generated_at: (now | todateiso8601),
               source_commit: $sourceCommit,
               migration_count: $migrationCount,
               migration_head: (.migrations[-1].version + "_" + .migrations[-1].name),
               canonical_schema_sha256: $schemaSha,
               repository_migration_manifest_sha256: $migrationSetSha,
               replay_count: 2,
               deterministic: true,
               database_lint_level: "warning",
               database_lint_passed: true,
               live_database_modified: false,
               isolated_staging_modified: false
             }' "$EVIDENCE_DIR/clean-replay-schema.json" \
            > "$EVIDENCE_DIR/clean-replay-summary.json"

      - name: Record and publish evidence
        env:
          ROOT_TESTS: ${{ steps.root_tests.outcome }}
          BACKEND_TYPECHECK: ${{ steps.backend_typecheck.outcome }}
          BACKEND_SMOKE: ${{ steps.backend_smoke.outcome }}
          MIGRATION_AUDIT: ${{ steps.migration_audit.outcome }}
          RECONCILIATION_TOOLS: ${{ steps.reconciliation_tools.outcome }}
          RECONCILE_EXIT: ${{ steps.migration_hashes.outputs.reconcile_exit }}
        shell: bash
        run: |
          set -euo pipefail
          EVIDENCE_DIR="docs/operations/evidence/live-migration-reconciliation-v1"
          HEAD_SHA="$(git rev-parse HEAD)"
          MAIN_SHA="$(git rev-parse origin/main)"
          BEHIND="$(git rev-list --count HEAD..origin/main)"
          AHEAD="$(git rev-list --count origin/main..HEAD)"
          STATUS_COUNTS="$(jq -c '.statusCounts' "$EVIDENCE_DIR/migration-reconciliation-final.json")"
          BLOCKING="$(jq '.blocking' "$EVIDENCE_DIR/migration-reconciliation-final.json")"
          MIGRATION_COUNT="$(jq '.repositoryMigrationCount' "$EVIDENCE_DIR/migration-reconciliation-final.json")"

          jq -n \
            --arg generatedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg headSha "$HEAD_SHA" \
            --arg mainSha "$MAIN_SHA" \
            --arg rootTests "$ROOT_TESTS" \
            --arg backendTypecheck "$BACKEND_TYPECHECK" \
            --arg backendSmoke "$BACKEND_SMOKE" \
            --arg migrationAudit "$MIGRATION_AUDIT" \
            --arg reconciliationTools "$RECONCILIATION_TOOLS" \
            --argjson reconcileExit "${RECONCILE_EXIT:-0}" \
            --argjson behind "$BEHIND" \
            --argjson ahead "$AHEAD" \
            --argjson migrationCount "$MIGRATION_COUNT" \
            --argjson statusCounts "$STATUS_COUNTS" \
            --argjson blocking "$BLOCKING" \
            '{
              format: "econovaria-live-migration-final-head-v1",
              generated_at: $generatedAt,
              branch: "agent/live-migration-reconciliation-v1",
              head_before_evidence_commit: $headSha,
              synchronized_main: $mainSha,
              commits_behind_main: $behind,
              commits_ahead_of_main: $ahead,
              repository_checks: {
                root_tests: $rootTests,
                backend_typecheck_all: $backendTypecheck,
                backend_smoke: $backendSmoke,
                migration_audit: $migrationAudit,
                reconciliation_tools: $reconciliationTools
              },
              migration_reconciliation: {
                repository_migration_count: $migrationCount,
                status_counts: $statusCounts,
                blocking: $blocking,
                process_exit: $reconcileExit
              },
              clean_replay: {
                replay_count: 2,
                deterministic_schema: true,
                migration_count: $migrationCount,
                lint: "passed"
              },
              connected_isolated_staging: "blocked_not_provided",
              live_production_modified: false,
              authoritative_roadmap_modified_by_branch: false
            }' > "$EVIDENCE_DIR/final-head-validation.json"

          test "$BEHIND" -eq 0
          git diff --check
          git add "$EVIDENCE_DIR"
          git commit -m "test(db): record clean replay and migration hashes"
          git push origin HEAD:agent/live-migration-reconciliation-v1

      - name: Enforce final-head check results
        env:
          ROOT_TESTS: ${{ steps.root_tests.outcome }}
          BACKEND_TYPECHECK: ${{ steps.backend_typecheck.outcome }}
          BACKEND_SMOKE: ${{ steps.backend_smoke.outcome }}
          MIGRATION_AUDIT: ${{ steps.migration_audit.outcome }}
          RECONCILIATION_TOOLS: ${{ steps.reconciliation_tools.outcome }}
          RECONCILE_EXIT: ${{ steps.migration_hashes.outputs.reconcile_exit }}
        shell: bash
        run: |
          set -euo pipefail
          test "$ROOT_TESTS" = "success"
          test "$BACKEND_TYPECHECK" = "success"
          test "$BACKEND_SMOKE" = "success"
          test "$MIGRATION_AUDIT" = "success"
          test "$RECONCILIATION_TOOLS" = "success"
          test "${RECONCILE_EXIT:-0}" -eq 0

      - name: Upload final reconciliation evidence and check logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-migration-reconciliation-final
          path: |
            /tmp/live-migration-reconciliation-startup.log
            /tmp/clean-replay-schema-first.json
            /tmp/root-tests.log
            /tmp/backend-typecheck.log
            /tmp/backend-smoke.log
            /tmp/migration-audit.log
            /tmp/reconciliation-tools.log
            docs/operations/evidence/live-migration-reconciliation-v1/
          if-no-files-found: warn
          retention-days: 30

      - name: Stop disposable stack
        if: always()
        run: npx supabase stop --workdir backend --no-backup || true
