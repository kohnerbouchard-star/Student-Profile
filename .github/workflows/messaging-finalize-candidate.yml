name: Messaging Finalize Validated Candidate

on:
  push:
    branches:
      - agent/messaging-communication-v1
    paths:
      - .github/workflows/messaging-finalize-candidate.yml

permissions:
  contents: write
  statuses: write

concurrency:
  group: messaging-finalize-validated-candidate
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out transport head
        uses: actions/checkout@v7
        with:
          ref: agent/messaging-communication-v1
          fetch-depth: 0
          persist-credentials: true

      - name: Materialize exact validated candidate
        id: finalize
        continue-on-error: true
        shell: bash
        env:
          BASE_COMMIT: f7dd92cea9731f009694453eb1c36adcf7b1fc1f
          EXPECTED_TREE: 92ff12de29f6e49a98cf74dd2b6e8371621a0664
          PATCH_B64_SHA256: 9e3eb8fc100fb81f4e7758eb7c3a96dc0b23d4a401a926e6a2fb05287c46ec7b
          PATCH_SHA256: 354fe1e011bf95abe918df3afdb5fb1c17b27d7c404d2dbd0c4af1166e4590ee
          TARGET_BRANCH: agent/messaging-communication-v1
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git cat-file -e "$BASE_COMMIT^{commit}"

          cat .github/messaging-final-patch/part-* > /tmp/messaging-final.patch.gz.b64
          echo "$PATCH_B64_SHA256  /tmp/messaging-final.patch.gz.b64" | sha256sum --check --strict
          base64 --decode /tmp/messaging-final.patch.gz.b64 | gzip --decompress > /tmp/messaging-final.patch
          echo "$PATCH_SHA256  /tmp/messaging-final.patch" | sha256sum --check --strict

          transport_head="$GITHUB_SHA"
          git reset --hard "$BASE_COMMIT"
          git apply --binary --index /tmp/messaging-final.patch
          git diff --cached --check

          actual_tree="$(git write-tree)"
          test "$actual_tree" = "$EXPECTED_TREE"

          final_commit="$(printf '%s\n\n%s\n' \
            'feat(messaging): harden converged communication release candidate' \
            'Additive shared integration, final migration namespace, exact participant reads, database-side search, cursor pagination, full-inbox unread accounting, transactional staging acceptance, independent zero-residue verification, and sanitized evidence handling.' \
            | git commit-tree "$actual_tree" -p "$BASE_COMMIT")"

          git reset --hard "$final_commit"
          test "$(git rev-parse HEAD^{tree})" = "$EXPECTED_TREE"
          test ! -e .github/messaging-final-patch
          test ! -e .github/workflows/messaging-finalize-candidate.yml
          test ! -e .github/workflows/messaging-final-bundle.yml
          git push --force-with-lease="refs/heads/$TARGET_BRANCH:$transport_head" origin "$final_commit:refs/heads/$TARGET_BRANCH"
          echo "final_commit=$final_commit" >> "$GITHUB_OUTPUT"

      - name: Publish finalization result
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const state = '${{ steps.finalize.outcome }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'messaging/finalize-validated-candidate',
              description: state === 'success'
                ? 'Validated Messaging release-candidate tree published'
                : 'Messaging candidate finalization failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Enforce finalization success
        if: steps.finalize.outcome != 'success'
        run: false
