name: PR295 Fix Release Contract Fixture

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/pr295-fix-release-contract-fixture.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.number == 295
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/production-integration-gate-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update release manifest fixture
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/release-platform.test.mjs')
          text = path.read_text(encoding='utf-8')
          old = '      sourceCommit: "a".repeat(40),\n      deterministicArchive: "gnu-tar+gzip-n",'
          new = '      sourceCommit: "a".repeat(40),\n      toolingCommit: "a".repeat(40),\n      deterministicArchive: "gnu-tar+gzip-n",'
          if text.count(old) != 1:
              raise SystemExit('Unexpected release fixture state')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          rm -f .github/workflows/pr295-fix-release-contract-fixture.yml
          git add -A
          git diff --cached --check
          git commit -m "test(release): bind tooling provenance in fixtures"
          git push origin HEAD:agent/production-integration-gate-v1
