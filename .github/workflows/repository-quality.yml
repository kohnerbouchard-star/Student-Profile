name: Repository Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.23.1"
          cache: npm

      - name: Pin npm
        run: npm install --global npm@10.9.8

      - name: Install pinned repository tooling
        run: npm ci

      - name: Verify repository package signatures
        continue-on-error: true
        run: npm audit signatures

      - name: Enforce dependency vulnerability threshold
        run: npm audit --audit-level=high

      - name: Run repository audit and source checks
        run: npm test

      - name: Install backend tooling
        run: npm --prefix backend ci

      - name: Verify backend package signatures
        continue-on-error: true
        working-directory: backend
        run: npm audit signatures

      - name: Audit backend dependencies
        run: npm --prefix backend audit --audit-level=high
