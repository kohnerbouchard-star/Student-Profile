name: Repository Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm

      - name: Pin npm
        run: npm install --global npm@10.9.8

      - name: Install pinned repository tooling
        run: npm ci

      - name: Verify repository package signatures
        continue-on-error: true
        run: npm audit signatures

      - name: Enforce dependency vulnerability threshold
        run: npm audit --audit-level=high

      - name: Scan committed source for credentials
        run: npm run security:secrets

      - name: Test supply-chain controls
        run: npm run test:supply-chain

      - name: Generate supply-chain SBOM bundle
        run: npm run security:sbom

      - name: Run repository audit and source checks
        id: repository-tests
        shell: bash
        run: |
          set +e
          npm test 2>&1 | tee "$RUNNER_TEMP/repository-quality.log"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          test "$status" -eq 0

      - name: Upload repository quality failure log
        if: failure() && steps.repository-tests.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: repository-quality-log
          path: ${{ runner.temp }}/repository-quality.log
          if-no-files-found: error
          retention-days: 7

      - name: Install backend tooling
        run: npm --prefix backend ci

      - name: Verify backend package signatures
        continue-on-error: true
        working-directory: backend
        run: npm audit signatures

      - name: Audit backend dependencies
        run: npm --prefix backend audit --audit-level=high

  finalize-market-roadmap:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/player-market-reconciliation-v1'
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Check out market branch
        uses: actions/checkout@v7
        with:
          ref: agent/player-market-reconciliation-v1
          fetch-depth: 0

      - name: Apply authoritative roadmap reconciliation
        run: node scripts/finalize-player-market-roadmap.mjs

      - name: Restore standard workflow and commit roadmap
        shell: bash
        run: |
          git fetch --no-tags origin main
          git show origin/main:.github/workflows/repository-quality.yml > .github/workflows/repository-quality.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && { echo "No roadmap reconciliation changes were produced."; false; }
          git commit -m "docs: reconcile completed player market tranche"
          git push origin HEAD:agent/player-market-reconciliation-v1
