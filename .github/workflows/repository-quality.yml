name: Repository Quality

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: seed-pr163-final-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  synchronize-seed-pr163:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.number == 163 &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       github.event.pull_request.head.ref == 'agent/seed-content-foundation-v1')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SEED_SOURCE_HEAD: 74bcac12127244f232c563b4b018703b53cab4ff
    steps:
      - name: Check out permanent seed branch
        uses: actions/checkout@v7
        with:
          ref: agent/seed-content-foundation-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge current main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-edit --no-ff origin/main

      - name: Restore canonical seed-owned files
        shell: bash
        run: |
          set -euo pipefail
          MERGE_BASE="$(git merge-base "$SEED_SOURCE_HEAD" origin/main)"
          git diff --name-only -z "$MERGE_BASE" "$SEED_SOURCE_HEAD" > /tmp/seed-owned-paths.zlist
          while IFS= read -r -d '' path; do
            case "$path" in
              package.json|.github/workflows/repository-quality.yml|.github/workflows/seed-pr163-reconcile.yml)
                continue
                ;;
            esac
            if git cat-file -e "$SEED_SOURCE_HEAD:$path" 2>/dev/null; then
              git checkout "$SEED_SOURCE_HEAD" -- "$path"
            else
              git rm -f --ignore-unmatch -- "$path"
            fi
          done < /tmp/seed-owned-paths.zlist

      - name: Restore canonical workflows
        run: |
          set -euo pipefail
          git checkout origin/main -- .github/workflows/repository-quality.yml
          git rm -f --ignore-unmatch .github/workflows/seed-pr163-reconcile.yml

      - name: Synthesize additive seed package scripts
        shell: bash
        run: |
          set -euo pipefail
          git show "$SEED_SOURCE_HEAD:package.json" > /tmp/seed-package.json
          node <<'NODE'
          const fs = require('node:fs');
          const current = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const seed = JSON.parse(fs.readFileSync('/tmp/seed-package.json', 'utf8'));
          current.scripts ??= {};
          for (const [name, command] of Object.entries(seed.scripts ?? {})) {
            if (name.toLowerCase().includes('seed')) current.scripts[name] = command;
          }
          if (!current.scripts.audit.includes('audit:seed-content')) {
            current.scripts.audit += ' && npm run audit:seed-content';
          }
          fs.writeFileSync('package.json', `${JSON.stringify(current, null, 2)}\n`);
          NODE

      - name: Stage and validate synchronized diff
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --check

      - name: Commit synchronized tree
        run: |
          set -euo pipefail
          if ! git diff --cached --quiet; then
            git commit -m "chore(seed): finalize synchronized executable pack tree"
          fi

      - name: Verify synchronized tree
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-list --count HEAD..origin/main)" -eq 0
          test ! -e .github/workflows/seed-pr163-reconcile.yml
          cmp .github/workflows/repository-quality.yml <(git show origin/main:.github/workflows/repository-quality.yml)
          grep -q 'name: Seed Executable Beta Pack' .github/workflows/seed-executable-beta-pack.yml
          node -e "const p=require('./package.json'); if(!p.scripts['seed:beta:validate']) process.exit(1)"
          git diff --check

      - name: Publish synchronized permanent head
        run: git push origin HEAD:agent/seed-content-foundation-v1
