name: Repository Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repository-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-banking-roadmap-baseline:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/banking-ledger-roadmap-evidence-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out evidence branch
        uses: actions/checkout@v7
        with:
          ref: agent/banking-ledger-roadmap-evidence-v1
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"

      - name: Update synchronized baseline
        run: node scripts/update-banking-roadmap-baseline-v1.mjs

      - name: Validate baseline
        run: grep -Fq 'Current audited main baseline:** `249fc53a23ad23058d376e4e394524af0bdee265`' docs/roadmaps/econovaria-beta-completion-roadmap-v1.md

      - name: Publish validated roadmap content
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: agent/banking-ledger-roadmap-evidence-v1
          ROADMAP_PATH: docs/roadmaps/econovaria-beta-completion-roadmap-v1.md
        shell: bash
        run: |
          blob_sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${ROADMAP_PATH}?ref=${TARGET_BRANCH}" --jq .sha)"
          content="$(base64 -w 0 "${ROADMAP_PATH}")"
          gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${ROADMAP_PATH}" \
            -f message='docs(roadmap): synchronize Banking evidence baseline' \
            -f branch="${TARGET_BRANCH}" \
            -f sha="${blob_sha}" \
            -f content="${content}" \
            --silent

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm

      - name: Pin npm
        run: npm install --global npm@10.9.8

      - name: Install pinned repository tooling
        run: npm ci

      - name: Verify repository package signatures
        continue-on-error: true
        run: npm audit signatures

      - name: Enforce dependency vulnerability threshold
        run: npm audit --audit-level=high

      - name: Run repository audit and source checks
        id: repository-tests
        shell: bash
        run: |
          set +e
          npm test 2>&1 | tee "$RUNNER_TEMP/repository-quality.log"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          test "$status" -eq 0

      - name: Upload repository quality failure log
        if: failure() && steps.repository-tests.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: repository-quality-log
          path: ${{ runner.temp }}/repository-quality.log
          if-no-files-found: error
          retention-days: 7

      - name: Install backend tooling
        run: npm --prefix backend ci

      - name: Verify backend package signatures
        continue-on-error: true
        working-directory: backend
        run: npm audit signatures

      - name: Audit backend dependencies
        run: npm --prefix backend audit --audit-level=high
