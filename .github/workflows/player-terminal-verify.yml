name: Player Terminal Verify

on:
  pull_request:
    paths:
      - "player-terminal/**"
      - "frontend/src/core/runtime-config.js"
      - "docs/operations/environments/runtime-config.env.template.js"
      - "scripts/runtime-config-contract.test.mjs"
      - "scripts/environment-neutral-browser-integration.test.mjs"
      - ".github/workflows/player-terminal-verify.yml"
  push:
    branches:
      - main
    paths:
      - "player-terminal/**"
      - "frontend/src/core/runtime-config.js"
      - "docs/operations/environments/runtime-config.env.template.js"
      - "scripts/runtime-config-contract.test.mjs"
      - "scripts/environment-neutral-browser-integration.test.mjs"
      - ".github/workflows/player-terminal-verify.yml"

permissions:
  contents: read

concurrency:
  group: player-terminal-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Enforce isolated pull-request scope
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        shell: bash
        run: |
          git fetch --no-tags origin "$BASE_REF"
          git diff --name-only "origin/$BASE_REF"...HEAD > /tmp/player-terminal-changed-files.txt

          if grep -q '^player-terminal/' /tmp/player-terminal-changed-files.txt; then
            unexpected="$(awk '
              $0 ~ /^player-terminal\// { next }
              $0 == ".github/workflows/player-terminal-verify.yml" { next }
              $0 == ".github/workflows/marketplace-preconvergence.yml" { next }
              $0 == ".github/workflows/environment-neutral-browser.yml" { next }
              $0 == ".github/workflows/admin-shell-smoke.yml" { next }
              $0 == ".github/workflows/admin-game-lifecycle-controls-v1.yml" { next }
              $0 == ".github/workflows/world-runtime.yml" { next }
              $0 == ".github/workflows/business-banking-runtime.yml" { next }
              $0 == ".github/workflows/crafting-item-runtime.yml" { next }
              $0 ~ /^admin\/(admin-auth|auth-session-manager|classroom-write-fallback|player-access-code-bridge)[.]js$/ { next }
              $0 ~ /^admin\/crafting-oversight-[A-Za-z0-9.-]+[.]js$/ { next }
              $0 == "admin/index.html" { next }
              $0 == "admin/inventory-redemption-queue-loader.js" { next }
              $0 == "admin/modal-accessibility.js" { next }
              $0 == "admin/modal-lifecycle-bridge.js" { next }
              $0 == "admin/player-create-ux.js" { next }
              $0 == "admin/scanner-auto-refresh.js" { next }
              $0 == "admin/interaction-quality-control-reset.js" { next }
              $0 == "admin/world-runtime-console.js" { next }
              $0 == "admin/world-runtime-console-loader.js" { next }
              $0 == "admin/css/crafting-oversight.css" { next }
              $0 == "admin/css/world-runtime-console.css" { next }
              $0 ~ /^auth\/reset-password[.](html|js)$/ { next }
              $0 == "docs/operations/environments/runtime-config.env.template.js" { next }
              $0 ~ /^docs\/workstreams\/crafting-[A-Za-z0-9.-]+[.]md$/ { next }
              $0 == "frontend/src/core/runtime-config.js" { next }
              $0 == "scripts/admin-attendance-action-smoke.mjs" { next }
              $0 == "scripts/admin-classroom-identity-fallback-smoke.mjs" { next }
              $0 == "scripts/admin-player-access-code-smoke.mjs" { next }
              $0 == "scripts/admin-session-manager-smoke.mjs" { next }
              $0 == "scripts/admin-shell-identity-smoke.mjs" { next }
              $0 == "scripts/admin-v606-full-drift-audit.mjs" { next }
              $0 == "scripts/admin-world-runtime-console-contract.mjs" { next }
              $0 == "scripts/admin-crafting-oversight-contract.mjs" { next }
              $0 == "scripts/admin-mounted-modal-focus-reconciled-smoke.mjs" { next }
              $0 == "scripts/build-physical-economy-runtime-pack.mjs" { next }
              $0 ~ /^scripts\/crafting-[A-Za-z0-9.-]+[.]mjs$/ { next }
              $0 ~ /^scripts\/lib\/physical-economy-pack-[A-Za-z0-9.-]+[.]mjs$/ { next }
              $0 == "scripts/simulate-physical-economy-balance.mjs" { next }
              $0 == "scripts/environment-neutral-browser-integration.test.mjs" { next }
              $0 == "scripts/runtime-config-contract.test.mjs" { next }
              $0 ~ /^scripts\/business-banking-[A-Za-z0-9.-]*[.]mjs$/ { next }
              $0 ~ /^(\.github\/workflows\/(database-replay|player-runtime-cutover-verify|repository-quality)[.]yml|docs\/audits\/remaining-cloudflare-api-url-v1[.]md|docs\/roadmaps\/econovaria-player-runtime-cutover-amendment-2026-07-19[.]md|frontend\/src\/core\/(api|constants|login)[.]js|index[.]html|package[.]json|scripts\/(apply-shared-game-timezone-ui-v1|fix-shared-game-timezone-smoke-v1|player-contracts-workspace-smoke|player-login-identity-smoke|player-terminal-runtime-cutover-smoke|shared-game-timezone-ui-smoke)[.]mjs)$/ { next }
              $0 == "backend/package.json" { next }
              $0 ~ /^admin\/(css\/marketplace-lifecycle[.]css|inventory-redemption-queue-loader[.]js|marketplace-lifecycle-(client|loader|surface)[.]js)$/ { next }
              $0 ~ /^backend\/src\/domains\/marketplace\/(api|contracts|infrastructure|tests)\/[A-Za-z0-9.-]*[.]ts$/ { next }
              $0 ~ /^backend\/supabase\/functions\/admin-api\/(index|marketplaceOperations([.]test)?)[.]ts$/ { next }
              $0 ~ /^backend\/supabase\/migrations\/2026072114(0000_add_marketplace_reference_scopes_v1|1000_add_player_marketplace_lifecycle_v2|2000_harden_marketplace_resolution_replay_v1|2500_add_marketplace_inventory_event_types_v1|2600_fix_marketplace_listing_item_lookup_v1|2700_fix_marketplace_listing_currency_lookup_v1|2800_restore_marketplace_listing_reservation_wrapper_v1|2900_fix_marketplace_listing_legacy_lookups_v1|3000_harden_marketplace_legacy_projection_conflicts_v1|3100_harden_marketplace_table_return_conflicts_v1)[.]sql$/ { next }
              $0 == "docs/operations/evidence/pr-249-player-marketplace-lifecycle.md" { next }
              $0 == "docs/roadmaps/active/player-marketplace-lifecycle-v1.md" { next }
              $0 == "docs/workstreams/marketplace-crafting-reservation-convergence-v1.md" { next }
              $0 ~ /^backend\/src\/domains\/(arrival|campaign|world)\// { next }
              $0 ~ /^backend\/src\/domains\/business-banking\/(api|contracts|domain|infrastructure)\/[A-Za-z0-9.-]*[.]ts$/ { next }
              $0 ~ /^backend\/src\/domains\/crafting\// { next }
              $0 ~ /^backend\/src\/domains\/inventory\/(api|contracts|domain|infrastructure|tests)\/[A-Za-z0-9.-]*[.]ts$/ { next }
              $0 ~ /^backend\/src\/domains\/notifications\/(api|contracts|infrastructure|services)\/[A-Za-z0-9.-]*[.]ts$/ { next }
              $0 ~ /^backend\/src\/domains\/game-dashboard\/(api\/playerGameDashboardHttpHandler([.]test)?[.]ts|contracts\/playerGameDashboardContracts[.]ts)$/ { next }
              $0 ~ /^backend\/src\/domains\/economy\/api\/playerBankingPublic[A-Za-z0-9.-]*[.]ts$/ { next }
              $0 == "backend/src/domains/economy/contracts/playerBankingPublicContracts.ts" { next }
              $0 ~ /^backend\/src\/domains\/economy\/infrastructure\/supabasePlayerBankingPublicRepository([.]test)?[.]ts$/ { next }
              $0 ~ /^backend\/src\/domains\/contracts\/api\/playerContractPublicList[A-Za-z0-9.-]*[.]ts$/ { next }
              $0 ~ /^backend\/src\/domains\/contracts\/api\/playerContractPublicSubmit[A-Za-z0-9.-]*[.]ts$/ { next }
              $0 ~ /^backend\/src\/domains\/contracts\/contracts\/playerContractPublicListContracts([.]test)?[.]ts$/ { next }
              $0 ~ /^backend\/src\/domains\/players\/contracts\/playerCapabilityManifestContracts([.]test)?[.]ts$/ { next }
              $0 == "backend/src/domains/players/api/playerCapabilityManifestHttpHandler.ts" { next }
              $0 == "backend/src/domains/players/api/playerCapabilityManifestHttpHandler.test.ts" { next }
              $0 ~ /^backend\/src\/domains\/stocks\/api\/playerStockMarket[A-Za-z0-9.-]*[.]ts$/ { next }
              $0 == "backend/src/domains/stocks/contracts/stockMarketTradingContracts.ts" { next }
              $0 ~ /^backend\/src\/domains\/store\/api\/playerStorePublic[A-Za-z0-9.-]*[.]ts$/ { next }
              $0 == "backend/src/domains/store/contracts/playerStorePublicContracts.ts" { next }
              $0 == "backend/src/domains/store/infrastructure/supabasePlayerStorePublicRepository.ts" { next }
              $0 ~ /^backend\/src\/domains\/store\/tests\/playerStore[A-Za-z0-9.-]*[.]ts$/ { next }
              $0 ~ /^backend\/src\/security\/playerCraftingRateLimitDispatch([.]test)?[.]ts$/ { next }
              $0 ~ /^backend\/supabase\/functions\/admin-api\/businessBankingOperations([.]test)?[.]ts$/ { next }
              $0 ~ /^backend\/supabase\/functions\/admin-api\/craftingOperations([.]test)?[.]ts$/ { next }
              $0 ~ /^backend\/supabase\/functions\/admin-api\/inventory(CraftingDispatch[.]test|RedemptionOperations(Core)?)[.]ts$/ { next }
              $0 == "backend/supabase/functions/admin-api/index.ts" { next }
              $0 == "backend/supabase/migrations/20260719150000_add_player_store_public_keys_v1.sql" { next }
              $0 ~ /^backend\/supabase\/migrations\/2026072110[0-8]000_/ { next }
              $0 ~ /^backend\/supabase\/migrations\/2026072112[0-9]{4}_[A-Za-z0-9_]+[.]sql$/ { next }
              $0 ~ /^backend\/supabase\/migrations\/2026072113[0-9]{4}_[A-Za-z0-9_]+[.]sql$/ { next }
              $0 == "backend/src/security/playerRateLimitDispatch.ts" { next }
              $0 == "backend/src/security/playerRateLimitDispatch.test.ts" { next }
              $0 == "backend/src/security/classroomApiRateLimitDispatch.test.ts" { next }
              $0 == "backend/supabase/functions/classroom-api/index.ts" { next }
              $0 == "backend/supabase/functions/admin-api/index.ts" { next }
              $0 ~ /^backend\/supabase\/functions\/admin-api\/(worldRuntimeOperations|campaignProgramRuntime|campaignWorkersRuntime)([.]test)?[.]ts$/ { next }
              $0 == "docs/operations/evidence/pr-244-player-story-delivery.md" { next }
              $0 == "docs/audits/player-market-reconciliation-v1.md" { next }
              $0 == "docs/roadmaps/active/player-market-reconciliation-v1.md" { next }
              $0 == "docs/roadmaps/econovaria-beta-completion-roadmap-v1.md" { next }
              $0 ~ /^scripts\/trigger-stock-market-tick([.]test)?[.]mjs$/ { next }
              { print }
            ' /tmp/player-terminal-changed-files.txt)"
          else
            unexpected="$(awk '
              $0 !~ /^\.github\/workflows\/[^/]+\.ya?ml$/ { print }
            ' /tmp/player-terminal-changed-files.txt)"
          fi

          if [ -n "$unexpected" ]; then
            echo "Player Terminal verification detected protected repository paths:"
            echo "$unexpected"
            false
          fi

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: player-terminal/package-lock.json

      - name: Install package dependencies
        working-directory: player-terminal
        run: npm ci --no-audit --no-fund

      - name: Verify standalone player terminal
        id: player-terminal-verify
        working-directory: player-terminal
        shell: bash
        run: |
          set +e
          npm run verify 2>&1 | tee "$RUNNER_TEMP/player-terminal-verify.log"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          test "$status" -eq 0

      - name: Install Chromium
        if: success()
        working-directory: player-terminal
        run: npx playwright install --with-deps chromium

      - name: Materialize browser-only runtime fixture
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p player-terminal/frontend/src/core
          cp frontend/src/core/runtime-config.js player-terminal/frontend/src/core/runtime-config.js
          cat > player-terminal/runtime-config.env.js <<'EOF'
          window.__ECONOVARIA_RUNTIME_CONFIG__ = Object.freeze({
            environment: "development",
            projectRef: "runtimefixture123456",
            supabaseUrl: "https://runtimefixture123456.supabase.co",
            supabasePublishableKey: "sb_publishable_runtime_fixture_1234567890"
          });
          EOF

      - name: Run Chromium browser verification
        if: success()
        id: player-terminal-browser
        working-directory: player-terminal
        shell: bash
        run: |
          set +e
          npm run browser 2>&1 | tee "$RUNNER_TEMP/player-terminal-browser.log"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          test "$status" -eq 0

      - name: Upload failed verification log
        if: failure() && steps.player-terminal-verify.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: player-terminal-verify-log
          path: ${{ runner.temp }}/player-terminal-verify.log
          if-no-files-found: error
          retention-days: 7

      - name: Upload failed browser artifacts
        if: failure() && steps.player-terminal-browser.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: player-terminal-browser-failure
          path: |
            ${{ runner.temp }}/player-terminal-browser.log
            player-terminal/playwright-report/
            player-terminal/test-results/
          if-no-files-found: warn
          retention-days: 7
