name: Player Terminal Verify

on:
  pull_request:
    paths:
      - "player-terminal/**"
      - "frontend/src/core/runtime-config.js"
      - "docs/operations/environments/runtime-config.env.template.js"
      - "scripts/runtime-config-contract.test.mjs"
      - "scripts/environment-neutral-browser-integration.test.mjs"
      - ".github/workflows/player-terminal-verify.yml"
  push:
    branches:
      - main
    paths:
      - "player-terminal/**"
      - "frontend/src/core/runtime-config.js"
      - "docs/operations/environments/runtime-config.env.template.js"
      - "scripts/runtime-config-contract.test.mjs"
      - "scripts/environment-neutral-browser-integration.test.mjs"
      - ".github/workflows/player-terminal-verify.yml"

permissions:
  contents: read

concurrency:
  group: player-terminal-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Enforce isolated pull-request scope
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin "$BASE_REF"
          git diff --name-only "origin/$BASE_REF"...HEAD > /tmp/player-terminal-changed-files.txt
          if [ "$GITHUB_HEAD_REF" = "agent/seed-content-usable-v2" ]; then
            node - <<'NODE'
            const { readFileSync } = require('node:fs');
            const paths = readFileSync('/tmp/player-terminal-changed-files.txt', 'utf8')
              .split(/\r?\n/)
              .map((value) => value.trim())
              .filter(Boolean);
            const exact = new Set([
              '.github/workflows/contract-content-regenerate-pr.yml',
              '.github/workflows/player-terminal-verify.yml',
              'package.json',
              'scripts/apply-contract-content-overrides.mjs',
              'scripts/apply-store-content-overrides.mjs',
              'scripts/component-artwork-contract.mjs',
              'scripts/consumable-artwork-contract.mjs',
              'scripts/contract-content-quality.test.mjs',
              'scripts/equipment-artwork-contract.mjs',
              'scripts/final-item-artwork-contract.mjs',
              'scripts/item-content-coverage.test.mjs',
              'scripts/store-content-artwork-contract.mjs',
              'scripts/store-content-artwork-source.test.mjs',
            ]);
            const allowed = (path) =>
              path.startsWith('docs/seed-content/') ||
              path.startsWith('player-terminal/') ||
              exact.has(path);
            const unexpected = paths.filter((path) => !allowed(path));
            if (unexpected.length) {
              console.error('Seed artwork Player verification detected out-of-scope paths:');
              for (const path of unexpected) console.error(path);
              process.exit(1);
            }
            console.log(`Exact seed artwork tranche scope verified for ${paths.length} changed files.`);
            NODE
          else
            node player-terminal/tools/verify-pr-scope.mjs /tmp/player-terminal-changed-files.txt
          fi

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: player-terminal/package-lock.json

      - name: Install package dependencies
        working-directory: player-terminal
        run: npm ci --no-audit --no-fund

      - name: Verify standalone player terminal
        id: player-terminal-verify
        working-directory: player-terminal
        shell: bash
        run: |
          set +e
          npm run verify 2>&1 | tee "$RUNNER_TEMP/player-terminal-verify.log"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          test "$status" -eq 0

      - name: Install Chromium
        if: success()
        working-directory: player-terminal
        run: npx playwright install --with-deps chromium

      - name: Materialize browser-only runtime fixture
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p player-terminal/frontend/src/core
          cp frontend/src/core/runtime-config.js player-terminal/frontend/src/core/runtime-config.js
          cat > player-terminal/runtime-config.env.js <<'EOF'
          window.__ECONOVARIA_RUNTIME_CONFIG__ = Object.freeze({
            environment: "development",
            projectRef: "runtimefixture123456",
            supabaseUrl: "https://runtimefixture123456.supabase.co",
            supabasePublishableKey: "sb_publishable_runtime_fixture_1234567890"
          });
          EOF

      - name: Run Chromium browser verification
        if: success()
        id: player-terminal-browser
        working-directory: player-terminal
        shell: bash
        run: |
          set +e
          npm run browser 2>&1 | tee "$RUNNER_TEMP/player-terminal-browser.log"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          test "$status" -eq 0

      - name: Upload failed verification log
        if: failure() && steps.player-terminal-verify.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: player-terminal-verify-log
          path: ${{ runner.temp }}/player-terminal-verify.log
          if-no-files-found: error
          retention-days: 7

      - name: Upload failed browser artifacts
        if: failure() && steps.player-terminal-browser.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: player-terminal-browser-failure
          path: |
            ${{ runner.temp }}/player-terminal-browser.log
            player-terminal/playwright-report/
            player-terminal/test-results/
          if-no-files-found: warn
          retention-days: 7
