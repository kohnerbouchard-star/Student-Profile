name: Player Terminal Verify

on:
  pull_request:
    paths:
      - "player-terminal/**"
      - ".github/workflows/player-terminal-verify.yml"
  push:
    branches:
      - main
    paths:
      - "player-terminal/**"
      - ".github/workflows/player-terminal-verify.yml"

permissions:
  contents: write

concurrency:
  group: player-terminal-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Enforce isolated pull-request scope
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        shell: bash
        run: |
          git fetch --no-tags origin "$BASE_REF"
          git diff --name-only "origin/$BASE_REF"...HEAD > /tmp/player-terminal-changed-files.txt

          if grep -q '^player-terminal/' /tmp/player-terminal-changed-files.txt; then
            unexpected="$(awk '
              $0 ~ /^player-terminal\// { next }
              $0 == ".github/workflows/player-terminal-verify.yml" { next }
              $0 == "backend/package.json" { next }
              $0 ~ /^backend\/src\/domains\/notifications\/(api|contracts|infrastructure|services)\/[A-Za-z0-9.-]*[.]ts$/ { next }
              $0 ~ /^backend\/src\/domains\/economy\/api\/playerBankingPublic[A-Za-z0-9.-]*[.]ts$/ { next }
              $0 ~ /^backend\/src\/domains\/economy\/contracts\/playerBankingPublicContracts[.]ts$/ { next }
              $0 ~ /^backend\/src\/domains\/economy\/infrastructure\/supabasePlayerBankingPublicRepository([.]test)?[.]ts$/ { next }
              $0 ~ /^backend\/src\/domains\/contracts\/api\/playerContractPublicList[A-Za-z0-9.-]*[.]ts$/ { next }
              $0 ~ /^backend\/src\/domains\/contracts\/api\/playerContractPublicSubmit[A-Za-z0-9.-]*[.]ts$/ { next }
              $0 ~ /^backend\/src\/domains\/contracts\/contracts\/playerContractPublicListContracts([.]test)?[.]ts$/ { next }
              $0 ~ /^backend\/src\/domains\/players\/contracts\/playerCapabilityManifestContracts([.]test)?[.]ts$/ { next }
              $0 ~ /^backend\/src\/domains\/store\/api\/playerStorePublic[A-Za-z0-9.-]*[.]ts$/ { next }
              $0 ~ /^backend\/src\/domains\/store\/contracts\/playerStorePublicContracts[.]ts$/ { next }
              $0 ~ /^backend\/src\/domains\/store\/infrastructure\/supabasePlayerStorePublicRepository[.]ts$/ { next }
              $0 ~ /^backend\/src\/domains\/store\/tests\/playerStore[A-Za-z0-9.-]*[.]ts$/ { next }
              $0 == "backend/supabase/migrations/20260719150000_add_player_store_public_keys_v1.sql" { next }
              $0 == "backend/src/security/playerRateLimitDispatch.ts" { next }
              $0 == "backend/src/security/playerRateLimitDispatch.test.ts" { next }
              $0 == "backend/src/security/classroomApiRateLimitDispatch.test.ts" { next }
              $0 == "backend/supabase/functions/classroom-api/index.ts" { next }
              { print }
            ' /tmp/player-terminal-changed-files.txt)"
          else
            unexpected="$(awk '
              $0 !~ /^\.github\/workflows\/[^/]+\.ya?ml$/ { print }
            ' /tmp/player-terminal-changed-files.txt)"
          fi

          if [ -n "$unexpected" ]; then
            echo "Player Terminal verification detected protected repository paths:"
            echo "$unexpected"
            false
          fi

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: player-terminal/package-lock.json

      - name: Install package dependencies
        working-directory: player-terminal
        run: npm ci --no-audit --no-fund

      - name: Verify standalone player terminal
        id: player-terminal-verify
        working-directory: player-terminal
        shell: bash
        run: |
          set +e
          npm run verify 2>&1 | tee "$RUNNER_TEMP/player-terminal-verify.log"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          test "$status" -eq 0

      - name: Install Chromium
        if: success()
        working-directory: player-terminal
        run: npx playwright install --with-deps chromium

      - name: Run Chromium browser verification
        if: success()
        id: player-terminal-browser
        working-directory: player-terminal
        shell: bash
        run: |
          set +e
          npm run browser 2>&1 | tee "$RUNNER_TEMP/player-terminal-browser.log"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          test "$status" -eq 0

      - name: Upload failed verification log
        if: failure() && steps.player-terminal-verify.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: player-terminal-verify-log
          path: ${{ runner.temp }}/player-terminal-verify.log
          if-no-files-found: error
          retention-days: 7

      - name: Upload failed browser artifacts
        if: failure() && steps.player-terminal-browser.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: player-terminal-browser-failure
          path: |
            ${{ runner.temp }}/player-terminal-browser.log
            player-terminal/playwright-report/
            player-terminal/test-results/
          if-no-files-found: warn
          retention-days: 7

  sync-player-banking-main:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/player-banking-public-read-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/player-banking-public-read-v1
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            player-terminal/package-lock.json
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Merge current main and resolve bounded overlap
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --no-tags origin main
          set +e
          git merge --no-commit --no-ff origin/main
          merge_status=$?
          set -e

          conflicts="$(git diff --name-only --diff-filter=U || true)"
          unexpected="$(printf '%s\n' "$conflicts" | grep -v -E '^(|player-terminal/src/api/backend-routes\.js|\.github/workflows/player-terminal-verify\.yml)$' || true)"
          if [ -n "$unexpected" ]; then
            echo "Unexpected merge conflicts:"
            echo "$unexpected"
            false
          fi

          git checkout origin/main -- player-terminal/src/api/backend-routes.js .github/workflows/player-terminal-verify.yml

          python3 <<'PY'
          from pathlib import Path

          route_path = Path('player-terminal/src/api/backend-routes.js')
          route = route_path.read_text()
          if 'notificationsPage:' not in route:
              raise SystemExit('notification page route was not preserved from main')
          banking_cursor = 'path: queryPath("/players/me/ledger", {\n      limit: payload.limit ?? 50,\n      cursor: payload.cursor,\n    }),' 
          if banking_cursor not in route:
              old = 'path: queryPath("/players/me/ledger", { limit: payload.limit ?? 50 }),' 
              if route.count(old) != 1:
                  raise SystemExit('unable to apply Banking cursor to reconciled route map')
              route = route.replace(old, banking_cursor, 1)
          route_path.write_text(route)

          workflow_path = Path('.github/workflows/player-terminal-verify.yml')
          workflow = workflow_path.read_text()
          notification_rule = '              $0 ~ /^backend\\/src\\/domains\\/notifications\\/(api|contracts|infrastructure|services)\\/[A-Za-z0-9.-]*[.]ts$/ { next }\n'
          banking_rules = (
              '              $0 ~ /^backend\\/src\\/domains\\/economy\\/api\\/playerBankingPublic[A-Za-z0-9.-]*[.]ts$/ { next }\n'
              '              $0 ~ /^backend\\/src\\/domains\\/economy\\/contracts\\/playerBankingPublicContracts[.]ts$/ { next }\n'
              '              $0 ~ /^backend\\/src\\/domains\\/economy\\/infrastructure\\/supabasePlayerBankingPublicRepository([.]test)?[.]ts$/ { next }\n'
          )
          if notification_rule not in workflow:
              raise SystemExit('notification scope allowance was not preserved from main')
          if banking_rules not in workflow:
              workflow = workflow.replace(notification_rule, notification_rule + banking_rules, 1)
          workflow_path.write_text(workflow)
          PY

          rm -f .github/workflows/sync-player-banking-main-v1.yml
          git add -A
          if [ "$merge_status" -ne 0 ] && git diff --name-only --diff-filter=U | grep -q .; then
            echo "Conflicts remain after bounded resolution."
            git diff --name-only --diff-filter=U
            false
          fi
          grep -R -n -E '^(<<<<<<<|=======|>>>>>>>)' player-terminal/src/api/backend-routes.js .github/workflows/player-terminal-verify.yml && false || true
      - name: Verify reconciled Backend boundaries
        working-directory: backend
        run: npm ci --no-audit --no-fund && npm run test:player-banking-public && npm run test:player-notifications && npm run typecheck
      - name: Verify reconciled Player boundaries
        working-directory: player-terminal
        run: npm ci --no-audit --no-fund && npm run banking-read && npm run notifications-inbox && npm run adapter && npm run connected-reads && npm run check
      - name: Publish merge commit
        shell: bash
        run: |
          git add -A
          git commit -m "merge: reconcile Banking with notification mainline"
          git push origin HEAD:agent/player-banking-public-read-v1
