name: Player Terminal Verify

on:
  pull_request:
    paths:
      - "player-terminal/**"
      - ".github/workflows/player-terminal-verify.yml"
  push:
    branches:
      - main
    paths:
      - "player-terminal/**"
      - ".github/workflows/player-terminal-verify.yml"

permissions:
  contents: read

concurrency:
  group: player-terminal-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce isolated player-terminal source branch scope
        if: >-
          github.event_name == 'pull_request' &&
          (startsWith(github.head_ref, 'frontend/player-terminal-') ||
          startsWith(github.head_ref, 'agent/player-terminal-v'))
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        shell: bash
        run: |
          git diff --name-only "$BASE_SHA"...HEAD > /tmp/player-terminal-changed-files.txt
          unexpected="$(awk '
            $0 !~ /^player-terminal\// &&
            $0 != ".github/workflows/player-terminal-verify.yml" { print }
          ' /tmp/player-terminal-changed-files.txt)"
          if [ -n "$unexpected" ]; then
            echo "Player Terminal PR changed protected repository paths:"
            echo "$unexpected"
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify standalone player terminal
        working-directory: player-terminal
        run: npm run verify
