name: Roadmap Comprehensive Re-audit v2

on:
  pull_request:
    paths:
      - ".github/workflows/roadmap-comprehensive-reaudit-v2.yml"
      - ".roadmap-reaudit/**"
      - "docs/roadmaps/econovaria-beta-completion-roadmap-v1.md"

permissions:
  contents: write

concurrency:
  group: roadmap-comprehensive-reaudit-v2
  cancel-in-progress: false

jobs:
  reconcile:
    if: github.head_ref == 'agent/roadmap-comprehensive-reaudit-v2'
    runs-on: ubuntu-latest
    steps:
      - name: Check out audit branch
        uses: actions/checkout@v7
        with:
          ref: agent/roadmap-comprehensive-reaudit-v2
          fetch-depth: 0

      - name: Apply beta and seed audit
        run: python3 .roadmap-reaudit/part1.py

      - name: Apply expansion, operations, and scoreboard audit
        run: python3 .roadmap-reaudit/part2.py

      - name: Validate comprehensive roadmap state
        run: python3 .roadmap-reaudit/validate.py

      - name: Validate patch formatting
        run: git diff --check

      - name: Remove one-use audit files and commit roadmap
        shell: bash
        run: |
          rm -rf .roadmap-reaudit
          rm .github/workflows/roadmap-comprehensive-reaudit-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(roadmap): apply comprehensive progress re-audit"
          git push origin HEAD:agent/roadmap-comprehensive-reaudit-v2
