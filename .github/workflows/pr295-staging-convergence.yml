name: PR295 Exact Artifact Staging Convergence

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/pr295-staging-convergence.yml"

permissions:
  contents: read
  actions: read

concurrency:
  group: pr295-exact-artifact-staging-convergence
  cancel-in-progress: false

jobs:
  converge:
    if: github.event.pull_request.number == 295
    name: Apply exact migrations and deploy exact Edge artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: staging
    env:
      RELEASE_COMMIT: 623b82e004ea8446f6358c7ae4cc7ab4f6ec340d
      SOURCE_RUN_ID: "29994325542"
      SOURCE_ARTIFACT_ID: "8558309964"
      EXPECTED_ARTIFACT_SET_SHA256: 95b50f909e9b83b89d60d78539eb03fe5eb01bd9abc6e3985f0e3fb187bd1727
      EXPECTED_MANIFEST_SHA256: 74c00a69804cab21fa2da7a7af96b7017a17706de62551ad861c3040803d670d
      EXPECTED_STAGING_PROJECT_REF: eecvbssdvarfcykcfrny
      PRODUCTION_PROJECT_REF: cgiukdjwicykrmtkhudh
      EXPECTED_PRE_COUNT: "136"
      EXPECTED_PRE_HEAD: "20260723061659"
      EXPECTED_PRE_DIGEST: 99afdbef408c9ab0fcab510f540bd9477e3ca0eb4706ed5545ff3c59f772742e
      EXPECTED_POST_COUNT: "140"
      EXPECTED_POST_HEAD: "20260723061659"
      EXPECTED_POST_DIGEST: 1a318610e798f9c8a8d200282c42d65696c507ab51141398636dacf8b7cc80eb
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Check out exact merged-main source
        uses: actions/checkout@v7
        with:
          ref: 623b82e004ea8446f6358c7ae4cc7ab4f6ec340d
          fetch-depth: 0
          persist-credentials: false

      - name: Enforce source and project boundaries
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$RELEASE_COMMIT"
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_REF"
          test -n "$SUPABASE_DB_PASSWORD"
          test "$SUPABASE_PROJECT_REF" = "$EXPECTED_STAGING_PROJECT_REF"
          test "$SUPABASE_PROJECT_REF" != "$PRODUCTION_PROJECT_REF"
          [[ "$SUPABASE_PROJECT_REF" =~ ^[a-z0-9]{20}$ ]]

      - name: Download exact immutable artifact by run and artifact ID
        uses: actions/download-artifact@v4
        with:
          artifact-ids: 8558309964
          run-id: 29994325542
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: dist/release

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm

      - name: Pin npm and install release tooling
        shell: bash
        run: |
          set -euo pipefail
          npm install --global npm@10.9.8
          npm ci

      - name: Validate immutable artifact and fixed identities
        shell: bash
        run: |
          set -euo pipefail
          test "$(sha256sum dist/release/release-manifest.json | awk '{print $1}')" = "$EXPECTED_MANIFEST_SHA256"
          (
            cd dist/release
            sha256sum --check checksums.sha256
          )
          npm run release:validate -- \
            --manifest dist/release/release-manifest.json \
            --artifact-root dist/release \
            --expected-commit "$RELEASE_COMMIT"
          node - <<'NODE'
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync('dist/release/release-manifest.json', 'utf8'));
          const expectedFunctions = [
            'admin-api',
            'classroom-api',
            'stock-market-player-read',
            'stock-market-read',
            'stock-market-runner',
            'stock-market-seed-copy',
            'stock-market-trading',
          ];
          const actualFunctions = manifest.artifacts
            .filter((artifact) => artifact.kind === 'edge-function')
            .map((artifact) => artifact.name)
            .sort();
          if (manifest.source.commit !== process.env.RELEASE_COMMIT) throw new Error('Release source mismatch');
          if (manifest.artifactSetSha256 !== process.env.EXPECTED_ARTIFACT_SET_SHA256) throw new Error('Artifact-set mismatch');
          if (manifest.migrations.count !== 131 || manifest.migrations.head !== '20260721163000') throw new Error('Canonical migration identity mismatch');
          if (manifest.migrations.versionSetSha256 !== '145d443670547d794c2e9e31b452a58338b784540eff64393cf2ad2d312193f3') throw new Error('Canonical migration digest mismatch');
          if (JSON.stringify(actualFunctions) !== JSON.stringify(expectedFunctions)) throw new Error('Edge Function inventory mismatch');
          if (manifest.environmentNeutrality?.status !== 'pass') throw new Error('Environment-neutrality did not pass');
          NODE

      - name: Install pinned Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.81.3

      - name: Link exact isolated staging database
        shell: bash
        run: |
          set -euo pipefail
          cp backend/supabase/config.next.toml backend/supabase/config.toml
          (
            cd backend
            supabase --yes link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          )
          test -s backend/supabase/.temp/pooler-url
          pooler_url="$(tr -d '\r\n' < backend/supabase/.temp/pooler-url)"
          case "$pooler_url" in
            "postgresql://postgres.${SUPABASE_PROJECT_REF}@"*":5432/postgres") ;;
            *) echo 'Linked pooler identity is invalid.' >&2; exit 1 ;;
          esac
          echo "POOLER_URL=$pooler_url" >> "$GITHUB_ENV"
          echo "PGPASSWORD=$SUPABASE_DB_PASSWORD" >> "$GITHUB_ENV"
          echo "PGSSLMODE=require" >> "$GITHUB_ENV"

      - name: Verify exact pre-convergence staging ledger
        shell: bash
        run: |
          set -euo pipefail
          read -r count head digest progression_count < <(
            psql "$POOLER_URL" -X -qAt -F ' ' -v ON_ERROR_STOP=1 -c "
              select count(*)::int,
                     max(version),
                     encode(extensions.digest(string_agg(version, E'\\n' order by version) || E'\\n', 'sha256'), 'hex'),
                     count(*) filter (where version in ('20260721160000','20260721161000','20260721162000','20260721163000'))
              from supabase_migrations.schema_migrations
            "
          )
          test "$count" = "$EXPECTED_PRE_COUNT"
          test "$head" = "$EXPECTED_PRE_HEAD"
          test "$digest" = "$EXPECTED_PRE_DIGEST"
          test "$progression_count" = "0"

      - name: Build atomic Progression schema and ledger transaction
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          migrations = [
              ('20260721160000', 'add_progression_reputation_runtime_v1'),
              ('20260721161000', 'fix_progression_read_volatility_v1'),
              ('20260721162000', 'harden_progression_event_idempotency_v1'),
              ('20260721163000', 'rebalance_progression_curve_v1'),
          ]
          output = [r'\set ON_ERROR_STOP on', 'begin;']
          ledger = []
          for version, name in migrations:
              path = Path('backend/supabase/migrations') / f'{version}_{name}.sql'
              original = path.read_text(encoding='utf-8')
              lines = original.splitlines()
              while lines and not lines[0].strip(): lines.pop(0)
              while lines and not lines[-1].strip(): lines.pop()
              if lines[0].strip().lower() != 'begin;' or lines[-1].strip().lower() != 'commit;':
                  raise SystemExit(f'Unexpected transaction wrapper: {path}')
              output.append(f'-- {path.name}')
              output.extend(lines[1:-1])
              tag = 'econovaria_progression_ledger'
              while f'${tag}$' in original:
                  tag += '_x'
              quoted_name = name.replace("'", "''")
              ledger.append(
                  "insert into supabase_migrations.schema_migrations(version,name,statements) "
                  f"values ('{version}','{quoted_name}',array[${tag}${original}${tag}$]);"
              )
          output.extend(ledger)
          output.append('commit;')
          Path('/tmp/pr295-apply-progression.sql').write_text('\n'.join(output) + '\n', encoding='utf-8')
          PY
          test -s /tmp/pr295-apply-progression.sql

      - name: Apply exact Progression migrations and ledger atomically
        shell: bash
        run: |
          set -euo pipefail
          psql "$POOLER_URL" -X -v ON_ERROR_STOP=1 -f /tmp/pr295-apply-progression.sql

      - name: Verify post-convergence staging ledger and runtime
        shell: bash
        run: |
          set -euo pipefail
          read -r count head digest progression_count < <(
            psql "$POOLER_URL" -X -qAt -F ' ' -v ON_ERROR_STOP=1 -c "
              select count(*)::int,
                     max(version),
                     encode(extensions.digest(string_agg(version, E'\\n' order by version) || E'\\n', 'sha256'), 'hex'),
                     count(*) filter (where version in ('20260721160000','20260721161000','20260721162000','20260721163000'))
              from supabase_migrations.schema_migrations
            "
          )
          test "$count" = "$EXPECTED_POST_COUNT"
          test "$head" = "$EXPECTED_POST_HEAD"
          test "$digest" = "$EXPECTED_POST_DIGEST"
          test "$progression_count" = "4"
          psql "$POOLER_URL" -X -qAt -v ON_ERROR_STOP=1 <<'SQL' > /tmp/progression-runtime-state.txt
          select
            to_regprocedure('public.read_player_progression_v1(uuid,uuid)') is not null,
            to_regprocedure('public.read_public_player_progression_profile_v1(uuid,text)') is not null,
            to_regprocedure('public.record_progression_integration_event_v1(uuid,uuid,text,text,text,text,timestamptz)') is not null,
            to_regprocedure('public.apply_admin_progression_correction_atomic_v1(uuid,uuid,text,text,numeric,text,text,text,text)') is not null;
          SQL
          test "$(tr -d '[:space:]' < /tmp/progression-runtime-state.txt)" = "t|t|t|t"

      - name: Extract and deploy exact Edge Function artifacts
        shell: bash
        run: |
          set -euo pipefail
          functions=(
            admin-api
            classroom-api
            stock-market-player-read
            stock-market-read
            stock-market-runner
            stock-market-seed-copy
            stock-market-trading
          )
          for function_name in "${functions[@]}"; do
            root="/tmp/pr295-deploy-${function_name}"
            rm -rf "$root"
            mkdir -p "$root"
            tar -xzf "dist/release/artifacts/edge-${function_name}.tar.gz" -C "$root"
            test -f "$root/backend/supabase/functions/${function_name}/index.ts"
            cp backend/supabase/config.next.toml "$root/backend/supabase/config.toml"
            printf '\n[functions.%s]\nverify_jwt = true\n' "$function_name" >> "$root/backend/supabase/config.toml"
            (
              cd "$root/backend"
              supabase functions deploy "$function_name" --project-ref "$SUPABASE_PROJECT_REF" --use-api
            )
          done

      - name: Record staging convergence identity
        shell: bash
        run: |
          {
            echo '## PR #295 exact-artifact staging convergence'
            echo "- Release source: \`$RELEASE_COMMIT\`"
            echo "- Source workflow run: \`$SOURCE_RUN_ID\`"
            echo "- Source artifact ID: \`$SOURCE_ARTIFACT_ID\`"
            echo "- Artifact-set SHA-256: \`$EXPECTED_ARTIFACT_SET_SHA256\`"
            echo "- Staging project: \`$SUPABASE_PROJECT_REF\`"
            echo "- Migration ledger: \`$EXPECTED_POST_COUNT / $EXPECTED_POST_HEAD / $EXPECTED_POST_DIGEST\`"
            echo '- Progression migrations applied: `4`'
            echo '- Exact Edge Function artifacts deployed: `7`'
            echo '- Function JWT verification requested: `true`'
            echo '- Artifact rebuilt during deployment: `false`'
            echo '- Production project selected: `false`'
          } >> "$GITHUB_STEP_SUMMARY"
