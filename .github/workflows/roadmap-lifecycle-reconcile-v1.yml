name: Roadmap Lifecycle Reconciliation

on:
  push:
    branches:
      - agent/roadmap-lifecycle-reconciliation-v1
    paths:
      - .github/workflows/roadmap-lifecycle-reconcile-v1.yml

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - name: Check out reconciliation branch
        uses: actions/checkout@v7
        with:
          ref: agent/roadmap-lifecycle-reconciliation-v1
          fetch-depth: 0

      - name: Reconcile authoritative roadmap
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('docs/roadmaps/econovaria-beta-completion-roadmap-v1.md')
          text = path.read_text(encoding='utf-8')

          replacements = {
              '**Current audited main baseline:** `249fc53a23ad23058d376e4e394524af0bdee265`':
                  '**Current audited main baseline:** `ece5876b0dfc79458afb5b5aaa9266b9884ecbcb`',
              '| Admin explicit request lifecycle | `VERIFIED_COMPLETE` | PR #168 merged as `1d487afc766146b5e3e19f718252b3eff9a1168e` |':
                  '| Admin explicit request lifecycle | `VERIFIED_COMPLETE` | PR #168 merged as `1d487afc766146b5e3e19f718252b3eff9a1168e` |\n| Admin game lifecycle and emergency mutation controls | `VERIFIED_COMPLETE` | PR #229 merged as `ece5876b0dfc79458afb5b5aaa9266b9884ecbcb` |',
              '- [ ] `BETA-ADMIN-009` Add emergency game mutation pause/resume controls.':
                  '- [x] `BETA-ADMIN-009` Add emergency game mutation pause/resume controls. `VERIFIED_COMPLETE` through PR #229 merged as `ece5876b0dfc79458afb5b5aaa9266b9884ecbcb`; owner-scoped lifecycle reads and row-locked, idempotent transitions gate ordinary game mutations across draft, active, paused, ended, archived, and unknown states.',
              '- [ ] `BETA-ADMIN-010` Verify start, pause, resume, end, archive, session revoke, and join-code reset lifecycle.':
                  '- [x] `BETA-ADMIN-010` Verify start, pause, resume, end, archive, session revoke, and join-code reset lifecycle. `VERIFIED_COMPLETE` through PR #229 merged as `ece5876b0dfc79458afb5b5aaa9266b9884ecbcb`; final head `9f7cbab6f718215ec748ee4e78c0dde12a56da0d` passed Admin Game Lifecycle Controls #15, Admin Shell Smoke #875 with all 89 stages, Backend Typecheck #1229, Database Replay #321, Repository Quality #979, Admin API Check #711, Admin Bundle Contract Audit #571, Staging Readiness Preflight #74, Exchange Calendar Runtime #185, and Required Game Market Timezone #206.',
              '- [ ] Game lifecycle start, pause, resume, end, archive, and session revoke.':
                  '- [x] Game lifecycle start, pause, resume, end, archive, and session revoke. Merged through PR #229.',
              '- [ ] Emergency economic mutation pause.':
                  '- [x] Emergency economic mutation pause. Merged through PR #229; isolated-staging connected verification remains part of the release gate.',
          }

          for old, new in replacements.items():
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'Expected exactly one roadmap occurrence for {old!r}; found {count}.')
              text = text.replace(old, new, 1)

          marker = '### Current release condition\n'
          if text.count(marker) != 1:
              raise SystemExit(f'Expected one current release condition marker; found {text.count(marker)}.')
          reconciliation = (
              '### 2026-07-20 game-lifecycle reconciliation\n\n'
              '- PR #229 merged authoritative Admin game lifecycle controls as `ece5876b0dfc79458afb5b5aaa9266b9884ecbcb`.\n'
              '- Final head `9f7cbab6f718215ec748ee4e78c0dde12a56da0d` passed all ten final-head workflows, including the dedicated lifecycle suite, the complete 89-stage Admin Shell, Backend Typecheck, Database Replay, Repository Quality, Admin API Check, Admin Bundle Contract Audit, Staging Readiness Preflight, Exchange Calendar Runtime, and Required Game Market Timezone.\n'
              '- `BETA-ADMIN-009` and `BETA-ADMIN-010` are repository-verified complete. Connected isolated-staging lifecycle verification remains under `BETA-ADMIN-007` and the release gates; it does not reopen the merged implementation items.\n\n'
          )
          text = text.replace(marker, reconciliation + marker, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Remove one-use workflow and commit reconciliation
        shell: bash
        run: |
          rm .github/workflows/roadmap-lifecycle-reconcile-v1.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/roadmaps/econovaria-beta-completion-roadmap-v1.md .github/workflows/roadmap-lifecycle-reconcile-v1.yml
          git commit -m "docs(roadmap): verify merged game lifecycle"
          git push origin HEAD:agent/roadmap-lifecycle-reconciliation-v1
