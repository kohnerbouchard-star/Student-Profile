name: Equipment Artwork Import PR

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/equipment-artwork-import-pr.yml"
      - "docs/seed-content/items/.equipment-artwork-download-v2.json"
      - "docs/seed-content/items/equipment-artwork-source-v2.json"
      - "scripts/equipment-artwork-contract.mjs"

permissions:
  contents: write

concurrency:
  group: equipment-artwork-import-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  import-equipment:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/seed-content-usable-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out exact PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deterministic image tooling
        run: python -m pip install --disable-pip-version-check pillow==11.3.0

      - name: Import and optimize equipment artwork
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import io
          import json
          import pathlib
          import urllib.request
          from PIL import Image, ImageOps

          root = pathlib.Path.cwd()
          manifest_path = root / 'docs/seed-content/items/equipment-artwork-source-v2.json'
          download_path = root / 'docs/seed-content/items/.equipment-artwork-download-v2.json'
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          downloads = json.loads(download_path.read_text(encoding='utf-8'))
          url_by_creation = {entry['creationIdentifier']: entry['url'] for entry in downloads['records']}

          if len(manifest['records']) != 30 or len(url_by_creation) != 30:
              raise SystemExit('Expected exactly 30 equipment artwork records and download URLs.')
          if set(url_by_creation) != {entry['creationIdentifier'] for entry in manifest['records']}:
              raise SystemExit('Equipment download coverage does not match the artwork manifest.')

          imported = 0
          for record in manifest['records']:
              relative_path = pathlib.Path('player-terminal/assets/images/items/equipment') / record['country'] / f"{record['itemKey']}.webp"
              output_path = root / relative_path
              request = urllib.request.Request(
                  url_by_creation[record['creationIdentifier']],
                  headers={'User-Agent': 'Econovaria-Equipment-Asset-Importer/2.0'},
              )
              with urllib.request.urlopen(request, timeout=120) as response:
                  source = response.read()
              with Image.open(io.BytesIO(source)) as original:
                  image = ImageOps.exif_transpose(original).convert('RGB')
                  image = ImageOps.fit(image, (1024, 1024), method=Image.Resampling.LANCZOS, centering=(0.5, 0.5))
                  output_path.parent.mkdir(parents=True, exist_ok=True)
                  image.save(output_path, format='WEBP', quality=86, method=6)

              data = output_path.read_bytes()
              record.update({
                  'runtimeImagePath': relative_path.as_posix(),
                  'assetStatus': 'repository-owned',
                  'sha256': hashlib.sha256(data).hexdigest(),
                  'bytes': len(data),
                  'width': 1024,
                  'height': 1024,
                  'mediaType': 'image/webp',
              })
              imported += 1

          manifest['runtimeDelivery'] = {
              'binaryFilesCommitted': True,
              'runtimeImagePathsAvailable': True,
              'newBinaryCount': 30,
              'reason': 'Thirty optimized equipment WebPs are repository-owned and bound one-to-one to equipment identities.',
              'sourceResolution': '2048x2048',
              'runtimeResolution': '1024x1024',
              'runtimeMediaType': 'image/webp',
          }
          manifest_path.write_text(json.dumps(manifest, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')
          print(json.dumps({'imported': imported, 'records': len(manifest['records'])}, indent=2))
          PY

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"

      - name: Validate equipment assets and full item copy
        run: |
          node scripts/equipment-artwork-contract.mjs
          node scripts/component-artwork-contract.mjs
          node scripts/store-content-artwork-contract.mjs
          node --test scripts/item-content-coverage.test.mjs

      - name: Commit equipment assets and manifest
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            player-terminal/assets/images/items/equipment \
            docs/seed-content/items/equipment-artwork-source-v2.json
          if git diff --cached --quiet; then
            echo "Equipment assets are already current."
            exit 0
          fi
          git commit -m "seed: import equipment artwork assets"
          git push origin "HEAD:${{ github.head_ref }}"
