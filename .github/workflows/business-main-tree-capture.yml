name: Business Main Tree Capture

on:
  push:
    branches:
      - agent/business-banking-credit-v1
    paths:
      - ".github/workflows/business-main-tree-capture.yml"

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out Business branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Publish merged main tree identity to branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          main_commit="$(git rev-parse origin/main)"
          main_tree="$(git rev-parse 'origin/main^{tree}')"
          content="$(printf 'main_commit=%s\nmain_tree=%s\ncapture_head=%s\n' "$main_commit" "$main_tree" "$GITHUB_SHA" | base64 -w0)"
          gh api "repos/${GITHUB_REPOSITORY}/contents/.business-main-tree-identity" \
            --method PUT \
            --field message="ci(business): record exact merged main tree identity" \
            --field branch="agent/business-banking-credit-v1" \
            --field content="$content"
