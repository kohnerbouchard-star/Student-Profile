name: Business Main Tree Capture

on:
  push:
    branches:
      - agent/business-banking-credit-v1
    paths:
      - ".github/workflows/business-main-tree-capture.yml"

permissions:
  contents: read
  issues: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out Business branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Publish merged main tree identity
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          main_commit="$(git rev-parse origin/main)"
          main_tree="$(git rev-parse 'origin/main^{tree}')"
          gh api "repos/${GITHUB_REPOSITORY}/issues/299/comments" \
            --method POST \
            --field body="BUSINESS_MAIN_TREE_IDENTITY main_commit=${main_commit} main_tree=${main_tree} capture_head=${GITHUB_SHA}"
