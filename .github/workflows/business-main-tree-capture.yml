name: Business Post-World Merge Executor

on:
  push:
    branches:
      - agent/business-banking-credit-v1
    paths:
      - ".github/workflows/business-main-tree-capture.yml"

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out existing Business branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Execute validated post-World merge
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/business-post-world-merge.sh
