name: Seed Core Content Coverage

on:
  push:
    branches:
      - agent/seed-content-foundation-v1
    paths:
      - package.json
      - scripts/seed-core-content-coverage-audit.mjs
      - docs/seed-content/contracts/**
      - docs/seed-content/banking/**
      - docs/seed-content/progression/**
      - docs/seed-content/events/**
      - docs/seed-content/interactions/**
      - docs/seed-content/news/**
      - docs/seed-content/tutorials/**
      - docs/seed-content/notifications/**
      - .github/workflows/seed-core-content-coverage.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: seed-core-content-coverage-${{ github.ref }}
  cancel-in-progress: false

jobs:
  audit:
    name: Record machine-readable content coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out seed authority branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/seed-content-foundation-v1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.23.1

      - name: Generate coverage evidence
        run: node scripts/seed-core-content-coverage-audit.mjs

      - name: Verify deterministic evidence
        run: npm run audit:seed-content-core-coverage

      - name: Validate generated diff
        run: git diff --check

      - name: Commit coverage evidence
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/seed-content/reviews/core-content-coverage-audit-v1.json docs/seed-content/reviews/core-content-coverage-audit-v1.md
          if git diff --cached --quiet; then
            echo "Core-content coverage evidence is current."
          else
            git commit -m "docs(seed): record core content coverage gaps [skip ci]"
            git push origin HEAD:agent/seed-content-foundation-v1
          fi
