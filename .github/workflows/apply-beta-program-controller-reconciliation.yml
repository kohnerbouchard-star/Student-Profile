name: Apply Beta Program Controller Reconciliation

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: beta-program-controller-reconciliation
  cancel-in-progress: false

jobs:
  apply:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'docs/beta-program-controller-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out controller branch
        uses: actions/checkout@v7
        with:
          ref: docs/beta-program-controller-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply authoritative roadmap reconciliation
        shell: bash
        run: |
          set -euo pipefail
          git pull --ff-only origin docs/beta-program-controller-v1
          python scripts/apply-beta-program-controller-reconciliation.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-beta-program-controller-reconciliation.yml
          git rm scripts/apply-beta-program-controller-reconciliation.py
          git add docs/roadmaps/econovaria-beta-completion-roadmap-v1.md
          git diff --cached --check
          git commit -m "docs(program): reconcile beta controller authority"
          git push origin HEAD:docs/beta-program-controller-v1
