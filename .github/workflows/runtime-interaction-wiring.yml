name: Runtime Interaction Wiring

on:
  pull_request:
    paths:
      - "player-terminal/**"
      - "admin/**"
      - "backend/src/domains/**"
      - "backend/supabase/functions/**"
      - "scripts/runtime-interaction-wiring-audit.mjs"
      - "package.json"
      - ".github/workflows/runtime-interaction-wiring.yml"
  push:
    branches:
      - main
    paths:
      - "player-terminal/**"
      - "admin/**"
      - "backend/src/domains/**"
      - "backend/supabase/functions/**"
      - "scripts/runtime-interaction-wiring-audit.mjs"
      - "package.json"
      - ".github/workflows/runtime-interaction-wiring.yml"

permissions:
  contents: read

jobs:
  trace-runtime-controls:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm

      - name: Pin npm
        run: npm install --global npm@10.9.8

      - name: Install repository dependencies
        run: npm ci

      - name: Trace Player and Admin interaction wiring
        run: npm run audit:interaction-wiring

      - name: Verify local Player controls
        run: npm --prefix player-terminal run local-controls
