name: Release Artifact Build

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/pr295-immutable-release-build.yml"

permissions:
  contents: read
  actions: read

concurrency:
  group: pr295-immutable-release-verification
  cancel-in-progress: false

jobs:
  verify:
    if: github.event.pull_request.number == 295
    name: Verify original immutable release artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RELEASE_COMMIT: 623b82e004ea8446f6358c7ae4cc7ab4f6ec340d
      SOURCE_RUN_ID: "29994325542"
      SOURCE_ARTIFACT_ID: "8558309964"
      EXPECTED_ARCHIVE_DIGEST: 684c5602c7e8a1730bd231a94b6bcf63fe280ed50cfd0a33d87dc22d23e14c4d
      EXPECTED_MANIFEST_SHA256: 74c00a69804cab21fa2da7a7af96b7017a17706de62551ad861c3040803d670d
      EXPECTED_ARTIFACT_SET_SHA256: 95b50f909e9b83b89d60d78539eb03fe5eb01bd9abc6e3985f0e3fb187bd1727
    steps:
      - name: Check out exact merged-main source
        uses: actions/checkout@v7
        with:
          ref: 623b82e004ea8446f6358c7ae4cc7ab4f6ec340d
          fetch-depth: 0
          persist-credentials: false

      - name: Download original immutable artifact
        uses: actions/download-artifact@v4
        with:
          artifact-ids: 8558309964
          run-id: 29994325542
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: dist/release
          merge-multiple: true

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm

      - name: Pin npm and install release tooling
        shell: bash
        run: |
          set -euo pipefail
          npm install --global npm@10.9.8
          npm ci

      - name: Verify original manifest and artifact bytes
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$RELEASE_COMMIT"
          test "$(sha256sum dist/release/release-manifest.json | awk '{print $1}')" = "$EXPECTED_MANIFEST_SHA256"
          (
            cd dist/release
            sha256sum --check checksums.sha256
          )
          npm run release:validate -- \
            --manifest dist/release/release-manifest.json \
            --artifact-root dist/release \
            --expected-commit "$RELEASE_COMMIT"
          node - <<'NODE'
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync('dist/release/release-manifest.json', 'utf8'));
          if (manifest.provenance.workflowRunId !== process.env.SOURCE_RUN_ID) throw new Error('Source workflow run mismatch');
          if (manifest.source.commit !== process.env.RELEASE_COMMIT) throw new Error('Source commit mismatch');
          if (manifest.artifactSetSha256 !== process.env.EXPECTED_ARTIFACT_SET_SHA256) throw new Error('Artifact-set mismatch');
          if (manifest.provenance.workflow !== 'Release Artifact Build') throw new Error('Provenance workflow mismatch');
          NODE

      - name: Record immutable verification identity
        shell: bash
        run: |
          {
            echo '## Original immutable release artifact verified'
            echo "- Source commit: \`$RELEASE_COMMIT\`"
            echo "- Source workflow run: \`$SOURCE_RUN_ID\`"
            echo "- Source artifact ID: \`$SOURCE_ARTIFACT_ID\`"
            echo "- GitHub archive SHA-256: \`$EXPECTED_ARCHIVE_DIGEST\`"
            echo "- Release-manifest SHA-256: \`$EXPECTED_MANIFEST_SHA256\`"
            echo "- Artifact-set SHA-256: \`$EXPECTED_ARTIFACT_SET_SHA256\`"
            echo '- Rebuilt: `false`'
            echo '- Deployment performed: `false`'
            echo '- Production modified: `false`'
          } >> "$GITHUB_STEP_SUMMARY"
