name: Release Artifact Build

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/pr295-immutable-release-build.yml"
      - "scripts/release-platform-lib.mjs"

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: pr295-immutable-release-v4-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event.pull_request.number == 295
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      RELEASE_COMMIT: 7838d93ef33908f61a2534486ec92031875a9a22
      SOURCE_ROOT: /tmp/econovaria-release-source
      OUTPUT_ROOT: /tmp/econovaria-release-v4
    steps:
      - name: Check out exact PR295 tooling
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Bind tooling and runtime source
        id: bind
        shell: bash
        run: |
          set -euo pipefail
          tooling_commit="$(git rev-parse HEAD)"
          test "$tooling_commit" = "${{ github.event.pull_request.head.sha }}"
          git fetch origin main
          test "$(git rev-parse origin/main)" = "$RELEASE_COMMIT"
          rm -rf "$SOURCE_ROOT"
          git worktree add --detach "$SOURCE_ROOT" "$RELEASE_COMMIT"
          test "$(git -C "$SOURCE_ROOT" rev-parse HEAD)" = "$RELEASE_COMMIT"
          echo "tooling_commit=$tooling_commit" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm

      - name: Install pinned tooling
        run: |
          npm install --global npm@10.9.8
          npm ci

      - name: Validate environment neutrality
        run: node scripts/release-environment-neutrality.mjs --repo-root "$SOURCE_ROOT"

      - name: Build immutable release
        env:
          RELEASE_TOOLING_COMMIT: ${{ steps.bind.outputs.tooling_commit }}
        run: |
          set -euo pipefail
          rm -rf "$OUTPUT_ROOT"
          node scripts/release-platform.mjs build \
            --repo-root "$SOURCE_ROOT" \
            --commit "$RELEASE_COMMIT" \
            --config docs/operations/release-configuration.v1.json \
            --output "$OUTPUT_ROOT"

      - name: Validate bytes and dependency closure
        id: metadata
        env:
          RELEASE_TOOLING_COMMIT: ${{ steps.bind.outputs.tooling_commit }}
        run: |
          set -euo pipefail
          node scripts/release-platform.mjs validate \
            --repo-root "$SOURCE_ROOT" \
            --manifest "$OUTPUT_ROOT/release-manifest.json" \
            --artifact-root "$OUTPUT_ROOT" \
            --expected-commit "$RELEASE_COMMIT"
          (cd "$OUTPUT_ROOT" && sha256sum --check checksums.sha256)
          for name in admin-api classroom-api stock-market-player-read stock-market-read stock-market-runner stock-market-seed-copy stock-market-trading; do
            archive="$OUTPUT_ROOT/artifacts/edge-${name}.tar.gz"
            listing="$(mktemp)"
            tar -tzf "$archive" > "$listing"
            grep -Fxq "./backend/supabase/functions/${name}/index.ts" "$listing"
            grep -q '^./backend/src/' "$listing"
            rm -f "$listing"
          done
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const crypto = require('node:crypto');
          const fs = require('node:fs');
          const root = process.env.OUTPUT_ROOT;
          const bytes = fs.readFileSync(`${root}/release-manifest.json`);
          const manifest = JSON.parse(bytes);
          if (manifest.source.commit !== process.env.RELEASE_COMMIT) throw new Error('source mismatch');
          if (manifest.provenance.toolingCommit !== process.env.RELEASE_TOOLING_COMMIT) throw new Error('tooling mismatch');
          if (manifest.provenance.workflow !== 'Release Artifact Build') throw new Error('workflow mismatch');
          if (manifest.migrations.count !== 131 || manifest.migrations.head !== '20260721163000') throw new Error('migration mismatch');
          console.log(`artifact_set_sha256=${manifest.artifactSetSha256}`);
          console.log(`manifest_sha256=${crypto.createHash('sha256').update(bytes).digest('hex')}`);
          NODE

      - name: Upload corrected immutable artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: econovaria-release-7838d93ef33908f61a2534486ec92031875a9a22-v4
          path: /tmp/econovaria-release-v4
          if-no-files-found: error
          retention-days: 90
          compression-level: 0
          overwrite: false

      - name: Attest corrected artifact
        uses: actions/attest@v4
        with:
          subject-path: |
            /tmp/econovaria-release-v4/artifacts/*
            /tmp/econovaria-release-v4/checksums.sha256
            /tmp/econovaria-release-v4/release-configuration.json
            /tmp/econovaria-release-v4/release-manifest.json
          show-summary: true

      - name: Record immutable identity
        run: |
          {
            echo "- Runtime source: \`$RELEASE_COMMIT\`"
            echo "- Tooling source: \`${{ steps.bind.outputs.tooling_commit }}\`"
            echo "- Artifact set: \`${{ steps.metadata.outputs.artifact_set_sha256 }}\`"
            echo "- Manifest: \`${{ steps.metadata.outputs.manifest_sha256 }}\`"
            echo "- Artifact ID: \`${{ steps.upload.outputs.artifact-id }}\`"
            echo "- Archive digest: \`${{ steps.upload.outputs.artifact-digest }}\`"
            echo '- Rebuilt during promotion: `false`'
            echo '- Production modified: `false`'
          } >> "$GITHUB_STEP_SUMMARY"
