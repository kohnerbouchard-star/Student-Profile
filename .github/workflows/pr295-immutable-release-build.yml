name: Release Artifact Build

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/pr295-immutable-release-build.yml"
      - "scripts/release-platform-lib.mjs"

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: pr295-immutable-release-v2
  cancel-in-progress: false

jobs:
  build:
    if: github.event.pull_request.number == 295
    name: Build corrected immutable release artifact
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      RELEASE_COMMIT: 10caf7a2355520484f8071489508e5ef576e5e04
      EXPECTED_TOOLING_COMMIT: 6ee5707261cf005df7180acaf5c7d29edd71a945
      CONFIGURATION_PATH: docs/operations/release-configuration.v1.json
      OUTPUT_ROOT: /tmp/econovaria-release-v2
      SOURCE_ROOT: /tmp/econovaria-release-source
    steps:
      - name: Check out exact PR295 release tooling
        uses: actions/checkout@v7
        with:
          ref: agent/production-integration-gate-v1
          fetch-depth: 0
          persist-credentials: false

      - name: Bind tooling and exact current main source
        id: bind
        shell: bash
        run: |
          set -euo pipefail
          tooling_commit="$(git rev-parse HEAD)"
          test "$tooling_commit" = "$EXPECTED_TOOLING_COMMIT"
          git fetch origin main
          test "$(git rev-parse origin/main)" = "$RELEASE_COMMIT"
          rm -rf "$SOURCE_ROOT"
          git worktree add --detach "$SOURCE_ROOT" "$RELEASE_COMMIT"
          test "$(git -C "$SOURCE_ROOT" rev-parse HEAD)" = "$RELEASE_COMMIT"
          test -f "$SOURCE_ROOT/$CONFIGURATION_PATH"
          echo "tooling_commit=$tooling_commit" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm

      - name: Pin npm and install release tooling
        shell: bash
        run: |
          set -euo pipefail
          npm install --global npm@10.9.8
          npm ci

      - name: Reject environment-bound source frontend
        shell: bash
        run: node scripts/release-environment-neutrality.mjs --repo-root "$SOURCE_ROOT"

      - name: Build corrected immutable release set exactly once
        shell: bash
        env:
          RELEASE_TOOLING_COMMIT: ${{ steps.bind.outputs.tooling_commit }}
        run: |
          set -euo pipefail
          rm -rf "$OUTPUT_ROOT"
          node scripts/release-platform.mjs build \
            --repo-root "$SOURCE_ROOT" \
            --commit "$RELEASE_COMMIT" \
            --config "$CONFIGURATION_PATH" \
            --output "$OUTPUT_ROOT"

      - name: Validate corrected manifest and artifact bytes
        shell: bash
        env:
          RELEASE_TOOLING_COMMIT: ${{ steps.bind.outputs.tooling_commit }}
        run: |
          set -euo pipefail
          node scripts/release-platform.mjs validate \
            --repo-root "$SOURCE_ROOT" \
            --manifest "$OUTPUT_ROOT/release-manifest.json" \
            --artifact-root "$OUTPUT_ROOT" \
            --expected-commit "$RELEASE_COMMIT"
          (
            cd "$OUTPUT_ROOT"
            sha256sum --check checksums.sha256
          )

      - name: Verify complete Edge dependency closure and identities
        id: metadata
        shell: bash
        env:
          RELEASE_TOOLING_COMMIT: ${{ steps.bind.outputs.tooling_commit }}
        run: |
          set -euo pipefail
          functions=(
            admin-api
            classroom-api
            stock-market-player-read
            stock-market-read
            stock-market-runner
            stock-market-seed-copy
            stock-market-trading
          )
          for function_name in "${functions[@]}"; do
            archive="$OUTPUT_ROOT/artifacts/edge-${function_name}.tar.gz"
            test -f "$archive"
            tar -tzf "$archive" | grep -Fxq "./backend/supabase/functions/${function_name}/index.ts"
            tar -tzf "$archive" | grep -q '^./backend/src/'
          done
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const crypto = require('node:crypto');
          const fs = require('node:fs');
          const path = process.env.OUTPUT_ROOT;
          const bytes = fs.readFileSync(`${path}/release-manifest.json`);
          const manifest = JSON.parse(bytes.toString('utf8'));
          if (manifest.source.commit !== process.env.RELEASE_COMMIT) throw new Error('Source commit mismatch');
          if (manifest.provenance.toolingCommit !== process.env.RELEASE_TOOLING_COMMIT) throw new Error('Tooling commit mismatch');
          if (manifest.provenance.workflow !== 'Release Artifact Build') throw new Error('Workflow provenance mismatch');
          if (manifest.migrations.count !== 131 || manifest.migrations.head !== '20260721163000') throw new Error('Migration identity mismatch');
          if (manifest.migrations.versionSetSha256 !== '145d443670547d794c2e9e31b452a58338b784540eff64393cf2ad2d312193f3') throw new Error('Migration digest mismatch');
          console.log(`release_id=${manifest.releaseId}`);
          console.log(`artifact_set_sha256=${manifest.artifactSetSha256}`);
          console.log(`manifest_sha256=${crypto.createHash('sha256').update(bytes).digest('hex')}`);
          NODE

      - name: Upload corrected immutable release set
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: econovaria-release-10caf7a2355520484f8071489508e5ef576e5e04-v2
          path: /tmp/econovaria-release-v2
          if-no-files-found: error
          retention-days: 90
          compression-level: 0
          overwrite: false

      - name: Attest corrected release artifact provenance
        uses: actions/attest@v4
        with:
          subject-path: |
            /tmp/econovaria-release-v2/artifacts/*
            /tmp/econovaria-release-v2/checksums.sha256
            /tmp/econovaria-release-v2/release-configuration.json
            /tmp/econovaria-release-v2/release-manifest.json
          show-summary: true

      - name: Record corrected immutable build identity
        shell: bash
        run: |
          {
            echo '## Corrected immutable release artifact built'
            echo "- Runtime source: \`$RELEASE_COMMIT\`"
            echo "- Release tooling: \`${{ steps.bind.outputs.tooling_commit }}\`"
            echo "- Release ID: \`${{ steps.metadata.outputs.release_id }}\`"
            echo "- Artifact-set SHA-256: \`${{ steps.metadata.outputs.artifact_set_sha256 }}\`"
            echo "- Release-manifest SHA-256: \`${{ steps.metadata.outputs.manifest_sha256 }}\`"
            echo "- GitHub artifact ID: \`${{ steps.upload.outputs.artifact-id }}\`"
            echo "- GitHub archive digest: \`${{ steps.upload.outputs.artifact-digest }}\`"
            echo '- Edge dependency closure: `backend/src included`'
            echo '- Environment-neutrality: `passed`'
            echo '- Deployment performed: `false`'
            echo '- Production modified: `false`'
          } >> "$GITHUB_STEP_SUMMARY"
