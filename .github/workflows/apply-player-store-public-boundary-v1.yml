name: Apply Player Store Public Boundary

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: apply-player-store-public-boundary-v1-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'agent/player-store-public-boundary-v1' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/player-store-public-boundary-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      - name: Apply bounded integration edits
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          function read(path) { return fs.readFileSync(path, 'utf8'); }
          function write(path, value) { fs.writeFileSync(path, value); }
          function replace(path, before, after) {
            const source = read(path);
            if (!source.includes(before)) throw new Error(`Missing anchor in ${path}: ${before.slice(0, 120)}`);
            write(path, source.replace(before, after));
          }

          const backendPackagePath = 'backend/package.json';
          const backendPackage = JSON.parse(read(backendPackagePath));
          backendPackage.scripts['test:player-store-public'] = 'deno test --allow-read=supabase/migrations/20260719150000_add_player_store_public_keys_v1.sql --config supabase/functions/classroom-api/deno.json --lock=supabase/functions/deno.lock --frozen src/domains/store/api/playerStorePublicHttpHandler.test.ts src/domains/store/tests/playerStorePublicMigrationContract.test.ts src/domains/store/tests/playerStoreFullLifecycleIntegration.test.ts';
          backendPackage.scripts['test:smoke'] = backendPackage.scripts['test:smoke'].replace(' && npm run test:admin-api', ' && npm run test:player-store-public && npm run test:admin-api');
          write(backendPackagePath, JSON.stringify(backendPackage, null, 2) + '\n');

          const manifestPath = 'backend/src/domains/players/contracts/playerCapabilityManifestContracts.ts';
          replace(manifestPath, 'export const PLAYER_CAPABILITY_MANIFEST_VERSION = "2026-07-19.2" as const;', 'export const PLAYER_CAPABILITY_MANIFEST_VERSION = "2026-07-19.3" as const;');
          replace(manifestPath, '  | "notificationsRead";', '  | "notificationsRead"\n  | "store"\n  | "storeQuote"\n  | "storePurchase";');
          replace(manifestPath, '  {\n    key: "inventory",', '  {\n    key: "store",\n    operations: [{ method: "GET", pathTemplate: "/players/me/store/items" }],\n    routeCapabilities: ["store"],\n  },\n  {\n    key: "storeQuote",\n    operations: [{ method: "POST", pathTemplate: "/players/me/store/quotes" }],\n  },\n  {\n    key: "storePurchase",\n    operations: [\n      { method: "GET", pathTemplate: "/players/me/store/purchases" },\n      { method: "POST", pathTemplate: "/players/me/store/purchases" },\n    ],\n    actionCapabilities: ["storePurchase"],\n  },\n  {\n    key: "inventory",');

          const manifestTestPath = 'backend/src/domains/players/contracts/playerCapabilityManifestContracts.test.ts';
          replace(manifestTestPath, 'import { readPlayerStockAssetListRoutePath } from "../../stocks/api/playerStockAssetListRoutePaths.ts";', 'import { readPlayerStockAssetListRoutePath } from "../../stocks/api/playerStockAssetListRoutePaths.ts";\nimport { readPlayerStorePublicRoutePath } from "../../store/api/playerStorePublicRoutePaths.ts";');
          replace(manifestTestPath, '  assertEquals(manifest.capabilities.routes.store, false);', '  assertEquals(manifest.capabilities.routes.store, true);');
          replace(manifestTestPath, '  assertEquals(manifest.capabilities.actions.storePurchase, false);', '  assertEquals(manifest.capabilities.actions.storePurchase, true);');
          replace(manifestTestPath, '  assertEquals(endpointKeys.includes("store" as never), false);', '  assertEquals(endpointKeys.includes("store"), true);\n  assertEquals(endpointKeys.includes("storeQuote"), true);\n  assertEquals(endpointKeys.includes("storePurchase"), true);');
          replace(manifestTestPath, '      : operation.key === "inventory"', '      : operation.key === "store" || operation.key === "storeQuote" ||\n          operation.key === "storePurchase"\n      ? readPlayerStorePublicRoutePath(operation.path)\n      : operation.key === "inventory"');

          const ratePath = 'backend/src/security/playerRateLimitDispatch.ts';
          replace(ratePath, '  notificationsRead: byMethod({\n    POST: operation("player.notifications.write", "write"),\n  }),', '  notificationsRead: byMethod({\n    POST: operation("player.notifications.write", "write"),\n  }),\n  store: byMethod({\n    GET: operation("player.store.read", "read"),\n  }),\n  storeQuote: byMethod({\n    POST: operation("player.store.quote", "write"),\n  }),\n  storePurchase: byMethod({\n    GET: operation("player.store.purchases.read", "read"),\n    POST: operation("player.store.purchase", "sensitive"),\n  }),');

          const classroomPath = 'backend/supabase/functions/classroom-api/index.ts';
          replace(classroomPath, 'import {\n  handlePlayerStoreCatalogRequest,\n} from "../../../src/domains/store/api/playerStoreCatalogHttpHandler.ts";\nimport {\n  handlePlayerStorePurchaseHistoryRequest,\n  handlePlayerStorePurchaseRequest,\n  handlePlayerStoreQuoteRequest,\n} from "../../../src/domains/store/api/playerStorePurchaseHttpHandler.ts";', 'import {\n  handlePlayerStorePublicRequest,\n} from "../../../src/domains/store/api/playerStorePublicHttpHandler.ts";\nimport {\n  readPlayerStorePublicRoutePath,\n} from "../../../src/domains/store/api/playerStorePublicRoutePaths.ts";');
          replace(classroomPath, '  if (url.pathname.endsWith("/players/me/store/items")) {\n    return handlePlayerStoreCatalogRequest(request, {\n      createServiceClient,\n    });\n  }\n\n  if (url.pathname.endsWith("/players/me/store/quote")) {\n    return handlePlayerStoreQuoteRequest(request, {\n      createServiceClient,\n    });\n  }\n\n  if (url.pathname.endsWith("/players/me/store/purchases")) {\n    if (request.method === "GET") {\n      return handlePlayerStorePurchaseHistoryRequest(request, {\n        createServiceClient,\n      });\n    }\n\n    return handlePlayerStorePurchaseRequest(request, {\n      createServiceClient,\n    });\n  }', '  const playerStoreRoute = readPlayerStorePublicRoutePath(url.pathname);\n\n  if (playerStoreRoute) {\n    const endpointKey = playerStoreRoute.kind === "items"\n      ? "store"\n      : playerStoreRoute.kind === "quotes"\n      ? "storeQuote"\n      : "storePurchase";\n    return dispatchRateLimitedReviewedPlayerRequest(\n      request,\n      endpointKey,\n      () =>\n        handlePlayerStorePublicRequest(request, playerStoreRoute, {\n          createServiceClient,\n        }),\n      { createServiceClient },\n    );\n  }');

          const backendRoutesPath = 'player-terminal/src/api/backend-routes.js';
          replace(backendRoutesPath, '  storeQuote: ({ payload = {} }) => ({\n    method: "POST",\n    path: "/players/me/store/quote",\n    payload: {\n      itemId: requiredText(payload.itemId || payload.storeItemId, "itemId", "storeQuote"),\n      quantity: Number(payload.quantity ?? 1)\n    }\n  }),', '  storeQuote: ({ payload = {} }) => ({\n    method: "POST",\n    path: "/players/me/store/quotes",\n    payload: {\n      itemKey: requiredText(payload.itemKey, "itemKey", "storeQuote"),\n      quantity: Number(payload.quantity ?? 1)\n    }\n  }),');
          replace(backendRoutesPath, '      quoteId: requiredText(payload.quoteId, "quoteId", "storePurchase"),', '      quoteKey: requiredText(payload.quoteKey, "quoteKey", "storePurchase"),');

          const readModelPath = 'player-terminal/src/api/read-model.js';
          replace(readModelPath, '  return list(store.listings).map((item) => ({\n    id: text(item.id || item.itemId),', '  return list(store.listings).map((item) => ({\n    id: text(item.itemKey || item.id || item.itemId),\n    itemKey: text(item.itemKey || item.id || item.itemId),');
          replace(readModelPath, '    stock: number(item.stockQuantity),', '    stock: number(item.stockQuantity),\n    currencyCode: text(item.currencyCode),');

          const flowPath = 'player-terminal/src/features/store/store-purchase-flow.js';
          replace(flowPath, '    const item = state.data?.store?.items?.find((candidate) => String(candidate.id) === String(itemId));', '    const item = state.data?.store?.items?.find((candidate) => String(candidate.itemKey || candidate.id) === String(itemId));');
          replace(flowPath, '        storeItemId: transaction.item.id,', '        itemKey: transaction.item.itemKey || transaction.item.id,');
          replace(flowPath, '    if (!quote?.quoteId) {', '    if (!quote?.quoteKey) {');
          replace(flowPath, '        quoteId: quote.quoteId,', '        quoteKey: quote.quoteKey,');
          replace(flowPath, '      receipt: operation.result,', '      receipt: operation.result?.receipt || operation.result,');

          const modalPath = 'player-terminal/src/components/modal.js';
          replace(modalPath, '<div><dt>PURCHASE ID</dt><dd><code>${escapeHtml(receipt.purchaseId || "Recorded")}</code></dd></div>\n            <div><dt>QUOTE ID</dt><dd><code>${escapeHtml(receipt.quoteId || quote.quoteId || "—")}</code></dd></div>', '<div><dt>RECEIPT KEY</dt><dd><code>${escapeHtml(receipt.receiptKey || "Recorded")}</code></dd></div>\n            <div><dt>QUOTE KEY</dt><dd><code>${escapeHtml(receipt.quoteKey || quote.quoteKey || "—")}</code></dd></div>');
          replace(modalPath, '<div><dt>QUOTE ID</dt><dd><code>${escapeHtml(quote.quoteId || "—")}</code></dd></div>', '<div><dt>QUOTE KEY</dt><dd><code>${escapeHtml(quote.quoteKey || "—")}</code></dd></div>');

          const frontendManifestPath = 'player-terminal/src/integrations/student-profile-capability-manifest.js';
          replace(frontendManifestPath, '  notificationsRead: Object.freeze(["notificationsRead"])', '  notificationsRead: Object.freeze(["notificationsRead"]),\n  store: Object.freeze(["store"]),\n  storeQuote: Object.freeze(["storeQuote"]),\n  storePurchase: Object.freeze(["storePurchase"])');
          replace(frontendManifestPath, '  inventory: "inventory"', '  inventory: "inventory",\n  store: "store"');
          replace(frontendManifestPath, '  notificationsRead: "notificationsRead"', '  notificationsRead: "notificationsRead",\n  storePurchase: "storePurchase"');

          const playerPackagePath = 'player-terminal/package.json';
          const playerPackage = JSON.parse(read(playerPackagePath));
          playerPackage.scripts['store-connected'] = 'node tests/store-connected-purchase.mjs';
          playerPackage.scripts.verify = playerPackage.scripts.verify.replace(' && npm run contracts-flow', ' && npm run store-connected && npm run contracts-flow');
          write(playerPackagePath, JSON.stringify(playerPackage, null, 2) + '\n');
          NODE
      - name: Commit bounded patch
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add backend player-terminal
          if git diff --cached --quiet; then
            echo 'No bounded patch changes remain.'
          else
            git commit -m 'Wire public Player Store boundary'
            git push origin HEAD:agent/player-store-public-boundary-v1
          fi
