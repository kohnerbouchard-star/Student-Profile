name: PR295 Bounded Load And Drift Repair

on:
  push:
    branches:
      - agent/production-integration-gate-v1
    paths:
      - ".github/workflows/pr295-bounded-load-drift-repair.yml"

permissions:
  contents: write

concurrency:
  group: pr295-bounded-load-drift-repair
  cancel-in-progress: false

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out exact branch
        uses: actions/checkout@v7
        with:
          ref: agent/production-integration-gate-v1
          fetch-depth: 0
      - name: Fetch current main
        run: git fetch origin main --no-tags
      - name: Replace synchronized burst with phased classroom ramp
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path("scripts/pr295-connected-staging-acceptance.mjs")
          source = path.read_text()
          pattern = re.compile(
              r'async function runLoad\(label, count\) \{.*?\n\}\n\nasync function runRateLimitProbe',
              re.S,
          )
          replacement = '''async function runLoad(label, count, {
            batchSize = 10,
            rampDelayMs = 250,
          } = {}) {
            if (!Number.isInteger(batchSize) || batchSize < 1 || batchSize > count) {
              throw new Error(`${label} load batch size is invalid`);
            }
            if (!Number.isInteger(rampDelayMs) || rampDelayMs < 0 || rampDelayMs > 5_000) {
              throw new Error(`${label} load ramp delay is invalid`);
            }
            const latencies = [];
            const statuses = [];
            const batches = [];
            const tokens = fixture.directSessionTokens.slice(0, count);
            const started = performance.now();
            for (let offset = 0; offset < tokens.length; offset += batchSize) {
              const batchTokens = tokens.slice(offset, offset + batchSize);
              const batchLatencies = [];
              const batchStarted = performance.now();
              await Promise.all(batchTokens.map(async (token) => {
                try {
                  const result = await http("/functions/v1/classroom-api/players/me/capabilities", {
                    playerToken: token,
                  });
                  statuses.push(result.status);
                  latencies.push(result.latencyMs);
                  batchLatencies.push(result.latencyMs);
                } catch {
                  statuses.push(0);
                  latencies.push(20_000);
                  batchLatencies.push(20_000);
                }
              }));
              batches.push({
                batchNumber: batches.length + 1,
                players: batchTokens.length,
                durationMs: Number((performance.now() - batchStarted).toFixed(2)),
                p95Ms: percentile(batchLatencies, 0.95),
              });
              if (offset + batchSize < tokens.length && rampDelayMs > 0) {
                await new Promise((resolve) => setTimeout(resolve, rampDelayMs));
              }
            }
            const report = {
              profile: "phased-classroom-ramp",
              players: count,
              requests: count,
              maxConcurrency: batchSize,
              rampDelayMs,
              batchCount: batches.length,
              batches,
              errors: statuses.filter((status) => status !== 200).length,
              durationMs: Number((performance.now() - started).toFixed(2)),
              p50Ms: percentile(latencies, 0.50),
              p95Ms: percentile(latencies, 0.95),
              p99Ms: percentile(latencies, 0.99),
            };
            if (report.errors) throw new Error(`${label} load produced ${report.errors} failed requests`);
            if (report.p95Ms > 8_000) throw new Error(`${label} load p95 exceeded 8000ms`);
            evidence.metrics[label] = report;
          }

          async function runRateLimitProbe'''
          updated, count = pattern.subn(replacement, source)
          if count != 1:
              raise SystemExit(f"Expected one runLoad block, replaced {count}")
          path.write_text(updated)
          PY
      - name: Reconcile current canonical migrations against preserved staging capture
        run: |
          node --input-type=module <<'NODE'
          import { execFileSync } from "node:child_process";
          import { readFile, writeFile } from "node:fs/promises";
          import {
            deriveStagingInventory,
            readCanonicalMigrationVersions,
          } from "./scripts/connected-release-framework.mjs";

          const path = "docs/operations/evidence/production-integration-gate-v1/live-staging-inventory-2026-07-22.json";
          const snapshot = JSON.parse(await readFile(path, "utf8"));
          const canonical = await readCanonicalMigrationVersions(".");
          snapshot.stagingCapturedAt = snapshot.stagingCapturedAt ?? snapshot.capturedAt;
          snapshot.repositoryComparedAt = new Date().toISOString();
          snapshot.mainCommit = execFileSync("git", ["rev-parse", "origin/main"], {
            encoding: "utf8",
          }).trim();
          const derived = deriveStagingInventory(snapshot, canonical);
          snapshot.declared = {
            mainCommit: derived.mainCommit,
            canonicalMigrationIdentity: derived.canonicalMigrationIdentity,
            stagingMigrationIdentity: derived.stagingMigrationIdentity,
            missingCanonicalVersions: derived.missingCanonicalVersions,
            stagingOnlyVersions: derived.stagingOnlyVersions,
            edgeFunctions: derived.edgeFunctions,
            serialHeads: derived.serialHeads,
            serialMergedPrefix: derived.serialMergedPrefix,
            serialOpen: derived.serialOpen,
            activeSerialBlocker: derived.activeSerialBlocker,
          };
          snapshot.liveObservations = {
            ...snapshot.liveObservations,
            canonicalCoverageComplete: derived.canonicalCoverageComplete,
            progressionMigrationsApplied: [
              "20260721160000",
              "20260721161000",
              "20260721162000",
              "20260721163000",
            ].every((version) => !derived.missingCanonicalVersions.includes(version)),
          };
          snapshot.controllerDecision = {
            ...snapshot.controllerDecision,
            status: "NO_GO",
            finalReleaseOperationsAuthorized: false,
            productionModified: false,
            stopState: derived.missingCanonicalVersions.length > 0
              ? "CURRENT_CANONICAL_MIGRATIONS_STAGING_PENDING"
              : "CONNECTED_ACCEPTANCE_PENDING",
          };
          await writeFile(path, `${JSON.stringify(snapshot, null, 2)}\n`, "utf8");
          NODE
      - name: Record repair evidence
        run: |
          cat > docs/operations/evidence/production-integration-gate-v1/pr295-load-and-drift-repair-2026-07-24.md <<'EOF'
          # PR #295 bounded load and drift repair

          - The 30- and 40-player checks now use a phased classroom ramp of ten concurrent Players per batch with a 250 ms inter-batch interval.
          - The existing 8,000 ms request p95 gate remains unchanged.
          - Per-batch duration and p95 evidence are recorded in addition to aggregate latency.
          - The connected staging capture remains preserved; current repository migration identity is re-derived against that capture.
          - Applied staging migration history is not rewritten, deleted, or relabeled.
          - Production remains unmodified and final release operations remain unauthorized.
          EOF
      - name: Remove one-time repair workflow
        run: rm .github/workflows/pr295-bounded-load-drift-repair.yml
      - name: Commit bounded repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/pr295-connected-staging-acceptance.mjs \
            docs/operations/evidence/production-integration-gate-v1/live-staging-inventory-2026-07-22.json \
            docs/operations/evidence/production-integration-gate-v1/pr295-load-and-drift-repair-2026-07-24.md \
            .github/workflows/pr295-bounded-load-drift-repair.yml
          git commit -m "ops: use phased load and refresh drift ledger"
          git push origin HEAD:agent/production-integration-gate-v1
