name: Messaging Fix Fingerprint Separator

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/messaging-fix-fingerprint-separator.yml
  push:
    branches:
      - agent/messaging-communication-v1
    paths:
      - .github/workflows/messaging-fix-fingerprint-separator.yml

permissions:
  contents: write

concurrency:
  group: messaging-fix-fingerprint-separator
  cancel-in-progress: true

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out Messaging branch
        uses: actions/checkout@v7
        with:
          ref: agent/messaging-communication-v1
          fetch-depth: 0
          persist-credentials: true

      - name: Replace invalid null-byte fingerprint separator
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python - <<'PY'
          from pathlib import Path

          path = Path('backend/supabase/migrations/20260721153000_compat_messaging_player_status_v1.sql')
          lines = path.read_text().splitlines()
          matches = [index for index, line in enumerate(lines) if 'v_fingerprint := md5(' in line]
          if len(matches) != 1:
              raise SystemExit(f'Expected one fingerprint assignment, found {len(matches)}.')
          lines[matches[0]] = "  v_fingerprint := md5(v_recipient.id::text || chr(31) || v_title || chr(31) || v_body);"
          path.write_text('\n'.join(lines) + '\n')
          PY

          grep -Fq "v_fingerprint := md5(v_recipient.id::text || chr(31) || v_title || chr(31) || v_body);" \
            backend/supabase/migrations/20260721153000_compat_messaging_player_status_v1.sql
          ! grep -Fq "E'\000'" backend/supabase/migrations/20260721153000_compat_messaging_player_status_v1.sql
          git add backend/supabase/migrations/20260721153000_compat_messaging_player_status_v1.sql
          git diff --cached --check
          git commit -m "fix(messaging): use UTF-8-safe fingerprint separator"
          git push origin HEAD:agent/messaging-communication-v1
