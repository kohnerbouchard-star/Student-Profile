name: PR295 Fix V2 Builder Binding

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/pr295-fix-v2-builder-binding.yml"

permissions:
  contents: write

concurrency:
  group: pr295-fix-v2-builder-binding
  cancel-in-progress: false

jobs:
  patch:
    if: github.event.pull_request.number == 295
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/production-integration-gate-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Bind builder to exact PR head and remove carrier
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/pr295-immutable-release-build.yml')
          text = path.read_text(encoding='utf-8')
          expression = chr(36) + '{{ github.event.pull_request.head.sha }}'
          replacements = [
              ('      EXPECTED_TOOLING_COMMIT: 6ee5707261cf005df7180acaf5c7d29edd71a945', f'      EXPECTED_TOOLING_COMMIT: {expression}'),
              ('          ref: agent/production-integration-gate-v1', f'          ref: {expression}'),
          ]
          for old, new in replacements:
              if text.count(old) != 1:
                  raise SystemExit(f'Expected builder binding not found exactly once: {old}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
          rm -f .github/workflows/pr295-fix-v2-builder-binding.yml
          git add .github/workflows/pr295-immutable-release-build.yml .github/workflows/pr295-fix-v2-builder-binding.yml
          git commit --amend --no-edit
          git push --force-with-lease origin HEAD:agent/production-integration-gate-v1
