name: Exchange Calendar Runtime

on:
  pull_request:
    paths:
      - backend/**
      - frontend/**
      - index.html
      - scripts/apply-configurable-stock-market-timezone-v1.mjs
      - scripts/fix-required-timezone-rpc-fixture-v1.mjs
      - scripts/apply-shared-game-timezone-ui-v1.mjs
      - scripts/fix-shared-game-timezone-smoke-v1.mjs
      - scripts/enforce-single-game-timezone-source-v1.mjs
      - scripts/fix-timezone-migration-preflight-v1.mjs
      - scripts/shared-game-timezone-ui-smoke.mjs
      - .github/workflows/exchange-calendar-runtime-v1.yml
  push:
    branches:
      - agent/exchange-calendar-runtime-v1
      - agent/exchange-calendar-config-v1
    paths:
      - backend/**
      - frontend/**
      - index.html
      - scripts/apply-configurable-stock-market-timezone-v1.mjs
      - scripts/fix-required-timezone-rpc-fixture-v1.mjs
      - scripts/apply-shared-game-timezone-ui-v1.mjs
      - scripts/fix-shared-game-timezone-smoke-v1.mjs
      - scripts/enforce-single-game-timezone-source-v1.mjs
      - scripts/fix-timezone-migration-preflight-v1.mjs
      - scripts/shared-game-timezone-ui-smoke.mjs
      - .github/workflows/exchange-calendar-runtime-v1.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: exchange-calendar-runtime-v1-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate exchange calendar runtime
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out evaluated ref
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Pin npm
        run: npm install --global npm@10.9.8

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.3

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Validate immutable integration
        id: validation
        shell: bash
        run: |
          set +e
          LOG="/tmp/exchange-calendar-runtime-v1-run-log.txt"
          : > "$LOG"
          STATUS=0

          run_step() {
            NAME="$1"
            shift
            printf '\n## %s\n' "$NAME" | tee -a "$LOG"
            "$@" 2>&1 | tee -a "$LOG"
            CODE=${PIPESTATUS[0]}
            printf 'exit=%s\n' "$CODE" | tee -a "$LOG"
            if [ "$CODE" -ne 0 ] && [ "$STATUS" -eq 0 ]; then STATUS="$CODE"; fi
          }

          run_step "reconcile required calendar integration" node scripts/apply-configurable-stock-market-timezone-v1.mjs
          run_step "reconcile RPC fixture" node scripts/fix-required-timezone-rpc-fixture-v1.mjs
          run_step "reconcile Create Game timezone" node scripts/apply-shared-game-timezone-ui-v1.mjs
          run_step "reconcile Create Game smoke" node scripts/fix-shared-game-timezone-smoke-v1.mjs
          run_step "reconcile one timezone source" node scripts/enforce-single-game-timezone-source-v1.mjs
          run_step "reconcile migration preflight syntax" node scripts/fix-timezone-migration-preflight-v1.mjs
          run_step "generated integration drift" git diff --exit-code
          run_step "focused exchange calendar tests" npm --prefix backend run test:stock-market-calendar
          run_step "staff signup timezone tests" env SUPABASE_URL=http://localhost:54321 SUPABASE_ANON_KEY=smoke-anon-key SUPABASE_SERVICE_ROLE_KEY=smoke-service-role-key deno test --allow-env=SUPABASE_URL,SUPABASE_ANON_KEY,SUPABASE_SERVICE_ROLE_KEY --config backend/supabase/functions/classroom-api/deno.json --lock=backend/supabase/functions/deno.lock --frozen backend/src/domains/auth/api/staffSignupHttpHandlerTest.ts
          run_step "Create Game timezone smoke" node scripts/shared-game-timezone-ui-smoke.mjs
          run_step "backend typecheck" npm --prefix backend run typecheck:all
          run_step "migration source audit" npm run audit:migrations
          run_step "diff whitespace check" git diff --check

          printf '\nfinalStatus=%s\n' "$STATUS" | tee -a "$LOG"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: exchange-calendar-runtime-v1-diagnostics
          path: /tmp/exchange-calendar-runtime-v1-run-log.txt
          if-no-files-found: error
          retention-days: 14

      - name: Enforce validation result
        shell: bash
        run: |
          STATUS="${{ steps.validation.outputs.status }}"
          if [ "$STATUS" -ne 0 ]; then
            echo "Exchange calendar validation failed. Download the diagnostics artifact."
            false
          fi
