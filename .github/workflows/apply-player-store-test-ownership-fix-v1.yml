name: Apply Player Store Ownership Test Fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'agent/player-store-public-boundary-v1' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/player-store-public-boundary-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Correct ownership test separation
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'player-terminal/tests/store-connected-purchase.mjs';
          let source = fs.readFileSync(path, 'utf8');
          const before = `const purchase = await api.execute("storePurchase", {\n  quoteKey,\n  clientSubmittedAt: "2026-07-19T03:00:30.000Z",\n  quoteId: "browser-owned-quote",\n  playerId: "browser-owned-player"\n});`;
          const after = `await assert.rejects(\n  api.execute("storePurchase", {\n    quoteKey,\n    playerId: "browser-owned-player"\n  }),\n  (error) => error.code === "INVALID_REQUEST"\n);\n\nconst purchase = await api.execute("storePurchase", {\n  quoteKey,\n  clientSubmittedAt: "2026-07-19T03:00:30.000Z",\n  quoteId: "browser-owned-quote"\n});`;
          if (!source.includes(before)) throw new Error('Missing Store purchase ownership anchor');
          source = source.replace(before, after);
          source = source.replace(
            'Connected Store purchase passed: manifest gating, public item/quote/receipt keys, committed settlement, and authoritative Store/Inventory/Banking refresh are valid.',
            'Connected Store purchase passed: manifest gating, ownership rejection, public item/quote/receipt keys, committed settlement, and authoritative Store/Inventory refresh are valid.'
          );
          fs.writeFileSync(path, source);
          NODE
      - name: Commit correction
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add player-terminal/tests/store-connected-purchase.mjs
          if git diff --cached --quiet; then
            echo 'No correction remains.'
          else
            git commit -m 'Separate Store ownership rejection proof'
            git push origin HEAD:agent/player-store-public-boundary-v1
          fi
