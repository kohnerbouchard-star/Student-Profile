name: Apply Player Store Final Corrections

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'agent/player-store-public-boundary-v1' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/player-store-public-boundary-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply final bounded corrections
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          function replace(path, before, after) {
            const source = fs.readFileSync(path, 'utf8');
            if (!source.includes(before)) throw new Error(`Missing anchor in ${path}`);
            fs.writeFileSync(path, source.replace(before, after));
          }

          replace(
            'backend/src/domains/store/api/playerStorePublicHttpHandler.ts',
            '  ) => Promise<PlayerRequestScope>;',
            '  ) => Promise<Pick<PlayerRequestScope, "gameId" | "playerUuid">>;'
          );

          const test = 'player-terminal/tests/store-connected-purchase.mjs';
          replace(test, '      banking: true,', '      banking: false,');
          replace(test,
            'const refreshed = await api.refreshResources(["store", "inventory", "banking"]);',
            'const refreshed = await api.refreshResources(["store", "inventory"]);'
          );
          replace(test,
            'assert.equal(refreshed.data.inventory.items[0].quantity, 2);\nassert.equal(refreshed.data.banking.checking.balance, 400);\nassert.equal(refreshed.data.banking.transactions[0].category, "store");',
            'assert.equal(refreshed.data.inventory.items[0].quantity, 2);\nassert.equal("banking" in refreshed.data, false, "Banking remains manifest-disabled and must not receive speculative traffic.");'
          );
          NODE
      - name: Commit final corrections
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add backend player-terminal
          if git diff --cached --quiet; then
            echo 'No final corrections remain.'
          else
            git commit -m 'Narrow Store scope and capability proof'
            git push origin HEAD:agent/player-store-public-boundary-v1
          fi
