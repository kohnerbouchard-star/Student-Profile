name: Required Game Market Timezone

on:
  push:
    branches:
      - agent/exchange-calendar-config-v1
  pull_request:
    paths:
      - backend/**
      - scripts/apply-configurable-stock-market-timezone-v1.mjs
      - .github/workflows/configurable-stock-market-timezone-v1.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: required-game-market-timezone-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: agent/exchange-calendar-config-v1

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.3

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Apply and validate required timezone integration
        id: validation
        shell: bash
        run: |
          set +e
          LOG="/tmp/required-game-market-timezone.log"
          PATCH="/tmp/required-game-market-timezone.patch"
          : > "$LOG"
          STATUS=0

          run_step() {
            NAME="$1"
            shift
            printf '\n## %s\n' "$NAME" | tee -a "$LOG"
            "$@" 2>&1 | tee -a "$LOG"
            CODE=${PIPESTATUS[0]}
            printf 'exit=%s\n' "$CODE" | tee -a "$LOG"
            if [ "$CODE" -ne 0 ] && [ "$STATUS" -eq 0 ]; then STATUS="$CODE"; fi
          }

          run_step "apply integration" node scripts/apply-configurable-stock-market-timezone-v1.mjs
          run_step "focused tests" npm --prefix backend run test:stock-market-calendar
          run_step "backend typecheck" npm --prefix backend run typecheck:all
          run_step "integration drift" node scripts/apply-configurable-stock-market-timezone-v1.mjs --check
          run_step "whitespace" git diff --check

          git diff --binary > "$PATCH"
          printf '\nfinalStatus=%s\n' "$STATUS" | tee -a "$LOG"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: required-game-market-timezone-diagnostics
          path: |
            /tmp/required-game-market-timezone.log
            /tmp/required-game-market-timezone.patch
          if-no-files-found: error
          retention-days: 14

      - name: Commit generated integration
        if: github.event_name != 'pull_request' && steps.validation.outputs.status == '0'
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(stocks): require one game market timezone"
          git push origin HEAD:agent/exchange-calendar-config-v1

      - name: Enforce validation result
        shell: bash
        run: |
          STATUS="${{ steps.validation.outputs.status }}"
          if [ "$STATUS" -ne 0 ]; then
            echo "Required game market timezone validation failed."
            false
          fi
