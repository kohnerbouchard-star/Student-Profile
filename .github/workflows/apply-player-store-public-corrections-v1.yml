name: Apply Player Store Public Corrections

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'agent/player-store-public-boundary-v1' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/player-store-public-boundary-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply fixture and Store contract corrections
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          function read(path) { return fs.readFileSync(path, 'utf8'); }
          function write(path, value) { fs.writeFileSync(path, value); }
          function replace(path, before, after) {
            const source = read(path);
            if (!source.includes(before)) throw new Error(`Missing anchor in ${path}: ${before.slice(0, 100)}`);
            write(path, source.replace(before, after));
          }

          for (const path of [
            'backend/src/domains/store/api/playerStorePublicHttpHandler.test.ts',
            'backend/src/domains/store/tests/playerStoreFullLifecycleIntegration.test.ts'
          ]) {
            replace(path,
              '      playerSessionId: "00000000-0000-4000-8000-000000000003",\n      sessionTokenHash: "hash",',
              '      activeSessionId: "00000000-0000-4000-8000-000000000003",\n      sessionValid: true,\n      sessionExpiresAt: "2026-07-20T00:00:00.000Z",\n      authorizationContext: {\n        actorType: "player",\n        source: "player_session",\n        gameScope: "session",\n        resourceScope: "own_player",\n      },'
            );
          }

          const lifecycle = 'backend/src/domains/store/tests/playerStoreFullLifecycleIntegration.test.ts';
          replace(lifecycle,
            'class SharedStoreRepository implements PlayerStorePublicRepository {\n  readonly items: PlayerStorePublicItemDto[] = [{',
            'type MutableStoreItem = Omit<PlayerStorePublicItemDto, "stockQuantity"> & { stockQuantity: number };\n\nclass SharedStoreRepository implements PlayerStorePublicRepository {\n  readonly items: MutableStoreItem[] = [{'
          );

          const adapter = 'player-terminal/tests/student-profile-adapter.mjs';
          replace(adapter, 'manifestVersion: "2026-07-19.1",', 'manifestVersion: "2026-07-19.3",');
          replace(adapter, '      inventory: true\n', '      inventory: true,\n      store: true\n');
          replace(adapter, '      notificationsRead: true\n', '      notificationsRead: true,\n      storePurchase: true\n');
          replace(adapter, '    {\n      key: "inventory",', '    {\n      key: "store",\n      operations: [{ method: "GET", pathTemplate: "/players/me/store/items" }]\n    },\n    {\n      key: "storeQuote",\n      operations: [{ method: "POST", pathTemplate: "/players/me/store/quotes" }]\n    },\n    {\n      key: "storePurchase",\n      operations: [\n        { method: "GET", pathTemplate: "/players/me/store/purchases" },\n        { method: "POST", pathTemplate: "/players/me/store/purchases" }\n      ]\n    },\n    {\n      key: "inventory",');
          replace(adapter,
            '  storeQuote: {\n    ok: true,\n    quoteId: "quote-1",\n    itemId: "item-1",\n    itemName: "Market Lens",\n    quantity: 1,\n    finalUnitPrice: 50,\n    finalTotalPrice: 50,\n    currencyCode: "ECO",\n    expiresAt: "2026-07-17T12:05:00.000Z"\n  },',
            '  storeQuote: {\n    ok: true,\n    quote: {\n      quoteKey: "quote_11111111111111111111111111111111",\n      itemKey: "market-lens",\n      itemName: "Market Lens",\n      quantity: 1,\n      finalUnitPrice: 50,\n      finalTotalPrice: 50,\n      currencyCode: "ECO",\n      expiresAt: "2026-07-17T12:05:00.000Z"\n    }\n  },'
          );
          replace(adapter,
            '  storePurchase: {\n    ok: true,\n    purchaseId: "purchase-1",\n    quoteId: "quote-1",\n    finalTotalPrice: 50,\n    currencyCode: "ECO",\n    refreshRequired: true\n  },',
            '  storePurchase: {\n    ok: true,\n    receipt: {\n      receiptKey: "receipt_22222222222222222222222222222222",\n      quoteKey: "quote_11111111111111111111111111111111",\n      itemKey: "market-lens",\n      itemName: "Market Lens",\n      quantity: 1,\n      finalUnitPrice: 50,\n      finalTotalPrice: 50,\n      currencyCode: "ECO",\n      inventoryQuantityOwned: 2,\n      completedAt: "2026-07-17T12:01:00.000Z",\n      alreadyCompleted: false\n    },\n    refreshRequired: true\n  },'
          );
          replace(adapter, 'assert.equal(session.capabilityManifestVersion, "2026-07-19.1");', 'assert.equal(session.capabilityManifestVersion, "2026-07-19.3");');
          replace(adapter,
            'const quote = await apiCall(context("storeQuote", "POST", "/store/quotes", {\n  storeItemId: "item-1",\n  quantity: 1\n}));\nassert.equal(quote.quoteId, "quote-1");\nassert.deepEqual(calls.at(-1).payload, { itemId: "item-1", quantity: 1 });\nassert.equal(calls.at(-1).path, "/players/me/store/quote");',
            'const quote = await apiCall(context("storeQuote", "POST", "/store/quotes", {\n  itemKey: "market-lens",\n  quantity: 1\n}));\nassert.equal(quote.quote.quoteKey, "quote_11111111111111111111111111111111");\nassert.deepEqual(calls.at(-1).payload, { itemKey: "market-lens", quantity: 1 });\nassert.equal(calls.at(-1).path, "/players/me/store/quotes");'
          );
          replace(adapter,
            'const purchase = await apiCall(context("storePurchase", "POST", "/store/purchases", {\n  quoteId: "quote-1",\n  clientSubmittedAt: "2026-07-17T12:01:00.000Z"\n}, { idempotencyKey: "idem-purchase-1" }));\nassert.equal(purchase.purchaseId, "purchase-1");',
            'const purchase = await apiCall(context("storePurchase", "POST", "/store/purchases", {\n  quoteKey: "quote_11111111111111111111111111111111",\n  clientSubmittedAt: "2026-07-17T12:01:00.000Z"\n}, { idempotencyKey: "idem-purchase-1" }));\nassert.equal(purchase.receipt.receiptKey, "receipt_22222222222222222222222222222222");'
          );

          const storeFlow = 'player-terminal/tests/store-purchase-flow.mjs';
          replace(storeFlow, 'const item = { id: "item-1", name: "Market Lens", price: 50, stock: 8, owned: 1 };', 'const item = { id: "market-lens", itemKey: "market-lens", name: "Market Lens", price: 50, stock: 8, owned: 1 };');
          replace(storeFlow, '  quoteId: "quote-1",', '  quoteKey: "quote_11111111111111111111111111111111",');
          replace(storeFlow, 'assert.ok(review.includes("quote-1"));', 'assert.ok(review.includes("quote_11111111111111111111111111111111"));');
          replace(storeFlow, '  receipt: { purchaseId: "purchase-1", quoteId: "quote-1", finalTotalPrice: 110, currencyCode: "ECO" }', '  receipt: { receiptKey: "receipt_22222222222222222222222222222222", quoteKey: "quote_11111111111111111111111111111111", finalTotalPrice: 110, currencyCode: "ECO" }');
          replace(storeFlow, 'assert.ok(receipt.includes("purchase-1"));', 'assert.ok(receipt.includes("receipt_22222222222222222222222222222222"));');
          replace(storeFlow, '  receipt: { purchaseId: "purchase-1", quoteId: "quote-1", finalTotalPrice: 110, currencyCode: "ECO" },', '  receipt: { receiptKey: "receipt_22222222222222222222222222222222", quoteKey: "quote_11111111111111111111111111111111", finalTotalPrice: 110, currencyCode: "ECO" },');
          NODE
      - name: Commit corrections
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add backend player-terminal
          if git diff --cached --quiet; then
            echo 'No corrections remain.'
          else
            git commit -m 'Fix Store integration fixtures'
            git push origin HEAD:agent/player-store-public-boundary-v1
          fi
