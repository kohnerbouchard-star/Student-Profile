name: Apply Brand Repair On PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: brand-asset-render-fix-v2-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/brand-asset-render-fix-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out exact repair branch
        uses: actions/checkout@v7
        with:
          ref: agent/brand-asset-render-fix-v2
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Apply current-source-aware brand repair
        shell: bash
        run: |
          set -euo pipefail
          if grep -q 'econovaria-logo.jpg?v=20260724.2' index.html; then
            echo 'Brand repair is already applied.'
            exit 0
          fi

          python3 - <<'PY'
          from pathlib import Path
          import json
          import re

          VERSION = "20260724.2"

          def read(path):
              return Path(path).read_text(encoding="utf-8")

          def write(path, content):
              Path(path).write_text(content, encoding="utf-8")

          def replace_required(path, old, new):
              content = read(path)
              if new in content:
                  return
              if old not in content:
                  raise SystemExit(f"Required source token not found in {path}: {old[:100]!r}")
              write(path, content.replace(old, new, 1))

          def append_once(path, token, block):
              content = read(path)
              if token not in content:
                  write(path, content.rstrip() + "\n\n" + block.strip() + "\n")

          # Root login: verified JPEG, stable favicon declarations, and a visible fallback.
          replace_required(
              "index.html",
              '<link rel="icon" type="image/png" sizes="32x32" href="assets/brand/favicon-32.png" />',
              f'<link rel="icon" type="image/png" sizes="32x32" href="assets/brand/favicon-32.png?v={VERSION}" />\n  <link rel="shortcut icon" type="image/png" href="assets/brand/favicon-32.png?v={VERSION}" />',
          )
          replace_required(
              "index.html",
              '<img src="assets/brand/econovaria-logo.webp" width="286" height="161" alt="Econovaria" />',
              f'<span class="logo-mark-fallback" aria-hidden="true">ECONOVARIA</span>\n              <img src="assets/brand/econovaria-logo.jpg?v={VERSION}" width="600" height="338" alt="Econovaria" decoding="sync" fetchpriority="high" data-econovaria-brand-image />',
          )
          login = read("index.html")
          css_marker = "    @media (prefers-reduced-motion: reduce) {"
          fallback_css = '''    .login-root .logo-mark.is-econovaria-logo {
              position: relative;
              display: grid;
              place-items: center;
              overflow: hidden;
            }

            .login-root .logo-mark.is-econovaria-logo img {
              position: relative;
              z-index: 1;
            }

            .login-root .logo-mark-fallback {
              position: absolute;
              inset: 0;
              display: grid;
              place-items: center;
              color: #8eeeff;
              font: 900 clamp(22px, 5vw, 38px)/1 ui-sans-serif, system-ui, sans-serif;
              letter-spacing: .08em;
              text-shadow: 0 0 16px rgba(0, 212, 255, .55), 0 0 22px rgba(255, 0, 238, .28);
            }

            .login-root .logo-mark.has-brand-error img {
              display: none;
            }

'''
          if "logo-mark-fallback" not in login.split("</style>", 1)[0]:
              if css_marker not in login:
                  raise SystemExit("Root login CSS insertion marker missing")
              login = login.replace(css_marker, fallback_css + css_marker, 1)
          script_old = '''  <script>
              window.setTimeout(function releasePreloadFallback() {
                document.documentElement.classList.remove("preload");
              }, 1800);
            </script>'''
          script_new = '''  <script>
              (function installLoginBrandFallback() {
                const image = document.querySelector("[data-econovaria-brand-image]");
                const mark = image?.closest(".logo-mark");
                const fail = function () { mark?.classList.add("has-brand-error"); };
                image?.addEventListener("load", function () { mark?.classList.remove("has-brand-error"); });
                image?.addEventListener("error", fail, { once: true });
                if (image?.complete && image.naturalWidth === 0) fail();
                window.setTimeout(function releasePreloadFallback() {
                  document.documentElement.classList.remove("preload");
                }, 1800);
              })();
            </script>'''
          if script_new not in login:
              if script_old not in login:
                  raise SystemExit("Root login preload script marker missing")
              login = login.replace(script_old, script_new, 1)
          write("index.html", login)

          # Player: local PNG, local favicon, and SVG/text fallback when image decoding fails.
          replace_required(
              "player-terminal/index.html",
              '<link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32.png" />',
              f'<link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32.png?v={VERSION}" />\n  <link rel="shortcut icon" type="image/png" href="./assets/favicon-32.png?v={VERSION}" />',
          )
          layout = read("player-terminal/src/components/layout.js")
          replacement = f'''function logoMark() {{
            return `<span class="player-terminal-logo-fallback" aria-hidden="true">E</span><img src="./assets/econovaria-icon.png?v={VERSION}" class="player-terminal-logo-image" width="42" height="42" alt="" aria-hidden="true" decoding="sync" data-player-brand-image>`;
          }}'''
          layout, count = re.subn(r'function logoMark\(\) \{.*?\n\}', replacement, layout, count=1, flags=re.S)
          if count != 1:
              raise SystemExit(f"Expected one Player logoMark function, replaced {count}")
          write("player-terminal/src/components/layout.js", layout)
          append_once(
              "player-terminal/css/player-terminal.css",
              "Cross-surface brand asset rendering repair",
              '''/* Cross-surface brand asset rendering repair. */
              .player-terminal-brand-mark {
                position: relative !important;
                overflow: hidden !important;
                border-radius: 10px !important;
                box-shadow: 0 0 16px rgba(0,212,255,.18), 0 0 18px rgba(255,0,238,.10) !important;
              }
              .player-terminal-logo-fallback,
              .player-terminal-logo-image {
                position: absolute;
                inset: 0;
                width: 42px;
                height: 42px;
              }
              .player-terminal-logo-fallback {
                z-index: 0;
                display: grid;
                place-items: center;
                color: var(--terminal-amber);
                font: 900 25px/1 var(--player-terminal-font-ui);
                text-shadow: 0 0 12px rgba(0,212,255,.7);
              }
              .player-terminal-logo-image {
                z-index: 1;
                display: block;
                object-fit: cover;
                border-radius: 10px;
              }
              .player-terminal-logo-image[hidden] { display: none !important; }''',
          )
          main = read("player-terminal/src/main.js")
          player_listener = '''
          function handlePlayerBrandImage(event) {
            const target = event.target;
            if (!(target instanceof HTMLImageElement) || !target.matches("[data-player-brand-image]")) return;
            target.hidden = event.type === "error";
          }
          mount.addEventListener("error", handlePlayerBrandImage, true);
          mount.addEventListener("load", handlePlayerBrandImage, true);
          '''
          mount_line = 'const mount = document.getElementById("playerTerminal");'
          if "handlePlayerBrandImage" not in main:
              if mount_line not in main:
                  raise SystemExit("Player mount marker missing")
              main = main.replace(mount_line, mount_line + player_listener, 1)
          write("player-terminal/src/main.js", main)

          # Admin: local favicon and local PNG overlay; the existing SVG remains visible as fallback.
          replace_required(
              "admin/index.html",
              '<link rel="icon" type="image/png" sizes="32x32" href="../assets/brand/favicon-32.png" />',
              f'<link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32.png?v={VERSION}" />\n  <link rel="shortcut icon" type="image/png" href="./assets/favicon-32.png?v={VERSION}" />',
          )
          append_once(
              "admin/css/admin-stabilization-visual-finish.css",
              "Cross-surface Admin brand asset rendering repair",
              f'''/* Cross-surface Admin brand asset rendering repair. */
              .admin-terminal-brand-mark {{
                position: relative !important;
                overflow: hidden !important;
                color: var(--admin-terminal-cyan, #62e5ff) !important;
                background: none !important;
              }}
              .admin-terminal-brand-mark::after {{
                content: "";
                position: absolute;
                inset: 0;
                z-index: 2;
                background: url("../assets/econovaria-icon.png?v={VERSION}") center / cover no-repeat;
                pointer-events: none;
              }}
              .admin-terminal-brand-mark .admin-terminal-logo-svg {{
                position: relative;
                z-index: 1;
                display: block !important;
              }}''',
          )

          # Local gateway: fail closed on missing or corrupt cross-surface brand assets.
          gateway_path = "scripts/local-staging-gateway.py"
          gateway = read(gateway_path)
          gateway = gateway.replace('server_version = "EconovariaLocalGateway/1.1"', 'server_version = "EconovariaLocalGateway/1.2"')
          if "REQUIRED_BRAND_ASSETS" not in gateway:
              marker = '''STATIC_CONDITIONAL_HEADERS: Final[tuple[str, ...]] = (
              "If-Modified-Since",
              "If-None-Match",
          )
          '''
              addition = marker + '''PNG_SIGNATURE: Final[bytes] = b"\\x89PNG\\r\\n\\x1a\\n"
          JPEG_SIGNATURE: Final[bytes] = b"\\xff\\xd8\\xff"
          REQUIRED_BRAND_ASSETS: Final[tuple[tuple[str, bytes], ...]] = (
              ("assets/brand/econovaria-logo.jpg", JPEG_SIGNATURE),
              ("assets/brand/econovaria-icon.png", PNG_SIGNATURE),
              ("assets/brand/favicon-32.png", PNG_SIGNATURE),
              ("player-terminal/assets/econovaria-icon.png", PNG_SIGNATURE),
              ("player-terminal/assets/favicon-32.png", PNG_SIGNATURE),
              ("admin/assets/econovaria-icon.png", PNG_SIGNATURE),
              ("admin/assets/favicon-32.png", PNG_SIGNATURE),
          )


          def validate_brand_assets(root: Path) -> None:
              failures: list[str] = []
              for relative_path, signature in REQUIRED_BRAND_ASSETS:
                  asset_path = root / relative_path
                  if not asset_path.is_file():
                      failures.append(f"missing {relative_path}")
                  elif not asset_path.read_bytes().startswith(signature):
                      failures.append(f"invalid image signature {relative_path}")
              if failures:
                  raise SystemExit("Local brand asset validation failed: " + "; ".join(failures))

          '''
              if marker not in gateway:
                  raise SystemExit("Local gateway constant marker missing")
              gateway = gateway.replace(marker, addition, 1)
          root_check = '''    if not (root / "index.html").is_file():
              raise SystemExit(f"Repository root does not contain index.html: {root}")
          '''
          if "validate_brand_assets(root)" not in gateway:
              if root_check not in gateway:
                  raise SystemExit("Local gateway root marker missing")
              gateway = gateway.replace(root_check, root_check + "    validate_brand_assets(root)\n", 1)
          write(gateway_path, gateway)

          # Repository contract verifies signatures, references, and favicon persistence.
          contract = f'''import assert from "node:assert/strict";
          import {{ readFileSync }} from "node:fs";
          import {{ fileURLToPath }} from "node:url";
          import path from "node:path";

          const root = path.resolve(path.dirname(fileURLToPath(import.meta.url)), "..");
          const version = "{VERSION}";
          const png = Buffer.from([0x89,0x50,0x4e,0x47,0x0d,0x0a,0x1a,0x0a]);
          const jpeg = Buffer.from([0xff,0xd8,0xff]);
          const bytes = (p) => readFileSync(path.join(root, p));
          const text = (p) => readFileSync(path.join(root, p), "utf8");
          const signature = (p, s) => assert.ok(bytes(p).subarray(0, s.length).equals(s), `${{p}} has an invalid image signature`);

          ["assets/brand/econovaria-icon.png","assets/brand/favicon-32.png","player-terminal/assets/econovaria-icon.png","player-terminal/assets/favicon-32.png","admin/assets/econovaria-icon.png","admin/assets/favicon-32.png"].forEach((p) => signature(p, png));
          signature("assets/brand/econovaria-logo.jpg", jpeg);
          const login = text("index.html");
          const player = text("player-terminal/index.html");
          const playerLayout = text("player-terminal/src/components/layout.js");
          const admin = text("admin/index.html");
          const adminCss = text("admin/css/admin-stabilization-visual-finish.css");
          assert.match(login, new RegExp(`econovaria-logo\\.jpg\\?v=${{version.replaceAll(".", "\\\\.")}}`));
          assert.match(login, /rel="shortcut icon"/);
          assert.match(player, /rel="shortcut icon"/);
          assert.match(admin, /rel="shortcut icon"/);
          assert.match(playerLayout, /econovaria-icon\.png\?v=/);
          assert.match(adminCss, /econovaria-icon\.png\?v=/);
          assert.doesNotMatch(login, /econovaria-logo\.webp/);
          assert.match(text("scripts/local-staging-gateway.py"), /validate_brand_assets\(root\)/);
          console.log("Econovaria brand assets verified across Login, Player, Admin, and local staging.");
          '''
          write("scripts/brand-asset-contract.mjs", contract)

          package_path = Path("package.json")
          package = json.loads(package_path.read_text(encoding="utf-8"))
          scripts = package["scripts"]
          scripts["test:brand-assets"] = "node scripts/brand-asset-contract.mjs"
          if "npm run test:brand-assets" not in scripts["test"]:
              scripts["test"] = scripts["test"].replace("npm run audit &&", "npm run audit && npm run test:brand-assets &&", 1)
          package_path.write_text(json.dumps(package, indent=2) + "\n", encoding="utf-8")

          scope_path = "player-terminal/tools/verify-pr-scope.mjs"
          scope = read(scope_path)
          if '"assets/brand/econovaria-icon.png"' not in scope:
              marker = '  "assets/brand/econovaria-icon.webp",\n'
              addition = marker + '  "assets/brand/econovaria-icon.png",\n  "assets/brand/econovaria-logo.jpg",\n  "admin/assets/econovaria-icon.png",\n  "admin/assets/favicon-32.png",\n  "scripts/brand-asset-contract.mjs",\n'
              if marker not in scope:
                  raise SystemExit("Player scope branding marker missing")
              scope = scope.replace(marker, addition, 1)
          write(scope_path, scope)

          for obsolete in (
              "assets/brand/econovaria-logo.webp",
              "assets/brand/econovaria-icon.webp",
              "player-terminal/assets/econovaria-icon.webp",
          ):
              Path(obsolete).unlink(missing_ok=True)
          PY

      - name: Validate repaired branch
        run: |
          python3 -m py_compile scripts/local-staging-gateway.py
          node scripts/brand-asset-contract.mjs
          node --test scripts/local-staging-gateway-contract.test.mjs
          node --check player-terminal/src/main.js
          node --check player-terminal/src/components/layout.js

      - name: Commit repaired files
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet && git diff --cached --quiet; then
            echo 'No repair changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(brand): repair cross-surface logo and favicon rendering'
          git push origin HEAD:agent/brand-asset-render-fix-v2
