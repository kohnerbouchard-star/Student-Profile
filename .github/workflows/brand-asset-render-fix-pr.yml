name: Apply Brand Repair On PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: brand-asset-render-fix-v2-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/brand-asset-render-fix-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out exact repair branch
        uses: actions/checkout@v7
        with:
          ref: agent/brand-asset-render-fix-v2
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Extract and apply audited repair
        id: apply-repair
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          if grep -q 'econovaria-logo.jpg?v=20260724.2' index.html; then
            echo 'Brand repair is already applied.' | tee /tmp/brand-repair.log
            exit 0
          fi
          git fetch origin agent/brand-asset-render-fix-v1
          git show origin/agent/brand-asset-render-fix-v1:.github/workflows/brand-asset-render-fix-apply.yml > /tmp/audited-brand-repair.yml
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path('/tmp/audited-brand-repair.yml').read_text(encoding='utf-8').splitlines()
          start = next(i for i, line in enumerate(workflow) if line.strip() == '- name: Apply cross-surface branding repair')
          run_line = next(i for i in range(start, len(workflow)) if workflow[i].strip() == 'run: |')
          end = next(i for i in range(run_line + 1, len(workflow)) if workflow[i].startswith('      - name: Validate repaired assets'))
          block = workflow[run_line + 1:end]
          stripped = [line[10:] if line.startswith('          ') else line for line in block]
          Path('/tmp/apply-brand-repair.sh').write_text('\n'.join(stripped) + '\n', encoding='utf-8')
          PY
          bash /tmp/apply-brand-repair.sh 2>&1 | tee /tmp/brand-repair.log

      - name: Report repair mismatch
        if: steps.apply-repair.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          {
            echo '### Brand repair runner mismatch'
            echo
            echo 'The audited transform did not match the current `main` source exactly. Diagnostic tail:'
            echo
            echo '```text'
            tail -n 30 /tmp/brand-repair.log
            echo '```'
          } > /tmp/brand-repair-comment.md
          gh pr comment "$PR_NUMBER" --body-file /tmp/brand-repair-comment.md
          exit 1

      - name: Validate repaired branch
        run: |
          python3 -m py_compile scripts/local-staging-gateway.py
          node scripts/brand-asset-contract.mjs
          node --test scripts/local-staging-gateway-contract.test.mjs
          node --check player-terminal/src/main.js
          node --check player-terminal/src/components/layout.js

      - name: Commit repaired files
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet && git diff --cached --quiet; then
            echo 'No repair changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(brand): repair cross-surface logo and favicon rendering'
          git push origin HEAD:agent/brand-asset-render-fix-v2
