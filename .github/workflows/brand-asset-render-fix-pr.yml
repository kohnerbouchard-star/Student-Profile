name: Clean Brand Repair Artifacts

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    if: github.event.pull_request.head.ref == 'agent/brand-asset-render-fix-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact repair branch
        uses: actions/checkout@v7
        with:
          ref: agent/brand-asset-render-fix-v2
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Remove temporary repair files
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          for relative_path in (
              ".github/workflows/brand-asset-render-fix-pr.yml",
              "scripts/apply-brand-render-fix.py",
              "scripts/__pycache__/apply-brand-render-fix.cpython-312.pyc",
              "scripts/__pycache__/local-staging-gateway.cpython-312.pyc",
          ):
              Path(relative_path).unlink(missing_ok=True)

          scope_path = Path("player-terminal/tools/verify-pr-scope.mjs")
          scope = scope_path.read_text(encoding="utf-8")
          scope = scope.replace('  "scripts/apply-brand-render-fix.py",\n', "")
          scope_path.write_text(scope, encoding="utf-8")
          PY

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore(brand): remove temporary repair tooling'
          git push origin HEAD:agent/brand-asset-render-fix-v2
