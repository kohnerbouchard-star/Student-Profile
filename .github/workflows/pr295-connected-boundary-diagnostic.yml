name: PR295 Connected Boundary Diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/pr295-connected-boundary-diagnostic.yml"

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event.pull_request.number == 295
    runs-on: ubuntu-latest
    environment: staging
    env:
      RELEASE_COMMIT: 7838d93ef33908f61a2534486ec92031875a9a22
      EXPECTED_PR_HEAD: ${{ github.event.pull_request.head.sha }}
      EXPECTED_STAGING_PROJECT_REF: eecvbssdvarfcykcfrny
      PRODUCTION_PROJECT_REF: cgiukdjwicykrmtkhudh
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Report safe boundary state
        shell: bash
        run: |
          set -u
          git fetch origin main
          actual_head="$(git rev-parse HEAD)"
          actual_main="$(git rev-parse origin/main)"
          echo "actual_head=$actual_head"
          echo "expected_head=$EXPECTED_PR_HEAD"
          echo "actual_main=$actual_main"
          echo "release_commit=$RELEASE_COMMIT"
          echo "head_match=$([ "$actual_head" = "$EXPECTED_PR_HEAD" ] && echo true || echo false)"
          echo "main_match=$([ "$actual_main" = "$RELEASE_COMMIT" ] && echo true || echo false)"
          echo "access_token_present=$([ -n "${SUPABASE_ACCESS_TOKEN:-}" ] && echo true || echo false)"
          echo "project_ref_present=$([ -n "${SUPABASE_PROJECT_REF:-}" ] && echo true || echo false)"
          echo "db_password_present=$([ -n "${SUPABASE_DB_PASSWORD:-}" ] && echo true || echo false)"
          echo "project_match=$([ "${SUPABASE_PROJECT_REF:-}" = "$EXPECTED_STAGING_PROJECT_REF" ] && echo true || echo false)"
          echo "production_selected=$([ "${SUPABASE_PROJECT_REF:-}" = "$PRODUCTION_PROJECT_REF" ] && echo true || echo false)"
