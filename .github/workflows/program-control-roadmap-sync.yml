name: Program Control Roadmap Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - .github/workflows/program-control-roadmap-sync.yml
      - scripts/program-control-roadmap-sync.py

permissions:
  contents: write

jobs:
  reconcile-roadmap:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'chore/program-control-consolidation-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply deterministic roadmap reconciliation
        run: python scripts/program-control-roadmap-sync.py

      - name: Remove one-time reconciliation helpers
        run: rm scripts/program-control-roadmap-sync.py .github/workflows/program-control-roadmap-sync.yml

      - name: Commit generated roadmap update
        run: |
          if git diff --quiet; then
            echo "No roadmap reconciliation changes were generated."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/roadmaps/econovaria-beta-completion-roadmap-v1.md scripts/program-control-roadmap-sync.py .github/workflows/program-control-roadmap-sync.yml
          git commit -m "docs(roadmap): reconcile parallel ownership"
          git push origin HEAD:${{ github.head_ref }}
