name: Retire Player Notification Helper

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  retire:
    if: github.head_ref == 'agent/player-notification-inbox-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/player-notification-inbox-v1
          fetch-depth: 0
      - name: Remove this temporary helper
        run: |
          rm .github/workflows/minimize-player-notification-diff-v1.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: remove notification diff helper"
          git push origin HEAD:agent/player-notification-inbox-v1
