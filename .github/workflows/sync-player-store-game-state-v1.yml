name: Sync Player Store Game State

on:
  push:
    branches:
      - agent/player-store-negative-state-evidence-v1
    paths:
      - .github/workflows/sync-player-store-game-state-v1.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-player-store-game-state-v1
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out Store authority branch
        uses: actions/checkout@v7
        with:
          ref: agent/player-store-negative-state-evidence-v1
          fetch-depth: 0

      - name: Merge current main and reconcile overlap
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "4189828+github-actions[bot]@users.noreply.github.com"
          git fetch origin main --prune

          set +e
          git merge --no-ff --no-commit origin/main
          MERGE_STATUS=$?
          set -e

          if [ "$MERGE_STATUS" -ne 0 ]; then
            CONFLICTS="$(git diff --name-only --diff-filter=U)"
            UNEXPECTED="$(printf '%s\n' "$CONFLICTS" | grep -Ev '^(backend/package.json|\.github/workflows/configurable-stock-market-timezone-v1\.yml)$' || true)"
            if [ -n "$UNEXPECTED" ]; then
              echo "Unexpected merge conflicts:"
              printf '%s\n' "$UNEXPECTED"
              false
            fi
          fi

          git checkout --theirs .github/workflows/configurable-stock-market-timezone-v1.yml
          git checkout --theirs backend/package.json

          node <<'NODE'
          const fs = require('fs');
          const path = 'backend/package.json';
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
          pkg.scripts['test:player-store-public'] = 'deno test --allow-read=supabase/migrations/20260719150000_add_player_store_public_keys_v1.sql,supabase/migrations/20260624084500_add_store_country_currency_purchase_fields_v1.sql,supabase/migrations/20260719170000_gate_public_store_purchase_by_game_state_v1.sql,src/domains/players/api/playerSessionHttpHelpers.ts --config supabase/functions/classroom-api/deno.json --lock=supabase/functions/deno.lock --frozen src/domains/store/api/playerStorePublicHttpHandler.test.ts src/domains/store/tests/playerStorePublicMigrationContract.test.ts src/domains/store/tests/playerStoreGameStateMigrationContract.test.ts src/domains/store/tests/playerStorePublicRateLimitContract.test.ts src/domains/store/tests/playerStoreFullLifecycleIntegration.test.ts src/domains/store/tests/playerStoreNegativeStateMatrix.test.ts src/domains/store/tests/playerStoreNegativeStateIntegration.test.ts';
          fs.writeFileSync(path, `${JSON.stringify(pkg, null, 2)}\n`);
          NODE

          git add .github/workflows/configurable-stock-market-timezone-v1.yml backend/package.json
          git rm .github/workflows/sync-player-store-game-state-v1.yml
          git add -A
          git diff --check
          git commit -m "chore(sync): merge current main into Store game-state enforcement"
          git push origin HEAD:agent/player-store-negative-state-evidence-v1
