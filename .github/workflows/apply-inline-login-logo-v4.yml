name: Apply Inline Login Logo V4

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: apply-inline-login-logo-v4-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/login-brand-runtime-fix-v3'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repair branch
        uses: actions/checkout@v7
        with:
          ref: agent/login-brand-runtime-fix-v3
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install image tooling
        run: python -m pip install --disable-pip-version-check pillow==11.3.0

      - name: Embed display logo into login document
        run: python scripts/apply-inline-login-logo-v4.py

      - name: Validate login in Chromium
        run: |
          npm ci --ignore-scripts
          npx playwright install --with-deps chromium
          node scripts/login-surface-browser-smoke.mjs

      - name: Remove one-time repair machinery
        run: |
          rm -f scripts/apply-inline-login-logo-v4.py
          rm -f .github/workflows/apply-inline-login-logo-v4.yml

      - name: Validate final source contract
        run: |
          python - <<'PY'
          from pathlib import Path
          html = Path('index.html').read_text(encoding='utf-8')
          assert 'data-econovaria-brand-source="inline"' in html
          assert 'src="data:image/png;base64,' in html
          assert './assets/brand/econovaria-logo.png?v=20260724.4' not in html
          assert not Path('scripts/apply-inline-login-logo-v4.py').exists()
          assert not Path('.github/workflows/apply-inline-login-logo-v4.yml').exists()
          print('Inline login logo source contract passed.')
          PY

      - name: Commit self-contained login logo
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(login): embed self-contained display logo'
          git push origin HEAD:agent/login-brand-runtime-fix-v3
