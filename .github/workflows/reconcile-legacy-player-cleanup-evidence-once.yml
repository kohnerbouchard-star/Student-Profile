name: Reconcile Legacy Player Cleanup Evidence Once

on:
  pull_request:
    branches:
      - main
    paths:
      - "scripts/reconcile-legacy-player-cleanup-evidence-v1.mjs"
      - ".github/workflows/reconcile-legacy-player-cleanup-evidence-once.yml"

permissions:
  contents: write

concurrency:
  group: legacy-player-cleanup-evidence-${{ github.head_ref }}
  cancel-in-progress: false

jobs:
  reconcile:
    if: github.head_ref == 'agent/legacy-player-cleanup-evidence-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out evidence branch
        uses: actions/checkout@v7
        with:
          ref: agent/legacy-player-cleanup-evidence-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm

      - name: Install repository tooling
        run: npm ci --no-audit --no-fund

      - name: Reconcile merged cleanup evidence
        run: node scripts/reconcile-legacy-player-cleanup-evidence-v1.mjs

      - name: Verify repository evidence state
        run: npm test

      - name: Remove one-time helpers
        run: |
          rm -f scripts/reconcile-legacy-player-cleanup-evidence-v1.mjs
          rm -f .github/workflows/reconcile-legacy-player-cleanup-evidence-once.yml

      - name: Commit permanent evidence
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No evidence changes were produced."
            false
          fi
          git commit -m "docs(player): record merged legacy cleanup evidence"
          git push origin HEAD:agent/legacy-player-cleanup-evidence-v1
