name: Core Coverage Refresh PR

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - ".github/workflows/core-coverage-refresh-pr.yml"

permissions:
  contents: write

concurrency:
  group: core-coverage-refresh-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  refresh-core-coverage:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/seed-content-usable-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"

      - name: Refresh deterministic core coverage reports
        run: |
          node scripts/seed-core-content-coverage-audit.mjs
          node scripts/seed-core-content-coverage-audit.mjs --check

      - name: Commit reports and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            docs/seed-content/reviews/core-content-coverage-audit-v1.json \
            docs/seed-content/reviews/core-content-coverage-audit-v1.md
          git rm .github/workflows/core-coverage-refresh-pr.yml
          git commit -m "seed: refresh core content coverage reports"
          git push origin "HEAD:${{ github.head_ref }}"
