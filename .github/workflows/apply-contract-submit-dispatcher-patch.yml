name: Apply Contract Submit Dispatcher Patch

on:
  push:
    branches:
      - agent/player-contract-submission-public-key-v1
    paths:
      - ".github/workflows/apply-contract-submit-dispatcher-patch.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/player-contract-submission-public-key-v1
          fetch-depth: 0

      - name: Apply bounded dispatcher and ratchet edits
        shell: python
        run: |
          from pathlib import Path

          def replace_once(path, old, new):
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected one anchor in {path}, found {count}: {old[:80]!r}")
              file.write_text(text.replace(old, new, 1))

          index = "backend/supabase/functions/classroom-api/index.ts"
          replace_once(
              index,
              'import {\n  readPlayerContractPublicListRoutePath,\n} from "../../../src/domains/contracts/api/playerContractPublicListRoutePaths.ts";\n',
              'import {\n  readPlayerContractPublicListRoutePath,\n} from "../../../src/domains/contracts/api/playerContractPublicListRoutePaths.ts";\nimport {\n  handlePlayerContractPublicSubmitRequest,\n} from "../../../src/domains/contracts/api/playerContractPublicSubmitHttpHandler.ts";\nimport {\n  readPlayerContractPublicSubmitRoutePath,\n} from "../../../src/domains/contracts/api/playerContractPublicSubmitRoutePaths.ts";\n',
          )
          replace_once(
              index,
              '  const playerContractPublicListRoute =\n    readPlayerContractPublicListRoutePath(url.pathname);\n',
              '  const playerContractPublicSubmitRoute =\n    readPlayerContractPublicSubmitRoutePath(url.pathname);\n\n  if (playerContractPublicSubmitRoute) {\n    return dispatchRateLimitedReviewedPlayerRequest(\n      request,\n      "contractSubmit",\n      () =>\n        handlePlayerContractPublicSubmitRequest(\n          request,\n          playerContractPublicSubmitRoute,\n          { createServiceClient },\n        ),\n      { createServiceClient },\n    );\n  }\n\n  const playerContractPublicListRoute =\n    readPlayerContractPublicListRoutePath(url.pathname);\n',
          )

          dispatch_test = "backend/src/security/classroomApiRateLimitDispatch.test.ts"
          replace_once(
              dispatch_test,
              '    10,\n',
              '    11,\n',
          )
          replace_once(
              dispatch_test,
              '      "return handlePlayerContractAcceptanceRequest(",\n',
              '      "return handlePlayerContractAcceptanceRequest(",\n      "return handlePlayerContractPublicSubmitRequest(",\n',
          )

          rate_test = "backend/src/security/playerRateLimitDispatch.test.ts"
          replace_once(
              rate_test,
              '    "contractAccept:POST": ["player.contracts.accept", "write"],\n',
              '    "contractAccept:POST": ["player.contracts.accept", "write"],\n    "contractSubmit:POST": ["player.contracts.submit", "write"],\n',
          )

          workflow = ".github/workflows/player-terminal-verify.yml"
          replace_once(
              workflow,
              '              $0 ~ /^backend\\/src\\/domains\\/contracts\\/api\\/playerContractPublicList[A-Za-z0-9.-]*[.]ts$/ { next }\n',
              '              $0 ~ /^backend\\/src\\/domains\\/contracts\\/api\\/playerContractPublicList[A-Za-z0-9.-]*[.]ts$/ { next }\n              $0 ~ /^backend\\/src\\/domains\\/contracts\\/api\\/playerContractPublicSubmit[A-Za-z0-9.-]*[.]ts$/ { next }\n',
          )

      - name: Commit bounded patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/supabase/functions/classroom-api/index.ts \
            backend/src/security/classroomApiRateLimitDispatch.test.ts \
            backend/src/security/playerRateLimitDispatch.test.ts \
            .github/workflows/player-terminal-verify.yml
          git commit -m "Wire public Contract submission dispatcher"
          git push origin HEAD:agent/player-contract-submission-public-key-v1
