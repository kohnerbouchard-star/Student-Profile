name: Progression Convergence Trigger

on:
  pull_request:
    types:
      - opened
      - synchronize
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: progression-final-convergence
  cancel-in-progress: false

jobs:
  trigger:
    if: github.head_ref == 'ops/progression-convergence-trigger-20260723'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CONVERGENCE_OVERLAY_REVISION: "2"
    steps:
      - name: Check out sole Progression authority
        uses: actions/checkout@v7
        with:
          ref: agent/progression-reputation-achievements-v1
          fetch-depth: 0
          persist-credentials: true
      - name: Prepare current-main convergence overlay
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python3 scripts/progression-final-convergence-overlay.py
      - name: Execute guarded Progression convergence
        shell: bash
        run: |
          set +e
          bash scripts/progression-final-convergence.sh 2>&1 | tee "$RUNNER_TEMP/progression-convergence.log"
          status=${PIPESTATUS[0]}
          exit "$status"
      - name: Upload sanitized convergence diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: progression-convergence-diagnostics-${{ github.run_id }}
          path: ${{ runner.temp }}/progression-convergence.log
          if-no-files-found: error
          retention-days: 7
