name: Progression Convergence Trigger

on:
  pull_request:
    types:
      - opened
      - synchronize
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: progression-final-convergence
  cancel-in-progress: false

jobs:
  trigger:
    if: github.head_ref == 'ops/progression-convergence-trigger-20260723'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CONVERGENCE_OVERLAY_REVISION: "8"
    steps:
      - name: Check out sole Progression authority
        uses: actions/checkout@v7
        with:
          ref: agent/progression-reputation-achievements-v1
          fetch-depth: 0
          persist-credentials: true
      - name: Prepare current-main convergence overlay
        shell: bash
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          sed -i "0,/block = '''save(manifest_path, manifest)/s//block = \"\"\"save(manifest_path, manifest)/" scripts/progression-final-convergence-overlay.py
          sed -i "0,/classroom_path ='''/s//classroom_path =\"\"\"/" scripts/progression-final-convergence-overlay.py
          python3 -m py_compile scripts/progression-final-convergence-overlay.py 2>&1 | tee "$RUNNER_TEMP/progression-overlay.log"
          compile_status=${PIPESTATUS[0]}
          if [ "$compile_status" -eq 0 ]; then
            python3 scripts/progression-final-convergence-overlay.py 2>&1 | tee -a "$RUNNER_TEMP/progression-overlay.log"
            status=${PIPESTATUS[0]}
          else
            status=$compile_status
          fi
          if [ "$status" -eq 0 ]; then
            sed -i 's|git diff --cached --check$|git diff --cached --check -- . ":(exclude)docs/workstreams/messaging-communication-v1.md"|' scripts/progression-final-convergence.sh
            sed -i '/Messaging main not incorporated/c\test "$(cat .git/MERGE_HEAD)" = "$EXPECTED_MAIN_HEAD" || fail "Messaging main merge parent missing"' scripts/progression-final-convergence.sh
            sed -i '/rm -f .github\/workflows\/progression-final-convergence-carrier.yml/d' scripts/progression-final-convergence.sh
            sed -i '/git checkout .*progression-runtime-v1.yml/c\git checkout "origin/$BRANCH_NAME" -- .github/workflows/progression-runtime-v1.yml .github/workflows/progression-final-convergence-carrier.yml' scripts/progression-final-convergence.sh
            grep -Fq 'Messaging main merge parent missing' scripts/progression-final-convergence.sh || status=1
            grep -Fq 'origin/$BRANCH_NAME' scripts/progression-final-convergence.sh || status=1
          fi
          exit "$status"
      - name: Execute guarded Progression convergence
        shell: bash
        run: |
          set +e
          bash scripts/progression-final-convergence.sh 2>&1 | tee "$RUNNER_TEMP/progression-convergence.log"
          status=${PIPESTATUS[0]}
          exit "$status"
      - name: Upload sanitized convergence diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: progression-convergence-diagnostics-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/progression-overlay.log
            ${{ runner.temp }}/progression-convergence.log
          if-no-files-found: warn
          retention-days: 7
