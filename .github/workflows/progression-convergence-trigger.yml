name: Progression Exact-Head Fix Carrier

on:
  pull_request:
    types:
      - synchronize
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: progression-exact-head-fix
  cancel-in-progress: false

jobs:
  fix:
    if: github.head_ref == 'ops/progression-convergence-trigger-20260723'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out sole Progression authority
        uses: actions/checkout@v7
        with:
          ref: agent/progression-reputation-achievements-v1
          fetch-depth: 0
          persist-credentials: true
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.3
      - name: Apply and verify exact-head fixes
        shell: bash
        run: bash <(git show origin/ops/progression-convergence-trigger-20260723:scripts/progression-exact-head-fix.sh)
