name: Progression Staging Compatibility Repair

on:
  pull_request:
    types:
      - reopened
      - synchronize
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: progression-staging-compatibility-repair
  cancel-in-progress: false

jobs:
  repair:
    if: github.head_ref == 'ops/progression-convergence-trigger-20260723'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out Progression authority
        uses: actions/checkout@v7
        with:
          ref: agent/progression-reputation-achievements-v1
          fetch-depth: 0
          persist-credentials: true

      - name: Apply bounded staging compatibility repair
        shell: bash
        run: bash <(git show origin/ops/progression-convergence-trigger-20260723:scripts/progression-staging-compat-fix.sh)
