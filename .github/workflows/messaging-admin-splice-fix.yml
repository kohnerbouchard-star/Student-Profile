name: Messaging Admin Splice Fix

on:
  push:
    branches:
      - agent/messaging-communication-v1
    paths:
      - .github/workflows/messaging-admin-splice-fix.yml

permissions:
  contents: write
  statuses: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const branch = 'agent/messaging-communication-v1';
            const file = 'backend/supabase/functions/admin-api/index.ts';
            const current = await github.rest.repos.getContent({ owner: context.repo.owner, repo: context.repo.repo, path: file, ref: branch });
            if (Array.isArray(current.data) || !current.data.sha || !current.data.content) throw new Error('Invalid Admin API file');
            let text = Buffer.from(current.data.content, 'base64').toString('utf8');
            const before = `      );\n    if (suffix.startsWith("/messages")) {`;
            if (!text.includes(before)) throw new Error('Expected Marketplace/Messaging splice not found');
            text = text.replace(before, `      );\n    }\n\n    if (suffix.startsWith("/messages")) {`);
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner, repo: context.repo.repo, path: file, branch,
              sha: current.data.sha,
              message: 'fix(messaging): close Marketplace block before Messaging dispatch',
              content: Buffer.from(text).toString('base64'),
            });

      - name: Publish fix status
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner, repo: context.repo.repo, sha: context.sha,
              state: '${{ job.status }}' === 'success' ? 'success' : 'failure',
              context: 'messaging/admin-splice-fix',
              description: 'Admin Marketplace/Messaging boundary correction',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
