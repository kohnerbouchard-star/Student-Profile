name: Connected Operations Source Snapshot

on:
  push:
    branches:
      - agent/production-integration-gate-v1
    paths:
      - ".github/workflows/connected-operations-source-snapshot.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Build source archives
        shell: bash
        run: |
          git archive --format=zip --output=/tmp/integration-branch-source.zip HEAD
          git archive --format=zip --output=/tmp/current-main-source.zip origin/main
      - name: Upload source archives
        uses: actions/upload-artifact@v4
        with:
          name: connected-operations-sources-${{ github.sha }}
          path: |
            /tmp/integration-branch-source.zip
            /tmp/current-main-source.zip
          if-no-files-found: error
          retention-days: 1
