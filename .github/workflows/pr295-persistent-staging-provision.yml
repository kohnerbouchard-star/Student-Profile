name: PR295 Persistent Staging Provision

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/pr295-persistent-staging-provision.yml"
      - "scripts/pr295-persistent-staging-provision.mjs"
      - "scripts/pr295-persistent-staging-provision-lib.mjs"
      - "scripts/pr295-persistent-staging-provision.test.mjs"
      - "scripts/seed-beta-importer.mjs"
      - "scripts/seed-beta-pack-lib.mjs"
      - "scripts/seed-beta-pack-validator.mjs"
      - "docs/seed-content/executable/beta-pack-v1/**"

permissions:
  contents: read

concurrency:
  group: pr295-persistent-staging-provision-v1
  cancel-in-progress: false

jobs:
  contract-tests:
    name: Persistent provisioning contract
    if: github.event.pull_request.number == 295
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out exact PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm
      - name: Install pinned repository tooling
        run: |
          npm install --global npm@10.9.8
          npm ci
      - name: Validate provisioning sources
        run: |
          node --check scripts/pr295-persistent-staging-provision-lib.mjs
          node --check scripts/pr295-persistent-staging-provision.mjs
          node --test scripts/pr295-persistent-staging-provision.test.mjs
          node scripts/seed-beta-importer.mjs --mode validate --environment staging

  provision-staging-game:
    name: Activate canonical content in staging preview
    if: github.event.pull_request.number == 295
    needs:
      - contract-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging
    env:
      RELEASE_COMMIT: dac68561c2d0d3607e8367394ebcaed77972fb6c
      EXPECTED_STAGING_PROJECT_REF: eecvbssdvarfcykcfrny
      PRODUCTION_PROJECT_REF: cgiukdjwicykrmtkhudh
      TARGET_GAME_NAME: Econovaria Staging Preview
      TARGET_GAME_ID_SHA256: c15408fa67056586134331a39ba9c59ded9b6f45772d3c48a38bbbab002a9b2c
      PROVISION_APPROVED_BY: "Repository owner instruction 2026-07-24: provision playable staging game"
      EVIDENCE_PATH: /tmp/pr295-persistent-staging-provision.json
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      CONFIGURED_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Check out exact PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Enforce exact source and staging boundaries
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
          git fetch origin main
          test "$(git rev-parse origin/main)" = "$RELEASE_COMMIT"
          test -n "$SUPABASE_PROJECT_REF"
          test "$SUPABASE_PROJECT_REF" = "$EXPECTED_STAGING_PROJECT_REF"
          test "$SUPABASE_PROJECT_REF" != "$PRODUCTION_PROJECT_REF"
          [[ "$SUPABASE_PROJECT_REF" =~ ^[a-z0-9]{20}$ ]]
          echo "SUPABASE_URL=https://${SUPABASE_PROJECT_REF}.supabase.co" >> "$GITHUB_ENV"

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"
          cache: npm

      - name: Install pinned repository tooling
        run: |
          npm install --global npm@10.9.8
          npm ci

      - name: Resolve protected staging service credential
        shell: bash
        run: |
          set -euo pipefail
          service="$CONFIGURED_SERVICE_ROLE_KEY"
          if [ -z "$service" ]; then
            test -n "$SUPABASE_ACCESS_TOKEN"
            curl --fail --silent --show-error \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF/api-keys?reveal=true" \
              > /tmp/project-api-keys.json
            node - <<'NODE'
          const fs = require('node:fs');
          const rows = JSON.parse(fs.readFileSync('/tmp/project-api-keys.json', 'utf8'));
          const service = rows.find((row) => row.name === 'service_role' && row.api_key)?.api_key || '';
          fs.writeFileSync('/tmp/service-role-key', service);
          NODE
            service="$(cat /tmp/service-role-key)"
          fi
          test -n "$service"
          echo "::add-mask::$service"
          printf 'SUPABASE_SERVICE_ROLE_KEY=%s\n' "$service" >> "$GITHUB_ENV"
          rm -f /tmp/project-api-keys.json /tmp/service-role-key

      - name: Re-run provisioning contract before connected write
        run: node --test scripts/pr295-persistent-staging-provision.test.mjs

      - name: Activate and verify canonical staging content
        run: node scripts/pr295-persistent-staging-provision.mjs

      - name: Upload sanitized provisioning evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr295-persistent-staging-provision-${{ github.event.pull_request.head.sha }}
          path: /tmp/pr295-persistent-staging-provision.json
          if-no-files-found: warn
          retention-days: 30

      - name: Record persistent staging boundary
        if: success()
        run: |
          {
            echo "## Persistent playable staging provisioning"
            echo "- Project bound to isolated staging: \`true\`"
            echo "- Game bound by SHA-256 identity: \`true\`"
            echo "- Canonical seed release remains active: \`true\`"
            echo "- Active market assets: \`240\`"
            echo "- Seed Contracts activated: \`30\`"
            echo "- Store items activated: \`50\`"
            echo "- Existing staff-authored content preserved: \`true\`"
            echo "- Automatic rollback executed: \`false\`"
            echo "- Production touched: \`false\`"
          } >> "$GITHUB_STEP_SUMMARY"
