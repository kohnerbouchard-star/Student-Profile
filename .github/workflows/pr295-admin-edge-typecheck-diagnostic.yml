name: PR295 Admin Edge Typecheck Diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/pr295-admin-edge-typecheck-diagnostic.yml"
      - "backend/package.json"
      - "backend/package-lock.json"
      - "backend/src/**"
      - "backend/supabase/functions/admin-api/**"

permissions:
  contents: read

concurrency:
  group: pr295-admin-edge-typecheck-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out exact PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.23.1"

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.3

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Capture exact Admin edge typecheck
        id: typecheck
        shell: bash
        run: |
          set +e
          npm --prefix backend run typecheck:admin-edge > /tmp/admin-edge-typecheck.log 2>&1
          status=$?
          cat /tmp/admin-edge-typecheck.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr295-admin-edge-typecheck-${{ github.event.pull_request.head.sha || github.sha }}
          path: /tmp/admin-edge-typecheck.log
          if-no-files-found: error
          retention-days: 7
