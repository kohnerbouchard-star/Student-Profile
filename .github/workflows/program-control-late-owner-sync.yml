name: Program Control Late Owner Sync

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - .github/workflows/program-control-late-owner-sync.yml
      - scripts/program-control-late-owner-sync.py

permissions:
  contents: write

jobs:
  sync-owners:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'docs/program-control-phase0-final-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - run: python scripts/program-control-late-owner-sync.py
      - run: rm scripts/program-control-late-owner-sync.py .github/workflows/program-control-late-owner-sync.yml
      - name: Commit late ownership reconciliation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/operations/branch-cleanup-2026-07-17.md docs/roadmaps/econovaria-beta-completion-roadmap-v1.md scripts/program-control-late-owner-sync.py .github/workflows/program-control-late-owner-sync.yml
          git commit -m "docs(program): reconcile late active ownership"
          git push origin HEAD:${{ github.head_ref }}
