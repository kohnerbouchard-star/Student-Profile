name: Trigger Player Banking Public Read

on:
  pull_request:
    paths:
      - ".github/workflows/apply-player-banking-public-read-v1.yml"
      - ".github/workflows/trigger-player-banking-public-read-v1.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/player-banking-public-read-v1
          fetch-depth: 0

      - name: Execute deterministic integration patch
        shell: bash
        run: |
          set +e
          python3 <<'PY' > /tmp/player-banking-patch.log 2>&1
          from pathlib import Path
          import textwrap
          import traceback

          try:
              workflow = Path('.github/workflows/apply-player-banking-public-read-v1.yml').read_text()
              marker = "          python3 <<'PY'\n"
              start = workflow.index(marker) + len(marker)
              end = workflow.index("\n          PY\n", start)
              code = textwrap.dedent(workflow[start:end])
              cleaned = []
              inside_literal = False
              literal_strip = 0
              for line in code.splitlines():
                  if inside_literal and literal_strip > 0 and line.startswith(" " * literal_strip):
                      line = line[literal_strip:]
                  cleaned.append(line)
                  if line.count("'''") % 2 == 1:
                      if inside_literal:
                          inside_literal = False
                          literal_strip = 0
                      else:
                          content = line.split("'''", 1)[1]
                          first_indent = len(content) - len(content.lstrip(" "))
                          literal_strip = max(0, 6 - first_indent)
                          inside_literal = True
              code = "\n".join(cleaned) + "\n"
              exec(compile(code, 'apply-player-banking-public-read-v1', 'exec'))
          except Exception:
              traceback.print_exc()
              raise
          PY
          status=$?
          set -e

          cat /tmp/player-banking-patch.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/player-banking-patch.log player-banking-patch-error-current.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add player-banking-patch-error-current.txt
            git commit -m "chore(banking): record normalized integration failure" || true
            git push origin HEAD:agent/player-banking-public-read-v1
            false
          fi

          git rm -f player-banking-patch-error.txt player-banking-patch-error-v3.txt player-banking-patch-error-current.txt
          git rm .github/workflows/apply-player-banking-public-read-v1.yml
          git rm .github/workflows/trigger-player-banking-public-read-v1.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(banking): connect UUID-private paginated Player read"
          git push origin HEAD:agent/player-banking-public-read-v1
