name: Trigger Player Banking Public Read

on:
  pull_request:
    paths:
      - ".github/workflows/apply-player-banking-public-read-v1.yml"
      - ".github/workflows/trigger-player-banking-public-read-v1.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/player-banking-public-read-v1
          fetch-depth: 0

      - name: Execute deterministic integration patch
        shell: bash
        run: |
          set +e
          python3 <<'PY' > /tmp/player-banking-patch.log 2>&1
          from pathlib import Path
          import re
          import textwrap
          import traceback

          flexible_definition = r'''def replace_once(path, old, new):
              file = Path(path)
              text = file.read_text()
              old_lines = old.splitlines()
              if len(old_lines) == 1:
                  target = old.strip()
                  if target in text:
                      file.write_text(text.replace(target, new.strip(), 1))
                      return
              source_lines = text.splitlines()
              expected = [line.strip() for line in old_lines]
              for index in range(0, len(source_lines) - len(old_lines) + 1):
                  candidate = source_lines[index:index + len(old_lines)]
                  if [line.strip() for line in candidate] != expected:
                      continue
                  first = candidate[0]
                  baseline = len(first) - len(first.lstrip(" "))
                  replacement = []
                  for line in new.splitlines():
                      replacement.append("" if not line.strip() else " " * baseline + line.strip())
                  source_lines[index:index + len(old_lines)] = replacement
                  suffix = "\n" if text.endswith("\n") else ""
                  file.write_text("\n".join(source_lines) + suffix)
                  return
              raise SystemExit(f"missing replacement block in {path}: {expected[:3]!r}")
          '''

          try:
              workflow = Path('.github/workflows/apply-player-banking-public-read-v1.yml').read_text()
              marker = "          python3 <<'PY'\n"
              start = workflow.index(marker) + len(marker)
              end = workflow.index("\n          PY\n", start)
              code = textwrap.dedent(workflow[start:end])
              definition_start = code.index("def replace_once(path, old, new):")
              definition_end = code.index("\n\nreplace_once(", definition_start)
              code = code[:definition_start] + textwrap.dedent(flexible_definition) + code[definition_end:]
              code = re.sub(
                  r'\nreplace_once\(\n\s+"player-terminal/src/pages/banking-page[.]js",.*?\n\)\n',
                  "\n",
                  code,
                  flags=re.S,
              )
              exec(compile(code, 'apply-player-banking-public-read-v1', 'exec'))
          except Exception:
              traceback.print_exc()
              raise
          PY
          status=$?
          set -e

          cat /tmp/player-banking-patch.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/player-banking-patch.log player-banking-patch-error-flexible.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add player-banking-patch-error-flexible.txt
            git commit -m "chore(banking): record flexible integration failure" || true
            git push origin HEAD:agent/player-banking-public-read-v1
            false
          fi

          git rm -f player-banking-patch-error*.txt
          git rm .github/workflows/apply-player-banking-public-read-v1.yml
          git rm .github/workflows/trigger-player-banking-public-read-v1.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(banking): connect UUID-private paginated Player read"
          git push origin HEAD:agent/player-banking-public-read-v1
