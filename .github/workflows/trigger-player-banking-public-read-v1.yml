name: Trigger Player Banking Public Read

on:
  pull_request:
    paths:
      - ".github/workflows/apply-player-banking-public-read-v1.yml"
      - ".github/workflows/trigger-player-banking-public-read-v1.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/player-banking-public-read-v1
          fetch-depth: 0

      - name: Execute deterministic integration patch
        shell: bash
        run: |
          set +e
          python3 <<'PY' > /tmp/player-banking-patch.log 2>&1
          from pathlib import Path
          import re
          import textwrap
          import traceback

          def normalize_literal(match):
              content = match.group(1)
              lines = content.splitlines()
              if len(lines) <= 1:
                  return "'''" + content + "'''"
              first_indent = len(lines[0]) - len(lines[0].lstrip(" "))
              subsequent = [
                  len(line) - len(line.lstrip(" "))
                  for line in lines[1:]
                  if line.strip()
              ]
              if not subsequent:
                  return "'''" + content + "'''"
              extra = max(0, min(subsequent) - (first_indent + 2))
              normalized = [lines[0]]
              for line in lines[1:]:
                  normalized.append(line[extra:] if line.startswith(" " * extra) else line)
              return "'''" + "\n".join(normalized) + "'''"

          try:
              workflow = Path('.github/workflows/apply-player-banking-public-read-v1.yml').read_text()
              marker = "          python3 <<'PY'\n"
              start = workflow.index(marker) + len(marker)
              end = workflow.index("\n          PY\n", start)
              code = textwrap.dedent(workflow[start:end])
              code = re.sub(r"'''(.*?)'''", normalize_literal, code, flags=re.S)
              exec(compile(code, 'apply-player-banking-public-read-v1', 'exec'))
          except Exception:
              traceback.print_exc()
              raise
          PY
          status=$?
          set -e

          cat /tmp/player-banking-patch.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/player-banking-patch.log player-banking-patch-error-block.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add player-banking-patch-error-block.txt
            git commit -m "chore(banking): record block-normalized integration failure" || true
            git push origin HEAD:agent/player-banking-public-read-v1
            false
          fi

          git rm -f player-banking-patch-error*.txt
          git rm .github/workflows/apply-player-banking-public-read-v1.yml
          git rm .github/workflows/trigger-player-banking-public-read-v1.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(banking): connect UUID-private paginated Player read"
          git push origin HEAD:agent/player-banking-public-read-v1
