name: Branch Hygiene

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  delete-merged-head:
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref != github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged pull-request branch
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const retained = new Set([
              context.payload.repository.default_branch,
              "frontend/admin-terminal-source-v1"
            ]);

            if (retained.has(branch)) {
              core.notice(`Retaining protected branch ${branch}.`);
              return;
            }

            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`
              });
              core.notice(`Deleted merged branch ${branch}.`);
            } catch (error) {
              if (error.status === 422) {
                core.notice(`Branch ${branch} is already absent or protected.`);
                return;
              }
              throw error;
            }
