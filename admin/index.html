<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="econovaria-admin-api-base" content="https://cgiukdjwicykrmtkhudh.supabase.co/functions/v1/admin-api" />
  <meta name="econovaria-csrf-token" content="" />
  <meta name="econovaria-admin-reauth-url" content="../?mode=admin&amp;reason=session-expired" />
  <meta name="econovaria-admin-asset-origins" content="" />
  <meta name="referrer" content="same-origin" />
  <title>Eco Novaria Administrator Console</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="./css/page-shell.css" />
  <link rel="stylesheet" href="./css/admin-overview-terminal.css" data-admin-terminal-stylesheet />
  <link rel="stylesheet" href="./css/admin-overview-integrity.css" />
  <link rel="stylesheet" href="./css/player-create-confirmation.css" />
  <style>
    .admin-session-gate {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: grid;
      place-items: center;
      padding: 24px;
      color: rgba(210, 247, 255, 0.72);
      background: #020914;
      font: 700 11px/1.5 "JetBrains Mono", ui-monospace, monospace;
      letter-spacing: 0.14em;
      text-align: center;
      text-transform: uppercase;
    }

    .admin-session-gate.is-error {
      color: #ff6976;
    }

    .admin-session-gate__panel {
      width: min(460px, 100%);
      padding: 24px;
      border: 1px solid rgba(255, 105, 118, 0.34);
      background: rgba(5, 17, 31, 0.94);
    }

    .admin-session-gate__panel p {
      margin: 0;
    }

    .admin-session-gate__actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 18px;
    }

    .admin-session-gate__actions button {
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid rgba(210, 247, 255, 0.28);
      color: #d2f7ff;
      background: rgba(11, 31, 50, 0.92);
      font: inherit;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .admin-session-gate__actions button:hover,
    .admin-session-gate__actions button:focus-visible {
      border-color: rgba(255, 103, 0, 0.8);
      outline: none;
    }
  </style>
  <script defer src="./session-gate.js"></script>
  <script defer src="./admin-auth.js"></script>
  <script defer src="./dist/admin-overview-terminal.js"></script>
  <script defer src="./asset-wiring.js"></script>
  <script defer src="./classroom-write-fallback.js"></script>
  <script defer src="./create-action-adapter.js"></script>
  <script defer src="./player-access-code-bridge.js"></script>
  <script defer src="./player-create-lifecycle.js"></script>
  <script defer src="./player-drawer-wiring.js"></script>
  <script defer src="./player-identity-wiring.js"></script>
  <script defer src="./player-create-ux.js"></script>
  <script defer src="./game-code-wiring.js"></script>
  <script defer src="./dist/admin-overview-boot.js"></script>
</head>
<body>
  <div id="adminSessionGate" class="admin-session-gate" role="status" aria-live="polite">
    Opening administrator console…
  </div>
  <main id="adminPreview" aria-label="Eco Novaria admin terminal" hidden></main>
</body>
</html>
