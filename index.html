<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f172a" />
  <title>Econovaria</title>
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/brand/favicon-32.png?v=20260724.4" />
  <link rel="shortcut icon" type="image/png" href="./assets/brand/favicon-32.png?v=20260724.4" />
  <link rel="stylesheet" href="frontend/src/styles/app.css" />
  <style id="app-preload-style">
    html.preload,
    html.preload body {
      min-height: 100%;
      margin: 0;
      background:
        linear-gradient(135deg, rgba(15, 23, 42, .96), rgba(17, 24, 39, .94)),
        radial-gradient(circle at 18% 22%, rgba(234, 88, 12, .22), transparent 30%),
        radial-gradient(circle at 88% 78%, rgba(37, 99, 235, .18), transparent 34%),
        #0f172a;
    }

    html.preload .login-panel-frame { opacity: 0; }
    html:not(.preload) .login-panel-frame {
      opacity: 1;
      transition: opacity 120ms ease;
    }

    .login-root .brand-block {
      gap: 0;
      padding: 22px 24px 16px;
    }

    .login-root .logo-mark.is-econovaria-logo {
      width: min(286px, 100%);
      height: auto;
      aspect-ratio: 1672 / 941;
      animation: none;
    }

    .login-root .logo-mark.is-econovaria-logo img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 22px rgba(0, 212, 255, .24)) drop-shadow(0 0 26px rgba(255, 0, 238, .14));
    }


    .login-root .logo-mark.is-econovaria-logo {
      position: relative;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .login-root .logo-mark-fallback {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #8eeeff;
      font: 900 clamp(22px, 5vw, 38px)/1 ui-sans-serif, system-ui, sans-serif;
      letter-spacing: .08em;
      text-shadow: 0 0 16px rgba(0, 212, 255, .55), 0 0 22px rgba(255, 0, 238, .28);
    }

    .login-root .logo-mark.is-econovaria-logo img {
      position: relative;
      z-index: 1;
    }

    .login-root .logo-mark.has-brand-error img {
      display: none;
    }

    @media (prefers-reduced-motion: reduce) {
      html:not(.preload) .login-panel-frame { transition: none; }
    }
  </style>
</head>

          <div class="mode-tabs" role="tablist" aria-label="Login mode">
            <button class="mode-tab active" data-mode="player" type="button" role="tab" aria-selected="true">Player</button>
            <button class="mode-tab" data-mode="admin" type="button" role="tab" aria-selected="false">Admin</button>
            <button class="mode-tab" data-mode="create" type="button" role="tab" aria-selected="false">Create Game</button>
          </div>

          <div id="playerPane" class="mode-pane active">
            <form id="playerForm" class="form-stack">
              <label>
                <span>Game / Session Code</span>
                <input id="gameCode" autocomplete="off" maxlength="12" placeholder="Game / Session Code" required />
              </label>
              <label>
                <span>Player ID / RFID Card</span>
                <input id="playerId" autocomplete="off" placeholder="Scan RFID card or enter Player ID" required />
              </label>
              <label>
                <span>Access Code</span>
                <input id="playerAccessCode" type="password" autocomplete="current-password" placeholder="Enter Access Code" required />
              </label>
              <div id="playerMessage" class="login-message status-message hidden"></div>
              <button class="submit-btn cyan" type="submit">Enter Game</button>
            </form>
          </div>

          <div id="adminPane" class="mode-pane">
            <div id="adminLoginStep">
              <form id="adminForm" class="form-stack">
                <label>
                  <span>Admin Email</span>
                  <input id="adminEmail" type="email" autocomplete="username" placeholder="teacher@example.com" required />
                </label>
                <label>
                  <span>Access Code</span>
                  <input id="adminAccessCode" type="password" autocomplete="current-password" placeholder="Enter Access Code" required />
                </label>
                <div id="adminMessage" class="login-message status-message hidden"></div>
                <button class="submit-btn amber" type="submit">Admin Login</button>
                <button id="forgotAdminAccessCode" class="auth-link-button" type="button">Forgot Access Code?</button>
              </form>
            </div>

            <div id="adminGamesStep" class="hidden">
              <div class="step-header">
                <span>Select Active Game</span>
                <button id="backToAdminLogin" type="button">Back</button>
              </div>
              <div id="selectedGameMessage" class="login-message status-message hidden"></div>
              <div id="adminGameList" class="game-list"></div>
            </div>
          </div>

          <div id="createPane" class="mode-pane">
            <form id="createForm" class="form-stack form-stack-compact">
              <label>
                <span>License / Purchase Code</span>
                <input id="licenseCode" autocomplete="off" placeholder="Enter License Code" required />
              </label>
              <label>
                <span>Teacher / Admin Email</span>
                <input id="createEmail" type="email" autocomplete="username" placeholder="teacher@example.com" required />
              </label>
              <label>
                <span>Display Name</span>
                <input id="createDisplayName" autocomplete="name" placeholder="Teacher Name" required />
              </label>
              <label>
                <span>Game Name</span>
                <input id="sessionName" autocomplete="off" placeholder="Period 3 Economy" required />
              </label>
              <label>
                <span>Game Timezone</span>

                  <option value="UTC">UTC</option>
                </select>
                <small id="gameTimeZoneHelp">Controls market hours for every exchange in this game.</small>
              </label>
              <label>
                <span>Difficulty</span>
                <select id="difficultyLevel" required>
                  <option value="" selected disabled>Select difficulty</option>
                  <option value="easy">Easy</option>
                  <option value="moderate">Moderate</option>
                  <option value="hard">Hard</option>
                  <option value="insane">Insane</option>
                </select>
              </label>
              <div class="two-col">
                <label>
                  <span>Access Code</span>
                  <input id="createAccessCode" type="password" autocomplete="new-password" minlength="8" placeholder="Minimum 8 characters" required />
                </label>
                <label>
                  <span>Confirm</span>
                  <input id="confirmAccessCode" type="password" autocomplete="new-password" minlength="8" placeholder="Confirm Access Code" required />
                </label>
              </div>
              <div id="createMessage" class="login-message status-message hidden"></div>
              <button class="submit-btn purple" type="submit">Create Game</button>
            </form>
          </div>

          <footer class="panel-footer">
            <span>ECONOVARIA &middot; PLAYER TERMINAL CUTOVER</span>
            <span><span class="status-dot green"></span> SUPABASE CONNECTED</span>
          </footer>
          <div class="panel-accent panel-accent-bottom"></div>
        </section>
      </div>
    </div>
  </section>

  <script>
    (function clearSignedOutAdminState() {
      try {
        const params = new URLSearchParams(window.location.search);
        if (params.get("reason") !== "signed-out") return;
        window.sessionStorage.removeItem("econovaria.admin.auth.v1");
        window.sessionStorage.removeItem("econovaria.admin.selected-game.v1");
        window.sessionStorage.removeItem("econovaria.admin.csrf.v1");
      } catch (_) {}
    })();
  </script>
  <script src="runtime-config.env.js"></script>
  <script src="frontend/src/core/runtime-config.js"></script>
  <script src="frontend/src/core/constants.js"></script>
  <script src="frontend/src/core/api.js"></script>
  <script src="frontend/src/core/login.js"></script>
  <script>
    (function installLoginSurfaceGuard() {
      document.documentElement.classList.remove("preload");
      const image = document.querySelector("[data-econovaria-brand-image]");
      const mark = image?.closest(".logo-mark");
      const fail = function () { mark?.classList.add("has-brand-error"); };
      image?.addEventListener("load", function () { mark?.classList.remove("has-brand-error"); });
      image?.addEventListener("error", fail, { once: true });
      if (image?.complete && image.naturalWidth === 0) fail();
    })();
  </script>
</body>
</html>
