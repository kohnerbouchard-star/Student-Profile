<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="referrer" content="no-referrer" />
  <title>Reset Eco Novaria Access Code</title>
  <link rel="stylesheet" href="./reset-password.css" />
  <script defer src="./reset-password.js"></script>
</head>
<body>
  <main class="reset-shell">
    <section class="reset-card" aria-labelledby="resetTitle">
      <span class="reset-kicker">Verified staff recovery</span>
      <h1 id="resetTitle">Set a new Access Code</h1>
      <p id="resetIntro">Enter a new Access Code for your Eco Novaria administrator account.</p>

      <form id="resetPasswordForm" class="reset-form" hidden>
        <label>
          <span>New Access Code</span>
          <input name="password" type="password" minlength="8" autocomplete="new-password" required />
        </label>
        <label>
          <span>Confirm Access Code</span>
          <input name="confirmPassword" type="password" minlength="8" autocomplete="new-password" required />
        </label>
        <button type="submit">Update Access Code</button>
      </form>

      <p id="resetMessage" class="reset-message" role="status"></p>
      <a class="reset-back" href="../?mode=admin">Return to administrator sign-in</a>
    </section>
  </main>
</body>
</html>
